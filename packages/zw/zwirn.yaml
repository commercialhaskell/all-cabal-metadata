description: "# \U0001F9F6\U0001F9F5\U0001F9F6 zwirn \U0001F9F6\U0001F9F5\U0001F9F6
  \n\nzwirn is a live coding language for playing with nested functions of time.\n\n##
  Inspiration\n\nzwirn is an experiment in making the pattern language [TidalCycles](https://tidalcycles.org/)
  into a small functional language of it's own. while zwirn's internals are quite
  different from Tidal's, zwirns design owes almost everything to tidals design by
  [Alex McLean](https://slab.org/).\n\nthe internal representation of signals of time
  was implemented together (and parallel) with [Julian Rohrhuber](https://wertlos.org/~rohrhuber/),
  in an effort to port tidal to SuperCollider. This can be found in the [zwirn-core](https://codeberg.org/uzu/zwirn/src/branch/main/src/zwirn-core/Zwirn/Core)
  sublibrary.\n\nthe implementation of the compiler is inspired by the excellent [Write
  You a Haskell](https://github.com/sdiehl/write-you-a-haskell) by Stephen Diehl.\n\n##
  Installing zwirn\n\ntba\n\n## Limitations\n\ndue to the representation of signals
  and the way they are queried, there can only be a limited amount of triggers per
  cycle, if this number is exceeded zwirn fails to find any triggers. Currently the
  threshold seems to be at 500 triggers per cycle:\n\nwhile ``` fast 499 $ s \"bd\"
  ``` works as expected, ``` fast 500 $ s \"bd\" ``` is silent. if you would like
  to increase the amount of trigger per *second* (not cycle!), increase the cycles
  per second, for example by running ``` :cps 1 ```.\n\n## Documentation\n\ndocumentation
  for zwirn is still in progress and available [here](https://codeberg.org/uzu/zwirn/wiki),
  feel free to drop me a message if you have any questions.\n"
