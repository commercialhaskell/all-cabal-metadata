changelog: |
  # Revision history for http-core

  ## 0.1.0.1 -- 2026-04-28

  * Bump `cabal-version` to 3.12. Older `cabal-install` (shipped with
    GHC < 9.10) was parsing the file before rejecting it on
    `default-language: GHC2024`, producing PlanningFailed on
    Hackage's GHC 9.8 build matrix row. Bumping forces clean
    rejection on older toolchains. No code changes.

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Shared HTTP method and status code primitives used across
    the acolyte and spire package families.
changelog-type: markdown
description: |-
  Shared HTTP vocabulary types that are independent of any specific
  server backend (warp, snap, etc.) or middleware framework.
  .
  This is the Haskell equivalent of Rust's @http@ crate: a tiny,
  stable package defining Request and Response types that everyone
  depends on. WAI, warp, and other backends are confined to adapter
  packages; this package knows nothing about them.
