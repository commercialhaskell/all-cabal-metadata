changelog: "# Change log for esqueleto-postgis project\n\n## Version 4.1.0\n+ Add
  95 PostGIS function bindings covering the bulk of the PostGIS 3.6 geometry API.\n+
  Geometry constructors: `st_collect`, `st_makeenvelope`, `st_makeline`, `st_makepolygon_line`.\n+
  Geometry accessors: `st_boundary`, `st_coorddim`, `st_endpoint`, `st_exteriorring`,\n
  \ `st_geometryn`, `st_geometrytype`, `st_interiorringn`, `st_iscollection`, `st_isempty`,\n
  \ `st_ispolygonccw`, `st_ispolygoncw`, `st_isring`, `st_m`, `st_ndims`, `st_nrings`,\n
  \ `st_numinteriorrings`, `st_numpoints`, `st_pointn`, `st_startpoint`, `st_z`.\n+
  Geometry editors: `st_addpoint`, `st_collectionextract`, `st_flipcoordinates`,\n
  \ `st_force2d`, `st_force3d`, `st_force4d`, `st_forcecollection`,\n  `st_forcepolygonccw`,
  `st_forcepolygoncw`, `st_multi`, `st_normalize`,\n  `st_reverse`, `st_segmentize`,
  `st_setpoint`, `st_snaptogrid`, `st_snap`.\n+ Geometry validation: `st_makevalid`,
  `st_isvalidreason`.\n+ SRS: `st_setsrid`.\n+ Geometry output: `st_astext`, `st_asgeojson`,
  `st_asewkt`, `st_geohash`.\n+ Spatial relationships: `st_3dintersects`, `st_relate`,
  `st_orderingequals`,\n  `st_dfullywithin`, `st_pointinsidecircle`.\n+ Measurements:
  `st_angle`, `st_closestpoint`, `st_3dclosestpoint`, `st_3ddistance`,\n  `st_distancesphere`,
  `st_frechetdistance`, `st_hausdorffdistance`, `st_length2d`,\n  `st_3dlength`, `st_longestline`,
  `st_3dlongestline`, `st_3dmaxdistance`,\n  `st_minimumclearance`, `st_shortestline`,
  `st_3dshortestline`.\n+ Overlay functions: `st_symdifference`, `st_unaryunion`,
  `st_split`, `st_node`.\n+ Geometry processing: `st_buildarea`, `st_chaikinsmoothing`,
  `st_concavehull`,\n  `st_delaunaytriangles`, `st_generatepoints`, `st_geometricmedian`,
  `st_linemerge`,\n  `st_minimumboundingcircle`, `st_offsetcurve`, `st_reduceprecision`,
  `st_sharedpaths`,\n  `st_simplify`, `st_simplifypreservetopology`, `st_voronoilines`,
  `st_voronoipolygons`.\n+ Affine transformations: `st_translate`, `st_scale`, `st_rotate`,
  `st_rotatex`, `st_rotatez`.\n+ Bounding box: `st_expand`.\n+ Linear referencing:
  `st_lineinterpolatepoint`, `st_linelocatepoint`, `st_linesubstring`.\n+ Integration
  test for every new function.\n\n## Version 4.0.3\n+ add comments on x and y, z and
  m.\n\n## Version 4.0.2 \n+ fix bug where st_point and friends did not respect spatialType.\n
  \ solved it by always casting them to whatever the user specified.\n  Added tests
  for this as well.\n\n## Version 4.0.1 \n+ Add notes on topology, may save some people
  a lot of time.\n+ Remove flake, use npins\n             \n## Version 4.0.0 \nHotfix!\n\n+
  `st_union` can't work on geography, banned that.\n+ `st_intersects` was to strict
  and worked only on geography\n+ add `st_transform_geometry` and `st_transform_geography`
  to convert between the two.\n+ hopefully I've explained the srid system somewhat
  understandable, it's kinda confusing.\n+ restrict `st_contains` to geometry as well
  \       .\n\n## Version 3.0.0 \n* add spatial type, split up postgis from geoemetry.\n
  \ this will allow us to deal with curveture of earth and other weird SRID's:\n  consider:\n```\nconverge=#
  SELECT ST_Distance(\n    ST_MakePoint(-118.24, 34.05)::geometry, -- LA\n    ST_MakePoint(-74.00,
  40.71)::geometry   -- NYC\n) as distance_in_km;\n  distance_in_km   \n-------------------\n
  44.73849796316367\n(1 row)\n\nconverge=# SELECT ST_Distance(\n    ST_MakePoint(-118.24,
  34.05)::geography, \n    ST_MakePoint(-74.00, 40.71)::geography\n) / 1000 as distance_in_km;\n
  \  distance_in_km   \n--------------------\n 3944.7358246490203\n(1 row)\n```\nThe
  change is mostly backward compatible, \nbut I deleted some instances I didn't want
  to solve.\nFurthermore the postgis type is arguably a bit more complicated now.\n\nI
  did have some minor breakage in the test suite on st_unions: \n```\n-                pure
  $ st_unions (val (Polygon $ makePolygon (PointXY 0 0) (PointXY 0 2) (PointXY 2 2)
  $ Seq.fromList [(PointXY 2 0)])) $\n+                pure $ st_unions @'Geometry
  \ (val (Polygon $ makePolygon (PointXY 0 0) (PointXY 0 2) (PointXY 2 2) $ Seq.fromList
  [(PointXY 2 0)])) $\n```\nYou may need to tell the compiler weather to use geometry
  or geography.\nBut then it'll happen correct within the database as well.\n\nWe
  don't allow mixing of the two.\n\n\n## Version 2.2.0 \n* add st_dwithin to find
  stuf within a range\n\n## Version 2.1.0 \n* add st_unions\n\n## Version 2.0.1 \n*
  drop haskell works hedghog dependency\n\n## Version 2.0.0 \n* Hide irrelevant modules\n*
  delete hex module, use base16 hex approach instead.\n* Much better docs that explain
  what's going on.\n\n## Version 1.2.0 \n+ re-export point, less annoying to use.\n+
  adopt wkt-geom package and put it in as a submodule,\n  original library doesn't
  appear to be maintained.\n  this way we're a step closer to stackage.\n  + got rid
  of the internal convention, \n    it goes against pvp. If we want some specialized\n
  \   usage package I should split off a core package instead.\n    For now I don't
  care I don't think I'm not changing those \n    functions anyway.\n  + also ported
  over the test suite\n+ swap out bytestring-base16 for base16, which appears maintained.\n\n\n##
  Version 1.1.0 \n+ Add st_union\n+ add getPoitns to escape the postgis geometry more
  easily.\n+ bump bounds\n\n\n## Version 1.0.1 \n+ fix insane bounds by cabal genbounds.
  \n  I think this was caused due to running it from the flake which\n  takes a bunch
  of outdated packages from stackage.\n\n## Version 1.0.0 \n+ add st_contains\n+ add
  st_intersects\n+ add st_point\n+ add custom datatype to map to persistent.\n+ bunch
  of roundtrip tests and sanity tests for added functions\n\n## Version 0.0.0 \n\nimport
  [template](https://github.com/jappeace/template).\n\n"
changelog-type: markdown
description: "[![https://jappieklooster.nl](https://img.shields.io/badge/blog-jappieklooster.nl-lightgrey)](https://jappieklooster.nl/tag/haskell.html)\n[![Github
  actions build status](https://img.shields.io/github/actions/workflow/status/jappeace/esqueleto-postgis/nix.yaml?branch=master)](https://github.com/jappeace/esqueleto-postgis/actions)\n[![Jappiejappie](https://img.shields.io/badge/discord-jappiejappie-black?logo=discord)](https://discord.gg/Hp4agqy)\n[![Hackage
  version](https://img.shields.io/hackage/v/esqueleto-postgis.svg?label=Hackage)](https://hackage.haskell.org/package/esqueleto-postgis)
  \n\n> Show me the place where space is not.\n\nImplement (partial) postgis functionality
  for esqueleto.\nhttps://postgis.net/\n\nuses wkt-geom to get a persistent instance,\nthen
  maps that to a custom datatype 'PostgisGeometry' which is valid\nfor roundtripping.\n\nThen
  the esqueleto combinators are defined around this datatype.\n\n# Tutorial\n\nmost
  linux distributions support this out of the box.\nnixos needs some special care:\n```nix\nservices.postgresql
  = {\n   enable = true;\n   package = (pkgs.postgresql_12.withPackages (p: [ p.postgis
  ]));\n};\n```\nFor mac you've to [install](https://postgis.net/documentation/getting_started/install_macos/)
  postgis.\n```sh\nbrew install postgis\n```\n\nMake sure to enable to postgis extension
  on your database (it's activated per database):\n```sql\nCREATE EXTENSION postgis;\n```\n\nyou
  can specify some posgis geometry,\nuse the point to nidicate dimensions, \npointxy
  = 2 dimensions\npointxyz = 3, pointxyzm = 4.\nThe library forces you to work in
  the same dimensions.\n\nYou can specify a table with the custom datatype, which
  will have geometry as sql type:\n\n```haskell\nshare\n  [mkPersist sqlSettings,
  mkMigrate \"migrateAll\"]\n  [persistUpperCase|\n  Unit sql=unit\n    geom       (PostgisGeometry
  PointXY)\n    deriving Eq Show\n|]\n```\n\nthen you can simply query on tat datatype:\n\n```haskell\ntest
  = testCase (\"it finds the one unit with st_contains\") $ do\n            result
  <- runDB $ do\n              _ <- insert $\n                Unit\n                  {
  unitGeom = Polygon $ makePolygon (PointXY 0 0) (PointXY 0 2) (PointXY 2 2) $ Seq.fromList
  [(PointXY 2 0)]\n                  }\n\n              selectOne $ do\n                unit
  <- from $ table @Unit\n                where_ $ unit ^. UnitGeom `st_contains` (val
  $ Point (PointXY 1 1))\n                pure countRows\n\n            -- expectation,
  the result should be 1\n            unValue <$> result @?= (Just (1 :: Int)),\n```\n\n#
  Contributing\ncontributions are welcome.\nThere are still many bindings missing!\n\n#
  Hacking\n\n### Tools\nEnter the nix shell.\n```\nnix-shell\n```\nYou can checkout
  the makefile to see what's available:\n```\ncat makefile\n```\n\n### Running\n```\nmake
  run\n```\n\n### Fast filewatch which runs tests\n```\nmake ghcid\n```\n"
