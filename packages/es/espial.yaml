description: "# Espial\r\n\r\nEspial is an open-source, web-based bookmarking server.\r\n\r\nIt
  supports multiple user accounts and is primarily intended for self-hosted deployments.\r\n\r\nBookmarks
  are stored in a SQLite database to keep setup and maintenance straightforward.\r\n\r\nEspial
  also includes internationalization support.\r\n\r\n### Adding Bookmarks\r\n\r\nThe
  easist way for logged-in users to add bookmarks, is with the \"bookmarklet\", found
  on the Settings page.\r\n\r\nEspial also supports file import options.\r\n\r\n##
  Demo Server\r\n\r\nLog in with:\r\n\r\n- username: `demo`\r\n- password: `demo`\r\n\r\nhttps://espdemo.ae8.org/u:demo\r\n\r\n![jpg](./docs/demo-bookmarks-page-dark.png)\r\n\r\n##
  Related Projects\r\n\r\nAlso, see the android app for adding bookmarks via an Android
  Share intent:\r\n\r\nhttps://github.com/jonschoning/espial-share-android\r\n\r\n##
  Installation\r\n\r\n### Docker Setup (Recommended Method)\r\n\r\nDocker installation
  is the recommended approach for most deployments.\r\n\r\nSee:\r\n\r\nhttps://github.com/jonschoning/espial-docker\r\n\r\n###
  Setup From Source\r\n\r\n1. Install Haskell tooling (choose one):\r\n   - **Stack**:
  https://docs.haskellstack.org/en/stable/\r\n   - **GHCup** (installs GHC, Stack,
  and more): https://www.haskell.org/ghcup/install/\r\n2. Build executables:\r\n\r\n```bash\r\nstack
  build\r\n```\r\n\r\n3. Create the database:\r\n\r\n```bash\r\nstack exec migration
  -- createdb\r\n```\r\n\r\n4. Create a user:\r\n\r\n```bash\r\nstack exec migration
  -- createuser --userName myusername --userPassword myuserpassword\r\n```\r\n\r\n5.
  Import a pinboard bookmark file for a user (optional):\r\n\r\n```bash\r\nstack exec
  migration -- importbookmarks --userName myusername --bookmarkFile sample-bookmarks.json\r\n```\r\n\r\n6.
  Import a firefox bookmark file for a user (optional):\r\n\r\n```bash\r\nstack exec
  migration -- importfirefoxbookmarks --userName myusername --bookmarkFile firefox-bookmarks.json\r\n```\r\n\r\n7.
  Start a production server:\r\n\r\n```bash\r\nstack exec espial\r\n```\r\n\r\n##
  API\r\n\r\n### Adding a Bookmark via `curl`\r\n\r\nBookmarks can be added programmatically
  by POSTing JSON to `/api/add`, authenticated with an API key.\r\n\r\n1. Generate
  an API key for a user, either:\r\n   - From the Account Settings (`settings`) page
  in the web UI, under **API Key** — click **Create API Key** (or **Reset API Key**
  to replace an existing one). The key is shown only once, so copy it immediately.\r\n
  \  - Or via the CLI:\r\n\r\n     ```bash\r\n     stack exec migration -- createapikey
  --userName myusername\r\n     ```\r\n\r\n2. Call the endpoint, passing the key in
  the `Authorization: ApiKey <key>` header:\r\n\r\nExample Request:\r\n\r\n```bash\r\ncurl
  -X POST https://your-espial-host/api/add \\\r\n  -H \"Authorization: ApiKey <key>\"
  \\\r\n  -H \"Content-Type: application/json\" \\\r\n  -H \"Accept: application/json\"
  \\\r\n  -d '{\r\n        \"url\": \"https://example.com\",\r\n        \"title\":
  \"Example Site\",\r\n        \"description\": \"\",\r\n        \"tags\": \"example
  some-tag\",\r\n        \"private\": false,\r\n        \"toread\": false\r\n      }'\r\n```\r\n\r\nOnly
  `url` is required; all other fields are optional. On success the response is `201
  Created` with the new bookmark id, or `204 No Content` if an existing bookmark was
  updated instead — matched by `bid` if given, otherwise by the (`userid`, `url`)
  pair.\r\n\r\n### `/api/add` Fields\r\n\r\n| Field              | Type      | Description
  \                                                                                                                                                                                 |\r\n|
  ------------------ | --------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  |\r\n| `url`              | `string`  | The bookmark's URL. Required.                                                                                                                                                                |\r\n|
  `title`            | `string`  | The bookmark's title/description line. Defaults
  to empty.                                                                                                                                    |\r\n|
  `description`      | `string`  | Extended/longer notes for the bookmark. Defaults
  to empty.                                                                                                                                   |\r\n|
  `tags`             | `string`  | Space-separated list of tags, e.g. `\"example some-tag\"`.
  \                                                                                                                                    |\r\n|
  `private`          | `boolean` | `true` keeps the bookmark private to the owner;
  `false` (or omitted) makes it shared/public.                                                                                                 |\r\n|
  `toread`           | `boolean` | Marks the bookmark on the \"to read\" list. Defaults
  to `false`.                                                                                                                               |\r\n|
  `bid`              | `number`  | Existing bookmark id to update. Omit to create
  a new bookmark (or update by matching `url` — see above).                                                                                     |\r\n|
  `slug`             | `string`  | URL-friendly identifier used in bookmark links
  (`u:<user>/<slug>`). Auto-generated when omitted.                                                                                             |\r\n|
  `selected`         | `boolean` | Whether the bookmark is \"starred\". Defaults to
  `false`.                                                                                                                                      |\r\n|
  `time`             | `string`  | Creation timestamp, ISO 8601 (e.g. `\"2018-02-26T22:57:20Z\"`).
  Defaults to the current time; useful when importing bookmarks with a historical
  date.                                          |\r\n| `archiveUrl`       | `string`
  \ | Link to an already-archived copy of the page. Normally set by the archiver,
  not supplied by clients.                                                                                         |\r\n|
  `archiveRequested` | `boolean` | Whether to kick off archiving of `url` after saving.
  Only takes effect when an archive backend is configured (see [Archive Backends](#archive-backends)).
  Not stored on the bookmark itself. |\r\n\r\n### Adding Multiple Bookmarks via `curl`\r\n\r\nMultiple
  bookmarks can be added in a single request by POSTing a JSON array to `/api/addBulk`,
  using the same fields and auth as `/api/add`.\r\n\r\nExample Request:\r\n\r\n```bash\r\ncurl
  -X POST https://your-espial-host/api/addBulk \\\r\n  -H \"Authorization: ApiKey
  <key>\" \\\r\n  -H \"Content-Type: application/json\" \\\r\n  -H \"Accept: application/json\"
  \\\r\n  -d '\r\n  [\r\n    {\r\n      \"url\": \"https://example.com/11111111\",\r\n
  \     \"title\": \"Example Site 1\",\r\n      \"description\": \"Random test bookmark
  11111111\",\r\n      \"tags\": \"example test run1\",\r\n      \"private\": false,\r\n
  \     \"toread\": false\r\n    },\r\n    {\r\n      \"url\": \"https://example.com/22222222\",\r\n
  \     \"title\": \"Example Site 2\",\r\n      \"description\": \"Random test bookmark
  22222222\",\r\n      \"tags\": \"example test run2\",\r\n      \"private\": false,\r\n
  \     \"toread\": false\r\n    },\r\n    {\r\n      \"url\": \"33333333\",\r\n      \"title\":
  \"Example Site 3\",\r\n      \"description\": \"Random test bookmark 33333333\",\r\n
  \     \"tags\": \"example test run3\",\r\n      \"private\": false,\r\n      \"toread\":
  false\r\n    }\r\n  ]'\r\n```\r\n\r\nThe response is `200 OK` with a JSON array
  of per-bookmark results, in the same order as the request:\r\n\r\n```json\r\n[\r\n
  \ { \"status\": \"created\", \"id\": 105831 },\r\n  { \"status\": \"updated\", \"id\":
  105832 },\r\n  { \"status\": \"failed\", \"error\": \"Invalid URL: InvalidUrlException
  \\\"33333333\\\" \\\"Invalid URL\\\"\" }\r\n]\r\n```\r\n\r\nIf the request array
  has more items than the `add-bulk-max-items` setting allows (default `200`), the
  response is `413 Payload Too Large` and no bookmarks are saved.\r\n\r\n\r\n## Configuration\r\n\r\nSee
  `config/settings.yml` for changing default run-time parameters & environment variables.\r\n\r\n-
  `config/settings.yml` is embedded into the app executable when compiled and also
  read once when the app starts. Current settings in `config/settings.yml` will override
  the embedded compile-time settings.\r\n- `config/settings.yml` values formatted
  like `_env:ENV_VAR_NAME:default_value` can be overridden by the specified environment
  variable.\r\n- Example:\r\n  - `_env:PORT:3000`\r\n  - environment variable `PORT`\r\n
  \ - default app http port: `3000`\r\n\r\n## Internationalization\r\n\r\nEspial's
  frontend supports a selectable UI language per account, on the Account Settings
  (`settings`) page.\r\n\r\nThe Server Language default is controlled by `language-default`
  in `config/settings.yml`, which can also be set with environment variable `LANGUAGE_DEFAULT`
  to the language code; the default value is `en`.\r\n\r\n#### Supported Languages:\r\n\r\n|
  Code      | English name          | Native name        |\r\n| --------- | ---------------------
  | ------------------ |\r\n| `en`      | English               | English            |\r\n|
  `de`      | German                | Deutsch            |\r\n| `es`      | Spanish
  \              | Español            |\r\n| `fr`      | French                | Français
  \          |\r\n| `it`      | Italian               | Italiano           |\r\n|
  `ja`      | Japanese              | 日本語             |\r\n| `ko`      | Korean                |
  한국어             |\r\n| `pl`      | Polish                | Polski             |\r\n|
  `pt-BR`   | Portuguese (Brazil)   | Português (Brasil) |\r\n| `ru`      | Russian
  \              | Русский            |\r\n| `tr`      | Turkish               | Türkçe
  \            |\r\n| `uk`      | Ukrainian             | Українська         |\r\n|
  `zh-Hans` | Chinese (Simplified)  | 简体中文           |\r\n| `zh-Hant` | Chinese (Traditional)
  | 繁體中文           |\r\n\r\n## Request IP Logging\r\n\r\nEspial supports the `IP_FROM_HEADER`
  environment variable for request logging.\r\n\r\n- `IP_FROM_HEADER=true`: log the
  client IP from the `X-Real-IP` or `X-Forwarded-For` header when present, and fall
  back to the peer address if neither header is available.\r\n- `IP_FROM_HEADER=false`:
  log the peer address from the HTTP connection.\r\n\r\nOnly set `IP_FROM_HEADER=true`
  if your application is safely positioned **behind a trusted reverse proxy**.\r\n\r\n##
  TLS / Reverse Proxy\r\n\r\nA reverse proxy is the recommended approach for production
  and most self-hosted deployments. For simple local or LAN setups where that is impractical,
  Espial can also terminate TLS directly — see [Optional: In-Process TLS](#optional-in-process-tls)
  below.\r\n\r\nSet `SSL_ONLY=true` whenever Espial is served over HTTPS (via reverse
  proxy or in-process TLS) to enable the `Secure` cookie flag and HTTP→HTTPS redirects.\r\n\r\n###
  Recommended: Reverse Proxy (Caddy, nginx, Cloudflare Tunnel, …)\r\n\r\nRunning Espial
  behind a reverse proxy is the recommended approach for production and most self-hosted
  deployments. The proxy terminates TLS and forwards plain HTTP to Espial. This gives
  you automatic certificate management, HTTP/2 and HTTP/3 at the edge, and cleaner
  separation of concerns.\r\n\r\nFor container-based deployment examples, including
  production-oriented layouts, see the `espial-docker` repository:\r\n\r\n- https://github.com/jonschoning/espial-docker\r\n\r\nMinimal
  [Caddy](https://github.com/caddyserver/caddy) example:\r\n\r\nLocalhost without
  a real domain:\r\n\r\n```caddyfile\r\nhttps://localhost:3050 {\r\n    reverse_proxy
  localhost:3000\r\n}\r\n```\r\n\r\nor with a domain:\r\n\r\n```caddyfile\r\nespial.example.com
  {\r\n  reverse_proxy 127.0.0.1:3000\r\n}\r\n```\r\n\r\nWith the domain setup:\r\n\r\n-
  Caddy terminates TLS for `espial.example.com`.\r\n- Espial continues listening on
  HTTP, locally on `127.0.0.1:3000`\r\n  - If using Docker Compose, it would look
  like `espial:3000`\r\n- Set `IP_FROM_HEADER=true` only when Espial is reachable
  solely through that trusted proxy.\r\n\r\nIf you are using Cloudflare:\r\n\r\n-
  Prefer Cloudflare SSL mode `Full (strict)`.\r\n- use `header_up X-Forwarded-For
  {http.request.header.CF-Connecting-IP}`\r\n- If traffic can reach Espial directly
  without passing through your trusted proxy, do not enable `IP_FROM_HEADER=true`,
  because client IP headers can be spoofed.\r\n\r\n#### Running on a Subpath\r\n\r\nEspial
  can also be served under a path prefix on a shared domain, e.g. `https://www.domain.com/espial`
  alongside other apps on the same host. This needs two pieces working together:\r\n\r\n1.
  **`APPROOT`** — tell Espial the full external URL (including the subpath) it's being
  served at, so generated links, redirects, and static asset URLs come out correct:\r\n\r\n
  \  ```yaml\r\n   approot: \"_env:APPROOT:https://www.domain.com/espial\"\r\n   ```\r\n\r\n
  \  or via environment variable:\r\n\r\n   ```bash\r\n   APPROOT=https://www.domain.com/espial
  stack exec espial\r\n   ```\r\n\r\n2. **Reverse proxy** — strip the `/espial` prefix
  before forwarding to Espial, since Espial itself always routes as if mounted at
  `/`. Also redirect the bare `/espial` (no trailing slash) to `/espial/` so relative
  URLs in the page resolve against the right base.\r\n\r\n   Minimal Caddy example
  (see `caddy/Caddyfile-Standalone-Subpath`, which runs Caddy in Docker alongside
  an Espial instance on the host):\r\n\r\n   ```caddyfile\r\n   :80 {\r\n       redir
  /espial /espial/\r\n\r\n       handle_path /espial/* {\r\n           # Caddy pools
  and reuses idle connections to the backend\r\n           # by default, but Espial's
  Warp server closes idle connections after 30s\r\n           # set keepalive to off
  or 15s\r\n           reverse_proxy host.docker.internal:3000 {\r\n               transport
  http {\r\n                   keepalive off\r\n               }\r\n           }\r\n
  \      }\r\n   }\r\n   ```\r\n\r\n   `handle_path` strips the `/espial` prefix before
  proxying, matching what `APPROOT` told Espial to expect. If Caddy and Espial run
  on the same host (not in Docker), replace `host.docker.internal:3000` with `localhost:3000`.\r\n\r\n###
  Optional: In-Process TLS\r\n\r\nFor simple local or LAN deployments where adding
  a reverse proxy is impractical, Espial can terminate TLS directly using your own
  certificate and key files (PEM format, unencrypted key).\r\n\r\nSet the `TLS_CERT_FILE`
  and `TLS_KEY_FILE` environment variables (or the corresponding `tls-cert-file` /
  `tls-key-file` keys in `config/settings.yml`) to the paths of your certificate and
  private key:\r\n\r\n```bash\r\nTLS_CERT_FILE=/path/to/cert.pem TLS_KEY_FILE=/path/to/key.pem
  stack exec espial\r\n```\r\n\r\nOr in `config/settings.yml`:\r\n\r\n```yaml\r\ntls-cert-file:
  \"/path/to/cert.pem\"\r\ntls-key-file: \"/path/to/key.pem\"\r\n```\r\n\r\nWhen both
  values are set Espial listens on HTTPS with HTTP/2 enabled. When either is absent
  Espial falls back to plain HTTP.\r\n\r\n**Certificate rotation** — Espial reloads
  the certificate from disk automatically every 12 hours without restarting or dropping
  existing connections. To trigger an immediate reload send `SIGHUP` to the process:\r\n\r\n```bash\r\nkill
  -HUP <espial-pid>\r\n```\r\n\r\n**Notes:**\r\n\r\n- Let's Encrypt certificates (`fullchain.pem`
  + `privkey.pem`) work directly.\r\n- A self-signed certificate for local testing
  can be generated with:\r\n  ```bash\r\n  openssl req -x509 -newkey rsa:2048 -nodes
  \\\r\n    -keyout key.pem -out cert.pem -days 3650 \\\r\n    -subj \"/CN=localhost\"
  \\\r\n    -addext \"subjectAltName=DNS:localhost,IP:127.0.0.1\"\r\n  ```\r\n- A
  reverse proxy is still preferred for production: it provides HTTP/3, edge caching,
  and hides the Espial process from the public internet.\r\n\r\n## Archive Backends\r\n\r\nEspial
  supports configurable archive backends for saving bookmark snapshots.\r\n\r\nSet
  the backend with `archive-backend` in `config/settings.yml`:\r\n\r\n- `disabled`:
  archiving is turned off (default).\r\n- `wayback-machine`: enables submission to
  the Internet Archive Wayback Machine.\r\n\r\n  Wayback Machine support requires
  the following settings:\r\n  - `wayback-machine-access-key`\r\n  - `wayback-machine-secret-key`\r\n\r\n
  \   Create these by signing in to your Internet Archive account and generating S3-style
  API credentials at `https://archive.org/account/s3.php`. \\\r\n     If `wayback-machine`
  is selected but the access key or secret key is missing, archiving is disabled at
  runtime.\r\n\r\n- `archivebox07`: queues the URL in a local ArchiveBox 0.7 instance
  and stores an ArchiveBox link on the bookmark.\r\n\r\n  **IMPORTANT - ArchiveBox
  stores all archive data in a single global index space, so this arcive-backend is
  best suited to single-user Espial instances.**\r\n\r\n  **Recommended setup is to
  use Docker Compose to run the ArchiveBox instance**\r\n  - Simple example, running
  on localhost: [docker-compose.archivebox07.yml](docker-compose.archivebox07.yml)\r\n
  \ - See https://github.com/jonschoning/espial-docker for more examples intended
  for deployment\r\n  - In all examples, you must change the `ARCHIVEBOX_PASSWORD`
  from it's default value.\r\n\r\n  ArchiveBox support requires the following settings:\r\n
  \ - `archivebox-url`\r\n\r\n    `archivebox-url` is the URL espial uses to sign
  in to ArchiveBox and submit URLs through the web UI. In Docker Compose this is typically
  `http://archivebox:8000`.\r\n\r\n  - `archivebox-public-url` (optional)\r\n\r\n
  \   Public ArchiveBox URL stored on bookmarks.\r\n\r\n  - `archivebox-username`
  plus `archivebox-password`\r\n\r\n    Espial signs in to the ArchiveBox web UI with
  these credentials before submitting URLs.\r\n\r\n  - `archivebox-tag` (optional)\r\n\r\n
  \   A tag Espial adds to submissions (example: `espial`).\r\n\r\n  - `archivebox-plugins`
  (optional)\r\n\r\n    Comma-separated list of ArchiveBox methods (plugins) to request
  when submitting URLs, e.g. `title,favicon,singlefile,screenshot`.\r\n\r\n  Set the
  ArchiveBox admin credentials in the override path by supplying:\r\n  - `ARCHIVEBOX_USERNAME=...`\r\n
  \ - `ARCHIVEBOX_PASSWORD=...`\r\n\r\n  The `Makefile` includes the following helpers:\r\n
  \ - `docker-compose-up-archivebox07`\r\n  - `docker-compose-up-d-archivebox07`\r\n
  \ - `docker-compose-exec-archivebox07`\r\n\r\n  Or start the instance manually via
  docker compose, example:\r\n\r\n  ```bash\r\n  docker compose -f docker-compose.archivebox07.yml
  up\r\n  ```\r\n\r\n  Configure the enrivonment variable `ARCHIVE_METHODS` to control
  which archive methods ArchiveBox uses:\r\n\r\n  ```yaml\r\n  environment:\r\n    -
  ARCHIVE_METHODS=title,favicon,singlefile,screenshot\r\n  ```\r\n\r\n  Available
  ARCHIVE_METHODS plugins:\r\n  - `archive_org`, `dom`, `favicon`, `git`, `headers`,
  `htmltotext`, `media`, `mercury`, `pdf`, `readability`, `screenshot`, `singlefile`,
  `title`, `wget`\r\n\r\n  If `ARCHIVE_METHODS` is unset/not-present, ArchiveBox will
  uses all plugins.\r\n\r\n  For additional information and configuration, refer to
  the [ArchiveBox repository](https://github.com/ArchiveBox/ArchiveBox)\r\n\r\nOptional
  proxy settings for archive requests:\r\n\r\n- `archive-socks-proxy-host`\r\n- `archive-socks-proxy-port`\r\n\r\n##
  CLI\r\n\r\nMigration commands are run via:\r\n\r\n```bash\r\nstack exec migration
  -- <command> [options]\r\n```\r\n\r\nAll commands take an optional `--conn` parameter
  for the database location; if omitted, the database location is loaded from `config/settings.yml`
  or environment variable `SQLITE_DATABASE`\r\n\r\n### Commands\r\n\r\n| Command                      |
  Example                                                                                                        |\r\n|
  ---------------------------- | --------------------------------------------------------------------------------------------------------------
  |\r\n| `createdb`                   | `stack exec migration -- createdb`                                                                             |\r\n|
  `createuser`                 | `stack exec migration -- createuser --userName myusername
  --userPassword myuserpassword`                       |\r\n| `createuser` (password
  file) | `stack exec migration -- createuser --userName myusername --userPasswordFile
  mypassword.txt`                   |\r\n| `deleteuser`                 | `stack exec
  migration -- deleteuser --userName myusername`                                                     |\r\n|
  `createapikey`               | `stack exec migration -- createapikey --userName
  myusername`                                                   |\r\n| `deleteapikey`
  \              | `stack exec migration -- deleteapikey --userName myusername`                                                   |\r\n|
  `importbookmarks`            | `stack exec migration -- importbookmarks --userName
  myusername --bookmarkFile sample-bookmarks.json`           |\r\n| `importfirefoxbookmarks`
  \    | `stack exec migration -- importfirefoxbookmarks --userName myusername --bookmarkFile
  firefox-bookmarks.json`   |\r\n| `importnetscapebookmarks`    | `stack exec migration
  -- importnetscapebookmarks --userName myusername --bookmarkFile bookmarks.html`
  \         |\r\n| `importnotes`                | `stack exec migration -- importnotes
  --userName myusername --noteDirectory ./notes`                            |\r\n|
  `importnotesjson`            | `stack exec migration -- importnotesjson --userName
  myusername --noteFile exported-notes.json`                 |\r\n| `exportbookmarks`
  \           | `stack exec migration -- exportbookmarks --userName myusername --bookmarkFile
  exported-bookmarks.json`         |\r\n| `exportnetscapebookmarks`    | `stack exec
  migration -- exportnetscapebookmarks --userName myusername --bookmarkFile exported-bookmarks.html`
  |\r\n| `exportnotesjson`            | `stack exec migration -- exportnotesjson --userName
  myusername --noteFile exported-notes.json`                 |\r\n| `printmigratedb`
  \            | `stack exec migration -- printmigratedb`                                                                       |\r\n|
  `runmigratedb`               | `stack exec migration -- runmigratedb`                                                                         |\r\n|
  `showuser`                   | `stack exec migration -- showuser --userName myusername`
  \                                                      |\r\n\r\n### `importbookmarks`
  Command Notes:\r\n\r\nSee `sample-bookmarks.json`, which contains a JSON array,
  each line containing a `FileBookmark` object.\r\n\r\nExample:\r\n\r\n```json\r\n[\r\n
  \ {\r\n    \"href\": \"http://raganwald.com/2018/02/23/forde.html\",\r\n    \"description\":
  \"Forde's Tenth Rule, or, \\\"How I Learned to Stop Worrying and \\u2764\\ufe0f
  the State Machine\\\"\",\r\n    \"extended\": \"\",\r\n    \"time\": \"2018-02-26T22:57:20Z\",\r\n
  \   \"shared\": \"yes\",\r\n    \"toread\": \"yes\",\r\n    \"tags\": \"raganwald\"\r\n
  \ },\r\n  ,\r\n  {\r\n    \"href\": \"http://downloads.haskell.org/~ghc/latest/docs/html/users_guide/flags.html\",\r\n
  \   \"description\": \"7.6. Flag reference \\u2014 Glasgow Haskell Compiler 8.2.2
  User's Guide\",\r\n    \"extended\": \"-fprint-expanded-synonyms\",\r\n    \"time\":
  \"2018-02-26T21:52:02Z\",\r\n    \"shared\": \"yes\",\r\n    \"toread\": \"no\",\r\n
  \   \"tags\": \"ghc haskell\"\r\n  }\r\n]\r\n```\r\n"
