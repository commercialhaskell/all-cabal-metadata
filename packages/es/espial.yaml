changelog: "# Changelog\r\n\r\n## v0.0.41 (2026-07-18)\r\n\r\n- add sorting ability
  on bookmarks (time,title,url,tagcount) and notes (created, title) (#88)\r\n  - db
  indexes reworked for the new sort fields\r\n- removed search box for anonymous users\r\n-
  search query updates\r\n  - add search term grouping with parentheses `(`, `)`\r\n
  \ - add exact search on a specific field `field=`\r\n  - search query help doc updated\r\n-
  add `/api/addBulk` for adding multiple bookmarks in a single request (#90)\r\n  -
  include documentation for `/api/add` and `/api/addBulk` in readme (#89)\r\n  - add
  appSetting `add-bulk-max-items` (default 200);\r\n- add queuing for archive requests\r\n
  \ - add appSettings `archive-rate-limit-ms`, `archive-queue-capacity`\r\n  - archive
  requests to the archiveBacked are performed at a maximum rate of `archive-rate-limit-ms`\r\n
  \ - archive requests waiting in the queue are backed by persistent storage\r\n  -
  archive requests exceeding queue capacity are dropped; best-effort only\r\n- improve
  note update safety: updated is rejected when server has newer copy\r\n- add appSetting
  `sqlite-app-write-lock` and `sqlite-busy-timeout-ms` to avoid errors under concurrent
  db writers\r\n- styling/css adjustments\r\n- add appSetting `demo-mode` (disables
  password changes)\r\n- security: guard against SSRF for private addresses\r\n- security/bug
  fix: fixed regression when rendering a bookmark whose extended text contains `</script>`\r\n\r\n##
  v0.0.40 (2026-07-11)\r\n\r\n- add Bulk Edit for notes\r\n  - toggle the **bulk edit**
  panel via the top-level `edit` link in the note listing\r\n  - Selection scope respects
  the current page's search context, allowing targeted bulk edits\r\n- add user-facing
  Import/Export page in Account Settings (`Import / Export` tab)\r\n  - export bookmarks
  (Pinboard JSON, Netscape HTML) and notes (JSON) as downloads\r\n  - import bookmarks
  (Pinboard JSON, Firefox JSON, Netscape HTML) and notes (JSON)\r\n  - extend `migration`
  command with `importnotesjson`, `exportnotesjson`\r\n- add user-facing API key management
  to Account Settings (`API` tab)\r\n  - create/reset an API key (shown once in plaintext)
  or revoke it\r\n  - `Settings/apikey` route: `POST` to (re)generate, `DELETE` to
  revoke\r\n  - nb: `/api/add` (add/update bookmark) is the only route that accepts
  an API key/authentication token\r\n- `notes` changes:\r\n  - Import/Export: add
  optional `slug`, `is_markdown` and `shared` properties. Importing a duplicate (userid,
  slug) is skipped.\r\n  - standarize note page filter ui; add `public`/`private`
  filters\r\n  - add `markdown:`\\\\`m:` search field\r\n  - db: add unique constraint
  on db table `note`: (userid, slug)\r\n    - Notes for a user with duplicate slugs
  will get fresh slugs via a migration script.\r\n- Extend `migration` cli to add
  commands: `importnotesjson`, `exportnotesjson`, `runmigratedb`\r\n  - migrations
  run automatically when starting the server, but `runmigratedb` will run db migrations
  without having to start the server.\r\n- add appSetting `maximum-content-length`
  to adjust max allowed request body size (e.g. for Settings/Import), default: 10485760
  bytes (10MB).\r\n- add Account Setting: `Use return key to apply tag suggestions`
  (default true).\r\n- provide a second `edit` link at the top of the note view for
  initiating editing of longer notes more easily.\r\n\r\n## v0.0.39 (2026-07-03)\r\n\r\n-
  security fix: hardened endpoints against a file-disclosure vulnerability\r\n  -
  affects `v0.0.36` through `v0.0.38`; upgrading is recommended\r\n\r\n## v0.0.38
  (2020-07-03)\r\n\r\n- add account setting `Show note previews in the note list`
  (`previewNotes`, default: on) to toggle text previews in the notes list\r\n- note
  `per page` selection uses a separate session key from bookmarks\r\n- add group headings
  on account settings page\r\n- add login page rate limiting; add appSettings `login-rate-limit-max-attempts`
  (default: 10), `login-rate-limit-window-seconds` (default: 60)\r\n- bug fix: fix
  translations from v0.0.37 which introduced malforfmed json into non-english translation
  files; add translation tests\r\n- bug fix: allow espial to be run on a subpath url
  via APPROOT setting / env var (fixes #58)\r\n\r\n## v0.0.37 (2026-06-30)\r\n\r\n-
  add Bulk Edit for bookmarks\r\n  - toggle the **bulk edit** panel via the top-level
  `edit` link in the bookmark listing toolbar\r\n  - Action and tag operations can
  be combined in a single submission\r\n  - Selection scope respects the current page's
  filter, tag, and search context, allowing targeted bulk edits\r\n    - e.g. effective
  rename of a tag by first clicking on an instance of it to filter by that tag. Then,
  bulk edit all pages, removing the existing tag and adding the new tag\r\n- Tag Cloud
  improvements\r\n  - Add account setting `Public Tag Cloud` to make user's tag cloud
  available for public users (fixes #48)\r\n  - Related Tags includes `all‧2‧5‧10‧20`
  selectors\r\n  - By default, or when clicked, `Related Tags` only shows top 200
  tags similar to `Top Tags`\r\n  - Related Tags section is now always closed by default\r\n-
  add optional in-process TLS\r\n  - to enable HTTPS without a reverse proxy, set
  `TLS_CERT_FILE` and `TLS_KEY_FILE` (PEM)\r\n  - certificate is reloaded from disk
  automatically every 12 hours; send `SIGHUP` to trigger an immediate reload\r\n  -
  reverse proxy (Caddy, nginx, Cloudflare Tunnel, etc.) remains the recommended approach
  for production\r\n- standardized bookmark api routes\r\n- update stack package set
  lts-24.42 -> lts-24.46\r\n- improved error handling & feedback in UI for api requests\r\n-
  bug fix: properly escape `_` and `%` in queries so they're treated as literals,
  not SQL wildcards\r\n\r\n## v0.0.36 (2026-06-26)\r\n\r\n- improve UI stability &
  positioning of elements after first render for less flash of content\r\n- add language
  internationalization\r\n  - add language selector on `settings` page (persisted
  in user db and in session cookie)\r\n  - supported languages: `en`, `de`, `es`,
  `fr`, `it`, `ja`, `ko`, `pl`, `pt-BR`, `ru`, `tr`, `uk`, `zh-Hans`, `zh-Hant`\r\n
  \ - add appSetting `language-default`\r\n    - if not logged in and no previous
  cookie is present, the `language-default` is used\r\n  - adjusted `migration` command
  `createUser` to take `language` option\r\n- corrected `migration` command `createUser`
  to set additional properties correctly on initial user creation\r\n- replaced npm
  Moment package with Intl.DateTimeFormat\r\n\r\n## v0.0.35 (2026-06-17)\r\n\r\n-
  add \"appMigrations\" on startup; normalize utctime fields in db for correct sorting\r\n-
  record \"appMigration\" history and app version history in db\r\n- add startup logs
  with version and revision information\r\n- add 'view in context' link, visible when
  viewing single bookmark listing\r\n- on bookmark and note listing, change '« earlier'
  and 'later »' links from pagenum-based params to time-based 'before'/'after' params\r\n-
  update robots.txt to disallow robots\r\n- add short versions of search term specifiers
  & updated search documentation:\r\n  - u: for url:, t: for tags:, ti: for title:,
  d: for description:, b: for before:, a: for after:\r\n- add OCI Image Specification
  annotation keys to docker image (including version & revision)\r\n\r\n## v0.0.34
  (2026-06-11)\r\n\r\n- fix serialization bug in Add bookmark handler (introduced
  in v0.0.33)\r\n\r\n## v0.0.33 (2026-06-08)\r\n\r\n- add new `archive-backend`: `archivebox07`\r\n
  \ - additional documentation in readme\r\n- add new archive-related elements on
  UI (visible when `archive-backend` is enabled)\r\n  - add url popup: `archive` checkbox
  (only displays for new bookmarks)\r\n    - when `Account Settings`: `Archive new
  non-Private bookmarks by default` is checked, the Archive checkbox is checked by
  default\r\n    - upon submission, the archive backend will run if checked\r\n  -
  bookmark edit form: `archive` button\r\n    - when clicked, immediately sends a
  request to the archive backend\r\n  - when a bookmark is marked as private, the
  archive checkbox/archive button are disabled\r\n  - `Account Settings`: `Privacy
  Lock (Private Account)` only controls authorization to view user's content on espial;
  it has no effect on whether bookmarks are archived.\r\n- update shared libs in runtime
  docker image\r\n- add docker compose examples\r\n\r\n## v0.0.32 (2026-05-28)\r\n\r\n-
  change runtime docker image from `jonschoning/espial:scratch` to `gcr.io/distroless/base-debian12`\r\n-
  fix css for 404 page\r\n\r\n## v0.0.31 (2026-05-27)\r\n\r\n- use values in `config/settings.yml`
  at run-time (on app startup), instead of only the values from compile-time embedding
  of `config/settings.yml`\r\n- add Archive Backend: `wayback-machine`\r\n  - add
  Wayback Machine Backend-related settings:\r\n    - `wayback-machine-access-key`\r\n
  \   - `wayback-machine-secret-key`\r\n- remove Archive Backend: `archive-li`\r\n-
  only show the archive link icon on the user's bookmark page if the the `archiveUrl`
  exists\r\n- adjust dark-mode link visited color and toggle\r\n- hide status of starred,
  to-read, and archive properties of bookmarks when not viewed by the bookmark owner\r\n\r\n##
  v0.0.30 (2026-05-24)\r\n\r\n- add Dark Mode (fixes #59)\r\n\r\n## v0.0.29 (2026-05-07)\r\n\r\n-
  Extend migration to add commands: `importnetscapebookmarks`, `exportnetscapebookmarks`
  (fixes #30)\r\n- fix migration command `ImportBookmarks` (pinboard import file)
  parsing bug to handle when the description is a boolean (fixes #32)\r\n- tag suggestions:
  when a tag exactly matches an existing tag, it will appear first in the suggestion
  list\r\n\r\n## v0.0.28 (2026-05-06)\r\n\r\n- add new app setting: `archive-backend:
  \"_env:ARCHIVE_BACKEND:disabled\"`\r\n  - default to `disabled`, since `archive-li`
  appears to no longer be working due to added captchas\r\n  - when archiving is disabled,
  the `Archive Non-Private Bookmarks` Account Setting is also disabled in the UI\r\n\r\n##
  v0.0.27 (2026-05-05)\r\n\r\n- prevent private tags (starts with \".\") from showing
  on public bookmark listing for a user if not owned\r\n\r\n## v0.0.26 (2026-05-04)\r\n\r\n-
  Add Tag Suggestion when adding/editing bookmarks.\r\n- Add account settings controls
  for `suggestTags` (default `True`).\r\n- Extend migration `createuser` with `suggestTags`
  setting.\r\n- Extend migration to add `showuser` command\r\n- Extend migration to
  load sql connection from yaml settings if not provided\r\n- use hashed js output
  + manifest.json in frontend build\r\n\r\n## v0.0.25 (2026-05-03)\r\n\r\n- Fix display
  bug for non-markdown notes.\r\n\r\n## v0.0.24 (2026-04-24)\r\n\r\n- Correct `extra-source-files`
  in `package.yaml`.\r\n- Correct GHC warnings.\r\n\r\n## v0.0.23 (2026-04-24)\r\n\r\n-
  Migrate frontend code from PureScript to TypeScript/React.\r\n- Update Stackage
  resolver: `lts-24.37`.\r\n\r\n## v0.0.22 (2025-05-23)\r\n\r\n- Update to Stackage
  LTS 23 (`ghc-9.8.4`).\r\n- Purs package-set update.\r\n\r\n## v0.0.21 (2024-01-15)\r\n\r\n-
  Switch to ESM JavaScript module imports.\r\n\r\n## v0.0.20 (2024-01-18)\r\n\r\n-
  Update version bounds for Cabal dependencies.\r\n\r\n## v0.0.19 (2023-12-19)\r\n\r\n-
  Update GHC and PureScript dependencies to latest.\r\n\r\n## v0.0.18 (2023-10-02)\r\n\r\n-
  Update GHC and PureScript dependencies to latest.\r\n\r\n## v0.0.17 (2023-07-04)\r\n\r\n-
  Update to GHC 9.4.5.\r\n\r\n## v0.0.16 (2023-01-05)\r\n\r\n- Add SIGTERM handler
  on Linux.\r\n- Adjust Docker CMD entrypoint.\r\n\r\n## v0.0.15 (2022-09-11)\r\n\r\n-
  Avoid using external `static/tmp` folder for generated static files.\r\n\r\n## v0.0.14
  (2022-06-01)\r\n\r\n- Upgrade to PureScript v0.15.\r\n- Increase bookmarklet window
  height.\r\n\r\n## v0.0.13 (2022-04-26)\r\n\r\n- Add setting `ALLOW_NON_HTTP_URL_SCHEMES`
  (default `false`).\r\n\r\n## v0.0.12 (2022-04-17)\r\n\r\n- Update to GHC 9.\r\n\r\n##
  v0.0.11 (2022-04-16)\r\n\r\n- Add API key auth.\r\n- Add `CreateApiKey`/`DeleteApiKey`
  commands to executable `migration`.\r\n\r\n## v0.0.10 (2022-04-05)\r\n\r\n- Update
  PureScript and package versions.\r\n\r\n## v0.0.9 (2022-04-05)\r\n\r\n- Rolling
  releases.\r\n\r\n## v0.0.7 (2019-01-30)\r\n\r\n- Init.\r\n"
