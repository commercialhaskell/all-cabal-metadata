description: "# Espial\n\nEspial is an open-source, web-based bookmarking server.\n\nIt
  allows mutiple accounts, but currently intended for self-host scenarios.\n\nThe
  bookmarks are stored in a sqlite3 database, for ease of deployment & maintenence.\n\nThe
  easist way for logged-in users to add bookmarks, is with the \"bookmarklet\", found
  on the Settings page.\n\n\n## Demo Server\n\nLog in with:\n\n- username: `demo`\n-
  password: `demo`\n\nhttps://espdemo.ae8.org/u:demo\n\n![jpg](./docs/demo-bookmarks-page.png)\n\n\n##
  Installation\n\n### Docker Setup\n\nSee:\n\nhttps://github.com/jonschoning/espial-docker\n\n###
  Server Setup (From Source)\n\n1. Install the Stack executable here:\n   - https://tech.fpcomplete.com/haskell/get-started\n2.
  Build executables:\n\n```bash\nstack build\n```\n\n3. Create the database:\n\n```bash\nstack
  exec migration -- createdb\n```\n\n4. Create a user:\n\n```bash\nstack exec migration
  -- createuser --userName myusername --userPassword myuserpassword\n```\n\n5. Import
  a pinboard bookmark file for a user (optional):\n\n```bash\nstack exec migration
  -- importbookmarks --userName myusername --bookmarkFile sample-bookmarks.json\n```\n\n6.
  Import a firefox bookmark file for a user (optional):\n\n```bash\nstack exec migration
  -- importfirefoxbookmarks --userName myusername --bookmarkFile firefox-bookmarks.json\n```\n\n7.
  Start a production server:\n\n```bash\nstack exec espial\n```\n\n## Configuration\n\nSee
  `config/settings.yml` for changing default run-time parameters & environment variables.\n\n-
  `config/settings.yml` is embedded into the app executable when compiled and also
  read once when the app starts.  Current settings in `config/settings.yml` will override
  the embedded compile-time settings.\n- `config/settings.yml` values formatted like
  `_env:ENV_VAR_NAME:default_value` can be overridden by the specified environment
  variable.\n- Example:\n  - `_env:PORT:3000`\n  - environment variable `PORT`\n  -
  default app http port: `3000`\n\n### Request IP Logging\n\nEspial supports the `IP_FROM_HEADER`
  environment variable for request logging.\n\n- `IP_FROM_HEADER=true`: log the client
  IP from the `X-Real-IP` or `X-Forwarded-For` header when present, and fall back
  to the peer address if neither header is available.\n- `IP_FROM_HEADER=false`: log
  the peer address from the HTTP connection.\n\nOnly set `IP_FROM_HEADER=true` if
  your application is safely positioned **behind a trusted reverse proxy**.\n\n###
  SSL / Reverse Proxy\n\nEspial does not terminate TLS itself. Run it behind a reverse
  proxy that handles HTTPS and forwards traffic to Espial over HTTP.\n\nFor container-based
  deployment examples, including production-oriented layouts, see the `espial-docker`
  repository:\n\n- https://github.com/jonschoning/espial-docker\n\nMinimal [Caddy](https://github.com/caddyserver/caddy)
  example:\n\nLocalhost without a real domain:\n\n```caddyfile\nhttps://localhost:3050
  {\n    reverse_proxy localhost:3000\n}\n```\n\nor with a domain:\n\n```caddyfile\nespial.example.com
  {\n  reverse_proxy 127.0.0.1:3000\n}\n```\n\nWith the domain setup:\n\n- Caddy terminates
  TLS for `espial.example.com`.\n- Espial continues listening on HTTP, locally on
  `127.0.0.1:3000`\n  - If using Docker Compose, it would like like `espial:3000`\n-
  Set `IP_FROM_HEADER=true` only when Espial is reachable solely through that trusted
  proxy.\n\nIf you are using Cloudflare:\n\n- Prefer Cloudflare SSL mode `Full (strict)`.\n-
  use `header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}`\n- If traffic
  can reach Espial directly without passing through your trusted proxy, do not enable
  `IP_FROM_HEADER=true`, because client IP headers can be spoofed.\n\n## Archive Backends\n\nEspial
  supports configurable archive backends for saving bookmark snapshots.\n\nSet the
  backend with `archive-backend` in `config/settings.yml`:\n\n- `disabled`: archiving
  is turned off (default).\n- `wayback-machine`: enables submission to the Internet
  Archive Wayback Machine.\n\n    Wayback Machine support requires the following settings:\n\n
  \   - `wayback-machine-access-key`\n    - `wayback-machine-secret-key`\n\n        Create
  these by signing in to your Internet Archive account and generating S3-style API
  credentials at `https://archive.org/account/s3.php`. \\\n        If `wayback-machine`
  is selected but the access key or secret key is missing, archiving is disabled at
  runtime.\n\n- `archivebox07`: queues the URL in a local ArchiveBox 0.7 instance
  and stores an ArchiveBox link on the bookmark.\n\n    **IMPORTANT - ArchiveBox stores
  all archive data in a single global index space, so this arcive-backend is best
  suited to single-user Espial instances.**\n\n\n    **Recommended setup is to use
  Docker Compose to run the ArchiveBox instance**\n\n    -  Simple example, running
  on localhost: [docker-compose.archivebox07.yml](docker-compose.archivebox07.yml)\n
  \   - See https://github.com/jonschoning/espial-docker for more examples intended
  for deployment\n    - In all examples, you must change the `ARCHIVEBOX_PASSWORD`
  from it's default value.\n\n    ArchiveBox support requires the following settings:\n\n
  \   - `archivebox-url`\n\n      `archivebox-url` is the URL espial uses to sign
  in to ArchiveBox and submit URLs through the web UI. In Docker Compose this is typically
  `http://archivebox:8000`.\n\n    - `archivebox-public-url` (optional)\n\n      Public
  ArchiveBox URL stored on bookmarks.\n\n    - `archivebox-username` plus `archivebox-password`\n\n
  \     Espial signs in to the ArchiveBox web UI with these credentials before submitting
  URLs.\n\n    - `archivebox-tag` (optional)\n\n      A tag Espial adds to submissions
  (example: `espial`).\n\n    - `archivebox-plugins` (optional)\n\n      Comma-separated
  list of ArchiveBox methods (plugins) to request when submitting URLs, e.g. `title,favicon,singlefile,screenshot`.\n\n
  \   Set the ArchiveBox admin credentials in the override path by supplying:\n\n
  \   - `ARCHIVEBOX_USERNAME=...`\n    - `ARCHIVEBOX_PASSWORD=...`\n\n    The `Makefile`
  includes the following helpers:\n      - `docker-compose-up-archivebox07`\n      -
  `docker-compose-up-d-archivebox07`\n      - `docker-compose-exec-archivebox07`\n
  \   \n    Or start the instance manually via docker compose, example:\n\n    ```bash\n
  \   docker compose -f docker-compose.archivebox07.yml up\n    ```\n\n    Configure
  the enrivonment variable `ARCHIVE_METHODS` to control which archive methods ArchiveBox
  uses:\n\n    ```yaml\n    environment:\n      - ARCHIVE_METHODS=title,favicon,singlefile,screenshot\n
  \   ```\n\n    Available ARCHIVE_METHODS plugins:\n\n    - `archive_org`, `dom`,
  `favicon`, `git`, `headers`, `htmltotext`, `media`, `mercury`, `pdf`, `readability`,
  `screenshot`, `singlefile`, `title`, `wget`\n\n    If `ARCHIVE_METHODS` is unset/not-present,
  ArchiveBox will uses all plugins.\n\n    For additional information and configuration,
  refer to the [ArchiveBox repository](https://github.com/ArchiveBox/ArchiveBox)\n\nOptional
  proxy settings for archive requests:\n\n- `archive-socks-proxy-host`\n- `archive-socks-proxy-port`\n\n\n##
  Related Projects\n\nAlso, see the android app for adding bookmarks via an Android
  Share intent:\n\nhttps://github.com/jonschoning/espial-share-android\n\n## Development\n\n###
  Backend\n\n- Install the `yesod` command line tool:\n\n```bash\nstack install yesod-bin
  --install-ghc\n```\n\n- Start a development server:\n\n```bash\nyesod devel\n```\n\n###
  Frontend\n\n- See `frontend/` folder\n\n## CLI\n\nMigration commands are run via:\n\n```bash\nstack
  exec migration -- <command> [options]\n```\n\nAll commands take an optional `--conn`
  parameter for the database location; if omitted, the database location is loaded
  from `config/settings.yml`.\n\n### Commands\n\n| Command | Example |\n| --- | ---
  |\n| `createdb` | `stack exec migration -- createdb` |\n| `createuser` | `stack
  exec migration -- createuser --userName myusername --userPassword myuserpassword`
  |\n| `createuser` (password file) | `stack exec migration -- createuser --userName
  myusername --userPasswordFile mypassword.txt` |\n| `deleteuser` | `stack exec migration
  -- deleteuser --userName myusername` |\n| `createapikey` | `stack exec migration
  -- createapikey --userName myusername` |\n| `deleteapikey` | `stack exec migration
  -- deleteapikey --userName myusername` |\n| `importbookmarks` | `stack exec migration
  -- importbookmarks --userName myusername --bookmarkFile sample-bookmarks.json` |\n|
  `importfirefoxbookmarks` | `stack exec migration -- importfirefoxbookmarks --userName
  myusername --bookmarkFile firefox-bookmarks.json` |\n| `importnetscapebookmarks`
  | `stack exec migration -- importnetscapebookmarks --userName myusername --bookmarkFile
  bookmarks.html` |\n| `importnotes` | `stack exec migration -- importnotes --userName
  myusername --noteDirectory ./notes` |\n| `exportbookmarks` | `stack exec migration
  -- exportbookmarks --userName myusername --bookmarkFile exported-bookmarks.json`
  |\n| `exportnetscapebookmarks` | `stack exec migration -- exportnetscapebookmarks
  --userName myusername --bookmarkFile exported-bookmarks.html` |\n| `printmigratedb`
  | `stack exec migration -- printmigratedb` |\n| `showuser` | `stack exec migration
  -- showuser --userName myusername` |\n\n### `importbookmarks` Command Notes:\n\nSee
  `sample-bookmarks.json`, which contains a JSON array, each line containing a `FileBookmark`
  object.\n\nExample:\n\n```json\n[ {\"href\":\"http://raganwald.com/2018/02/23/forde.html\",\"description\":\"Forde's
  Tenth Rule, or, \\\"How I Learned to Stop Worrying and \\u2764\\ufe0f the State
  Machine\\\"\",\"extended\":\"\",\"time\":\"2018-02-26T22:57:20Z\",\"shared\":\"yes\",\"toread\":\"yes\",\"tags\":\"raganwald\"},\n,
  {\"href\":\"http://downloads.haskell.org/~ghc/latest/docs/html/users_guide/flags.html\",\"description\":\"7.6.
  Flag reference \\u2014 Glasgow Haskell Compiler 8.2.2 User's Guide\",\"extended\":\"-fprint-expanded-synonyms\",\"time\":\"2018-02-26T21:52:02Z\",\"shared\":\"yes\",\"toread\":\"no\",\"tags\":\"ghc
  haskell\"},\n]\n```\n"
