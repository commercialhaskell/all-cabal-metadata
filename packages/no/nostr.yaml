description: "# nostr.hs\n\nA NIP-01 compliant Nostr library and client implementation
  in Haskell.\n\n## Features\n\n- **NIP-01 Compliant**: Full implementation of event
  structure, rules, and tags.\n- **Schnorr Signatures**: Pure Haskell BIP-340 Schnorr
  signatures using `ppad-secp256k1`.\n- **Relay Communication**: WebSocket-based communication
  with Nostr relays.\n- **Type Safety**: Strong types for Event IDs, Public Keys,
  and Signatures.\n\n## Implemented NIPs\n\n- [x] NIP-01: Basic protocol flow\n- [x]
  NIP-02: Contact Lists\n- [x] NIP-05: DNS-based verification\n- [x] NIP-09: Event
  Deletion Request\n- [x] NIP-10: Text Notes and Threads\n- [x] NIP-19: bech32-encoded
  entities\n- [x] NIP-21: nostr: URI scheme\n- [x] NIP-42: Relay Authentication\n\n\n##
  Installation\n\nThis project uses **Nix** for reproducible builds.\n\n1. **Clone
  the repository:**\n   ```bash\n   git clone https://github.com/delirehberi/nostr.hs.git\n
  \  cd nostr.hs\n   ```\n\n2. **Enter the development shell:**\n   ```bash\n   nix
  develop\n   ```\n\n3. **Build the project:**\n   ```bash\n   cabal build all\n   ```\n\n##
  Development\n\n### Building and Testing\n\n```bash\nmake build    # Build the project\nmake
  test     # Run tests\nmake clean    # Clean build artifacts\nmake docs     # Generate
  documentation\nmake sdist    # Generate source distribution tar.gz\n```\n\nAll `make`
  commands automatically use the Nix development environment, so you don't need to
  run `nix develop` first.\n\n### Uploading to Hackage\n\nTo package and upload the
  library to Hackage:\n\n```bash\nmake upload-hackage\n```\n\nThis will:\n1. Generate
  a source distribution tar.gz file\n2. Generate Haddock documentation for Hackage\n3.
  Upload the package source to Hackage\n4. Upload the documentation to Hackage\n\nYou'll
  need to be authenticated with Hackage and have upload permissions. The script assumes
  you have `cabal` configured with your Hackage credentials.\n\n## Usage Examples\n\n###
  High-Level API (Recommended)\n\nThe `Nostr.Client` module provides a monadic interface
  for managing connections, signing, and publishing. It handles robust reconnections
  (exponential backoff) and TLS usage automatically.\n\n```haskell\n{-# LANGUAGE OverloadedStrings
  #-}\n\nimport Nostr.Client\nimport Nostr.Event\nimport Nostr.Crypto\nimport Data.Function
  ((&))\nimport Control.Monad.IO.Class (liftIO)\n\nmain :: IO ()\nmain = do\n  --
  1. Generate Keys\n  -- Note: In a real app, you'd load these from safe storage\n
  \ (secKey, pubKey) <- generateKeyPair\n  let keys = Keys secKey pubKey Nothing\n\n
  \ -- 2. Connect to Relays\n  -- connectRelays establishes background threads for
  each relay and manages reconnection\n  env <- connectRelays [\"wss://relay.damus.io\",
  \"wss://nos.lol\"]\n\n  runNostrApp env $ do\n    -- A. Publish a simple short text
  note (Kind 1)\n    publishShortNote keys \"Hello Nostr from Haskell!\"\n\n    --
  B. Publish a complex event using the Builder Pattern\n    -- Use the (&) operator
  to chain combinators for tags and kinds\n    liftIO $ putStrLn \"Publishing a reply...\"\n
  \   publish keys $ shortNote \"Replying to an event...\"\n      & withKind 1\n      &
  withReply \"event-id-hex\"\n      & withMention \"pubkey-hex\"\n      & withTag
  [\"t\", \"haskell\"]\n      \n    -- C. Query Events\n    -- Queries all connected
  relays concurrently and aggregates unique results\n    let filter = defaultFilter\n
  \         { filterKinds = Just [1]\n          , filterAuthors = Just [pubKey]\n
  \         , filterLimit = Just 10\n          }\n    \n    events <- queryEvents
  filter\n    liftIO $ print events\n\n    -- D. Follow Users (NIP-02)\n    -- This
  fetches your existing contact list (Kind 3), adds the user, and republishes.\n    liftIO
  $ putStrLn \"Following Jack...\"\n    follow keys \"82341f882b6eabcd2ba7f1ef90aad961cf074af15b9ef44a09f9d2a8fbf71d22\"
  (Just \"wss://relay.damus.io\") (Just \"jack\")\n\n    -- E. Fetch Contacts\n    contacts
  <- getContacts keys\n    liftIO $ print contacts\n\n    -- F. Delete Events (NIP-09)\n
  \   -- Deletes a list of event IDs with an optional reason.\n    -- let eventIds
  = [EventId \"hex_id_1...\", EventId \"hex_id_2...\"]\n    -- deleteEvents keys eventIds
  (Just \"mistake\")\n\n  -- 3. Disconnect\n  disconnect env\n```\n\n### Low-Level
  Event Creation\n\nIf you need manual control over event creation without the `NostrApp`
  environment:\n\n```haskell\nimport Nostr.Event\nimport Nostr.Crypto\nimport Data.Time.Clock.POSIX
  (getPOSIXTime)\n\nmain :: IO ()\nmain = do\n  (secKey, pubKey) <- generateKeyPair\n
  \ now <- round <$> getPOSIXTime\n  \n  -- Create unsigned event\n  let unsigned
  = createUnsignedEvent pubKey now 1 [] \"Manual event content\"\n  \n  -- Sign event\n
  \ signed <- signEvent secKey unsigned\n  case signed of\n    Right event -> putStrLn
  $ \"Event ID: \" ++ show (eventId event)\n    Left err    -> putStrLn $ \"Error:
  \" ++ show err\n\n### Encrypted Direct Messages (NIP-04)\n\nUse the `Nostr.Nip04`
  module to securely encrypt and decrypt direct messages using AES-256-CBC and ECDH:\n\n```haskell\nimport
  Nostr.Crypto\nimport Nostr.Nip04\nimport qualified Data.Text as T\n\nmain :: IO
  ()\nmain = do\n  (senderSec, senderPub) <- generateKeyPair\n  (receiverSec, receiverPub)
  <- generateKeyPair\n  \n  let msg = \"Super secret message\"\n  \n  -- Encrypt (Sender
  -> Receiver)\n  Just encrypted <- encryptNip04 senderSec receiverPub msg\n  putStrLn
  $ \"Encrypted: \" ++ T.unpack encrypted\n  \n  -- Decrypt (Receiver)\n  let decrypted
  = decryptNip04 receiverSec senderPub encrypted\n  print decrypted -- Just \"Super
  secret message\"\n```\n\n### Fetching Relay Information (NIP-11)\n\nQuery a relay's
  metadata document using the `Nostr.Nip11` module:\n\n```haskell\nimport Nostr.Nip11\n\nmain
  :: IO ()\nmain = do\n  info <- fetchRelayInfo \"wss://relay.damus.io\"\n  case info
  of\n    Right i  -> print (riSoftware i, riSupportedNips i)\n    Left err -> putStrLn
  $ \"Failed to fetch info: \" ++ err\n```\n\n### Parsing Lightning Zaps (NIP-57)\n\nEasily
  parse Zap Requests (Kind 9734) and Zap Receipts (Kind 9735):\n\n```haskell\nimport
  Nostr.Nip57\nimport Nostr.Event\n\n-- Assuming `event` is a parsed Event of kind
  9734\nhandleEvent :: Event -> IO ()\nhandleEvent event = do\n  case parseZapRequest
  event of\n    Just zr -> putStrLn $ \"Zap Request for \" ++ T.unpack (zrP zr)\n
  \   Nothing -> return ()\n```\n```\n\n## Contributing\n\nContributions are welcome!
  Please ensure all tests pass before submitting a PR.\n"
