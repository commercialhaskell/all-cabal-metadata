changelog: |
  # Changelog

  ## 0.1.5.0 — 2026-02-26

  ### New Builtins, Coercion Fixes, CI Cleanup

  - **`builtins.warn`** — prints warning to stderr, returns second arg
  - **`builtins.path`** — copies file/dir to store with `SCPlain` context
  - **`builtins.seq` fix** — now forces first arg to WHNF (was silent no-op)
  - **`builtins.trace`/`traceVerbose` fix** — print to stderr via `MonadEval.traceMessage`
  - **`coerceToString` fix** — handle `VAttrs` with `__toString` and `outPath`, enabling `"${pkgs.hello}/bin/hello"` interpolation (was type error on all attrsets)
  - **`fetchTarball` fix** — downloads and extracts via curl|tar pipeline (was returning raw .tar.gz)
  - **`MonadEval`** — added `traceMessage`, `copyPathToStore` methods
  - CI: switched to `haskell-actions/run-ormolu@v16` (matching all Novavero repos)
  - 108 builtins, 511 tests, -Werror clean, ormolu clean, hlint clean

  ## 0.1.4.0 — 2026-02-26

  ### Memory Optimization + Lazy Non-Rec Attrsets

  - **Lazy non-rec attrsets** — `evalNonRecAttrs` now uses `LazyAttrs` to defer thunk+IORef allocation until first access. For `all-packages.nix` (~15k entries per stdenv stage), only accessed packages allocate thunks.
  - **Per-binding Env in `LazyBinding`** — Each `LazyExpr`/`LazyInherit`/`LazyInheritFrom` carries its own `Env` instead of sharing one per-attrset. Fixes a bug where `//` merges of `LazyAttrs` from different scopes lost variables — broke `lib.extends` overlay pattern used by `makeExtensibleWithCustomName`.
  - **Batched formal set matching** — `matchFormalSet` creates ONE `Env` with all formals instead of N singleton `Env`s. Uses knot-tying so default expressions can reference other formals, including forward references (`{ a ? b, b ? 1 }: a` → `1`).
  - **Env scope chain** — `Env` now uses a parent pointer chain instead of `Map.union`. Variable lookup walks the chain: local bindings, then parent, then with-scopes. Avoids O(n) `Map.union` when extending large envs (e.g. 30k-entry nixpkgs rec set). Peak Map.Bin heap: 956MB → ~40MB.
  - **ThunkCell release** — On force, `Pending expr env` is overwritten to `Computed val`, dropping all references to `Expr` and `Env` (matching C++ Nix in-place mutation). Previously retained dead closures indefinitely.
  - **Lazy `//` operator** — `mergeAttrSets` preserves `LazyAttrs` when possible, merging binding recipe maps instead of materializing all thunks.
  - **Lazy with-scopes** — `pushWithScope` accepts `AttrSet` directly so `LazyAttrs` with-scopes stay lazy. `lookupWithScopes` uses `attrSetLookup` to materialize only the accessed key.
  - **Key-driven `intersectAttrs`** — Only touches keys present in both sets instead of materializing entire attrsets.
  - **New builtins** — `min`, `max`, `mod`, base64 `encode`/`decode` (via nova-cache 0.2.4)
  - `nova-cache >= 0.2.4` dependency bump
  - 511 tests, -Werror clean, ormolu 0.7.7.0 clean, hlint clean

  ## 0.1.3.0 — 2026-02-25

  ### nixpkgs Compatibility: Module System, Callable Sets, Parser Fixes

  - **`__functor` support** — Attribute sets with `__functor` are now callable, matching real Nix. `(set.__functor set) arg` dispatch enables nixpkgs patterns like `lib.makeOverridable` and `lib.setFunctionArgs`.
  - **`builtins.setFunctionArgs`** — Wraps a function in a callable attrset with `__functor` and `__functionArgs` metadata. Used by `lib.mirrorFunctionArgs`, `lib.makeOverridable`, and the entire nixpkgs override system.
  - **Null dynamic keys** — `{ ${null} = val; }` now skips the binding instead of erroring (matching real Nix). Used extensively by the nixpkgs module system for conditional attributes like `${if cond then "key" else null}`.
  - **Indented string interpolation fix** — `''${expr}''` now parses correctly. The lexer had an overzealous guard (`isIndStringEscape`) that blocked `''` from opening an indented string when followed by `$`. This broke `lib.generators` and many nixpkgs files.
  - **`splitVersion` fix** — Dots are separators, not components. `splitVersion "1.2.3"` now returns `["1" "2" "3"]` (was `["1" "." "2" "." "3"]`). Fixes `lib.versions.majorMinor` and all version comparison logic.
  - **`builtins.functionArgs` on callable sets** — Now inspects `__functionArgs` metadata on attrsets produced by `setFunctionArgs`, enabling `lib.functionArgs` to work on overridable functions.
  - **CLI eval sub-parser** — `--strict` and `--nix-path` flags now work after `eval` command (e.g. `nova-nix eval --strict --expr '...'`). Previously only worked before the command.
  - **Bundled `<nix/fetchurl.nix>`** — Ships as a Cabal data-file, added to search paths automatically. nixpkgs stdenv bootstrap imports this file; no system Nix install needed.
  - **nixpkgs module system working** — `lib.evalModules`, `lib.mkOption`, `lib.mkIf`, `lib.types.*` all evaluate correctly.
  - **nixpkgs functional patterns working** — `lib.makeOverridable`, `lib.makeExtensible`, `lib.fix`, `lib.generators.toKeyValue` all correct.
  - **`lib.systems.elaborate` instant** — Was taking minutes before lazy builtins; now returns immediately for any system string.
  - 101 builtins (up from 91), 511 tests

  ## 0.1.2.0 — 2026-02-24

  ### Lazy Builtins + Correctness Fixes

  - **Lazy `map`** — returns deferred thunks instead of eagerly forcing all elements. `map f [80000 items]` is now O(1) until elements are demanded.
  - **Lazy `genList`** — each element is a deferred `f(i)` thunk, forced only on demand
  - **Lazy `mapAttrs`** — each attr value is a deferred `f key val` thunk. Critical for nixpkgs which `mapAttrs` over the entire package set.
  - **Semi-lazy `concatMap`** — forces applications to discover list structure for concatenation, but element thunks within sub-lists stay lazy
  - **`@`-pattern scoping fix** — `{ system ? args.system or ..., ... }@args:` now correctly binds the `@`-name before evaluating defaults, matching real Nix. Previously, default expressions couldn't reference the `@`-binding.
  - **Synthetic thunk memo cell fix** — `mkSyntheticThunk` uses env bindings (not expr) for IORef uniqueness, preventing GHC's full-laziness transform from sharing one memo cell across all deferred thunks. Without this, `map f [a b c]` would return `[f(a) f(a) f(a)]`.
  - `deferApply` helper: builds thunks wrapping `EApp (EVar "__fn") (EVar "__arg")` in a self-contained env, reusing existing eval + memoization machinery
  - 511 tests (3 new: map laziness, genList laziness, mapAttrs laziness)

  ## 0.1.1.0 — 2026-02-24

  - **Thunk memoization** — Per-thunk `IORef` memo cells (matching real Nix in-place mutation). `forceThunk` is a `MonadEval` method: IO evaluators memoize per-allocation, pure evaluators re-evaluate. GC reclaims dead thunks naturally — no unbounded global cache. `unsafePerformIO` CAF float-out prevented via `NOINLINE` + `seq` pattern.
  - **8.4x builtin dispatch speedup** — Case dispatch replacing polymorphic `Map` reconstruction on every call. Direct pattern match on builtin name for zero-allocation dispatch in the hot path.
  - **Regex builtins** — `builtins.match` and `builtins.split` via `regex-tdfa` (pure Haskell POSIX ERE, cross-platform)
  - `ESearchPath !Text` AST constructor — `<nixpkgs>` is now its own node, desugared at eval time to `builtins.findFile builtins.nixPath "nixpkgs"` (matching real Nix semantics)
  - NIX_PATH parsing: `parseNixPath` converts colon-separated `name=path` entries into `{ prefix, path }` attrset thunks
  - `builtinEnv` now accepts search paths: `builtinEnv :: Integer -> [Thunk] -> Env`
  - `EvalState.esSearchPaths` populated from `NIX_PATH` environment variable at startup
  - Directory imports: `import ./dir` automatically resolves to `./dir/default.nix`
  - Dynamic attribute keys: `{ ${expr} = val; }` fully supported in all contexts (non-rec, rec, let, select, hasAttr)
  - Two-phase binding resolution for knot-tying: `resolveBindingKeys` (monadic, evaluates dynamic keys) then `buildResolvedBindingsMap` (pure, enables recursive self-reference)
  - Monadic `resolveKey` replaces pure `resolveStaticKey` — handles both `StaticKey` and `DynamicKey` uniformly
  - CLI `--nix-path NAME=PATH` flag (repeatable, merged with NIX_PATH)
  - CLI `--expr EXPR` for inline expression evaluation
  - CLI deep-force and pretty-printing for eval output
  - `README.md` added to `extra-doc-files` in cabal (shows on Hackage)
  - Parser fix: `TokInterpOpen` in expression context expects `TokRBrace` (not `TokInterpClose`) for closing brace
  - 91 builtins (up from 88)
  - 508 tests (14 new: parseNixPath, search path parsing/eval, dynamic keys, directory import, populated search path resolution)

  ## 0.1.0.0 — 2026-02-24

  ### Cross-Platform Fixes

  - Cross-platform ATerm serialization: `storePathToText` always uses `/` for store paths regardless of OS, `parseStorePath` accepts both `/` and `\`
  - Builder inherits system environment, overlays build env via `Map.union` — fixes silent process failures on Windows (missing `SYSTEMROOT`)
  - Builder PATH derived from builder location (`buildPath`) — includes builder dir and MSYS2 sibling `usr/bin` for coreutils discovery
  - `findTestShell` prefers known Git for Windows bash over WSL launcher (`System32\bash.exe`)
  - Parser strips UTF-8 BOM — Windows editors (Notepad, PowerShell) commonly add byte order marks
  - Demo `test.nix` included: derivations, lambdas, builtins.map, arithmetic — runs on all platforms
  - 16 builtins exposed at top level without `builtins.` prefix (`toString`, `map`, `throw`, `import`, `derivation`, `abort`, `baseNameOf`, `dirOf`, `isNull`, `removeAttrs`, `placeholder`, `scopedImport`, `fetchTarball`, `fetchGit`, `fetchurl`, `toFile`) — matches real Nix language spec, required for nixpkgs compatibility

  ### String Contexts, Dependency Resolution, Binary Substituter

  - String context tracking on all `VStr` values: `SCPlain`, `SCDrvOutput`, `SCAllOutputs`
  - Context propagation through interpolation, string concatenation, `replaceStrings`, `substring`, `concatStringsSep`, and all string builtins
  - `Nix.Eval.Context` module: pure helpers for context construction, queries, and extraction
  - `derivation` builtin now collects string contexts into `drvInputDrvs` and `drvInputSrcs`
  - New builtins: `hasContext`, `getContext`, `appendContext`
  - `Nix.DependencyGraph`: BFS graph construction with `Data.Sequence` (O(V+E)), topological sort via Kahn's algorithm, cycle detection
  - `Nix.Substituter`: full HTTP binary cache protocol — narinfo fetch/parse, Ed25519 signature verification, NAR download/decompress/unpack, store DB registration, priority-ordered multi-cache
  - `Nix.Builder.buildWithDeps`: recursive dependency resolution — topo sort, cache check, binary substitution, local build fallback
  - CLI `nova-nix build` now builds full dependency trees, not just single derivations
  - Cleanup pass: eliminated all partial functions (`T.head`/`T.tail` to `T.uncons`, `!!` to safe lookup, `last` to pattern match), flattened deeply nested code into composed functions, `Data.Sequence` BFS queues throughout, semantic section organization
  - 494 tests (68 new: string context, context propagation, dependency graph, substituter, build orchestrator)

  ### Content-Addressed Store + Derivation Builder

  - Real SQLite-backed store database (`ValidPaths` + `Refs` tables, WAL mode)
  - Store operations: `addToStore` (cross-device safe), `scanReferences` (byte-scan for store path references), `setReadOnly` (recursive), `writeDrv`
  - `parseStorePath`: parse full store path strings into `StorePath` values
  - ATerm parser (`fromATerm`): hand-rolled recursive descent, full round-trip with `toATerm`
  - `builtinDerivation` now populates `drvOutputs` with `DerivationOutput` records
  - Full `buildDerivation` loop: input validation, temp directory setup, environment construction, process execution via `System.Process`, reference scanning, output registration in store DB
  - CLI `nova-nix build FILE.nix`: evaluate, extract derivation, write `.drv`, build, print output path
  - 426 tests (45 new: 10 store DB, 13 store ops, 10 ATerm parser, 8 builder, 4 CLI end-to-end)

  ### Parser, Lazy Evaluator, 85 Builtins

  - Full Nix expression parser (hand-rolled recursive descent, 13 precedence levels)
  - Lazy evaluator with thunk-based evaluation, knot-tying for recursive bindings
  - 85 builtins: type checks, arithmetic, bitwise, strings, lists, attrsets, higher-order, JSON, hashing, version parsing, tryEval, deepSeq, genericClosure, all IO builtins, derivation
  - MonadEval typeclass — evaluator is polymorphic in its effect monad (PureEval for tests, EvalIO for real evaluation)
  - IO builtins: import, readFile, pathExists, readDir, getEnv, toPath, toFile, findFile, scopedImport, fetchurl, fetchTarball, fetchGit, currentTime
  - derivation builtin: attrset to .drv build recipe with computed drvPath and outPath
  - ATerm serialization with string escaping, sorted environments
  - placeholder and storePath builtins via nova-cache hashing
  - Content-addressed store path types with Windows/Unix support
  - Derivation types, platform detection, and textToPlatform/platformToText
  - Shared hash utilities in Nix.Hash (SHA-256 hex, truncated base-32, byteToHex)
  - CLI: `nova-nix eval FILE.nix` evaluates a .nix file and prints the result
  - 381 tests, zero framework dependencies
  - CI pipeline: HLint, Ormolu, build with -Werror, test, Hackage publish on tags

  ### Security

  - Total functions only — no `read`, `head`, `tail`, `!!`, `fromJust`, or `Map.!`
  - Argument injection prevention in fetch builtins (`--` separator before user URLs)
  - Path traversal validation in writeToStore (rejects `/`, `..`, null bytes)
  - Content-hashed temp directories for fetchGit (no predictable paths)
  - Store paths set read-only after registration (immutability enforcement)

  ### Architecture

  - Store paths parameterized via `StoreDir` — no hardcoded `/nix/store/` strings
  - Cross-device safe directory moves (rename with copy+remove fallback)
  - Hash utilities deduplicated into Nix.Hash (single source of truth)
  - currentSystem is a constant (not a function), matching real Nix semantics
  - Platform-aware environment setup (HOME vs USERPROFILE, Unix vs Windows PATH)
changelog-type: markdown
description: |
  <div align="center">
  <h1>nova-nix</h1>
  <p><strong>Windows-Native Nix in Pure Haskell</strong></p>
  <p>A from-scratch implementation of the Nix package manager — parser, lazy evaluator, content-addressed store, derivation builder, binary substituter — running natively on Windows, macOS, and Linux. No WSL. No Cygwin. No MSYS2.</p>
  <p><a href="#quick-start">Quick Start</a> · <a href="#cli">CLI</a> · <a href="#modules">Modules</a> · <a href="#architecture">Architecture</a> · <a href="#the-hard-problems">Hard Problems</a> · <a href="#roadmap">Roadmap</a> · <a href="#build--test">Build & Test</a></p>
  <p>

  [![CI](https://github.com/Novavero-AI/nova-nix/actions/workflows/ci.yml/badge.svg)](https://github.com/Novavero-AI/nova-nix/actions/workflows/ci.yml)
  [![Hackage](https://img.shields.io/hackage/v/nova-nix.svg)](https://hackage.haskell.org/package/nova-nix)
  ![Haskell](https://img.shields.io/badge/haskell-GHC%209.6-purple)
  ![License](https://img.shields.io/badge/license-MIT-blue)

  </p>
  </div>

  ---

  ## What is nova-nix?

  A pure Haskell implementation of Nix that treats Windows as a first-class target:

  - **Parser** — Hand-rolled recursive descent parser for the full Nix expression language. 13 precedence levels, 17 AST constructors, all syntax forms including search paths (`<nixpkgs>`) and dynamic attribute keys (`{ ${expr} = val; }`). Direct `Text` consumption for maximum throughput.
  - **Lazy Evaluator** — Thunk-based evaluation with environment closures, knot-tying for recursive bindings via Haskell laziness. All 17 AST constructors handled: literals, strings with interpolation, attribute sets (recursive and non-recursive), let bindings, lambdas with formal parameters, if/then/else, with, assert, unary/binary operators, function application, list construction, attribute selection, has-attribute checks, and search path resolution.
  - **106 Built-in Functions** — Type checks, arithmetic (`min`, `max`, `mod`), bitwise, strings, lists, attribute sets, higher-order (`map`, `filter`, `foldl'`, `sort`, `genList`, `concatMap`, `mapAttrs`), JSON (`toJSON`/`fromJSON`), hashing (SHA-256/SHA-512/SHA-1/MD5), base64 (`encode`/`decode`), version parsing, `replaceStrings`, `tryEval`, `deepSeq`, `genericClosure`, `setFunctionArgs`/`functionArgs`, string context introspection (`hasContext`, `getContext`, `appendContext`), IO builtins (`import`, `readFile`, `pathExists`, `readDir`, `getEnv`, `toPath`, `toFile`, `findFile`, `scopedImport`, `fetchurl`, `fetchTarball`, `fetchGit`), `derivation`, `placeholder`, `storePath`, and more. 16 builtins available at top level without `builtins.` prefix (`toString`, `map`, `throw`, `import`, `derivation`, `abort`, `baseNameOf`, `dirOf`, `isNull`, `removeAttrs`, `placeholder`, `scopedImport`, `fetchTarball`, `fetchGit`, `fetchurl`, `toFile`) — matching the real Nix language spec.
  - **Search Path Resolution** — `<nixpkgs>` desugars to `builtins.findFile builtins.nixPath "nixpkgs"` — matching real Nix semantics. `NIX_PATH` environment variable is parsed at startup, and `--nix-path` CLI flags merge with it. Directory imports (`import ./dir`) resolve to `dir/default.nix` automatically.
  - **Dynamic Attribute Keys** — `{ ${expr} = val; }` fully supported in all contexts: non-recursive attrs, recursive attrs, let bindings, attribute selection, and has-attribute checks. Key resolution is cleanly separated from value thunk construction to preserve knot-tying in recursive bindings.
  - **String Context Tracking** — Every string carries invisible metadata tracking which store paths it references. Context propagates through interpolation, concatenation, `replaceStrings`, and all string operations. The `derivation` builtin collects contexts into `drvInputDrvs` and `drvInputSrcs` — matching real Nix semantics.
  - **Content-Addressed Store** — `/nix/store` on Unix, `C:\nix\store` on Windows, with real SQLite metadata tracking (ValidPaths + Refs tables, WAL mode)
  - **Derivation Builder** — Full build loop with recursive dependency resolution: topological sort via Kahn's algorithm, binary cache substitution before local builds, input validation, reference scanning, output registration
  - **Binary Substituter** — HTTP binary cache protocol: narinfo fetch + parse, Ed25519 signature verification, NAR download/decompress/unpack, store registration. Priority-ordered multi-cache support. Built on [nova-cache](https://github.com/Novavero-AI/nova-cache).
  - **ATerm Serialization** — Full round-trip `.drv` serialization and parsing with string escape handling

  Every module is pure by default. IO lives at the boundaries only.

  ---

  ## Try It

  ```bash
  git clone https://github.com/Novavero-AI/nova-nix.git
  cd nova-nix
  cabal run nova-nix -- --strict eval test.nix
  ```

  Output:

  ```
  { count = 6; greeting = "Hello, nova-nix!"; items = [ 2 4 6 8 10 ]; nested = { a = 1; b = 2; c = 4; }; types = { attrs = "set"; int = "int"; list = "list"; string = "string"; }; }
  ```

  That's a Nix expression with `let` bindings, `rec` attrs, lambdas, `builtins.map`, `builtins.typeOf`, and arithmetic — parsed, lazily evaluated, and pretty-printed. On Windows, macOS, or Linux.

  ---

  ## CLI

  ```bash
  nova-nix eval FILE.nix                        # Evaluate a .nix file, print result
  nova-nix eval --expr 'EXPR'                   # Evaluate an inline expression
  nova-nix build FILE.nix                       # Build a derivation from a .nix file
  nova-nix --nix-path nixpkgs=/path eval FILE   # Add search paths (repeatable)
  ```

  ### Evaluate

  ```bash
  $ nova-nix --strict eval test.nix
  { count = 6; greeting = "Hello, nova-nix!"; items = [ 2 4 6 8 10 ]; nested = { a = 1; b = 2; c = 4; }; types = { attrs = "set"; int = "int"; list = "list"; string = "string"; }; }
  ```

  Inline expressions:

  ```bash
  $ nova-nix eval --expr '1 + 2'
  3

  $ nova-nix eval --expr 'builtins.map (x: x * x) [1 2 3 4 5]'
  [ 1 4 9 16 25 ]

  $ nova-nix eval --expr '{ x = 1; y = 2; }.x + { x = 1; y = 2; }.y'
  3
  ```

  Search paths:

  ```bash
  $ nova-nix --nix-path nixpkgs=/path/to/nixpkgs eval --expr 'import <nixpkgs> {}'

  $ NIX_PATH=nixpkgs=/path/to/nixpkgs nova-nix eval --expr 'import <nixpkgs> {}'
  ```

  ### Build

  ```bash
  $ cat > hello.nix <<'EOF'
  derivation {
    name = "hello";
    system = builtins.currentSystem;
    builder = "/bin/sh";
    args = [ "-c" "mkdir -p $out && echo 'Hello from nova-nix!' > $out/greeting.txt" ];
  }
  EOF

  $ nova-nix build hello.nix
  /nix/store/abc...-hello
  ```

  The `build` command evaluates the `.nix` file, extracts the derivation, builds the full dependency graph, topologically sorts it, checks binary caches for substitutes, builds anything missing locally, and registers all outputs in the store DB.

  ---

  ## Quick Start

  Add to your `.cabal` file:

  ```cabal
  build-depends: nova-nix
  ```

  ### Parse a Nix Expression

  ```haskell
  import Nix.Parser (parseNix)
  import Nix.Expr.Types

  main :: IO ()
  main = do
    case parseNix "<stdin>" "let x = 1 + 2; in x" of
      Left err   -> print err
      Right expr -> print expr
      -- ELet [NamedBinding [StaticKey "x"]
      --        (EBinary OpAdd (ELit (NixInt 1)) (ELit (NixInt 2)))]
      --      (EVar "x")
  ```

  ### Evaluate an Expression

  ```haskell
  import Nix.Parser (parseNix)
  import Nix.Eval (eval, PureEval(..), NixValue(..))
  import Nix.Builtins (builtinEnv)

  main :: IO ()
  main = do
    case parseNix "<stdin>" "let x = 5; y = x * 2; in y + 1" of
      Left err -> print err
      Right expr -> case runPureEval (eval (builtinEnv 0 []) expr) of
        Left err  -> putStrLn ("Error: " ++ show err)
        Right val -> print val  -- VInt 11
  ```

  The evaluator is polymorphic via `MonadEval` — `PureEval` runs without IO, while `EvalIO` can access the filesystem for `import`, `readFile`, etc.

  ### Lazy Evaluation in Action

  ```haskell
  -- Nix is lazy: unused bindings are never evaluated
  -- runPureEval (eval (builtinEnv 0 []) expr) where expr parses:
  --   "let unused = builtins.throw \"boom\"; x = 42; in x"
  -- Right (VInt 42)  —  "boom" is never triggered

  -- Recursive attribute sets with self-reference
  --   "rec { a = 1; b = a + 1; c = b * 2; }.c"
  -- Right (VInt 4)

  -- Lambda closures, set patterns with defaults
  --   "({ name, greeting ? \"Hello\" }: \"${greeting}, ${name}!\") { name = \"Nix\"; }"
  -- Right (VStr "Hello, Nix!")
  ```

  ---

  ## Modules

  ### Parser

  | Module | Purpose |
  |--------|---------|
  | `Nix.Expr.Types` | Complete Nix AST — 17 expression constructors (including `ESearchPath`), atoms, formals, operators, string parts, source locations |
  | `Nix.Parser` | Hand-rolled recursive descent parser + lexer. Direct `Text` consumption, source position tracking |
  | `Nix.Parser.Lexer` | Tokenizer — integers, floats, strings with interpolation, paths, URIs, search paths, all operators/keywords |
  | `Nix.Parser.Expr` | Expression parser — 13 precedence levels, left/right/non-associative operators, application, selection, dynamic keys |
  | `Nix.Parser.Internal` | Parser state and combinator internals |
  | `Nix.Parser.ParseError` | Structured parse errors with source positions |

  ### Evaluator

  | Module | Purpose |
  |--------|---------|
  | `Nix.Eval` | Lazy evaluator — all 17 AST constructors, thunk forcing, env operations, 106-builtin dispatch, `__functor` callable sets, search path resolution, dynamic attribute keys. Polymorphic via `MonadEval` |
  | `Nix.Eval.Types` | Shared types — `NixValue` (11 constructors), `Thunk` (lazy env for knot-tying), `Env` (lexical + with-scope chain), `StringContext` (store path tracking), `MonadEval` typeclass, `PureEval` runner |
  | `Nix.Eval.Operator` | Binary/unary operators — arithmetic with float promotion, deep structural equality, division-by-zero checks |
  | `Nix.Eval.StringInterp` | String interpolation — value coercion with context propagation, indented string whitespace stripping |
  | `Nix.Eval.Context` | String context construction, queries, extraction — pure helpers for building and inspecting store path references |
  | `Nix.Eval.IO` | IO evaluation monad — real filesystem access, import cache (with directory import), process execution, store writes, NIX_PATH parsing, per-thunk IORef memoization (matching real Nix in-place mutation) |
  | `Nix.Builtins` | Built-in function environment — 106 builtins, search path plumbing (`parseNixPath`), top-level builtin exposure |

  ### Store + Builder

  | Module | Purpose |
  |--------|---------|
  | `Nix.Derivation` | Derivation type, ATerm serialization + parsing (`toATerm`/`fromATerm`), platform detection |
  | `Nix.Hash` | Derivation hashing, store path computation, shared hex/base-32 utilities |
  | `Nix.Store.Path` | Store path types — `StoreDir`, `StorePath`, `parseStorePath`, Windows/Unix support |
  | `Nix.Store.DB` | SQLite store database — `ValidPaths` + `Refs` tables, WAL mode, path registration, reference/deriver queries |
  | `Nix.Store` | High-level store operations — `addToStore`, `scanReferences`, `setReadOnly`, `writeDrv` |
  | `Nix.Builder` | Derivation builder — dependency graph construction, topological sort, binary cache substitution, local build with output registration |
  | `Nix.DependencyGraph` | Dependency graph construction (BFS with `Seq` queue) and topological sort (Kahn's algorithm, O(V+E)), cycle detection |
  | `Nix.Substituter` | Binary cache substituter — HTTP narinfo fetch, signature verification, NAR download/decompress/unpack, store registration. Multi-cache with priority ordering |

  ---

  ## Architecture

  ```
                       Pure Core (no IO)
    +-------------------------------------------------+
    |                                                 |
    |  Parser --> Expr.Types --> Eval --> Builtins     |
    |                 |           |                    |
    |          Parser.Lexer    Eval.Types              |
    |          Parser.Expr     Eval.Operator           |
    |          Parser.Internal Eval.StringInterp       |
    |          ParseError      Eval.Context            |
    |                             |                    |
    |                        Derivation --> Hash        |
    |                             |                    |
    |                    Store.Path  DependencyGraph    |
    |                                                 |
    +-------------------------------------------------+
                          |
                 IO Boundary (thin)
    +-------------------------------------------------+
    |  Eval.IO   Store.DB   Store   Builder   Substituter|
    +-------------------------------------------------+
  ```

  **Evaluator design:**

  - **MonadEval typeclass** — The evaluator is `eval :: (MonadEval m) => Env -> Expr -> m NixValue`, polymorphic in its effect monad. `PureEval` (newtype over `Either Text`) runs all pure tests with no IO. `EvalIO` provides `readFileText`, `doesPathExist`, `listDirectory`, `getEnvVar`, `getCurrentTime`, `writeToStore`, `scopedImportFile`, `runProcess` for IO builtins.
  - **Thunk-based lazy evaluation with memoization** — List elements and attribute set values are stored as unevaluated thunks (`Thunk Expr Env`). Only forced when a value is demanded. `(x: 1) (throw "boom")` returns `1` because `x` is never referenced. In `EvalIO`, each thunk carries a per-thunk `IORef` memo cell — forced once, then cached in place (matching real Nix's in-place mutation). Dead thunks are reclaimed by GC naturally.
  - **Knot-tying via Haskell laziness** — Recursive `let` and `rec { }` create self-referential environments. The `Thunk` type has a lazy `Env` field so thunks can capture environments that include themselves. Haskell's own laziness resolves the recursion. Dynamic attribute keys are resolved monadi­cally *before* knot-tying — the two-phase design (`resolveBindingKeys` then `buildResolvedBindingsMap`) cleanly separates key evaluation from value thunk construction.
  - **Search path desugaring** — `<nixpkgs>` is its own AST constructor (`ESearchPath`), desugared at eval time to `builtins.findFile builtins.nixPath "nixpkgs"` — exactly how real Nix handles it. `builtins.nixPath` is populated from `NIX_PATH` and `--nix-path` flags.
  - **With-scope chain** — `Env` has lexical bindings (always win) plus a stack of with-scopes walked innermost-first. `let a = 1; in with { a = 2; }; a` correctly returns `1` because lexical scope takes priority.
  - **Short-circuit operators** — `&&`, `||`, and `->` are handled directly in eval (not delegated to Operator) because they must not evaluate both operands.
  - **String context propagation** — Every `VStr` carries a `StringContext` tracking store path references (`SCPlain`, `SCDrvOutput`, `SCAllOutputs`). Context merges through interpolation, concatenation, and string builtins. The `derivation` builtin collects all context into `drvInputDrvs`/`drvInputSrcs`.

  **Build pipeline:**

  1. Evaluate `.nix` file to extract derivation
  2. Build dependency graph by reading `.drv` files from the store (BFS traversal)
  3. Topologically sort via Kahn's algorithm — leaves first, cycle detection
  4. For each dependency in build order: check store cache, try binary substitution, build locally
  5. Build execution: validate inputs, set up environment, run builder process, scan references, register outputs in SQLite DB

  **Key numbers:**

  - **22 modules** — all implemented
  - **511 tests** — hand-rolled harness, no framework dependencies
  - **Zero partial functions** — total by construction, `T.uncons` over `T.head`/`T.tail`
  - **Strict by default** — bang patterns on all data fields (except Thunk's Env, which is lazy for knot-tying)

  ---

  ## The Hard Problems

  Building Nix on Windows means solving real platform differences:

  | Problem | Solution |
  |---------|----------|
  | **No `fork`/`exec`** | `System.Process.createProcess` maps to Win32 `CreateProcess` natively |
  | **No symlinks (sometimes)** | Developer Mode enables symlinks; fallback to junction points / copies |
  | **`/nix/store` doesn't exist** | `C:\nix\store` as `StoreDir` — all paths parameterized, never hardcoded |
  | **Case-insensitive filesystem** | Nix store paths are case-sensitive by content hash — collisions impossible |
  | **260-char path limit** | `\\?\` extended-length prefix (32K chars), already used by cargo/node |
  | **No bash** | Ship `bash.exe` from MSYS2 (same as Git for Windows) |
  | **Sandboxing** | Unsandboxed initially (macOS did this for years); future: Win32 Job Objects + App Containers |
  | **stdenv bootstrap** | Cross-compile from Linux, or bootstrap from MSYS2 MinGW toolchain |
  | **Cross-device moves** | `renameDirectory` can fail across devices; fallback to recursive copy + remove |

  The biggest challenge isn't any single feature — it's **nixpkgs compatibility**. nixpkgs is 80,000+ packages defined as one massive recursive attrset. It exercises every builtin, every edge case in string context tracking, and every lazy evaluation pattern. The evaluator must handle all of this correctly and fast enough (~2-5 seconds for full nixpkgs eval).

  ---

  ## Roadmap

  ### Next

  - [ ] **Full `import <nixpkgs> {}` performance** — nixpkgs lib layer evaluates correctly; stdenv bootstrap runs but needs memory optimization for the full 80,000+ package set (currently OOM at 2GB, investigating space leak)
  - [ ] **`nova-nix shell`** — Enter a development shell (like `nix shell`)
  - [ ] **`nova-nix repl`** — Interactive evaluator

  ### Long-Term

  - [ ] **Nix daemon protocol compatibility**
  - [ ] **XZ decompression** — Enable nova-cache compression flag for real binary cache downloads
  - [ ] **Store bootstrap** — Ship prebuilt bash + coreutils for Windows builds

