  ## Build & Test

  ```bash
  cabal build                              # Build library + CLI
  cabal test                               # Run all 511 tests
  cabal build --ghc-options="-Werror"      # Warnings as errors (CI default)
  cabal haddock                            # Generate API docs
  ```

  Requires GHC 9.6 and cabal-install 3.10+.

