changelog: "# Version [0.8.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/client-core-0.7.0.0...client-core-0.8.0.0)
  (2026-04-15)\n\n* Changes\n  * `BlockfrostError` constructor of `BlockfrostError`
  type now contains\n    `Status` from `Network.HTTP.Types.Status` (HTTP status code
  and an explanation message).\n    Previously `BlockfrostError Text`, now `BlockfrostError
  Status Text`.\n  * `BlockfrostFatal` constructor (HTTP 500) of `BlockfrostError`
  merged into `BlockfrostError` constructor.\n  * `Blockfrost.Client.Core` module
  now exports `retriableError`, for retry logic\n    implemented in `blockfrost-client`
  package (using `Control.Retry` from `retry` package).\n\n# Version [0.7.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/client-core-0.6.0.1...client-core-0.7.0.0)
  (2025-12-02)\n\n* Changes\n  * Add `CustomURL` to `Env`, to allow arbitrary Blockfrost
  instance [#79](https://github.com/blockfrost/blockfrost-haskell/pull/79)\n  * `BlockfrostNotFound`
  constructor of `BlockfrostError` is now `BlockfrostNotFound Text`\n    containing
  path that resulted in 404 error [#81](https://github.com/blockfrost/blockfrost-haskell/pull/81)\n
  \ * Drop `Sanchonet` `Env` [#79](https://github.com/blockfrost/blockfrost-haskell/pull/79)\n\n#
  Version [0.6.0.1](https://github.com/blockfrost/blockfrost-haskell/compare/v0.6.0.0...client-core-0.6.0.1)
  (2024-01-16)\n\n* Allow servant `0.20`\n\n# Version [0.6.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/v0.5.0.0...v0.6.0.0)
  (2022-08-31)\n\n* Additions\n  * HTTP Error `425`\n    * `BlockfrostMempoolFullOrPinQueueFull`
  to `BlockfrostError` \n      * related to `/tx/submit` endpoint\n      * or to `IPFS`
  pinning `/ipfs/pin/add/{IPFS_path}` endpoint\n  * `Preprod` and `Preview` environments\n\n*
  Changes\n  * Order of results returned by `allPages` is now the same as returned
  by the API. Was unintentionally reversed before.\n\n# Version [0.4.0.2](https://github.com/blockfrost/blockfrost-haskell/compare/v0.4.0.1...client-core-0.4.0.2)
  (2022-06-06)\n\n* Allow blockfrost-api `0.5`\n\n# Version [0.4.0.1](https://github.com/blockfrost/blockfrost-haskell/compare/v0.4.0.0...v0.4.0.1)
  (2022-04-05)\n\n* Allow servant `0.19`\n\n# Version [0.4.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/v0.3.1.0...v0.4.0.0)
  (2022-03-09)\n\n* Re-export `nextPage`\n\n# Version [0.2.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/v0.1.0.0...v0.2.0.0)
  (2021-10-29)\n\n* Dropped `Alonzo` environment\n* Switched category to `Cardano`\n\n#
  Version [0.1.0.0](https://github.com/blockfrost/blockfrost-haskell/compare/initial...v0.1.0.0)
  (2021-09-14)\n\n* Initial release\n\n---\n\n`blockfrost-client-core` uses [PVP Versioning][1].\n\n[1]:
  https://pvp.haskell.org\n\n"
