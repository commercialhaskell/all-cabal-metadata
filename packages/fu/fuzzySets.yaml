changelog: "# Revision history for fuzzySets\r\n\r\n## 1.0.0 -- 2025-04-17\r\n\r\n*
  First version.\r\n\r\n## 1.0.1 -- 2025-05-01\r\n* Changed constrains for dependencies
  in .cabal file to allow for more flexibility in package versions.\r\n\r\n## 1.0.2
  -- 2025-03-28\r\n* Added deffuzzification function to the library, allowing users
  to convert fuzzy sets (Lset Double l) back into numbers. \r\n* This update is prepared
  for the next major release, which will include fuzzy control systems, if than rules
  and more.\r\n\r\n## 1.1.0 -- 2025-04-11\r\n* Added new functions for computing cardinality
  of fuzzy sets.\r\n* Fixed some minor bugs in the implementation of defuzzification
  functions. \r\n* Updated documentation.\r\n* Added tutorial modules to get started
  with the library.\r\n* Added toMatrix and fromMatrix functions to convert between
  fuzzy sets and matrices.\r\n* Added fuzzification functions to convert crisp values
  into fuzzy sets.\r\n* Added support for linguistic variables and terms, allowing
  users to define fuzzy sets based on natural language descriptions.\r\n* Added inference
  engine for fuzzy control systems, enabling users to create fuzzy rules and evaluate
  them based on input data.\r\n"
changelog-type: markdown
description: |-
  In classical set theory, an element either belongs to a set or it does not.
  Fuzzy sets generalize this idea by allowing graded membership.
  This package provides tools for constructing and manipulating fuzzy sets
  and fuzzy relations.
  If you are new to the library, the "Fuzzy.Tutorial" module is the best
  place to start before diving into the reference documentation.
