description: "The @stock@ plugin provides a datatype for deriving and synthesising\ninstances
  at compile time. @stock-hashable@ extends the @stock@ with\nsupport for @Hashable@
  and higher-kinded variants.\n\n> {-# options_ghc -fplugin Stock #-}\n> \n> {-# language
  DerivingVia #-}\n> \n> import Stock\n> import Stock.Hashable\n> \n> data Pair a
  b = Pair a b\n>  deriving (Eq,  Hashable)  via Stock  (Pair a b)\n>  deriving (Eq1,
  Hashable1) via Stock1 (Pair a)\n>  deriving (Eq2, Hashable2) via Stock2 Pair\n\n@stock-hashable@
  provides three instances, that signal to the plugin\nhow to derive @Hashable@.\n\n>
  instance DeriveStock  Hashable  ..\n> instance DeriveStock1 Hashable1 ..\n> instance
  DeriveStock2 Hashable2 .."
