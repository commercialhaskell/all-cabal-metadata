description: "# File System Event Notification (fsnotify)\n\nA **portable, robust,
  and stream-based file system event notification API** for\n**Linux, macOS, and Windows**.
  This library provides a streaming alternative to\nthe [`fsnotify`](https://github.com/fsnotify/fsnotify)
  package.\n\nThe portable module in this package offers a consistent, cross-platform,\ncommon
  denominator API across all supported systems whereas\nplatform-specific modules
  expose more extensive APIs that allow you to\nmake full use of each operating system’s
  native capabilities.\n\n## Contributing\n\nWe welcome contributions of all kinds,
  bug reports, feature requests, and pull\nrequests. If you’d like to get involved,
  please open an issue or start a\ndiscussion.\n\n## Getting Support\n\n* \U0001F4AC
  Join our [community chat](https://gitter.im/composewell/streamly).\n* \U0001F4E7
  For dedicated support and feature requests, contact us at [support@composewell.com](mailto:support@composewell.com).\n"
