changelog: "# Revision history for symplectic-chp\n\n## 0.2.0.0 -- 2026-07-20\n\n###
  Breaking API Changes\n\n* **Deterministic `Clifford` monad**: `Clifford` now threads
  a `StdGen` instead of\n  living in `IO`. The type changed from\n  `SomeTableau ->
  IO (SomeTableau, a)` to\n  `SomeTableau -> StdGen -> (SomeTableau, StdGen, a)`.\n
  \ This makes simulations reproducible when a seed is supplied.\n* **Seeded runner**:
  added `runWithSeed :: Int -> StdGen -> Clifford a -> (SomeTableau, a)`.\n* **LargeTableau
  gate unification**: removed `LargeLocalSymplectic` and\n  `LargeSymplecticGate`;
  `LargeTableau` now reuses `LocalSymplectic` and\n  `SymplecticGate` from `SymplecticCHP`.\n\n###
  Bug Fixes\n\n* **`--seed` flag now works**: the CLI seed was previously accepted
  but ignored;\n  random measurements now derive from the supplied seed.\n\n### Other
  Changes\n\n* Updated `stim-parser` dependency to `>= 0.4 && < 0.5` and adapted to
  the\n  `AnnTarget` change in annotation AST.\n* Removed unused/incomplete modules
  `SymplecticCHP.Core`, `SymplecticCHP.Types`,\n  and `SymplecticCHP.Storage`.\n\n##
  0.1.0.1 -- 2026-07-17\n\n* Support `stim-parser` 0.2.0.0: relax upper bound to `<
  0.3`.  \n  The `Float` → `Double` change in `stim-parser`'s AST is transparent to\n
  \ `symplectic-chp` because probabilities and coordinates are ignored during\n  translation.\n\n##
  0.1.0.0 -- 2026-04-06\n\n### Major Features\n\n* **Symplectic Geometry Foundation**:
  Complete implementation of CHP simulator through the lens of symplectic geometry,
  revealing that Aaronson & Gottesman's CHP algorithm is a computational realization
  of the Symplectic Basis Theorem.\n\n* **Mathematical Hierarchy**: Type class hierarchy
  encoding the geometric structure:\n  - `Group` → `SymplecticGroup` → `AbelianLagrangianCorrespondence`\n
  \ - `SymplecticVectorSpace` → `IsotropicSubSpace` → `LagrangianSubSpace` → `SymplecticBasisTheorem`\n\n*
  **Type-Safe Tableau**: Compile-time guarantees via GADTs and type-level naturals:\n
  \ - Dimensional checking with `Vector n` and `Finite n`\n  - O(1) indexing with
  bounds guarantees\n  - Zero-cost abstractions (< 5% runtime overhead)\n\n### STIM
  Circuit Support\n\n* **Parser Integration**: Full STIM circuit file parsing via
  `stim-parser` library\n* **Supported Gates**: H, S, CNOT, X, Y, Z, CZ, SWAP, SQRT_Z,
  S_DAG, XCZ, ZCX, ZCZ, H_XZ\n* **Gate Decomposition**: Automatic decomposition of
  non-native gates:\n  - X = H·S·S·H\n  - Y = S·X·S³\n  - Z = S·S\n  - CZ = H(t)·CNOT(c,t)·H(t)\n
  \ - SWAP = CNOT(a,b)·CNOT(b,a)·CNOT(a,b)\n* **Measurements**: Z-basis (M/MZ), X-basis
  (MX), Y-basis (MY)\n* **Multi-target Gates**: Support for `H 0 1 2`, `CNOT 0 1 2
  3` syntax\n* **Command-line Tool**: `symplectic-chp` executable with options:\n
  \ - `--seed N` for reproducible measurements\n  - `--no-tableau` to hide tableau
  output\n  - `-v` for verbose mode\n\n### Bug Fixes\n\n* **S Gate Phase Fix**: Corrected
  phase update in S gate to properly handle Y→-X transformation (was adding 0 phase,
  should add +1)\n* **Phase Convention**: Stabilizer phases now correctly reflect
  canonical form (-Z instead of +iZ)\n\n### Test Suite\n\n* **68 Total Tests**:\n
  \ - 58 Haskell unit tests (symplectic properties, gate composition, measurement
  correctness)\n  - 10 STIM circuit integration tests\n* **Test Circuits**: bell-state,
  ghz-state, single-hadamard, stabilizer-cycle, cz-gate, swap-gate, multi-target,
  y-measurement, phase-gate, unsupported-rx\n* **Mathematical Derivations**: Each
  test circuit includes `.derive.md` with step-by-step tableau evolution\n\n### Documentation\n\n*
  **Implementation Guide** (`doc/implement.md`): Complete mathematical hierarchy documentation\n*
  **STIM Parser Implementation** (`doc/stim-parse-impl.md`): Real implementation documentation\n*
  **Performance Analysis** (`doc/overhead.md`): Abstraction cost analysis\n* **Theory
  Blog** (`doc/symplectic-blog-intuitive.md`): Intuitive explanation of symplectic
  geometry\n\n### Formal Verification\n\n* **Agda Formalization**: All test expectations
  derived from [symplectic-pauli](https://github.com/overshiki/symplectic-pauli) Agda
  proofs\n* Machine-checked proofs of:\n  - Symplectic Basis Theorem\n  - Fundamental
  Correspondence (Pauli commutation ⟺ symplectic form)\n  - All 10 circuit examples
  verified in Agda\n\n---\n\n## Pre-release History\n\n### 2026-03 - Initial Development\n\n*
  Core CHP simulator implementation with symplectic geometry foundation\n* Type-safe
  vector implementation using `vector-sized`\n* Basic gate support: H, S, CNOT\n*
  Tableau operations: evolution, measurement\n\n### 2026-03 - Mathematical Abstraction\n\n*
  Refactored to use geometric hierarchy (Group, SymplecticGroup, etc.)\n* Added `Clifford`
  monad for circuit composition\n* Property-based testing with QuickCheck\n\n### 2026-04
  - STIM Integration\n\n* Added STIM circuit file support\n* Gate decomposition for
  X, Y, Z, CZ, SWAP\n* Multi-target gate syntax\n* Comprehensive test suite with derivations\n*
  Bug fix for S gate phase calculation\n"
changelog-type: markdown
description: "# Symplectic-CHP\n\nA Haskell implementation of the CHP clifford simulator,
  **through the lens of symplectic geometry** with **type-safe, fixed-length vectors**,
  **higher-order mathematical abstractions**, and **minimal runtime overhead**.\n\n##
  Overview\n\nWhat if the CHP simulator isn't just an algorithm, but a **computational
  realization of the Symplectic Basis Theorem**?\n\nThis package reveals that Aaronson
  & Gottesman's CHP algorithm is actually doing symplectic linear algebra over \U0001D53D₂.
  The \"tableau\" is really a **symplectic basis**—a pair of transverse Lagrangian
  subspaces satisfying the elegant duality condition ω(Dᵢ, Sⱼ) = δᵢⱼ.\n\nWe encode
  this mathematical structure in Haskell's type system, achieving:\n- **Compile-time
  guarantees** that your tableau is valid\n- **Zero-cost abstractions** via GHC optimization\n-
  **Mathematical clarity** where code mirrors geometric structure\n\n> **Why Haskell?**
  This level of abstraction—encoding theorems as type classes, enforcing geometric
  invariants at compile time—is uniquely enabled by Haskell's expressive type system.
  The composition of dependent types, higher-kinded polymorphism, and type families
  makes such elegant encoding of mathematical structures possible.\n\n## What Makes
  This Special?\n\n### The Symplectic Basis Theorem, in Code\n\nThe CHP tableau **is**
  a symplectic basis:\n\n```haskell\n-- | The Symplectic Basis Theorem: {e₁,...,eₙ,
  f₁,...,fₙ} with ω(eᵢ,fⱼ) = δᵢⱼ\ndata Tableau (n :: Nat) v where\n  Tableau ::\n
  \   { stabLagrangian   :: Lagrangian n v   -- S = {e₁,...,eₙ}\n    , destabLagrangian
  :: Lagrangian n v   -- D = {f₁,...,fₙ}\n    } -> Tableau n v\n\ninstance SymplecticBasisTheorem
  Tableau n v where\n  firstLagrangian  = stabLagrangian\n  secondLagrangian = destabLagrangian\n```\n\nThe
  type system enforces the theorem's three conditions:\n1. Stabilizers are isotropic:
  ω(Sᵢ, Sⱼ) = 0\n2. Destabilizers are isotropic: ω(Dᵢ, Dⱼ) = 0\n3. **Duality**: ω(Dᵢ,
  Sⱼ) = δᵢⱼ\n\n### A Hierarchy of Mathematical Structures\n\nOur type classes mirror
  the geometric hierarchy:\n\n```\nGroup g\n  └─ SymplecticGroup g v         -- group
  + symplectic structure\n        ├─ Pauli (concrete)\n        └─ AbelianLagrangianCorrespondence
  g n v\n              └─ Maximal abelian  ⟷  Lagrangian\n\nSymplecticVectorSpace
  v\n  └─ IsotropicSubSpace s n v\n        └─ LagrangianSubSpace s n v\n              └─
  SymplecticBasisTheorem s n v\n                    └─ Tableau n v\n```\n\nThe code
  *is* the mathematics.\n\n## Mathematical Soundness: Formally Verified\n\nThe mathematical
  foundations of this implementation have been **machine-checked** in the [symplectic-pauli](https://github.com/overshiki/symplectic-pauli)
  Agda formalization project.\n\n### What Does This Mean?\n\nEvery theorem underlying
  this codebase has been formally proven:\n\n| Theorem | Status | Agda Proof |\n|---------|--------|------------|\n|
  **Symplectic Basis Theorem** | ✅ Complete | `symplecticBasisTheorem` |\n| **Fundamental
  Correspondence** | ✅ Complete | Pauli commutation ⟺ symplectic form |\n| **Tableau
  as Symplectic Basis** | ✅ Complete | Duality conditions verified |\n| **All Circuit
  Examples** | ✅ Verified | 10/10 test circuits proven correct |\n\nThe Agda formalization
  translates our Haskell type class hierarchy into dependent type theory, providing
  **compile-time proof** that:\n- Stabilizers are isotropic (ω(Sᵢ, Sⱼ) = 0)\n- Destabilizers
  are isotropic (ω(Dᵢ, Dⱼ) = 0)  \n- Duality holds (ω(Dᵢ, Sⱼ) = δᵢⱼ)\n- Gate conjugations
  preserve the symplectic form\n- Measurement outcomes match quantum mechanical predictions\n\n>
  **Why this matters**: While Haskell gives us runtime verification via `verifyDuality`,
  Agda provides **mathematical certainty** at the type level. The test expectations
  in this repository are derived from these formal proofs.\n\n### Minimal Overhead,
  Maximum Safety\n\nThe mathematical rigor of our haskell chp implementation comes
  with **< 5% runtime overhead**. GHC's optimizer eliminates abstraction costs through
  inlining, while `Vector`-based storage improves cache locality over traditional
  lists.\n\nType-level naturals (`Vector n`, `Finite n`) give us:\n- Compile-time
  dimensional checking\n- O(1) indexing with bounds guarantees\n- No out-of-bounds
  errors at runtime\n\n## Arbitrary Qubit Support\n\nIn addition to the standard `Tableau
  n` (optimized for up to 64 qubits using `Word64`), we now provide `LargeTableau`
  for **arbitrary qubit counts** using chunked bit-vector storage.\n\n### Standard
  API (≤ 64 qubits, Word64-optimized)\n\n```haskell\nimport SymplecticCHP\n\n-- Type-safe,
  compile-time sized (fast for small circuits)\nbellState :: Tableau 2\nbellState
  = \n  applyGate (CNOT 0 1) $\n  applyGate (Local (Hadamard 0)) $\n  emptyTableau
  @2\n```\n\n### Large Tableau API (arbitrary qubits, BitVec-backed)\n\n```haskell\nimport
  SymplecticCHP.BitVec\nimport SymplecticCHP.LargeTableau\n\n-- Runtime-sized, works
  with any number of qubits\nlargeCircuit :: Int -> LargeTableau\nlargeCircuit n =
  \n  largeApplyGate (LargeCNOT 0 1) $\n  largeApplyGate (LargeLocal (LargeHadamard
  0)) $\n  largeEmpty n\n\n-- Simulate 1000-qubit circuit\nmain = do\n  let tab0 =
  largeEmpty 1000\n  let tab1 = largeApplyGate (LargeLocal (LargeHadamard 0)) tab0\n
  \ print $ largeIsValid tab1  -- True\n```\n\n### Feature Comparison\n\n| Feature
  | Standard `Tableau n` | `LargeTableau` |\n|---------|---------------------|----------------|\n|
  Max qubits | 64 (Word64) | Unlimited (BitVec) |\n| Storage | Unboxed Word64 | Chunked
  Vector Word64 |\n| Type safety | Compile-time n | Runtime n |\n| Performance | Optimal
  | Good (slight overhead) |\n| Best for | Small circuits, education | Large QEC codes
  |\n\n## Quick Start\n\n### Library Usage\n\n```haskell\n-- Create a Bell state\nbellCircuit
  :: Clifford Bool\nbellCircuit = do\n  gate (Local (Hadamard 0))     -- H ⊗ I\n  gate
  (CNOT 0 1)                -- CNOT 0→1\n  measurePauli (Pauli 3 0 0)     -- Measure
  X⊗X (should be +1)\n\n-- Run it\nmain = do\n  (tab, outcome) <- runWith 2 bellCircuit\n
  \ print outcome  -- True (+1 eigenvalue)\n```\n\n### STIM Circuit Files\n\nThe package
  includes a command-line tool to simulate [STIM](https://github.com/quantumlib/Stim)
  circuit files:\n\n```bash\n# Build and run\ncabal build\ncabal run symplectic-chp
  -- circuit.stim\n```\n\nCreate a STIM circuit file (e.g., `bell.stim`):\n\n```\n#
  Bell state preparation\nH 0\nCNOT 0 1\nM 0 1\n```\n\nRun the simulation:\n\n```bash\n$
  cabal run symplectic-chp -- bell.stim\n\n========================================\n
  \ CHP Simulation Results\n========================================\n\nMeasurements
  performed: 2\nMeasurement outcomes:\n  M0: +1 (|0⟩ or |+⟩)\n  M1: +1 (|0⟩ or |+⟩)\n\nNumber
  of qubits: 2\nTableau valid: True\n\nStabilizers (generators of the stabilizer group):\n
  \ S0: +Z\n  S1: +ZZ\n\nDestabilizers (dual to stabilizers):\n  D0: +XX\n  D1: +IX\n```\n\n####
  Supported STIM Features\n\n| Feature | Status |\n|---------|--------|\n| **Gates**
  | H, S, CNOT, CZ, X, Y, Z, SWAP, SQRT_Z (S), S_DAG |\n| **Measurements** | M (Z-basis),
  MX (X-basis), MY (Y-basis), MZ (Z-basis) |\n| **Gates (decomposed)** | CZ, X, Y,
  Z, SWAP are decomposed into H/S/CNOT |\n\n#### Unsupported Features (will report
  error)\n\n- Non-Clifford gates (T, RX, RY, RZ, SQRT_X, etc.)\n- Reset operations
  (R, MR, MRX, etc.)\n- Pauli product measurements (MPP)\n- Noise channels (X_ERROR,
  DEPOLARIZE1, etc.)\n- REPEAT blocks\n- Annotations (QUBIT_COORDS, DETECTOR, etc.)\n\n####
  Command-Line Options\n\n```bash\nsymplectic-chp [OPTIONS] <input.stim>\n\nOptions:\n
  \ -h, --help         Show help message\n  -v                 Enable verbose output\n
  \ --seed N           Use specific random seed for reproducibility\n  --no-tableau
  \      Don't show final tableau\n```\n\n#### Example: GHZ State\n\n```\n# ghz.stim\nH
  0\nCNOT 0 1\nCNOT 0 2\nM 0 1 2\n```\n\n```bash\n$ cabal run symplectic-chp -- ghz.stim\n```\n\n####
  Test Circuits\n\nExample circuits are available in `data/stim-circuits/`:\n\n```bash\n#
  List available test circuits\nls data/stim-circuits/*.stim\n\n# Run a test circuit\ncabal
  run symplectic-chp -- data/stim-circuits/bell-state.stim\n```\n\nEach circuit includes:\n-
  `.stim` - The circuit file\n- `.expected` - Expected results for automated testing\n-
  `.derive.md` - Mathematical derivation of the circuit's behavior\n\n### Verifying
  LargeTableau Correctness\n\nWe provide a comprehensive verification suite to validate
  the `LargeTableau` implementation against known quantum states:\n\n```bash\n# Build
  the verification executable\ncabal build verify-large-tableau\n\n# Run with default
  settings (10,000 qubits for Bell pairs test)\ncabal run verify-large-tableau\n\n#
  Run with custom qubit counts\ncabal run verify-large-tableau -- --bell-pairs=5000
  --rep-code=1000 --random=50\n\n# Quick test with smaller circuits\ncabal run verify-large-tableau
  -- --bell-pairs=100 --rep-code=100 --random=10\n```\n\n#### Verification Tests\n\n|
  Test | Description | Qubits | Verification Method |\n|------|-------------|--------|---------------------|\n|
  **Bell Pairs** | Creates N/2 independent \\|Φ⁺⟩ states | Configurable (default 10,000)
  | Stabilizer validity, pair-wise commutation |\n| **Repetition Code** | Creates
  \\|+⋯+⟩ GHZ-like state | Configurable (default 1,000) | X₀Xᵢ stabilizer properties
  |\n| **Phase Identity** | Verifies S² = Z algebra | 100 | Eigenvalue verification
  |\n| **Random Circuits** | Property-based fuzzing | 100 | Tableau validity preservation
  |\n| **Performance** | Benchmarks gate throughput | 100-10,000 | Timing measurements
  |\n\n#### Example Output\n\n```\n========================================\n  LargeTableau
  Verification Suite\n========================================\nConfiguration:\n  Bell
  pairs test: 10000 qubits\n  Rep code test: 1000 qubits\n  Random circuits: 100\n\n===
  Test 1: Pairwise Bell States ===\nCreating 5000 Bell pairs with 10000 qubits...\nCircuit
  creation time: 0.23s\nTableau valid: True\nSampled stabilizers commute: True\nStabilizer
  count: 10000 (expected: 10000)\n\n=== Test 5: Performance Benchmark ===\nBenchmarking
  10000 qubits:\n  Creation: 0.01s\n  100 Hadamards: 0.15s\n  100 CNOTs: 0.32s\n  Tableau
  valid: True\n  Estimated memory: 2500 KB\n\n========================================\n
  \ Summary\n========================================\nTotal time: 2.34s\n\n✅ ALL
  TESTS PASSED\n```\n\nThese tests ensure that `LargeTableau` produces correct results
  for arbitrary qubit counts by validating against analytically known quantum states.\n\n##
  Learn More\n\n- **[Theory Blog](https://overshiki.github.io/symplectic-blog-intuitive/)**
  — Why the Pauli group is symplectic\n- **[Implementation Guide](doc/implement.md)**
  — The complete mathematical hierarchy\n- **[Performance Analysis](doc/overhead.md)**
  — Why the abstractions are free\n- **[STIM Parser Implementation](doc/stim-parse-impl.md)**
  — STIM circuit file parsing and simulation\n- **[Agda Formalization](https://github.com/overshiki/symplectic-pauli)**
  — Machine-checked proofs of all theorems (symplectic-pauli)\n\n## Testing\n\n###
  Haskell Test Suite\n\n```bash\ncabal test\n```\n\nAll **68 tests** pass:\n- **58
  unit tests** — verifying symplectic form properties, tableau validity, gate composition,
  and measurement correctness\n- **10 integration tests** — STIM circuit files testing
  Bell states, GHZ states, gate decompositions, and error handling\n\n\n### Test Circuits\n\nExample
  STIM circuits are provided in `data/stim-circuits/`:\n\n| Circuit | Description
  |\n|---------|-------------|\n| `bell-state.stim` | Bell state \\|Φ⁺⟩ preparation
  |\n| `ghz-state.stim` | GHZ state preparation |\n| `swap-gate.stim` | SWAP gate
  decomposition |\n| `stabilizer-cycle.stim` | X gate via HSSH decomposition |\n|
  `unsupported-rx.stim` | Error handling for non-Clifford gates |\n\nThe test suite
  automatically runs these circuits and verifies their outputs against expected results.\n\n##
  References\n\n- Aaronson & Gottesman, \"Improved Simulation of Stabilizer Circuits,\"
  *Phys. Rev. A* 70, 052328 (2004)\n- Artin, *Geometric Algebra* (symplectic groups)\n-
  Gosson, *Symplectic Geometry and Quantum Mechanics*\n\n## License\n\nMIT License\n"
