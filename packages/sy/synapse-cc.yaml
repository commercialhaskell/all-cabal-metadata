description: "# synapse-cc\n\n**Unified compiler toolchain for Plexus backends**\n\n`synapse-cc`
  (synapse compiler collection) orchestrates the complete pipeline from backend schema
  discovery to compiled, ready-to-use client libraries.\n\n## Features\n\n- \U0001F527
  **Unified Interface**: Single command to generate clients from any backend\n- \U0001F50D
  **Smart Tool Discovery**: Finds local development builds or installed versions\n-
  ⚡ **Fast**: Smart caching avoids regeneration when schemas haven't changed (coming
  in Phase 3)\n- \U0001F3AF **Multi-Language**: TypeScript, Python, Rust support (TypeScript
  in MVP)\n- \U0001F6E0️ **Complete Pipeline**: From schema → IR → generated code
  → compiled artifacts\n\n## Installation\n\n### From Source\n\n```bash\ncd synapse-cc\ncabal
  build\ncabal install\n```\n\n### Dependencies\n\n`synapse-cc` requires these tools
  to be available:\n- **synapse** - Schema discovery and IR generation\n- **hub-codegen**
  - Code generation from IR\n\nThe tool will automatically find them if they're:\n-
  In your `$PATH`\n- In local development directories (`../synapse`, `../hub-codegen`)\n-
  In `~/.plexus/bin/`\n\n## Usage\n\n### Basic TypeScript Client\n\n```bash\nsynapse-cc
  typescript substrate ws://localhost:4444\n```\n\nThis will:\n1. Connect to substrate
  at `ws://localhost:4444`\n2. Discover the schema\n3. Generate IR\n4. Generate TypeScript
  client\n5. Output to `./generated/`\n\n### Options\n\n```bash\nsynapse-cc <target>
  <backend> <url> [OPTIONS]\n\nArguments:\n  target    Target language (typescript,
  python, rust)\n  backend   Backend identifier (substrate, plexus, synapse, etc.)\n
  \ url       Backend WebSocket URL (e.g., ws://localhost:4444)\n\nOptions:\n  -o,
  --output DIR           Output directory (default: ./generated)\n  --bundle-transport
  BOOL    Bundle transport code (default: true)\n  --no-install              Skip
  dependency installation\n  --no-build                Skip compilation step\n  --cache-dir
  DIR           Cache directory (default: ~/.plexus/cache)\n  --force                   Force
  regeneration (ignore cache)\n  --watch                   Watch backend and regenerate
  on changes\n  --debug                   Enable debug logging\n  -h, --help                Show
  help message\n```\n\n### Examples\n\n**External transport mode** (uses `@plexus/rpc-client`
  package):\n```bash\nsynapse-cc typescript substrate ws://localhost:4444 \\\n  --bundle-transport=false
  \\\n  --output ./packages/substrate-client\n```\n\n**Skip build steps** (just generate
  code):\n```bash\nsynapse-cc typescript substrate ws://localhost:4444 \\\n  --no-install
  \\\n  --no-build\n```\n\n**Debug mode**:\n```bash\nsynapse-cc typescript substrate
  ws://localhost:4444 --debug\n```\n\n## Architecture\n\n```\nsynapse-cc (Haskell)\n
  \   ↓\n    ├─→ synapse (Haskell) → IR (JSON)\n    ↓\n    ├─→ hub-codegen (Rust)
  → Generated Code\n    ↓\n    └─→ Language Tools (npm, tsc, etc.) → Compiled Artifact\n```\n\n##
  Development\n\n### Project Structure\n\n```\nsynapse-cc/\n├── synapse-cc.cabal         #
  Cabal project file\n├── PLAN.md                  # Detailed implementation plan\n├──
  app/\n│   └── Main.hs              # Entry point\n└── src/\n    └── SynapseCC/\n
  \       ├── Types.hs         # Core types\n        ├── CLI.hs           # Command-line
  parsing\n        ├── Discover.hs      # Tool discovery\n        ├── Pipeline.hs
  \     # Pipeline orchestration\n        ├── Process.hs       # Subprocess helpers\n
  \       ├── Cache.hs         # Caching (Phase 3)\n        ├── Language.hs      #
  Language integration (Phase 2)\n        └── Logging.hs       # Pretty output\n```\n\n###
  Building\n\n```bash\ncabal build\n```\n\n### Running from source\n\n```bash\ncabal
  run synapse-cc -- typescript substrate ws://localhost:4444\n```\n\n### Testing\n\n```bash\n#
  Ensure substrate is running\ncd ../plexus-substrate\ncargo run -- --port 4444\n\n#
  In another terminal, test synapse-cc\ncd ../synapse-cc\ncabal run synapse-cc --
  typescript substrate ws://localhost:4444 --debug\n```\n\n## Roadmap\n\n### Phase
  1: MVP (Current)\n- ✅ Project scaffolding\n- ✅ Tool discovery\n- ✅ Pipeline orchestration\n-
  ✅ Basic error handling\n- [ ] End-to-end testing\n\n### Phase 2: Language Integration\n-
  [ ] Dependency installation (npm, pip, cargo)\n- [ ] Build automation\n- [ ] Multi-package
  manager support\n\n### Phase 3: Smart Caching\n- [ ] Hash-based caching\n- [ ] Cache
  management\n- [ ] Fast iteration\n\n### Phase 4: Production Features\n- [ ] Watch
  mode\n- [ ] Progress indicators\n- [ ] Auto-install tools\n- [ ] Configuration files\n\n##
  Contributing\n\nSee [PLAN.md](./PLAN.md) for detailed implementation plan and design
  decisions.\n\n## License\n\nMIT\n"
