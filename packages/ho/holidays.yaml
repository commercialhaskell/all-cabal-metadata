changelog: |
  # Revision history for holidays

  ## **0.1.0.0** - 2025-02-04
  - small EDSL for describing holidays
  - ZAF, NAM, USA, GBR, DEU
  - support for country regions
  - unit + property based tests

  ## **0.2.0.0** - 2025-02-17
  - new Holiday data type
  - use "holidayKey" for a textual description
  - new countries supported: MOZ

  ## **0.3.0.0** - 2025-08-20
  - default language is Haskell2010

  ## **0.3.0.1** - 2026-05-05
  - make OverloadedStrings a default extension

  ## **0.3.0.2** - 2026-05-07
  - new country supported: ISR

  ## **0.4.0.0** - 2026-06-04
  - use ADT's for country codes and regions
changelog-type: markdown
description: |-
  Public holidays with Haskell.
  Because lazy programmers need holidays!
  Provides a small EDSL for finding dates. (Very useful if you are a lonely programmer)
