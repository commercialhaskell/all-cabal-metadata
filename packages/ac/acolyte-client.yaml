changelog: |
  # Revision history for acolyte-client

  ## 0.1.0.1 -- 2026-04-28

  * Bump `cabal-version` to 3.12. Older `cabal-install` (shipped with
    GHC < 9.10) was parsing the file before rejecting it on
    `default-language: GHC2024`, producing PlanningFailed on
    Hackage's GHC 9.8 build matrix row. Bumping forces clean
    rejection on older toolchains. No code changes.

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Type-safe HTTP client derivation from acolyte-core
    API types: one client function per endpoint, paths and queries
    built from the type, response decoding driven by the declared
    content type.
changelog-type: markdown
description: |-
  Generates type-safe HTTP client calls from the same API type that
  drives the server. One type, two interpretations.
