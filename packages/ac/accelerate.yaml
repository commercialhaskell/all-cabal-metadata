changelog-type: markdown
description: "<div align=\"center\">\n<img width=\"450\" src=\"https://github.com/AccelerateHS/accelerate/raw/master/images/accelerate-logo-text-v.png?raw=true\"
  alt=\"henlo, my name is Theia\"/>\n\n# High-performance parallel arrays for Haskell\n\n[![CI](https://github.com/tmcdonell/accelerate/actions/workflows/ci.yml/badge.svg)](https://github.com/tmcdonell/accelerate/actions/workflows/ci.yml)\n[![Gitter](https://img.shields.io/gitter/room/nwjs/nw.js.svg)](https://gitter.im/AccelerateHS/Lobby)\n[![Hackage](https://img.shields.io/hackage/v/accelerate.svg)](https://hackage.haskell.org/package/accelerate)\n[![Stackage
  LTS](https://stackage.org/package/accelerate/badge/lts)](https://stackage.org/lts/package/accelerate)\n[![Stackage
  Nightly](https://stackage.org/package/accelerate/badge/nightly)](https://stackage.org/nightly/package/accelerate)\n\n</div>\n\n`Data.Array.Accelerate`
  defines an embedded language of array computations for high-performance computing
  in Haskell. Computations on multi-dimensional, regular arrays are expressed in the
  form of parameterised collective operations (such as maps, reductions, and permutations).
  These computations are online-compiled and executed on a range of architectures.\n\nFor
  more details, see our papers:\n\n * [Accelerating Haskell Array Codes with Multicore
  GPUs][CKLM+11]\n * [Optimising Purely Functional GPU Programs][MCKL13] ([slides][MCKL13-slides])\n
  * [Embedding Foreign Code][CMCK14]\n * [Type-safe Runtime Code Generation: Accelerate
  to LLVM][MCGN15] ([slides][MCGN15-slides]) ([video][MCGN15-video])\n * [Streaming
  Irregular Arrays][CMCK17] ([video][CMCK17-video])\n\nThere are also slides from
  some presentations on Accelerate:\n\n * [Embedded Languages for High-Performance
  Computing in Haskell][Embedded]\n * [GPGPU Programming in Haskell with Accelerate][YLJ13-slides]
  ([video][YLJ13-video]) ([workshop][YLJ13-workshop])\n\nChapter 6 of Simon Marlow's
  book [Parallel and Concurrent Programming in Haskell][Mar13] contains a tutorial
  introduction to Accelerate.\n\n[Trevor's PhD thesis][Trevor-thesis] details the
  design and implementation of frontend optimisations and CUDA backend.\n\n\n**Table
  of Contents**\n\n- [An Embedded Language for Accelerated Array Computations](#an-embedded-language-for-accelerated-array-computations)\n
  \ - [A simple example](#a-simple-example)\n  - [Availability](#availability)\n  -
  [Additional components](#additional-components)\n  - [Requirements](#requirements)\n
  \ - [Documentation](#documentation)\n  - [Examples](#examples)\n  - [Who are we?](#who-are-we)\n
  \ - [Mailing list and contacts](#mailing-list-and-contacts)\n  - [Citing Accelerate](#citing-accelerate)\n
  \ - [What's missing?](#whats-missing)\n\nA simple example\n----------------\n\nAs
  a simple example, consider the computation of a dot product of two vectors of single-precision
  floating-point numbers:\n\n    dotp :: Acc (Vector Float) -> Acc (Vector Float)
  -> Acc (Scalar Float)\n    dotp xs ys = fold (+) 0 (zipWith (*) xs ys)\n\nExcept
  for the type, this code is almost the same as the corresponding Haskell code on
  lists of floats. The types indicate that the computation may be online-compiled
  for performance; for example, using `Data.Array.Accelerate.LLVM.PTX.run` it may
  be on-the-fly off-loaded to a GPU.\n\nAvailability\n------------\n\nPackage _Accelerate_
  is available from:\n\n * Hackage: [accelerate][Hackage] - just add it to your cabal
  file\n * GitHub: [AccelerateHS/accelerate][GitHub] - get the source with `git clone
  https://github.com/AccelerateHS/accelerate.git` \n\nTo install the Haskell toolchain
  try [GHCup](https://www.haskell.org/ghcup/).\n\nAdditional components\n---------------------\n\nThe
  following supported add-ons are available as separate packages:\n\n  * [accelerate-llvm-native][accelerate-llvm-native]:
  Backend targeting multicore CPUs\n  * [accelerate-llvm-ptx][accelerate-llvm-ptx]:
  Backend targeting CUDA-enabled NVIDIA GPUs. Requires a GPU with compute capability
  3.0 or greater (see the [table on Wikipedia][wiki-cc])\n  * [accelerate-examples][accelerate-examples]:
  Computational kernels and applications showcasing the use of Accelerate as well
  as a regression test suite (supporting function and performance testing)\n  * Conversion
  between various formats:\n    * [accelerate-io](https://hackage.haskell.org/package/accelerate-io):
  For copying data directly between raw pointers\n    * [accelerate-io-array](https://hackage.haskell.org/package/accelerate-io-array):
  Immutable arrays\n    * [accelerate-io-bmp](https://hackage.haskell.org/package/accelerate-io-bmp):
  Uncompressed BMP image files\n    * [accelerate-io-bytestring](https://hackage.haskell.org/package/accelerate-io-bytestring):
  Compact, immutable binary data\n    * [accelerate-io-cereal](https://hackage.haskell.org/package/accelerate-io-cereal):
  Binary serialisation of arrays using [cereal](https://hackage.haskell.org/package/cereal)\n
  \   * [accelerate-io-JuicyPixels](https://hackage.haskell.org/package/accelerate-io-JuicyPixels):
  Images in various pixel formats\n    * [accelerate-io-repa](https://hackage.haskell.org/package/accelerate-io-repa):
  Another Haskell library for high-performance parallel arrays\n    * [accelerate-io-serialise](https://hackage.haskell.org/package/accelerate-io-serialise):
  Binary serialisation of arrays using [serialise](https://hackage.haskell.org/package/serialise)\n
  \   * [accelerate-io-vector](https://hackage.haskell.org/package/accelerate-io-vector):
  Efficient boxed and unboxed one-dimensional arrays\n  * [accelerate-fft][accelerate-fft]:
  Fast Fourier transform implementation, with FFI bindings to optimised implementations\n
  \ * [accelerate-blas][accelerate-blas]: BLAS and LAPACK operations, with FFI bindings
  to optimised implementations\n  * [accelerate-bignum][accelerate-bignum]: Fixed-width
  large integer arithmetic\n  * [colour-accelerate][colour-accelerate]: Colour representations
  in Accelerate (RGB, sRGB, HSV, and HSL)\n  * [containers-accelerate](http://hackage.haskell.org/package/containers-accelerate):
  Hashing-based container types\n  * [gloss-accelerate][gloss-accelerate]: Generate
  [gloss][gloss] pictures from Accelerate\n  * [gloss-raster-accelerate][gloss-raster-accelerate]:
  Parallel rendering of raster images and animations\n  * [hashable-accelerate](http://hackage.haskell.org/package/hashable-accelerate):
  A class for types which can be converted into a hash value\n  * [lens-accelerate][lens-accelerate]:
  [Lens][lens] operators for Accelerate types\n  * [linear-accelerate][linear-accelerate]:
  [Linear][linear] vector spaces in Accelerate\n  * [mwc-random-accelerate][mwc-random-accelerate]:
  Generate Accelerate arrays filled with high quality pseudorandom numbers\n  * [numeric-prelude-accelerate][numeric-prelude-accelerate]:
  Lifting the [numeric-prelude][numeric-prelude] to Accelerate\n  * [wigner-ville-accelerate](https://github.com/Haskell-mouse/wigner-ville-accelerate):
  Wigner-Ville time-frequency distribution.\n\nThese are all available on Hackage.\n\n\nDocumentation\n-------------\n\n
  \ * Haddock documentation is included and linked with the individual package releases
  on [Hackage][Hackage].\n  <!-- * Haddock documentation for in-development components
  can be found [here](http://tmcdonell-bot.github.io/accelerate-travis-buildbot/).
  -->\n  * The idea behind the HOAS (higher-order abstract syntax) to de-Bruijn conversion
  used in the library is [described separately][HOAS-conv].\n\nExamples\n--------\n\n###
  accelerate-examples\n\nThe [accelerate-examples][accelerate-examples] package provides
  a range of computational kernels and a few complete applications. The examples include:\n\n
  \ * An implementation of [canny edge detection][wiki-canny]\n  * An interactive
  [mandelbrot set][wiki-mandelbrot] generator\n  * An [N-body simulation][wiki-nbody]
  of gravitational attraction between solid particles\n  * An implementation of the
  [PageRank][wiki-pagerank] algorithm\n  * A simple [ray-tracer][wiki-raytracing]\n
  \ * A particle based simulation of stable fluid flows\n  * A cellular automata simulation\n
  \ * A \"password recovery\" tool, for dictionary lookup of MD5 hashes\n\nTo run
  these, either get the source from Hackage using `cabal get accelerate-examples`
  or clone the [git repository][accelerate-examples], then use `cabal run` on the
  individual executables.\n\n[![Mandelbrot](https://i.imgur.com/5Tbsp1j.jpg \"accelerate-mandelbrot\")](https://i.imgur.com/RgXRqsc.jpg)\n[![Raytracer](https://i.imgur.com/7ohhKm9.jpg
  \"accelerate-ray\")](https://i.imgur.com/ZNEGEJK.jpg)\n\n<!--\n<video width=400
  height=300 controls=false autoplay loop>\n  <source=\"http://www.cse.unsw.edu.au/~tmcdonell/images/ray.mp4\"
  type=\"video/mp4\">\n</video>\n-->\n\n\n### LULESH\n\n[LULESH-accelerate][lulesh-accelerate]
  is in implementation of the Livermore Unstructured Lagrangian Explicit Shock Hydrodynamics
  (LULESH) mini-app. [LULESH][LULESH] represents a typical hydrodynamics code such
  as [ALE3D][ALE3D], but is a highly simplified application, hard-coded to solve the
  Sedov blast problem on an unstructured hexahedron mesh.\n\n![LULESH mesh](https://i.imgur.com/bIkODKd.jpg)\n\n\n###
  Additional examples\n\nAccelerate users have also built some substantial applications
  of their own.\nPlease feel free to add your own examples!\n\n  * Jonathan Fraser,
  [GPUVAC](https://github.com/GeneralFusion/gpuvac): An explicit advection magnetohydrodynamics
  simulation\n  * David van Balen, [Sudokus](https://github.com/dpvanbalen/Sudokus):
  A sudoku solver\n  * Trevor L. McDonell, [lol-accelerate][lol-accelerate]: A backend
  to the Λ ○ λ ([Lol][lol]) library for ring-based lattice cryptography\n  * Henning
  Thielemann, [patch-image](http://hackage.haskell.org/package/patch-image): Combine
  a collage of overlapping images\n  * apunktbau, [bildpunkt](https://github.com/abau/bildpunkt):
  A ray-marching distance field renderer\n  * klarh, [hasdy](https://github.com/klarh/hasdy):
  Molecular dynamics in Haskell using Accelerate\n  * Alexandros Gremm used Accelerate
  as part of the [2014 CSCS summer school](http://user.cscs.ch/blog/2014/cscs_usi_summer_school_2014_30_june_10_july_2014_in_serpiano_tessin/index.html)
  ([code](https://github.com/agremm/cscs))\n\n\nWho are we?\n-----------\n\nThe Accelerate
  team (past and present) consists of:\n\n  * Manuel M T Chakravarty ([@mchakravarty])
  \ <!-- 2008..2017? -->\n  * Gabriele Keller ([@gckeller])             <!-- 2008..
  \    -->\n  * Trevor L. McDonell ([@tmcdonell])         <!-- 2009..     -->\n  *
  Robert Clifton-Everest ([@robeverest])    <!-- 2013..     -->\n  * Frederik M. Madsen
  ([@fmma])              <!-- 2014       -->\n  * Ryan R. Newton ([@rrnewton])              <!--
  2012..2013 -->\n  * Joshua Meredith ([@JoshMeredith])         <!-- 2018..     -->\n
  \ * Ben Lever ([@blever])                     <!-- 2010..2011 -->\n  * Sean Seefried
  ([@sseefried])              <!-- 2010..2011 -->\n  * Ivo Gabe de Wolff ([@ivogabe])
  \           <!-- 2019..     -->\n  * Tom Smeding ([@tomsmeding])               <!--
  2021..2026? -->\n\nThe maintainer and principal developer of Accelerate is Trevor
  L.\nMcDonell <trevor.mcdonell@gmail.com>.\n\n\nMailing list and contacts\n-------------------------\n\n
  \ * Mailing list: [`accelerate-haskell@googlegroups.com`](mailto:accelerate-haskell@googlegroups.com)
  (discussions on both use and development are welcome)\n  * Sign up for the mailing
  list at the [Accelerate Google Groups page][Google-Group]\n  * Bug reports and issues
  tracking: [GitHub project page][Issues]\n  * Chat with us on [gitter](https://gitter.im/AccelerateHS/Lobby)\n\n\nCiting
  Accelerate\n-----------------\n\nIf you use Accelerate for academic research, you
  are encouraged (though not\nrequired) to cite the following papers:\n<!-- ([BibTeX](http://www.cse.unsw.edu.au/~tmcdonell/papers/accelerate.bib)):
  -->\n\n  * Manuel M. T. Chakravarty, Gabriele Keller, Sean Lee, Trevor L. McDonell,
  and Vinod Grover.\n    [Accelerating Haskell Array Codes with Multicore GPUs][CKLM+11].\n
  \   In _DAMP '11: Declarative Aspects of Multicore Programming_, ACM, 2011.\n\n
  \ * Trevor L. McDonell, Manuel M. T. Chakravarty, Gabriele Keller, and Ben Lippmeier.\n
