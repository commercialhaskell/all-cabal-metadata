changelog: |
  # Revision history for acolyte

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Umbrella package for the composable, type-safe
    acolyte web framework. Re-exports the core API DSL, server,
    client, OpenAPI, gRPC, and test packages through Acolyte and
    Acolyte.Prelude.
changelog-type: markdown
description: |-
  A web framework where the API is a type, middleware is tracked at
  compile time, and the backend is pluggable. Re-exports all common
  types from the component packages.
