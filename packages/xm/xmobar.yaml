changelog: "## Version 0.51.1 (June, 2026)\n\n- Missing upper bounds for dependencies
  \n\n## Version 0.51 (June, 2026)\n\n- Improvements for `PacmanUpdates` (thanks,
  Enrico Maria and Alexander)\n- Fixes and improvements to `Accordion` (thanks, Enrico
  Maria)\n- Fixes to `Batt` (thanks, Leana)\n- Fix BadDrawable crash when wallpaper
  setters free the root pixmap while\n  alpha is 255 (thanks, Ashesh)\n- base dependency
  relaxed to 4.21\n\n## Version 0.50 (June, 2025)\n\n- New plugins: `PacmanUpdates`
  (thanks, Alexander)\n- `ArchUpdates` deprecated in favor of `PacmanUpdates`\n  -
  a deprecation notice will be shown to users of that plugin in the bar in\n    the
  zero updates case\n- `Accordion`: new constructor to allow short version to have
  plugins too\n- `Swap`: update for FreeBSD 15\n- `MPD` compiled again by default
  with `all_extensions`.\n\n## Version 0.49 (April, 2025)\n\n- New plugins: `ArchUpdates`
  and `Accordion` (thanks, Enrico Maria)\n- New template variable `weatherS` for `WeatherX`.\n-
  New Nix flake (thanks, refaelsh)\n- `MPRIS`: Fix for duration reported by Spotify
  (thanks, Claudio)\n- Base dep up to 4.20 (thanks, Alexander)\n\n## Version 0.48.1
  (May, 2024)\n\n- Removing for now mouse support for `Kbd`, which can be recovered
  by\n  interested users using regular actions (see issue #703 for further details).\n\n##
  Version 0.48 (April, 2024)\n\n- The `Kbd` monitor is now clickable (thanks, Enrico
  Maria)\n- Fix zombie processes left by `<action>` tag and low battery action (thanks,\n
  \ Ulrik)\n- Fix plugins such as `Alsa` and `Com` not working when configuration
  is\n  recompiled (#657, ditto)\n- New `Lock'` monitor with configurable labels (thanks,
  Enrico Maria)\n\n## Version 0.47.4 (March, 2024)\n\n- Bug fixes (launching processes
  from self-compiled instances)\n\n## Version 0.47.3 (February, 2024)\n\n- New flag
  `with_shared` to use xmobar with dynamic linking (see PR #690)\n- Fix for actions
  invoked from recompiled xmobar instances (issue #688)\n- Maximum base version bumped
  to 4.20\n\n## Version 0.47.2 (November, 2023)\n\n- Compatibility with GHC 9.6\n\n##
  Version 0.47.1 (September, 2023)\n\n- Allow compilation with libmpd even with GHC
  > 9.4, by requesting it\n  explicitly with `with_mpd`.  See #667 for further details.\n\n##
  Version 0.47 (August, 2023)\n\n- Fix: center middle section for templates of the
  for }M{\n- Documentation fixes and improvements\n- Better error handling in network
  connections\n- Dependency fixes (libmpd excluded for GHC > 9.2)\n\n## Version 0.46
  (January, 2023)\n\n- New bar position specifiers TopHM, BottomHM.\n- New configuration
  option, `dpi`, to set the font scaling factor.\n- Fixes and extensions for section
  alignment behaviour (#650, #655).\n- Fix: honour fc/bg specs for icons (#663).\n\n##
  Version 0.45 (October, 2022)\n\n- New cairo/pango font drawing backend, substituting
  the direct X11/Xft one.\n\n## Version 0.44.2 (August, 2022)\n\n- Documentation improvements.\n-
  Missing doc files and xmobar.el added to distribution.\n\n## Version 0.44.1 (July,
  2022)\n\nRepository moved to Codeberg.  No code changes.\n\n## Version 0.44 (July,
  2022)\n\n_Breaking changes_\n\n  - Building with UTF-8 support is now mandatory
  (the with_utf8 flag\n    is gone).\n\n_Bug fixes_\n\n  - Fix for -W \"0\" monitor
  spec in logarithmic bars.\n\n## Version 0.43 (May, 2022)\n\n_New features_\n\n  -
  New monitor `Load` providing load averages (stolen from Finn\n    Lawler, with FreeBSD
  support thanks to Michał Zielonka).\n  - New argument `scale` for `Memory` monitor
  to scale size units.\n  - New dbus signal: `SetAlpha` (see issue #499).\n  - `CpuFreq`:
  new template parameters `max`, `min` and `avg`.\n\n_Bug fixes_\n\n  - MultiCoreTemp:
  allow temperature directory names with more than\n    one digit.\n  - Batt (linux):
  correct computation of power consumption based on\n    actual voltage (Patrick Günther).\n\n##
  Version 0.42 (March, 2022)\n\n_New features_\n\n  - New text mode (thanks to Pavel
  Kagulin, see issue #601), with\n    output formats compatible with color terminals
  and pango.\n  - New text mode with format following swaybar-protocol, supporting\n
  \   colors, faces, boxes and actions.\n\n_Bug fixes_\n\n   - Fix for bottom placement
  (#608)\n   - Fix for memory leak during X drawing (#609)\n\n## Version 0.41 (January,
  2022)\n\n_New features_\n\n  - Disk monitors for FreeBSD (Michał Zielonka).\n  -
  Improvements to signal handling when using xmobar as a library (John Soo).\n\n##
  Version 0.40 (November, 2021)\n\n_New features_\n\n  - New plugin: `QueueReader`
  (Guy Gastineau).\n  - Greatly improved FreeBSD support: Mem, Network and Swap monitors\n
  \   fixes, and CI build for FreeBSD (Michał Zielonka).\n  - New template markup:
  `<hspace>`(tulthix)\n\n## Version 0.39 (August, 2021)\n\n_New features_\n\n  - New
  constructors for only controlling bar height:\n    TopH and BottomH for Top and
  Bottom respectively\n  - New monitor: k10temp (Sam Kirby)\n  - Better handling of
  command line arguments for Haskell-based\n    configuration keys (see #553 and #554)\n
  \ - New monitor: Kraken (Amid Saeid)\n\n_Bug fixes_\n\n  - NotmuchMail usable in
  text configurations (#547)\n  - Fix for off-by-one in padding (#560)\n  - Fixes
  for Kbd (#561)\n\n## Version 0.38 (May, 2021)\n\n_Bug fixes_\n\n  - Fix off-by-one
  in strut calculation for `Static` position which reserved\n    space for the panel
  than necessary and caused issues in some multi-head\n    setups (fixes #530).\n
  \ - Revert the double-UTF-8 encoding workarounds of 0.36 (#482), as they're no\n
  \   longer necessary with xmonad-contrib master, and aren't needed with any\n    released
  version of xmonad-contrib either.\n  - Fix slow reactions to SIGUSR1/2 signals (reposition,
  change screen).\n\n## Version 0.37 (November, 2020)\n\n_New features_\n\n  - New
  command line option `--add-font` (Ivan Brennan)\n  - New monitor `MPDX` that extends
  `MPD` with the ability of having a\n    custom alias.  Useful for connecting with
  multiple servers.\n  - New plugin `NotmuchMail` to monitor mail indexed by `notmuch`.\n\n_Bug
  fixes_\n\n  - Fix date plugin not picking up DST and timezone changes (refresh\n
  \   timezone once a minute to preserve the optimized performace of 0.34).\n\n##
  Version 0.36 (August, 2020)\n\n_New features_\n\n  - Monitor progress bars: a value
  of 0 for `-W` denotes an index in\n    the `-f` string, similar to icon patterns
  but using characters.\n  - New tag `<box>` to add borders around text (Unoqwy).\n
  \ - `fc` color background now accepts an offset (Unoqwy).\n\n_Bug fixes_\n\n  -
  Documentation fixes (Tomáš Janoušek)\n  - Don't get confused by empty configuration
  dirs (fixes #412)\n  - Xft rendering: Avoid encoding to UTF8 on all scenarios. This\n
  \   causes issue to StdinReader monitor when the handle wasn't binary.\n\n## Version
  0.35.1 (June, 2020)\n\n- Dropped support for GHC < 8.4 (see issue #461)\n\n## Version
  0.35 (June, 2020)\n\n_New features_\n\n  - `MultiCoreTemp` now works with Ryzen
  processors.  New option\n    `--hwmon-path` for better performance.\n  - CPU Monitor
  optimizations.\n  - Version bumps for some dependencies, including timezone-olson.\n\n##
  Version 0.34 (June, 2020)\n\n_New features_\n\n  - New plugin `HandleReader` for
  reading data from a Haskell `Handle`. This is\n    useful if you are running xmobar
  from within a Haskell program.\n  - Build with ghc 8.10 allowed.\n  - Optimize date
  plugin by avoiding calling getTimeZone for each of\n    the time the date has to
  be updated. Instead, it's computed once\n    at the start and re-used for each invocation.\n
  \ - Optimize Weather and UVMeter plugin by using global Manager\n    instead of
  creating for each http request when useManager is\n    explicitly configured as
  False.\n\n## Version 0.33 (February, 2020)\n\n_New features_\n\n  - New template
  parameter `<weather>` for the `Weather` plugin, potentially\n    displaying specific
  weather conditions that are occurring near the\n    station (thanks to *slotThe*).\n
  \ - New option `--weathers`, for `Weather` to display a default string in\n    case
  the `weather` field is not reported (thanks to *slotThe*).\n  - New template parameter
  `<volumestatus>` for the `Volume` plugin, combining\n    the effects of `<volume>`
  and `<status>`.  This will show the volume\n    (possibly prefixed by `onString`
  or a percentage-based string) if and only\n    if the volume is not muted.  Otherwise
  it will show the\n    `offString` (thanks to *slotThe*).\n  - `Battery` and `BatteryN`
  now support FreeBSD (thanks to Dhananjay\n    Balan).\n  - New option `--useManager`
  for `Weather` and `UVMeter` to decide whether to\n    use one single manager per
  monitor for managing network connections or\n    create a new one every time a connection
  is made.\n  - New more efficient time coalescing strategy for monitor updates,\n
  \   available with the threaded runtime: use the `with_threaded` flag\n    to enable
  it (see #410; thanks to Tomáš Janoušek).\n  - `Wireless` supports current nl80211
  API on Linux now, old Wext ioctls still\n    available as compile-time option (thanks
  to Paul Fertser).\n\n## Version 0.32 (December, 2019)\n\n_New features_\n\n  - New
  options `--host` and `--port` for `MPD` monitor.\n  - New plugin `MailX` extending
  `Mail` with colors and prefix/suffix.\n  - New options `--lows`, `--mediums`, and
  `--highs` for `Battery`\n    to display an additional string depending on battery
  level (thanks\n    to *slotThe*).\n  - New options `-L` and `-H` for `Volume` to
  set low and high volume\n    levels, as well as `-l`, `-m`, and `-h` to display
  an additional\n    string depending on current volume level (thanks to *slotThe*).\n
  \ - New option `-P` in `Battery` to add a `%` symbol to `<left>`.\n  - New option
  `--devices` in `DynNetwork` to select what interfaces\n    to monitor (thanks to
  *vindex10*).\n  - DateZone plugin now also checks TZDIR (thanks to Emmanuel Rosa).\n\n_Bug
  fixes_\n\n   - `Kbd` plugin: ignore \"terminate\" layout token (thanks to Greg\n
  \    Steuck).\n   - Fixed compilation with GHC 8.8.x (thanks to Vanessa McHale).\n
  \  - Avoid creating `~/.xmobar` ([issue #405]).\n\n[issue #405]: https://codeberg.org/xmobar/xmobar/issues/405\n\n##
  Version 0.31 (October, 2019)\n\n_New features_\n\n  - New option `--contiguous-icons`
  for `MultiCpu` to draw icons\n    without padding (see [issue #388]).\n  - New version
  of libmpd (0.9.0.10), thanks to John Tyree\n\n[issue #388]: https://codeberg.org/xmobar/xmobar/issues/388\n\n##
  Version 0.30 (August, 2019)\n\n_New features_\n\n  - New monitor `MultiCoreTemp`,
  thanks to Felix Springer.\n  - `DiskIO`: Additional template variables for absolute
  number of\n    bytes rather than speeds (see [issue #390]).\n  - `WeatherX`: An
  extension to the `Weather` monitor allowing the\n    spefication of custom strings
  or icons for sky conditions.\n  - The battery monitors accept the new arguments
  `-a` and `-A` to\n    specify a system command executed if battery left goes beyond
  a\n    given threshold.\n\n[issue #390]: https://codeberg.org/xmobar/xmobar/issues/390\n\n##
  Version 0.29.5 (March, 2019)\n\n_Bug fixes_\n\n  - Honour command line flags when
  starting xmobar without any\n    configuration file (issue #375).\n  - `Alsa` plugin:
  restart `alsactl` if it quits, e.g. because of a\n    sleep/awake cycle (issue #376).\n
  \ - `Weather` using the new HTTPS URL, which requires http-conduit as\n    a dependency
  (issue #378).\n  - `MarqueePipeReader` exported at the API level (issue #381).\n\n##
  Version 0.29.4 (December, 2018)\n\nUpgrade to alsa-mixer 0.3.0.  See issues #372
  and #373.\n\n## Version 0.29.3 (December, 2018)\n\n_Bug fixes_\n\n  - Upper bound
  for alsa_mixer (see [issue #372])\n\n[issue #372]: https://codeberg.org/xmobar/xmobar/issues/372\n\n##
  Version 0.29.2 (December, 2018)\n\n_Bug fixes_\n\n  - Work as usual with .xmobarrc
  (see [issue #371]).\n\n[issue #371]: https://codeberg.org/xmobar/xmobar/issues/371\n\n##
  Version 0.29.1 (December, 2018)\n\n_Bug fixes_\n\n  - Honour command line flags
  (fixes [issue #370]).\n  - Expose Cmd and CmdX in Xmobar interface.\n\n[issue #370]:
  https://codeberg.org/xmobar/xmobar/issues/370\n\n## Version 0.29 (December, 2018)\n\n_New
  features_\n\n  - New `Alsa` monitor for volume display that doesn't use polling,
  by\n    Daniel Schüssler.\n  - `ThermalZone` retries reading missing files, thanks
  to Reed Koser.\n  - `TopProc` ignores kernel threads (see also [issue #369]).\n
  \ - `Wireless` simple autodetection of wirless interface name (if set\n    to \"\").\n
  \ - Experimental support for using xmobar as a library, so that\n    configurations
  are in fact Haskell programs a la Xmonad (beta\n    stage, with help from Pavan
  Rikhi). Traditional config files are\n    still (and will continue to be) supported.\n\n_Bug
  fixes_\n\n  - Correctly parsing configuration options `mwClass` and `wmName`.\n\n[issue
  #369]: https://codeberg.org/xmobar/xmobar/issues/369\n\n## Version 0.28.1 (October,
  2018)\n\nDependencies updated to work with GHC 8.6, avoiding [issue #354].\n\n[issue
  #354]: https://codeberg.org/xmobar/xmobar/issues/354\n\n## Version 0.28 (August,
  2018)\n\n_New features_\n\n  - New `ComX`, which runs a command with custom exit
  error message.\n\n_Bug fixes_\n\n  - hinotify version upgraded ([issue #356])\n\n[issue
  #356]: https://codeberg.org/xmobar/xmobar/issues/356\n\n## Version 0.27 (July, 2018)\n\n_New
  features_\n\n  - Dropped support for GHC 7.x.  See [issue #352].\n  - New configuration
  option, `textOffsets` to specify separate\n    vertical offsets for each of the
  fonts in `additionalFonts`.  See\n    [issue #311].\n\n_Bug fixes_\n\n   - Use the
  maximum width options `-T` and `-E` correctly when a\n     monitor subtemplate contains
  font and color tags.\n\n[issue #311]: https://codeberg.org/xmobar/xmobar/issues/311\n[issue
  #352]: https://codeberg.org/xmobar/xmobar/issues/352\n\n## Version 0.26 (April,
  2018)\n\n_New features_\n\n  - New options to specify the ellipsis string for fields
  (`-e`) and\n    total width (`-E`), thanks to Olivier Schneider.\n  - `MultiCpu`:
  New option to specify fallback icon paths\n    (`--fallback-icon-pattern`), thanks
  to Reed Koser.\n\n_Bug fixes_\n\n  - `CpuFreq` monitors honours `-d` (number of
  digits) if no suffix is\n    given (cf. [issue #335]).\n  - Race condition in network
  monitor fixed ([issue #347]).\n  - Limiting dbus supported version (see [issue #346]).\n\n[issue
  #335]: https://codeberg.org/xmobar/xmobar/issues/335\n[issue #346]: https://codeberg.org/xmobar/xmobar/issues/346\n[issue
  #347]: https://codeberg.org/xmobar/xmobar/issues/347\n\n## Version 0.25 (February,
  2018)\n\n_New features_\n\n  - The X11 properties `WM_NAME` and `WM_CLASS` for xmobar
  windows can\n    be setup in either the configuration file (`wmName` and `wmClass`)\n
  \   or using the new flags `-n` adn `-w` (see [issue #323]).\n  - New flag `with_weather`,
  to build sans `Weather` monitor.\n\n_Bug fixes_\n\n   - Honouring -x in MPris monitor
  ([issue #325])\n\n\n[issue #323]: https://codeberg.org/xmobar/xmobar/issues/323\n[issue
  #325]: https://codeberg.org/xmobar/xmobar/issues/325\n\n## Version 0.24.5 (May,
  2017)\n\n_Bug fixes_\n\n  - Fix for vertical bars ([issue #303])\n\n[issue #303]:
  https://codeberg.org/xmobar/xmobar/issues/303\n\n## Version 0.24.4 (April, 2017)\n\n_Infrastructure_\n\n
  \ - Whe have now an active [Travis CI setup].\n\n[Travis CI setup]: https://travis-ci.org/jaor/xmobar\n\n_Bug
  fixes_\n\n  - Reduce wakeups rate via rtsopts V0 (with new flag with_rtsopts to\n
  \   disable it) (see [issue #89]).\n  - Fix Net monitor for lage uptimes and bytecounts
  (Tomas Janoušek).\n  - Fix MultiCpu monitor for large uptimes (Zev Weiss).\n  -
  Fix compilation when XMP is disabled (Sergi Trofimovich).\n  - Better fatal error
  messages (Michael Bishop).\n  - More paths to read from in CoreTemp (see [issue
  #291]).\n\n[issue #291]: https://codeberg.org/xmobar/xmobar/issues/291\n\n## Version
  0.24.3 (Sep 5, 2016)\n\n_Bug fixes_\n\n  - Battery monitor: fixes for cases where
  status is not consistently\n    reported by the kernel (see [issue #271]).\n\n[issue
  #271]: https://codeberg.org/xmobar/xmobar/issues/271\n\n## Version 0.24.2 (Aug 8,
  2016)\n\n_Bug fixes_\n\n   - New Weather plugin URL (see [issue #270]).\n\n[issue
  #270]: https://codeberg.org/xmobar/xmobar/issues/270\n\n## Version 0.24.1 (Jul 28,
  2016)\n\n_Bug fixes_\n\n   - Restoring compatibility with GHC 7.6, (see [issue #269]).\n\n[issue
  #269]: https://codeberg.org/xmobar/xmobar/issues/269\n\n## Version 0.24 (Jul 26,
  2016)\n\n_New features_\n\n   - Use the new compilation flag `with_conduit` to compile
  an\n     implemetation of the  `Weather` plugin that will work behind\n     proxies,
  by Dragos Boca.\n   - New command line argument (`-p`) to specify xmobar's position,
  by\n     Valentin Shirokov.\n   - Wind speed in Km/h and m/s for the `Weather` plugin,
  by Michael\n     Knabe.\n   - `UVMeter`, a new optional plugin showing UV data for
  Australian\n     users, by Roman Joost.\n   - New template parameter `<date>` for
  the `MPD` plugin (by Bruno\n     Heridet)\n   - New monitor argument `-T` to specify
  the maximum total width of\n     the monitor text.\n   - New $VAR parameter syntax
  for using env vars in pipe monitors, by\n     Will Song (see [issue #268]).\n\n_Bug
  fixes_\n\n   - The `Volume` plugin now supports capture devices (Antoine Eiche).\n
  \  - The `MPD` plugin will now automatically update on options changes\n     (Ben
  Boeckel).\n   - The `Battery` plugin does now a better job at tracking AC status\n
  \    and times (see [issue #231]).\n   - `PipeReader` was polling too often (thanks
  to zlbruce).\n   - The `MPris` monitor now honours field width and padding optons\n
  \    (-M, -w, etc.).\n   - `Batt`: sensible thresholds for high/low power consumption
  (see\n     [issue #265]).\n\n[issue #231]: https://codeberg.org/xmobar/xmobar/issues/225\n[issue
  #265]: https://codeberg.org/xmobar/xmobar/issues/225\n[issue #268]: https://codeberg.org/xmobar/xmobar/issues/268\n\n##
  Version 0.23.1 (Apr 14, 2015)\n\n_Bug fixes_\n\n  - Vertical alignment for icons,
  [issue #216]\n  - Improvements to vertical text alignment, with many thanks to Jan\n
  \   Palus (see ongoing discussion in [issue #221]).\n  - Better error handling in
  `Volume` monitor, [issue #215]\n  - Compilation with ghc 7.8 and 7.10 (thanks to
  Edward Tjörnhammar,\n    see [issue #225]).\n\n[issue #225]: https://codeberg.org/xmobar/xmobar/issues/225\n[issue
  #221]: https://codeberg.org/xmobar/xmobar/issues/221\n[issue #216]: https://codeberg.org/xmobar/xmobar/issues/216\n[issue
  #215]: https://codeberg.org/xmobar/xmobar/issues/215\n\n## Version 0.23 (Mar 8,
  2015)\n\n_New features_\n\n  - Xmobar can now use a (semi)transparent background:
  set it with the\n    new configuration option `alpha` (thanks to Edward Z. Yang,
  see\n    [issue #114]).\n  - Multiple fonts available by means of the new configuration\n
  \   parameter `additionalFonts` and the template markers\n    `<fn=1>...</fn>`,
  by Markus Scherer.\n  - New variables in `Mem` monitor for available memory as reported
  by\n    Linux 3.14 and newer, by Samuli Thomasson.\n  - New configuration parameters
  `textOffset` and `iconOffset` (see\n    discussion in [issue #171] and [issue #201]).\n
  \ - New template variable `flags` in `MPD` monitor, by Duncan Burke.\n\n[issue #171]:
  https://codeberg.org/xmobar/xmobar/issues/171\n[issue #201]: https://codeberg.org/xmobar/xmobar/issues/201\n[issue
  #114]: https://codeberg.org/xmobar/xmobar/issues/114\n\n_Bug fixes_\n\n  - We honour
  the `-S` (show suffix) monitor flag in `CpuFreq`.\n  - Better `Weather` parsing
  of wind direction, by Dino Morelli (see\n    [pull #212]).\n\n[pull #212]: https://codeberg.org/xmobar/xmobar/pulls/212\n\n##
  Version 0.22.1 (Oct 11, 2014)\n\n_Bug fixes_\n\n  - Fix compilation in systems that
  don't need mtl newer than the one\n    shipped with GHC.\n\n## Version 0.22 (Oct
  9, 2014)\n\n_New features_\n\n  - New `MarqueePipeReader` plugin by Reto Hablützel.\n
  \ - `Network` monitor has now adaptive units (`-S` is used now to\n    switch them
  on), by Axel Angel.\n  - `Weather` now offers `dewPointC` and `dewPointF` instead
  of\n    `dewPoint`, and the new `windCardinal`, `windAzimuth`, `windMph`\n    and
  `windKnots` variables, by Tony Morris.\n  - Strings in the configuration file can
  now span multiple lines\n    using Haskell-style multiline script, thanks to dunric\n
  \ - Icons can now be also xpm files (if xmobar is compiled with\n    `with_xpm`),
  thanks to Alexander Shabalin.\n  - New `borderWidth` option to set xmobar's boder
  width, thanks to\n    Travis Staton.\n  - Support for multiple Xft fonts, thanks
  to Phil Xiaojun Hu and\n    Cedric staub (see [pull request #196]).\n  - Icon patterns
  for several monitors, that allow you to specify a\n    collection of icons to use
  for successive integer variable values,\n    thanks to Alexander Shabalin (see [pull
  request #192] and the\n    documentation for details).\n  - Upgrade to libmpd 0.9.\n\n_Bug
  fixes_\n\n  - Much more efficient implementation of the `Locks` plugin, thanks\n
  \   to Anton Vorontsov (see [pull request #195]).\n  - Not colorizing total disk
  size in `DiskU` ([issue #189]).\n  - Avoiding zombies on click actions, thanks to
  Phil Xiaojun Hu\n    ([issue #181]).\n\n[issue #181]: https://codeberg.org/xmobar/xmobar/issues/181\n[issue
  #189]: https://codeberg.org/xmobar/xmobar/issues/189\n[pull request #192]: https://codeberg.org/xmobar/xmobar/pulls/192\n[pull
  request #195]: https://codeberg.org/xmobar/xmobar/pulls/195\n[pull request #196]:
  https://codeberg.org/xmobar/xmobar/pulls/196\n\n## Version 0.21 (Jul 1, 2014)\n\n_New
  features_\n\n  - Vertical bar indicators using unicode available for most monitors,\n
  \   by Eric Mrak.\n  - `CoreTemp`: support for linux 3.15, by Tomáš Janoušek.\n
  \ - New `CatInt` monitor, displaying integer values read from a file,\n    by Nathaniel
  Wesley Filardo.\n  - New `<raw>` tag for safer input parsing, also by Nathaniel.\n
  \ - New `UnsafeXMonadLog` monitor (by Eric Mrak) and their xproperty\n    counterparts,
  `UnsafeXPropertyLog` and `UnsafeNamedXPropertyLog`.\n\n_Bug fixes_\n\n  - `Network`
  now reports status for ppp connections (see\n    [issue #89]).\n  - Fix for very
  long running `Cpu` monitors, by Robert J Macomber.\n\n[issue #89]: https://codeberg.org/xmobar/xmobar/issues/89\n\n##
  Version 0.20.1 (March 13, 2014)\n\n_New features_\n\n  - Back to picking by default
  the first available screen, with a new\n    configuration option, `pickBroadest`,
  for choosing the broadest\n    (see [issue #158]).\n\n[issue #158]: https://codeberg.org/xmobar/xmobar/issues/158\n\n##
  Version 0.20 (March 10, 2014)\n\n_New features_\n\n  - Mouse actions now support
  multiple buttons, by Marcin Mikołajczyk.\n  - Non supported monitors are ignored
  in configuration files (see\n    [issue #139]), by Adam Vogt.\n\n_Bug fixes_\n\n
  \ - `Disk` monitor now ignores non-existent devices (Reto Hablützel).\n  - `Weather`
  is now non-blocking and doesn't use curl (Ben Boeckel).\n  - Fix for `Memory` monitor
  in 3.14 kernels (Ben Boeckel).\n  - Fix for infinite loops in `AutoMPD` ([issue
  #76], [issue #111]).\n  - More robust AC readings in `BatteryP`.\n  - Fix for `Top`
  monitor's readings for processes whose name contains\n    blanks.\n  - Fixes for
  geometry computation on multihead (Dmitry Malikov).\n  - Fixes for missing XDG configuration
  (Thiago Negri and James McCoy,\n    see [issue #133]).\n  - Compatibility with latest
  `directory` (1.2.0.2).\n\n[issue #76]: https://codeberg.org/xmobar/xmobar/issues/76\n[issue
  #111]: https://codeberg.org/xmobar/xmobar/issues/111\n[issue #133]: https://codeberg.org/xmobar/xmobar/issues/133\n[issue
  #139]: https://codeberg.org/xmobar/xmobar/issues/133\n\n## Version 0.19 (October
  27, 2013)\n\nAs of this release, the old bug tracker at Google code is deprecated.\nPlease
  use [codeberg's tracker] for new bugs.\n\n_New features_\n\n  - New monitor `BatteryN`,
  a variant of `BatteryP` that lets you\n    specify the name of the monitor in the
  template.\n  - Support for configuration file living in `XDG_CONFIG_HOME` (see\n
  \   [codeberg #99]).\n  - `Com` uses safer `runInteractiveProcess` instead of spawning
  a\n    shell (David McLean).  If you're using shell expansion in your\n    `Com`
  (e.g. \"~/bin/script\") here's a workaround: `Run Com\n    \"/bin/bash\" [\"-c\",
  \"~/bin/script\"]` (cf. [codeberg #127]).\n  - New plugin `UnsafeStdinReader` that
  allows actions from stdin.\n    Now it's possible to have clickable workspaces!\n
  \   (Thiago Negri, see [codeberg #125]).\n  - New monitor configuration option (`-x`
  or `--nastring`) that allows\n    specifying what string to display when a monitor
  is not available\n    (defaulting to \"N/A\"). Cf. [codeberg #119].\n\n_Bug fixes_\n\n
  \ - Using the width options `-w`, `-m` and `-M` in battery monitors\n    watts display
  ([codeberg #118]).\n  - Using the `-d` option in `CoreTemp` ([codeberg #115])\n
  \ - Fix for systems not supporting PCRE regular expressions: we use\n    now BCEs,
  so regex-compat should be enough everywhere (see\n    [codeberg #117]).\n  - Weather
  monitor: support for stations without name (Sergei\n    Trofimovich, [issue #65]).\n\n[codeberg's
  tracker]: https://codeberg.org/xmobar/xmobar/issues\n[codeberg #99]: https://codeberg.org/xmobar/xmobar/issues/115\n[codeberg
  #115]: https://codeberg.org/xmobar/xmobar/issues/115\n[codeberg #117]: https://codeberg.org/xmobar/xmobar/issues/117\n[codeberg
  #125]: https://codeberg.org/xmobar/xmobar/issues/125\n[issue #65]: http://code.google.com/p/xmobar/issues/detail?id=65\n[codeberg
  #118]: https://codeberg.org/xmobar/xmobar/issues/118\n[codeberg #119]: https://codeberg.org/xmobar/xmobar/issues/119\n[codeberg
  #127]: https://codeberg.org/xmobar/xmobar/issues/127\n\n## Version 0.18 (June 5,
  2013)\n\n_New features_\n\n  - All extra argument monitors taking a string (e.g.
  `-O` for\n    `BatteryP`) accept now template variables (see [codeberg #109] and\n
  \   [#110]).  Thanks to Todd Lunter.\n\n  - New battery monitor extra argument,
  `-i`, for the idle status.\n\n_Bug fixes_\n\n  - Safer standard input parsing, avoiding
  <action> injections.\n\n\n[codeberg #109]: https://codeberg.org/xmobar/xmobar/issues/109\n[#110]:
  https://codeberg.org/xmobar/xmobar/issues/110\n\n## Version 0.17 (May 5, 2013)\n\n_New
  features_\n\n  - Icons support: it's now possible to insert bitmaps in the template\n
  \   (Edward O'Callaghan, Alexander Polakov and Tomáš Janoušek).\n  - Initial support
  for reacting to mouse clicks (Alexander Polakov).\n  - New `TopP` and `BottomP`
  alignments, taking left and right\n    paddings (thanks to Dmitry Malikov).\n  -
  New `<freeratio>` field for memory monitor (Peter Simons).\n  - New `allDesktops`
  and `overrideRedirect` configuration options,\n    providing dock behaviour in tiling
  WMs (when set to True and False\n    respectively). Cf. discussion at [codeberg
  #105].\n  - Experimental `-d` (start as a dock) option, may address [codeberg #67]\n
  \   in some window managers.\n\n_Bug fixes_\n\n  - Partial (as reports go) fix for
  [codeberg #77].\n  - Safer volume plugin (Dmitry Malikov).\n  - Battery percentage
  capped at 100% (RJ Regenold).\n\n[codeberg #67]: https://codeberg.org/xmobar/xmobar/issues/67\n[codeberg
  #77]: https://codeberg.org/xmobar/xmobar/issues/77\n[codeberg #105]: https://codeberg.org/xmobar/xmobar/issues/105\n\n\n##
  Version 0.16 (Dec 3, 2012)\n\n_New features_\n\n  - New monitor `AutoMPD`, which
  uses asynchronous events to display\n    MPD status (thanks to Ben Boeckel).\n  -
  New monitor `BufferedPipeReader` displaying data from multiple\n    pipes (thanks
  to Jochen Keil).\n  - New monitor `DynNetwork`, which detects the active interface\n
  \   automatically, by Reto Hablützel\n  - New monitor, `Locks`, displaying the status
  of lock keys, by\n    Patrick Chilton.\n  - Extension for DBUS signal handling (Jochen
  Keil)\n  - Hide/Reveal: one can send signals to xmobar and make it (un)hide\n    itself
  (Jochen again).\n  - `PipeReader`'s default text is now configurable, by Reto Hablützel.\n
  \ - Dependencies updated to latest mtl and libmpd (thanks to Sergei\n    Trofimovich).\n
  \ - Dependencies on the deprecated dbus-core removed in favour of\n    dbus 0.10
  (thanks to Jochen Keil).\n  - MPris2 now includes genre and composer among its fields.\n\n_Bug
  fixes_\n\n  - `DiskIO` now can report overall activity in all partitions of a device\n
  \   which is not mounted itself (e.g., sda when sda1, sda3, etc. are\n    the mounted
  partitions).  Thanks to John Soros. See [codeberg #73].\n  - `DiskU`, the disk usage
  monitor, works again correctly on Linux,\n    instead of randomly crashing every
  now and then, and reporting\n    wrong used size.\n  - When using antialiased fonts,
  we were causing a memory leak in the\n    X server by repeatedly allocating colors
  that, apparently, the\n    server doesn't know how to get rid of (even when told
  so!).  We're\n    caching them now and X server memory doesn't grow.\n  - Compilation
  errors and warnings with GHC 7.6 removed (thanks to\n    Raghavendra D Prabhu for
  his reports in [codeberg #71]).\n\n_Known problems_\n\nSome users have reported
  problems with xmobar compiled with GHC 7.6 in\nArchLinux: see [codeberg #78] and
  pointers therein.  Please, send\nreports of any problems or successes in that regard
  so that we can fix\nany remaining issues.  Thanks!\n\n[codeberg #71]: https://codeberg.org/xmobar/xmobar/issues/71\n[codeberg
  #73]: https://codeberg.org/xmobar/xmobar/issues/73\n[codeberg #78]: https://codeberg.org/xmobar/xmobar/issues/78\n\n##
  Version 0.15 (June 4, 2012)\n\n_Incompatible changes_\n\n  - `Batt` monitor no longer
  uses `-c` to specify the charge file: it\n    should figure things out by itself
  (cf. [issue 69]).\n\n_New features_\n\n  - New command line option, `-C`, that allows
  *adding* commands to\n    those specified in the configuration file (Ben Boeckel).\n
  \ - Dependency on GHC's threaded runtime has been eliminated.\n  - New MPRIS (versions
  1 and 2) monitor, by Artem Tarasov.\n  - New monitor option `-d` to specify the
  number of decimal places to\n    display for float numbers.  Defaults to 0. See
  [issue 58].\n  - New compilation option `--with_threaded`, to use GHC's threaded\n
  \   runtime to compile xmobar.  Disabled by default (cf. discussion in\n    [codeberg
  #36]).\n\n_Bug fixes_\n\n  - Stricter build dependencies versioning in cabal file.\n
  \ - [issue 56] vertical alignment of text improved.\n  - [issue 64] display of `watts`
  in `Batt` monitor fixed.\n  - [issue 69] miscellaneous battery reporting issues.\n
  \ - [issue 67] compilation in DragonFly.\n  - DiskIO works also when device path
  in mtab are symbolic links\n    to the real device file.\n  - Wireless monitor honours
  padding settings for ESSID names.\n  - CoreTemp monitor fixed for newer kernels
  ([codeberg #38]).\n\n[issue 56]: http://code.google.com/p/xmobar/issues/detail?id=56\n[issue
  58]: http://code.google.com/p/xmobar/issues/detail?id=58\n[issue 64]: http://code.google.com/p/xmobar/issues/detail?id=64\n[issue
  67]: http://code.google.com/p/xmobar/issues/detail?id=67\n[issue 69]: http://code.google.com/p/xmobar/issues/detail?id=69\n[codeberg
  #36]: https://codeberg.org/xmobar/xmobar/issues/36\n[codeberg #38]: https://codeberg.org/xmobar/xmobar/issues/38\n\n##
  Version 0.14 (Dec 10, 2011)\n\n_New features_\n\n  - New brightness monitor, courtesy
  of Martin Perner.\n  - New DateZone plugin, for configurable timezone and localized\n
  \   datetimes, also by Martin.\n  - New keyboard layout monitor (Kbd).  Yes, by
  Martin.\n  - Rewrite of the event handling ([issue 53], [issue 57]), you\n    guessed
  it.\n  - Cpu monitor now also reports `iowait` field ([issue 55]).\n  - Battery
  monitor: the full charge file is now settable in the\n    monitor arguments (olpc
  systems use `charge_full_design`; see\n    [issue 62]).\n\n_Bug fixes_\n\n  - [issue
  45] Fix for crashes with AC status changes in battery monitor.\n  - [issue 48] The
  <quality> field of Wireless behaves like a percentage.\n  - [issue 50]/[issue 61]:
  `MPD` monitor now works with libmpd 0.6.\n  - [issue 60] Fixes for crashes on power
  resume for battery monitor.\n  - Template sections without fields are now correctly
  displayed.\n  - Catch errors when reading battery status (Ben Boeckel).\n  - Compilation
  issues with ghc 7.x (Sergei Trofimovich).\n  - Fixes for CoreTemp monitor in new
  kernels (Norbert Zeh).\n  - Fix for pulseaudio problems in volume monitor (Martin
  Perner).\n  - Fix for parsing errors when a `Run` entry ended in an array\n    (Martin).\n
  \ - Fixed compilation in OpenBSD (Ivo van der Sangen).\n\n[issue 45]: http://code.google.com/p/xmobar/issues/detail?id=45\n[issue
  48]: http://code.google.com/p/xmobar/issues/detail?id=48\n[issue 50]: http://code.google.com/p/xmobar/issues/detail?id=50\n[issue
  53]: http://code.google.com/p/xmobar/issues/detail?id=53\n[issue 55]: http://code.google.com/p/xmobar/issues/detail?id=55\n[issue
  57]: http://code.google.com/p/xmobar/issues/detail?id=57\n[issue 60]: http://code.google.com/p/xmobar/issues/detail?id=60\n[issue
  61]: http://code.google.com/p/xmobar/issues/detail?id=61\n[issue 62]: http://code.google.com/p/xmobar/issues/detail?id=62\n\n##
  Version 0.13 (March 28, 2011)\n\n_New features_\n\n  - New `Volume` monitor displaying
  ALSA soundcards information, by\n    Thomas Tuegel.\n  - New `ThermalZone` plugin
  substituting `Thermal` and using linux's\n    *sysfs* interface (you need this one
  if you're using a kernel\n    version equal to or above 2.6.37). See [issue 44].\n
  \ - xmobar app new has WM_CLASS, WM_NAME and _NET_WM_PID xprops\n    ([issue 38]).\n\n_Incompatible
  changes_\n\n  - In the process of solving [issue 14], we've broken those\n    configurations
  that rely on including alignment separators in the\n    input fed to `StdinReader`.\n
  \ - The MPD plugin does not accept host and port options anymore: use\n    the environment
  variables MPD_HOST and MPD_PORT instead.\n  - The `Mail` plugin now takes a second
  parameter (a string)\n    specifying its alias. As a side-effect, this solves [issue
  30].\n\n_Bug fixes_\n\n  - [issue 14] `StdinReader` and other plugins accepting
  external\n    input don't get confused anymore when characters from `alignSep`\n
  \   appear in their input.\n  - [issue 27] `BottomSize` placement now respects its
  width argument.\n  - [issue 28] Compilation in Mac OS X fixed.\n  - [issue 30] `Mail`
  plugin can be specified anywhere in commands list.\n  - [issue 36] Battery monitor
  now supports non-standard locations of\n    the `/sys/class/power_supply/AC/online`
  file.\n  - [issue 40] Battery monitor now supports the new power_now, that\n    replaces
  current_now in linux kernels for v. 2.36 and above.\n  - [issue 42] More accurate
  net monitor rates.\n  - DiskIO, Cpu and MultiCpu monitors are also more accurate
  now.\n  - Text is now correctly centered vertically.\n  - `FullBM` border spec fixed.\n\n[issue
  14]: http://code.google.com/p/xmobar/issues/detail?id=14\n[issue 27]: http://code.google.com/p/xmobar/issues/detail?id=27\n[issue
  28]: http://code.google.com/p/xmobar/issues/detail?id=28\n[issue 30]: http://code.google.com/p/xmobar/issues/detail?id=30\n[issue
  36]: http://code.google.com/p/xmobar/issues/detail?id=36\n[issue 38]: http://code.google.com/p/xmobar/issues/detail?id=38\n[issue
  40]: http://code.google.com/p/xmobar/issues/detail?id=40\n[issue 42]: http://code.google.com/p/xmobar/issues/detail?id=42\n[issue
  44]: http://code.google.com/p/xmobar/issues/detail?id=44\n\n## Version 0.12 (Dec
  24, 2010)\n\nxmobar has a new [maintainer], a new [website], a new [mailing\nlist]
  and uses a new [source code repository].\n\nMany thanks to Andrea Rossato, xmobar's
  author and maintainer so far,\nfor creating xmobar in the first place, and for giving
  me the chance\nto become its maintainer. And a big thanks to Ben Boeckel, Petr Rockai\nand
  Norbert Zeh for their patches.\n\n[website]: http://projects.haskell.org/xmobar/\n[mailing
  list]: http://projects.haskell.org/cgi-bin/mailman/listinfo/xmobar\n[source code
  repository]: https://codeberg.org/xmobar/xmobar\n[maintainer]: http://hacks-galore.org/jao/\n\n_New
  features_\n\n  - Window borders: configuration options `border` and `borderColor`\n
  \   allow drawing borders around xmobar's window.\n  - New monitor, `Uptime`, showing
  the system uptime.\n  - New monitor argument (`-S`) to enable displaying the `%`
  symbol in\n    percentages or other suffixes (e.g., units in Uptime and Network);\n
  \   the symbol is now never included by default.\n  - New 'run once' commands, by
  specifying a 0 refresh rate in `Run\n    Com` ([issue 26]).\n  - MPD monitor: updated
  to libmpd 1.5. New fields `ppos` (playlist\n    position) and `remaining` (remaining
  time). New configuration\n    options to specify MPD's host, user name and password.\n
  \ - Battery monitor: new `watts` and `timeleft` fields (Petr Rockai),\n    and specific
  arguments to control coloring and thresholds of the\n    former.\n  - MultiCPU monitor:
  new `auto*` fields that automatically detect all\n    present CPUs (Ben Boeckel).\n
  \ - CpuFreq monitor uses just one decimal digit for GHz values (Petr\n    Rockai).\n
  \ - Mail plugin expands paths starting with \"~/\" (Ben Boeckel). Ditto\n    MBox.\n
  \ - Weather monitor now skips not retrieved fields, instead of\n    displaying a
  long error message.\n  - New compilation flag, `all_extensions`.\n  - Documentation
  and website updates.\n\n_Bug fixes_\n\n  - [issue 23] Wireless monitor is now compatible
  with iwlib 29.\n  - [issue 24] Swap monitor's used ratio display fixed.\n  - [issue
  25] Percentages only include `%` if requested using `-P`.\n  - [issue 31] MPD monitor
  now respects `-W` argument.\n  - Fixes in CPU frequency formatting, string alignment
  and colour\n    boxes in monitors (Norbert Zeh).\n  - TopMem and TopProc now use
  the `-L` and `-H` options correctly for\n    memory template fields.\n  - MBox skips
  non-existent mbox paths instead of hanging.\n\n[issue 23]: http://code.google.com/p/xmobar/issues/detail?id=23\n[issue
  24]: http://code.google.com/p/xmobar/issues/detail?id=24\n[issue 25]: http://code.google.com/p/xmobar/issues/detail?id=25\n[issue
  26]: http://code.google.com/p/xmobar/issues/detail?id=26\n[issue 31]: http://code.google.com/p/xmobar/issues/detail?id=31\n"
