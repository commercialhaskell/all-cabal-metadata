description: "#+title: xmobar, a minimalistic status bar\n\n#+begin_export html\n<p
  align=\"right\">\n  <a href=\"http://hackage.haskell.org/package/xmobar\">\n    <img
  src=\"https://img.shields.io/hackage/v/xmobar.svg\" alt=\"hackage\"/>\n  </a>\n
  \ <a href=\"https://ci.codeberg.org/repos/17487\" target=\"_blank\">\n    <img src=\"https://ci.codeberg.org/api/badges/17487/status.svg\"
  alt=\"status-badge\" />\n  </a>\n</p>\n#+end_export\n\nXmobar is a minimalistic
  status bar. It was originally designed and\nimplemented to work with [[http://xmonad.org][xmonad]],
  but it is actually usable with any\nwindow manager in X11 and also (via its text
  output mode) Wayland.\n\nXmobar was inspired by the [[http://tuomov.iki.fi/software/][Ion3]]
  status bar, and supports similar\nfeatures, like dynamic color management, icons,
  output templates, and\nextensibility through plugins.  It is also able to write
  to standard\noutput, in a variety of formats.\n\n[[file:doc/screenshots/xmobar-top.png]]\n\n[[file:doc/screenshots/xmobar-bottom.png]]\n\n[[file:doc/screenshots/xmobar-exwm.png]]\n\nCheck
  [[https://codeberg.org/xmobar/xmobar/src/branch/master/changelog.md][the change
  log]] for our release history.  We also have an IRC\nchannel, ~#xmobar~, at [[ircs://irc.libera.chat][Libera]].\n\n*
  Breaking news\n\n  - Starting with version 0.51, we introduced a new GHC support
  policy: xmobar\n    officially supports only the GHC versions that upstream marks
  as /suitable\n    for use/ in the [[https://gitlab.haskell.org/ghc/ghc/-/wikis/GHC-status][official
  GHC status overview]]. \n    At the time of writing, this means GHC versions from
  9.6 to 9.14.\n\n  - Starting with version 0.45, we use cairo/pango as our drawing
  engine\n    (instead of plain X11/Xft).  From a user's point of view, that change\n
  \   should be mostly transparent, except for the facts that it's allowed\n    fixing
  quite a few bugs and that your /font names/ in your configuration, if\n    you used
  ~xft~ ones, might need to be adapted to Pango's syntax: please see\n    [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/quick-start.org#fonts][this
  section of the documentation]] for all the details.  If you're\n    compiling your
  own xmobar, there's a new dependency on libpango (see\n    [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/compiling.org#c-libraries][C
  library dependencies]]).\n\n* Installation\n  :PROPERTIES:\n  :CUSTOM_ID: installation\n
  \ :END:\n** From your system's package manager\n\n   Xmobar is probably available
  from your distributions package\n   manager!  Most distributions compile xmobar
  with the =all_extensions=\n   flag, so you don't have to.\n\n   - Arch Linux\n     #+begin_src
  shell\n       pacman -S xmobar\n     #+end_src\n\n   - Debian/Ubuntu based\n     #+begin_src
  shell\n       apt install xmobar\n     #+end_src\n\n   - OpenSUSE\n     #+begin_src
  shell\n       zypper install xmobar\n     #+end_src\n\n   - Void Linux\n     #+begin_src
  shell\n       xbps-install xmobar\n     #+end_src\n\n   - Gentoo\n     #+begin_src
  shell\n       emerge --ask xmobar\n     #+end_src\n\n   - FreeBSD\n     #+begin_src
  shell\n       pkg install hs-xmobar\n     #+end_src\n\n** Using cabal or stack\n\n
  \  Xmobar is available from [[http://hackage.haskell.org/package/xmobar/][Hackage]],
  and you can compile and install it using\n   =cabal-install=, making sure the [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/compiling.org#c-libraries][required
  C libraries]] are in place. For a\n   full build with all available extensions:\n\n
  \  #+begin_src shell\n     # required C librarises\n     apt-get install xorg-dev
  libxrandr-dev libpango1.0-dev\n     # optional C libraries for additional plugins\n
  \    apt-get install libasound2-dev libxpm-dev libmpd-dev\n\n     cabal install
  xmobar -fall_extensions\n   #+end_src\n\n   See [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/compiling.org#optional-features][here]]
  for a list of optional compilation flags that will enable some\n   optional plugins.\n\n
  \  See [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/compiling.org][compiling]]
  for full compilation instructions starting from source.\n\n* Running xmobar\n**
  Running xmobar with a configuration file\n   You can run xmobar with:\n\n   #+begin_src
  shell\n     xmobar /path/to/config &\n   #+end_src\n\n   or\n\n   #+begin_src shell\n
  \    xmobar &\n   #+end_src\n\n   if you have the default configuration file saved
  as\n   =$XDG_CONFIG_HOME/xmobar/xmobarrc= (defaulting to =~/.config/xmobar/xmobarrc=),\n
  \  or =~/.xmobarrc=.\n\n   All the available command line switches and configuration
  parameters are\n   described in [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/quick-start.org][the
  quick start guide]] and [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/plugins.org][the
  plugins index]].\n\n** Writing your own xmobar in Haskell\n\n   As shown above,
  one can use ~xmobar~ as a regular program, via its\n   configuration file, without
  having to write any code. It also is possible\n   to install xmobar as a library
  and use it to write your own xmobar using\n   Haskell instead of using a configuration
  file.  (This is very similar to\n   how [[http://xmonad.org][xmonad]] works.)  That
  gives you the ability of using Haskell and its\n   libraries to extend xmobar to
  your heart's content. If you are a\n   programmer, take a look [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/using-haskell.org][here]]
  to learn more.\n\n** Running xmobar in text mode\n\n   By default, xmobar will run
  as an X11 application, in a docked window, but\n   it is possible to redirect xmobar's
  output to the standard output,\n   optionally with color escape sequences.  In this
  mode, xmobar can be run\n   inside a terminal o console, or its output piped to
  other applications, and\n   there is no need for an X11 display.  See [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/quick-start.org#text-mode][Running
  xmobar in text mode]] for\n   details.  Using this mode, you could [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/quick-start.org#wayland][pipe
  xmobar's output to, say, swaybar]],\n   and use it in wayland, or, with the [[https://codeberg.org/xmobar/xmobar/src/branch/master/etc/xmobar.el][xmobar.el]]
  package, show it in Emacs's\n   tab bar.\n\n* Configuration and further documentation\n\n
  \ - If you want to jump straight into running xmobar, head over to the\n    [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/quick-start.org][quick
  start guide]].\n\n  - If you want to get a detailed overview of all available plugins
  and\n    monitors, visit the [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/plugins.org][plugins
  index]].\n\n  - For more information on how to use xmobar as a Haskell library see
  the\n    [[https://codeberg.org/xmobar/xmobar/src/branch/master/doc/using-haskell.org][using
  Haskell guide]].\n\n  - If you want to know how to contribute to the xmobar project,
  check out\n    [[https://codeberg.org/xmobar/xmobar/src/branch/master/contributing.org][contributing]].\n\n*
  Authors and credits\n\n  Andrea Rossato originally designed and implemented xmobar
  up to version\n  0.11.1. Since then, it is maintained and developed by [[https://jao.io][jao]],
  with the help of\n  the greater xmobar and Haskell communities.\n\n  In particular,
  xmobar incorporates patches by Kostas Agnantis, Mohammed\n  Alshiekh, Ashesh Ambasta,
  Alex Ameen, Axel Angel, Enrico Maria De Angelis, Dhananjay Balan,\n  Claudio Bley,
  Dragos Boca, Ben Boeckel, Ivan Brennan, Duncan Burke, Roman\n  Cheplyaka, Patrick
  Chilton, Antoine Eiche, Nathaniel Wesley Filardo, Guy\n  Gastineau, John Goerzen,
  Jonathan Grochowski, Patrick Günther, Reto\n  Hablützel, Corey Halpin, Juraj Hercek,
  Jaroslaw Jantura, Tomáš Janoušek, Ada\n  Joule, Spencer Janssen, Léana 江, Roman
  Joost, Pavel Kalugin, Jochen Keil, Sam Kirby,\n  Lennart Kolmodin, Krzysztof Kosciuszkiewicz,
  Dmitry Kurochkin, Todd Lunter,\n  Vanessa McHale, Robert J. Macomber, Dmitry Malikov,
  David McLean, Ulrik de\n  Muelenaere, Joan Milev, Marcin Mikołajczyk, Dino Morelli,
  Tony Morris, Eric\n  Mrak, Thiago Negri, Edward O'Callaghan, Svein Ove, Martin Perner,
  Alexander\n  Pankoff, Jens Petersen, Alexander Polakov, Sibi Prabakaran, Pavan Rikhi,\n
  \ Petr Rockai, Andrew Emmanuel Rosa, Sackville-West, Amir Saeid, Markus\n  Scherer,
  Daniel Schüssler, Olivier Schneider, Alexander Shabalin, Valentin\n  Shirokov, Peter
  Simons, Alexander Solovyov, Will Song, John Soo, John Soros,\n  Felix Springer,
  Travis Staton, Artem Tarasov, Samuli Thomasson, Edward\n  Tjörnhammar, Sergei Trofimovich,
  Thomas Tuegel, John Tyree, Jan Vornberger,\n  Anton Vorontsov, Daniel Wagner, Zev
  Weiss, Phil Xiaojun Hu, Nikolay Yakimov,\n  Edward Z. Yang, Leo Zhang, Norbert Zeh,
  and Michał Zielonka.\n\n  Andrea wants to thank Robert Manea and Spencer Janssen
  for their help in\n  understanding how X works. They gave him suggestions on how
  to solve many\n  problems with xmobar.  He also thanks Claus Reinke for making him
  understand\n  existential types (or at least for letting him think he grasps existential\n
  \ types...;-).\n\n* License\n\n  This software is released under a BSD-style license.
  See [[https://codeberg.org/xmobar/xmobar/src/branch/master/license][license]] for
  more\n  details.\n\n  Copyright © 2010-2026 Jose Antonio Ortega Ruiz\n\n  Copyright
