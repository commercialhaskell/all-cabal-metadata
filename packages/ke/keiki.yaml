changelog: |
  # Changelog

  All notable changes to this package are documented in this file.
  The format follows [Keep a Changelog](https://keepachangelog.com/),
  and this project adheres to the
  [Haskell PVP](https://pvp.haskell.org).


  ## [Unreleased]


  ## [0.1.0.0] — 2026-06-07

  Initial Hackage release. Public surface stabilised around the
  symbolic-register transducer formalism described in
  `docs/research/synthesis-c-foundation-b-presentation-with-worked-examples.md`.

  ### Added

  - `Keiki.Core` — the foundational `RegFile rs` register file, the
    `SymTransducer` GADT, and the slot / predicate / command / event /
    output algebra. Edges carry a *list-shaped* output
    (`output :: [OutTerm rs ci co]`) so one transition can emit
    zero, one, or N events in declaration order — a Generalized
    Sequential Machine, not a letter FST. The `InFlight s co`
    wrapper exposes the streaming-replay state for event-by-event
    replay through length-N edges; `applyEvent` (letter-only) and
    `applyEventStreaming` (InFlight-aware) cover the two regimes,
    while `applyEvents` does atomic chunk replay over command
    boundaries.
  - `Keiki.Acceptor` — input- and output-side acceptor projections.
  - `Keiki.Builder` — the monadic edge-authoring DSL.
  - `Keiki.Composition` — sequential, alternative, and single-step
    feedback combinators on `SymTransducer`s.
  - `Keiki.Decider` — the Chassaing-shape `Decider` facade
    (`decide` / `evolve` / `evolveStreaming` / `initialState` /
    `isTerminal`) derived mechanically from a `SymTransducer`.
    `decide` returns the full event list directly, including
    length-2+ chains from multi-event edges; `evolveStreaming`
    threads the `Keiki.Core.InFlight` wrapper through length-N
    edges for event-by-event streaming replay.
  - `Keiki.Generics` — `RegFieldsOf`, `GRecord`, `mkInCtor` /
    `mkInCtorVia`, `mkWireCtor` / `mkWireCtorVia`, plus `EmptyRegFile`.
  - `Keiki.Generics.TH` — `deriveAggregateCtors`, `deriveWireCtors`,
    `deriveView` for record-payload aggregates, plus zero-enumeration
    `*All` splices that retire the hand-typed
    `(constructorName, shortName)` spec list in the common case where
    the short name equals the constructor name:
    - `deriveAggregateCtorsAll ''Cmd ''Regs` — enumerates every command
      constructor and emits `inCtor<Ctor>` / `inp<Ctor>` / `is<Ctor>`
      (singletons omit `inp<Ctor>`), defaulting each short-name suffix to
      the constructor name.
    - `deriveWireCtorsAll ''Event` — the event-side dual, emitting
      `wire<Ctor>` plus, for record-payload events, the `<Ctor>TermFields`
      record and its `ToOutFields` instance.
    - `deriveAggregate ''Cmd ''Regs ''Event` — fuses both `*All` variants
      into one splice covering an aggregate's command and event
      constructors.
    The enumerated `deriveAggregateCtors` / `deriveWireCtors` remain for
    abbreviated short names that differ from the constructor name.
  - `Keiki.NoThunks` — strict-evaluation discipline assertions for
    the register file and per-vertex state.
  - `Keiki.Profunctor` — `Profunctor` / `Category` / `Strong` /
    `Choice` instances on the existential `SymTransducer` wrapper.
  - `Keiki.Render.Mermaid` — Mermaid renderers for single and
    composite `SymTransducer` diagrams.
  - **`Keiki.Shape`** — GHC-upgrade-safe shape hash for snapshot
    discrimination. `class CanonicalTypeName a`, `class
    KnownRegFileShape (rs :: [Slot])`, `regFileShapeHash`,
    `regFileShapeCanonical`, `renderStableTypeRep`, `sha256Hex`.
    Reusable by any codec; the optional JSON codec lives in the
    sibling package `keiki-codec-json`.
  - `Keiki.Symbolic` — SBV-backed `sat` / `isBot` /
    `isSingleValuedSym` analyses for symbolic CI gating.

  ### Out of scope (intentional)

  - No built-in serialization. JSON / CBOR / Protobuf codecs are
    runtime concerns and live in sibling packages — currently
    `keiki-codec-json`. The pure core talks only typed Haskell
    values; the shape hash discriminates snapshots regardless of
    codec choice.

  ### Validated against

  - GHC 9.12.2 locally on macOS aarch64 and in CI on Ubuntu Linux
    x86_64 (see `.github/workflows/ci.yml`).
  - 278 hspec assertions in the in-tree test suite, including 11
    `Keiki.ShapeSpec` golden assertions for the shape hash, 10
    `Keiki.CoreInFlightSpec` assertions for the GSM streaming
    replay path, and 3 `Keiki.CompositionMultiEventSpec`
    assertions for multi-event composition. The downstream
    `jitsurei` package adds 96 more assertions exercising eight
    worked-example aggregates against the public surface.
changelog-type: markdown
description: |
  # keiki — 継起

  A Haskell library for the **pure core** of event sourcing, workflow
  engines, and durable execution, built on one formalism: the
  symbolic-register finite-state transducer.

  keiki keeps the runtime boundary deliberately small. You describe an
  aggregate or workflow once as a typed transducer; the library derives
  the event-sourcing facade, replay, acceptors, projections, composition
  machinery, diagram renderers, and optional symbolic checks from that
  single declaration.

  ## The name

  **継起** (*keiki*) is the Japanese word for **"successive occurrence"** —
  events that follow, one after another, each rising out of what came before.

  | Kanji | Reading | Meaning |
  |---|---|---|
  | 継 | *kei* | to continue, to succeed (as an heir does), to follow on |
  | 起 | *ki*  | to rise, to occur, to begin, to happen |

  The choice is literal. An event-sourced aggregate is a sequence of events
  in succession, each one rising out of the state the previous events left
  behind. *keiki* names that pattern directly: 継 (the prior event is
  succeeded by) 起 (the next one rising). The replay fold —
  `reconstitute :: [Event] → State` — is exactly the operation the word
  describes.

  (Disambiguation, since the romanisation is ambiguous: this is 継起, not
  景気 *keiki* "economic conditions" nor 計器 *keiki* "gauge / instrument".
  Only the 継起 reading carries the "succession of events" sense.)

  ## What it is

  A unified treatment of three problems often solved with separate
  runtime concepts:

  1. **Event sourcing** — store the immutable log of events, replay to
     recover state.
  2. **Workflow engines** — coordinate long-running multi-step processes.
  3. **Durable execution** — resume cleanly after a crash, mid-process.

  keiki models all three as **finite-state transducers** with a typed
  register file and predicate-labelled guards: a practical hybrid of
  Symbolic Finite Transducers and Streaming String Transducers. From one
  `SymTransducer` declaration, the library mechanically derives:

  - the Chassaing-shape `Decider` (`decide`/`evolve`/`initialState`/`isTerminal`),
  - input- and output-side `Acceptor`s,
  - per-vertex projections (the "B-presentation" view),
  - composition (`compose`, `alternative`, `feedback1`),
  - profunctor / `Category` / `Strong` / `Choice` instances,
  - Mermaid and Markdown renderers for documentation,
  - single-valuedness checks via SBV + z3 as an opt-in symbolic CI gate.

  `delta` / `omega` / `applyEvent` use concrete predicate evaluation — no
  solver in the per-event hot path. Solver dispatch is reserved for
  build-time analysis.

  ## Status

  Pre-1.0, prepared for the initial `0.1.0.0` Hackage release. The
  planned v0.1 surface is implemented and validated against in-tree tests
  plus the downstream `jitsurei` worked-example package.

  The core package is intentionally codec-free. JSON support lives in
  [`keiki-codec-json`](keiki-codec-json/README.md), and downstream codec
  testing helpers live in
  [`keiki-codec-json-test`](keiki-codec-json-test/README.md).

  ## Build

  Requires GHC 9.12 and (for the symbolic analyses only) `z3` on `PATH`.

  ```sh
  nix develop          # provides ghc 9.12, cabal, z3
  cabal build all
  cabal test all
  ```

  Pure evaluation (`delta`, `omega`, `step`, `reconstitute`) does not
  depend on z3. The symbolic checks in `Keiki.Symbolic` will fail loudly
  if z3 is missing when invoked.

  ## A taste

  The smallest useful aggregate, in full:

  ```haskell
  emailDelivery
    :: SymTransducer (HsPred EmailRegs EmailCmd)
                     EmailRegs EmailVertex EmailCmd EmailEvent
  emailDelivery = B.buildTransducer EmailPending emptyRegFile
                    (\case EmailSentVertex -> True; _ -> False) do
    B.from EmailPending do
      B.onCmd inCtorSendEmail $ \d -> B.do
        B.slot @"emailRecipient" .= d.recipient
        B.slot @"emailSubject"   .= d.subject
        B.slot @"emailSentAt"    .= d.at
        B.emit wireEmailSent EmailSentTermFields
          { recipient = d.recipient
          , subject   = d.subject
          , at        = d.at
          }
        B.goto EmailSentVertex
  ```

  `Decider`, `Acceptor`, replay, and the per-vertex view are all derived
  from this one declaration. See the sibling `jitsurei/` package for the
  full worked aggregates the test suite drives.

  ## Repository documentation

  The repository includes user guides, design notes, and implementation
  history:

  | Folder | Audience |
  |---|---|
  | `docs/foundations/` | Onboarding. Reads as a tutorial in ~1 hour; assumes Haskell, no automata-theory background. Start at `00-reading-guide.md`. |
  | `docs/guide/` | Action-oriented. `user-guide.md` is the canonical authoring walkthrough; topical guides cover composition, profunctors, symbolic CI, AST drop-down, and B-views. |
  | `docs/research/` | Design notes for the library itself. Assume foundations vocabulary. The current baseline is `synthesis-c-foundation-b-presentation-with-worked-examples.md`. |
  | `docs/adr/` | Stable architecture decisions distilled from the plan history. |
  | `docs/plans/` and `docs/masterplans/` | Execution records for the work that produced v0.1. |
  | `docs/historical/` | Superseded design notes, retained for context only. |

  For a status snapshot — what's implemented, what's next, and what's intentionally
  out of scope — see [`ROADMAP.md`](ROADMAP.md).

  Recommended shortest path:

  1. `docs/foundations/00-reading-guide.md` — orientation.
  2. `docs/guide/user-guide.md` — write your first aggregate.
  3. `docs/research/synthesis-c-foundation-b-presentation-with-worked-examples.md` — the design baseline.

  ## License

  BSD-3-Clause. See [`keiki.cabal`](keiki.cabal) for package metadata.
