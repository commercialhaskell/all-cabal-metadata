description: "# pms-infra-agent-process\n\n----\n## ⚠️ Caution\n\n**Do not grant unrestricted
  control to AI.**  \nUnsupervised use or misuse may lead to unintended consequences.
  \ \nAll AI systems must remain strictly under human oversight and control.  \nUse
  responsibly, with full awareness and at your own risk.  \n\n----\n## \U0001F4D8
  Overview\n\n**`pms-infra-agent-process`** is a Haskell infrastructure library that
  provides AI agents with direct, low-level control over external processes via standard
  input/output.\n\nUnlike PTY-based tools, this library communicates with spawned
  processes directly through `stdin`/`stdout`/`stderr` handles, without allocating
  a pseudo-terminal. This makes it well-suited for non-TUI programs that communicate
  via plain text streams, such as language servers, compilers, or custom automation
  scripts.\n\nThe library is a core component of the [`pty-mcp-server`](https://github.com/phoityne/pty-mcp-server)
  ecosystem and implements the `agent-proc-*` family of MCP tools.\n\n---\n\n## \U0001F527
  Provided MCP Tools\n\n### `agent-proc-run`\nSpawns an external process with the
  specified command and options. The process's `stdin`/`stdout` are connected for
  subsequent `agent-proc-read` and `agent-proc-write` operations. Only one process
  can be active at a time.\n\nSupports an `allowedAgentCmds` whitelist — if configured,
  only commands present in the whitelist are permitted to run.\n\n### `agent-proc-read`\nReads
  up to the specified number of bytes from the `stdout` of the running process. Returns
  immediately with available data (non-blocking). Returns an empty string if no data
  is available.\n\n### `agent-proc-write`\nWrites the specified string to the `stdin`
  of the running process.\n\n### `agent-proc-terminate`\nForcefully terminates the
  currently running process. Resets internal state so `agent-proc-run` can be called
  again.\n\n---\n\n## \U0001F3D7️ Architecture\n\n### Module Structure\n\n```\nPMS.Infra.Agent.Process\n├──
  DM.Type        -- Data type definitions (ProcData, AppData, tool parameter types)\n├──
  DM.Constant    -- Constants\n├── DS.Core        -- Core domain service logic\n├──
  DS.Utility     -- Utility functions\n└── App.Control    -- Application control:
  tool dispatch and process lifecycle management\n```\n\n### Key Design Points\n\n-
  **Single active process**: Only one process can run at a time per server instance.
  State is managed via `STM.TMVar`.\n- **Non-blocking reads**: `agent-proc-read` returns
  immediately without blocking, allowing the agent to poll at its own pace.\n- **Whitelist
  enforcement**: `agent-proc-run` checks the command against `allowedAgentCmds` from
  the configuration before spawning. If the list is empty, all commands are denied
  by default.\n- **Direct stdio**: No PTY allocation. Suitable for programs that do
  not require a terminal environment.\n\n---\n\n## \U0001F4E6 Dependencies\n\n- [`pms-domain-model`](https://github.com/phoityne/pms-domain-model)\n\n---\n\n##
  \U0001F4DC Credits & License\n\n- **Execution & Process Lead:** Sonnet 4.6, Gemini
  3 Flash\n- **Direction & Policy:** phoityne\n- **License:** Apache-2.0 — see [LICENSE](./LICENSE)\n\n---\n"
