description: "# pms-infra-agent-socket\n\n----\n## ⚠️ Caution\n\n**Do not grant unrestricted
  control to AI.**  \nUnsupervised use or misuse may lead to unintended consequences.
  \ \nAll AI systems must remain strictly under human oversight and control.  \nUse
  responsibly, with full awareness and at your own risk.  \n\n----\n## \U0001F4D8
  Overview\n\n**`pms-infra-agent-socket`** is a Haskell infrastructure library that
  provides AI agents with direct, low-level control over socket-based communication
  endpoints.\n\nUnlike higher-level abstractions, this library exposes raw byte-stream
  access over both TCP/IP and Unix Domain Sockets, allowing agents to handle protocol-specific
  exchanges such as Telnet IAC negotiation, binary protocol framing, and real-time
  I/O monitoring with fine-grained control.\n\nThe library is a core component of
  the [`pty-mcp-server`](https://github.com/phoityne/pty-mcp-server) ecosystem and
  implements the `agent-socket-*` family of MCP tools.\n\n---\n\n## \U0001F527 Provided
  MCP Tools\n\n### `agent-socket-open`\nOpens a socket connection for subsequent read/write
  operations.  \nSupports both **TCP** (`host` + `port`) and **Unix Domain Socket**
  (`file`) connections via a single tool.\n\n- `host` — TCP host name or IP address
  \ \n- `port` — TCP service name or port number  \n- `file` — Unix domain socket
  path (absolute path required on Windows)  \n\nOnly one socket connection can be
  active at a time.\n\n### `agent-socket-close`\nCloses the active socket connection
  and releases all associated resources.\n\n### `agent-socket-read`\nReads up to the
  specified number of bytes from the active socket connection and returns the data
  as a **UTF-8 string**.  \nReturns an empty string if no data is available before
  timeout.\n\n- `length` — Maximum number of bytes to read  \n\n> ⚠️ If the received
  data contains non-UTF-8 bytes (e.g., binary protocols, IAC bytes), use `agent-socket-read-byte`
  instead.\n\n### `agent-socket-read-byte`\nReads up to the specified number of bytes
  from the active socket connection and returns the data as an **uppercase hex string**
  (e.g., `FF0A1B41`).  \nUse this for binary protocols or when precise byte-level
  inspection is required.\n\n- `length` — Maximum number of bytes to read  \n\n###
  `agent-socket-write`\nWrites the specified **UTF-8 string** to the active socket
  connection.\n\n- `data` — Text data to write  \n\n> ⚠️ Escape sequences such as
  `\\r\\n` in the string are sent as literal characters. To send exact byte sequences
  (e.g., CR+LF = `0D0A`), use `agent-socket-write-byte`.\n\n### `agent-socket-write-byte`\nDecodes
  the specified **hex string** and writes the resulting bytes to the active socket
  connection.  \nUse this for binary protocols or when precise byte-level control
  is required.\n\n- `data` — Uppercase hex string to decode and write (e.g., `DEADBEEF0D0A`)
  \ \n\n---\n\n## \U0001F4A1 Usage Notes\n\n### IAC / Telnet negotiation\nTelnet IAC
  processing is the **responsibility of the agent**, not the library.  \nUse `agent-socket-read-byte`
  and `agent-socket-write-byte` to handle IAC sequences at the byte level.\n\nExample
  negotiation flow:\n```\n← FFFD18FFFD20FFFD23FFFD27   (Server: IAC DO TERMINAL-TYPE/SPEED/X-DISPLAY/NEW-ENVIRON)\n→
  FFFC18FFFC20FFFC23FFFC27   (Agent:  IAC WONT x4)\n← FFFB03FFFD01FFFD1FFFFB05   (Server:
  IAC WILL SGA / DO ECHO / DO NAWS / WILL STATUS)\n→ FFFD03FFFB01FFFC1FFFFD05   (Agent:
  \ IAC DO SGA / WILL ECHO / WONT NAWS / DO STATUS)\n← \"localhost login: \"         (Login
  prompt — read as UTF-8 string)\n→ \"phoityne\\r\\n\"              (Username — send
  as bytes: 70686F6974796E650D0A)\n← \"Password: \"                (Password prompt)\n```\n\n###
  Unix Domain Socket on Windows\nUnix Domain Socket (`file` parameter) is supported
  on **Windows 10 build 1803 and later** at the OS level.  \nHowever, the socket server
  side must be implemented in a runtime that supports `AF_UNIX` on Windows.\n\n- **Python
  3.13.7 (Windows)**: `socket.AF_UNIX` is unavailable unless **Developer Mode** is
  enabled.\n- **PowerShell / .NET**: `System.Net.Sockets.UnixDomainSocketEndPoint`
  works without Developer Mode.\n- **pty-mcp-server (Haskell)**: Confirmed working
  on Windows 11 via `Network.Socket` with `AF_UNIX`.\n\n---\n\n## \U0001F3D7️ Architecture\n\n###
  Module Structure\n\n```\nPMS.Infra.Agent.Socket\n├── DM.Type        -- Data type
  definitions (SocketData, AppData, tool parameter types)\n├── DM.Constant    -- Constants\n├──
  DS.Core        -- Core domain service logic\n├── DS.Utility     -- Utility functions
  (TCP connect, Unix Domain Socket connect)\n└── App.Control    -- Application control:
  tool dispatch and socket lifecycle management\n```\n\n### Key Design Points\n\n-
  **Single active connection**: Only one socket can be open at a time per server instance.
  State is managed via `STM.TMVar`.\n- **Dual connection mode**: `agent-socket-open`
  supports both TCP (`host`/`port`) and Unix Domain Socket (`file`) via a single unified
  interface.\n- **Non-blocking reads**: Read operations return immediately with available
  data, allowing the agent to poll at its own pace.\n- **Byte-level I/F**: In addition
  to UTF-8 string I/F, hex string I/F is provided for binary protocol handling. IAC
  processing and protocol framing are delegated to the agent.\n\n---\n\n## \U0001F4E6
  Dependencies\n\n- [`pms-domain-model`](https://github.com/phoityne/pms-domain-model)\n\n---\n\n##
  \U0001F4DC Credits & License\n\n- **Execution & Process Lead:** Claude Sonnet 4.6,
  Gemini 3 Flash, GPT-5.5\n- **Direction & Policy:** phoityne\n- **License:** Apache-2.0
  — see [LICENSE](./LICENSE)\n\n---\n"
