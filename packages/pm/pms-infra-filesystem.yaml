changelog: |
  # Revision history for pms-infra-filesystem

  ## 0.0.4.0 -- 2026-06-15

  * Added pms-infra-agent-server: TCP server listen/accept functionality for AI agents.

  ## 0.0.3.0 -- 2026-05-15

  * Add `pms-file-info` to report line count and byte size.
  * Add `pms-grep-file` to search files with POSIX extended regular expressions and return matching line numbers, text, and column offsets.
  * Extend `pms-read-file` with optional `startLine` and `endLine` partial-read parameters.
  * Add `pms-replace-file` for ordered literal text replacements.
  * Fix UTF-8 handling in `pms-grep-file` responses so Japanese text is returned without mojibake.
  * Add tests for file info, grep, partial read, replace, Japanese grep output, and related error cases.

  ## 0.0.2.0 -- 2026-01-31

  * Add file system pms-make-dir tools.

  ## 0.0.1.0 -- 2025-12-31

  * First version.
changelog-type: markdown
description: |
  # pms-infra-filesystem

  `pms-infra-filesystem` is one of the internal packages that make up the PMS infrastructure.

  `pms-infra-filesystem` provides file system operations as an Infra-layer component, isolating direct OS file access from the Domain and UseCase layers. It is responsible for validating permitted paths, performing safe file and directory operations, and converting file system data into structured representations suitable for JSON and MCP communication.

  By centralizing path normalization, access control, and size checks, this package enables higher layers to interact with the file system through a controlled and secure interface, without depending on OS-specific details.


