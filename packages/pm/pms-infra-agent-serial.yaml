description: "# pms-infra-agent-serial\n\n----\n## ⚠️ Caution\n\n**Do not grant unrestricted
  control to AI.**\n\nUnsupervised use or misuse may lead to unintended consequences.\nAll
  AI systems must remain strictly under human oversight and control.\nUse responsibly,
  with full awareness and at your own risk.\n\n----\n## \U0001F4D8 Overview\n\n**`pms-infra-agent-serial`**
  is a Haskell infrastructure library that provides AI agents with direct, low-level
  control over serial communication endpoints.\n\nUnlike prompt-oriented serial abstractions,
  this library exposes raw serial I/O as both UTF-8 strings and byte-level hex strings.
  This allows agents to handle device-specific protocols, binary command frames, console
  sessions, and real-time serial monitoring with fine-grained control.\n\nThe library
  is a core component of the [`pty-mcp-server`](https://github.com/phoityne/pty-mcp-server)
  ecosystem and implements the `agent-serial-*` family of MCP tools.\n\n---\n\n##
  \U0001F527 Provided MCP Tools\n\n### `agent-serial-open`\nOpens a serial port connection
  for subsequent read/write operations.\nOnly one serial port connection can be active
  at a time.\n\n- `device` — Serial device path (for example `/dev/ttyUSB0` or `COM3`)\n-
  `commSpeed` — Baud rate (for example `9600` or `115200`; default: `9600`)\n- `bitsPerWord`
  — Data bits (`5` to `8`; default: `8`)\n- `stopb` — Stop bits (`1` or `2`; default:
  `1`)\n- `parity` — Parity (`NoParity`, `Odd`, or `Even`; default: `NoParity`)\n-
  `flowControl` — Flow control (`NoFlowControl` or `Software`; default: `NoFlowControl`)\n-
  `timeout` — Read timeout in tenths of a second (default: `1`)\n\n### `agent-serial-close`\nCloses
  the active serial port connection and releases all associated resources.\n\n###
  `agent-serial-read`\nReads up to the specified number of bytes from the active serial
  port and returns the data as a **UTF-8 string**.\nReturns an empty string if no
  data is available before timeout.\n\n- `size` — Maximum number of bytes to read\n\n>
  ⚠️ If the received data contains non-UTF-8 bytes or binary protocol frames, use
  `agent-serial-read-byte` instead.\n\n### `agent-serial-read-byte`\nReads up to the
  specified number of bytes from the active serial port and returns the data as an
  **uppercase hex string** (e.g., `FF0A1B41`).\nUse this for binary protocols or when
  precise byte-level inspection is required.\n\n- `size` — Maximum number of bytes
  to read\n\n### `agent-serial-write`\nWrites the specified **UTF-8 string** to the
  active serial port.\n\n- `data` — Text data to write\n- `appendNewline` — When omitted
  or `true`, appends CR+LF automatically. When `false`, sends the string as-is.\n\n>
  ⚠️ To send exact byte sequences (for example binary frames, checksums, or explicit
  CR+LF bytes), use `agent-serial-write-byte`.\n\n### `agent-serial-write-byte`\nDecodes
  the specified **hex string** and writes the resulting bytes to the active serial
  port.\nUse this for binary protocols or when precise byte-level control is required.\n\n-
  `data` — Hex string to decode and write (e.g., `DEADBEEF0D0A`; uppercase and lowercase
  are accepted)\n\n---\n\n## \U0001F4A1 Usage Notes\n\n### Serial protocol handling\nPrompt
  detection, command framing, response parsing, retries, checksums, and other protocol-specific
  behavior are the **responsibility of the agent**, not the library.\nUse `agent-serial-read-byte`
  and `agent-serial-write-byte` when communicating with devices that require byte-accurate
  exchanges.\n\nExample binary command flow:\n```\n→ 010300000002C40B   (Agent: write
  Modbus RTU request as bytes)\n← 010304000A0014DA3E (Device: response read as bytes)\n```\n\nExample
  console flow:\n```\n← \"login: \"          (Device prompt — read as UTF-8 string)\n→
  \"admin\\r\\n\"        (Username — send with appendNewline or exact bytes)\n← \"Password:
  \"       (Password prompt)\n```\n\n### Newline behavior\n`agent-serial-write` appends
  CR+LF by default to support common serial-console workflows.\nSet `appendNewline`
  to `false` when the target protocol requires exact text without automatic line endings.\n\n###
  Read size limit\nRead operations cap the requested size to the internal read buffer
  size.\nFor large outputs, poll repeatedly with `agent-serial-read` or `agent-serial-read-byte`.\n\n---\n\n##
  \U0001F3D7️ Architecture\n\n### Module Structure\n\n```\nPMS.Infra.Agent.Serial\n├──
  DM.Type        -- Data type definitions (AppData, tool parameter types)\n├── DM.Constant
  \   -- Constants\n├── DS.Core        -- Core domain service logic\n├── DS.Utility
  \    -- Utility functions (serial settings, hex decoding, AppContext helpers)\n└──
  App.Control    -- Application control: tool dispatch and serial lifecycle management\n```\n\n###
  Key Design Points\n\n- **Single active port**: Only one serial port can be open
  at a time per server instance. State is managed via `STM.TMVar`.\n- **Configurable
  serial settings**: `agent-serial-open` supports baud rate, data bits, stop bits,
  parity, flow control, and read timeout.\n- **Non-blocking reads**: Read operations
  return available data within the configured serial timeout, allowing the agent to
  poll at its own pace.\n- **Byte-level I/F**: In addition to UTF-8 string I/F, hex
  string I/F is provided for binary protocol handling. Device protocol processing
  is delegated to the agent.\n\n---\n\n## \U0001F4E6 Dependencies\n\n- [`pms-domain-model`](https://github.com/phoityne/pms-domain-model)\n-
  [`serialport`](https://hackage.haskell.org/package/serialport)\n\n---\n\n## \U0001F4DC
  Credits & License\n\n- **Execution & Process Lead:** Claude Sonnet 4.6, Gemini 3
  Flash, GPT-5.5\n- **Direction & Policy:** phoityne\n- **License:** Apache-2.0 —
  see [LICENSE](./LICENSE)\n\n---\n"
