description: "aeson-value-qq provides a `QuasiQuoter` that creates aeson `Value`s
  using JSON-like syntax.  \nIt's a sister package of [aeson-match-qq][0]\n\n[aeson-qq][1]
  is a very similar package. The main differences (as far as I can say) are:\n\n  -
  we use aeson-attoparsec's parsers (specifically, `jstring` and `scientific`) where
  possible\n\n  - we don't support variable object keys (that is, the `{$key: 42}`
  notation); I'm not exactly opposed to that feature but I don't really like how it
  looks and never had the need for it. It would also require adding `FromJSONKey`
  support and I would then have to support it in aeson-match-qq as well; in the end
  it's just too much work, man.\n\n  - we use [ghc-hs-meta][2] instead of [haskell-src-meta][3]
  to parse Haskell expressions\n\n## Syntax\n\nCopy-pasting JSON should always work
  (assuming infinite RAM).  \nBesides that, there are syntax extensions such as:\n\n###
  Bare keys\n\nIt's often possible to omit quotes around keys that include neither
  whitespace  \nnor characters used as part of JSON syntax:\n\n```\n[qq|\n  { foo:
  4\n  , snake-case: \"hello\"\n  }\n|]\n```\n\nThe bare-keys support is best-effort,
  so if your keys are *weird*, err on the side of quoting them.\n\n### Comments\n\nIf
  for some reason you'd like to document what you're doing, you can add comments:\n\n```\n[qq|\n
  \ # .foo works better when it's 7 not 4\n  { foo: 7\n  }\n|]\n```\n\n### Interpolation\n\nWe
  use ghc-hs-meta to parse Haskell inside `#{...}` syntax.\n\n```\n[qq|\n  { foo:
  #{4 + 7}\n  }\n|]\n```\n\nNote that `#{...}` uses the Haskell language extensions
  enabled in the current module.\n\n\n[0]: https://github.com/supki/aeson-match-qq\n[1]:
  https://hackage.haskell.org/package/aeson-qq\n[2]: https://hackage.haskell.org/package/ghc-hs-meta\n[3]:
  https://hackage.haskell.org/package/haskell-src-meta\n"
