changelog: "# Changelog for `brush-strokes`\r\n\r\n## 0.1.0.0 – 2026-03-28\r\n\r\nInitial
  Hackage release.\r\n"
changelog-type: markdown
description: "# brush-strokes\r\n\r\n\r\nThis library provides a toolkit for dealing
  with Bézier curves and Bézier splines,\r\nwith a particular focus on computing the
  outline of a brush stroke in the spirit\r\nof Knuth's [METAFONT](https://en.wikipedia.org/wiki/Metafont).\r\n\r\n<p
  align=\"center\"><img src=\"img/example_stroke.svg\" width=\"400\" alt=\"Brush stroke
  example\"/></p>\r\n\r\n---\r\n\r\n## Bézier curves\r\n\r\nThis library mainly deals
  with quadratic and cubic Bézier curves,\r\nwith `Math.Bezier.Quadratic` and `Math.Bezier.Cubic`
  providing basic operations\r\nsuch as differentiation, curvature, subdivision, and
  closest-point queries.\r\n\r\n### Bézier splines\r\n\r\n`Math.Bezier.Spline` contains
  functionality for working with Bézier splines\r\n(made up of straight lines and
  quadratic/cubic Bézier curve). For example:\r\n\r\n  - subdividing a spline,\r\n
  \ - deleting points from a spline,\r\n  - distinguishing between open and closed
  splines.\r\n\r\n### Arc-length parametrisation\r\n\r\n`Math.Bezier.ArcLength` implements
  several numerical integration strategies\r\nfor computing the arc length of a Bézier
  curve, and inverts the arc-length\r\nmap via Newton–Raphson for arc-length re-parametrisation:\r\n\r\n|
  Integrator        | Description |\r\n|-------------------|-------------|\r\n| `GaussLegendre`
  \  | Gauss–Legendre quadrature |\r\n| `ClenshawCurtis`  | Clenshaw–Curtis quadrature
  |\r\n| `TanhSinh`        | Tanh–sinh (double-exponential) quadrature |\r\n| `Gravesen`
  \       | Gravesen's adaptive polygon/chord method |\r\n\r\nThese methods are also
  extended to Bézier splines.\r\n\r\n## Brush stroking\r\n\r\n`Math.Bezier.Stroke`
  implements brush stroking, in which:\r\n\r\n  - the base path is a Bézier spline,\r\n
  \ - the brush shape is a closed Bézier spline whose parameters can vary as the\r\n
  \   brush moves along the path; the parameters are themselves Bézier functions\r\n
  \   of the base path Bézier parameter.\r\n\r\nBrush shapes are defined in `Calligraphy.Brushes`;
  predefined shapes include\r\ncircular, elliptical, and teardrop brushes.\r\n\r\nThe
  stroking algorithm:\r\n\r\n  - Computes outline points by numerically solving the
  envelope equation\r\n    using (forward-mode) automatic differentiation.\r\n    (See
  `Math.Bezier.Stroke.EnvelopeEquation` for details.)\r\n  - Detects cusps via real
  root isolation algorithms implemented using\r\n    interval arithmetic.\r\n  - Splits
  up the base path at cuspidal points.\r\n  - Fits a cubic Bézier spline to the computed
  outline, using Hoschek's\r\n    least-squares curve fitting algorithm (see `Math.Bezier.Cubic.Fit`).\r\n
  \ - Joins up adjacent stroke segments at corners.\r\n\r\n### Cusps\r\n\r\nThe most
  complex (and computationally intensive) step in the above algorithm is\r\nthe computation
  of cusps, using real root isolation with interval arithmetic.\r\n\r\nThe cusp equation
  is formulated in `Math.Bezier.Stroke.EnvelopeEquation` using\r\nimplicit differentiation
  of the envelope equation. (There is also a secondary\r\ncusp equation corresponding
  to corners of the brush, if the brush has corners.)\r\n\r\nThe `cusps` benchmark
  suite compares the performance of the root isolation\r\nalgorithms for cusp finding
  on a selection of brush strokes that arose in\r\ntesting.\r\n\r\n## Root finding\r\n\r\n`Math.Roots`
  implements a few basic 1D root-finding algorithms:\r\n\r\n  - A quadratic equation
  solver,\r\n  - A Newton–Raphson implementation with Armijo line search,\r\n  - Laguerre's
  method,\r\n  - A modified Halley M2 method by [Cordero, Ramos, Torregrosa (2020)](https://doi.org/10.1007/s10910-020-01108-3).\r\n\r\nA
  very basic `n`-dimensional Newton's method is also implemented,\r\ncalling out to
  `eigen` for inversion of the Jacobian.\r\n\r\n### Real root isolation\r\n\r\n`Math.Root.Isolation`
  provides general-purpose real root isolation algorithms\r\nfor general multi-dimensional
  non-linear systems.\r\n\r\nAvailable algorithms include bisection, the interval
  Newton method,\r\nand narrowing methods (e.g. [Kubica (2017)](https://doi.org/10.1016/j.jpdc.2017.03.009)\r\nand
  [Goldsztejn & Goualard (2010)](https://dl.acm.org/doi/10.1145/1774088.1774519)).\r\n\r\nFor
  interval Newton, two methods are available for inverting the interval\r\nJacobian:\r\n\r\n
  \ - Gauss–Seidel step (with option to use the complete Gauss–Seidel method,\r\n
  \   [Montanher, Domes, Schichl, Neumaier (2017)](https://link.springer.com/article/10.1007/s10543-017-0657-x)),\r\n
  \ - (2D only) a highly-performant linear-programming approach, kindly contributed
  by\r\n    Walter Figueiredo Mascarenhas; see [`cbits/lp_2d.cpp`](cbits/lp_2d.cpp).\r\n\r\nIt
  is possible to customise the pipeline to choose in which order and when to apply
  the different algorithms when performing branch-and-bound style search.\r\n\r\n###
  Interval arithmetic\r\n\r\n`Math.Interval` provides rigorously rounded intervals
  and *n*-dimensional\r\ninterval boxes.\r\n\r\nThree back-ends for computing correctly-rounded
  interval arithmetic operations\r\nare selectable at build time via Cabal flags:\r\n\r\n|
  Flag        | Description |\r\n|-------------|-------------|\r\n| *(default)* |
  Use `rounded-hw` |\r\n| `use-fma`   | Use Kahan TwoSum and FMA TwoProd |\r\n| `use-simd`
  \ | Use 128-bit SIMD registers |\r\n\r\n### Automatic differentiation\r\n\r\n`Math.Algebra.Dual`
  implements *k*-th order dual numbers for forward-mode\r\nautomatic differentiation
  in *n* variables, used throughout the library for\r\nderivatives, curvature, and
  critical-point detection.\r\n\r\n---\r\n\r\n## Other utilities\r\n\r\n### Arc-length
  test suite\r\n\r\nThe `test-arc-length` test executable can output relative error
  data to a CSV\r\nfile, useful for visualising which Béziers each integrator struggles
  with:\r\n\r\n```\r\ncabal run test-arc-length -- csv --output errors.csv INTEGRATOR
  [--grid-size STEP]\r\n```\r\n\r\n<p align=\"center\"><img src=\"img/clenshaw_error_landscape.png\"
  alt=\"Clenshaw–Curtis arc-length integrator error landscape\"/></p>\r\n\r\n\r\n###
  Arc-length benchmark suite\r\n\r\nThe `bench-arc-length` executable compares the
  speed and accuracy of various\r\narc-length integrators across a selection of quadratic
  and cubic Béziers.\r\n\r\nOn top of command-line output, it also writes the results
  to `bench_results.csv`.\r\nThese results can be visualised using the included helper
  Python script\r\n`plot_bench.py` (requires `numpy` and `matplotlib`):\r\n\r\n```\r\npython
  src/arc-length/bench/plot_bench.py bench_results.csv\r\n```\r\n\r\n<p align=\"center\"><img
  src=\"img/bench_quadratics.png\" alt=\"Integrator time &amp; error histograms –
  Quadratic Béziers\"/></p>\r\n\r\n<p align=\"center\"><img src=\"img/bench_cubics.png\"
  alt=\"Benchmark time &amp; error histograms – Cubic Béziers\"/></p>\r\n"
