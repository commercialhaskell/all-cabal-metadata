description: "# `brush-stroking`\r\n\r\nThis is a companion library to the `brush-strokes`
  package, providing a simple\r\ndocument model and rendering (using `cairo`).\r\n\r\n##
  Installation notes\r\n\r\nThis library requires the `cairo` C system library.\r\n\r\nHere
  are some ways to install it:\r\n\r\n  - On Linux, you will need to install the ``cairo``
  development libraries\r\n    and the GObject introspection data. On Debian for example,
  you can run:  \r\n    `apt-get install pkg-config libcairo2-dev libgirepository1.0-dev`\r\n
  \ - On Windows, you will need to use the MSYS2 installation that is provided by\r\n
  \   `ghcup`. In an `MSYS2` shell, you can run:  \r\n    `pacman -S -q --noconfirm
  mingw64/mingw-w64-x86_64-pkg-config mingw64/mingw-w64-x86_64-cairo mingw64/mingw-w64-x86_64-gobject-introspection`\r\n
  \ - On MacOS, you should be able to use ``brew`` (untested):  \r\n    `brew install
  pkgconf cairo gobject-introspection`\r\n"
