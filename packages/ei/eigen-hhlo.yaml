  ## Appendix: CPU Backend

  The CPU backend is **deferred** ‚Äî the source code is present but end-to-end execution is not yet possible.

  ### Why it is deferred

  The PJRT CPU plugin uses an internal C++ `CustomCallTargetRegistry` singleton to resolve custom calls. This registry can only be populated by code **linked directly into the plugin binary** itself. Our LAPACK wrapper library (`libeigenhhlo_cpu.so`) would be loaded separately via `dlopen(RTLD_GLOBAL)`, and its symbols are globally visible ‚Äî yet the plugin never looks them up. We verified this experimentally (`LD_PRELOAD`, `dlsym` tests, and symbol-table inspection all confirm the plugin ignores externally-loaded symbols).

  **What this means in practice:**
  - ‚úÖ MLIR generation and compilation work correctly on the CPU code path.
  - ‚ùå Runtime execution crashes with `PJRTException "No registered implementation for untyped custom call to eigenhhlo_* for Host"`.
  - This is **not a bug in eigen-hhlo**; it is an architectural limitation of the current PJRT CPU plugin.

  **Paths forward for CPU:**
  1. **Build a custom PJRT CPU plugin** from OpenXLA source with the LAPACK wrappers linked in.
  2. **Wait for upstream** ‚Äî OpenXLA is tracking CPU custom-call registration APIs (see [openxla/xla#26928](https://github.com/openxla/xla/issues/26928)).

  ### CPU source code

  | File | Purpose |
  |------|---------|
  | `cbits/cpu/eigenhhlo_lapack.c` | LAPACK wrappers (`dpotrf`, `dgesvd`, `dgeqrf`/`dorgqr`, `dsyevd`, `dgetrf`) for XLA CPU ABI (`api_version = 2`) |
  | `cbits/cpu/build.sh` | Build script for `lib/libeigenhhlo_cpu.so` |
  | `lib/libeigenhhlo_cpu.so` | Output shared library (not usable until upstream support arrives) |

  ### Building the CPU library (optional)

  If you want to experiment with the CPU backend:

  ```bash
  # Prerequisites: LAPACK / OpenBLAS (liblapack.so.3, libopenblas.so.0)
  cd cbits/cpu && bash build.sh && cd ../..
  # Produces: lib/libeigenhhlo_cpu.so
  ```

  The Haskell API also exposes `withEigenCPU`, which resolves the library path via `EIGENHHLO_CPU_LIB` (environment variable) or the default `lib/libeigenhhlo_cpu.so`, following the same three-tier strategy as the GPU backend.

