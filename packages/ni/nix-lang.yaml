changelog: |
  # Revision history for nix-lang

  ## 0.1.0.0 -- 2026-07-05

  * First public release.
  * Added a parser and exact printer for the Nix language.
  * Added exact-print-preserving tree editing APIs.
  * Added a fresh syntax tree together with an RFC 166-oriented formatter.
changelog-type: markdown
description: "# nix-lang\n\n`nix-lang` is a parser, exact printer, and formatter for
  the Nix language built around a [Trees that Grow](https://gitlab.haskell.org/ghc/ghc/-/wikis/implementing-trees-that-grow/trees-that-grow-guidance)
  style AST. Inspired by [`ghc-exactprint`](https://hackage.haskell.org/package/ghc-exactprint),
  it supports lossless round-tripping for parsed source while preserving comments,
  formatting, and multiline structure after modifying the syntax tree. It also provides
  a fresh syntax tree for generated Nix code together with an RFC 166-oriented formatter
  for canonical output.\n\n`nix-lang-qq` provides quasiquoter for building fresh Nix
  expressions in Haskell file and supports embedding Haskell expressions.\n\n```haskell\nformatExpr
  [nixQQ| { value = 1; } |]\n  -- => {\n  --      value = 1; \n  --    }\nformatExpr
  [nixQQ| %%(foldl (\\acc _ -> mkApp (mkVar \"f\") acc) (mkVar \"x\") [1..10 :: Int])]\n
  \ -- => f (f (f (f (f (f (f (f (f (f x)))))))))\n```\n\n\n## Known unsupported syntax\n\nAlthough
  it now parses the entire nixpkgs, some valid syntax is not supported.\n\n* Legacy
  let\n\n```nix\nlet { x = 233; body = x; }\n```\n\n* Floating number starting with
  a decimal point\n\n```nix\n.233\n```\n\n* Chained has-attribute expressions\n\n```nix\na
  ? b ? c ? d\n```\n\n* Operator without white spaces\n\n```nix\n1+-1\n```\n"
