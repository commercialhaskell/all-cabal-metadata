  ## [0.1.0.0] - 2026-04-25

  Initial release. Conduit streaming adapter for
  [`valiant`](https://hackage.haskell.org/package/valiant). Exposes
  `selectSource` (cursor-based, requires a transaction) and
  `foldSource` (single-shot extended-protocol) as `ConduitT () r IO ()`
  producers.

