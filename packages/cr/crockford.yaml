description: |-
  An implementation of Douglas Crockford's base32 encoding, a textual 32-symbol notation for
  expressing numbers in a form that can be conveniently and accurately transmitted between humans
  and computer systems. It uses a set of 32 symbols (0-9 and A-Z, excluding I, L, O, and U) to
  represent numbers in a compact and human-friendly way.
