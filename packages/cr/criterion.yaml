changelog: |
  1.6.5.0

  * Make the test suite work with `tasty-1.5.4` or later.
  * Remove unused `parsec`, `time`, and `vector-algorithms` dependencies.

  1.6.4.1

  * Merge tutorial into README.

  1.6.4.0

  * Drop support for pre-8.0 versions of GHC.

  1.6.3.0

  * Remove a use of the partial `head` function within `criterion`.

  1.6.2.0

  * Require `optparse-applicative-0.18.*` as the minimum and add an explicit
    dependency on `prettyprinter` and `prettyprinter-ansi-terminal`.

  1.6.1.0

  * Support building with `optparse-applicative-0.18.*`.

  1.6.0.0

  * `criterion-measurement-0.2.0.0` adds the `measPeakMbAllocated` field to
    `Measured` for reporting maximum megabytes allocated. Since `criterion`
    re-exports `Measured` from `Criterion.Types`, this change affects `criterion`
    as well. Naturally, this affects the behavior of `Measured`'s `{To,From}JSON`
    and `Binary` instances.
  * Fix a bug in which the `--help` text for the `--match` option was printed
    twice in `criterion` applications.

  1.5.13.0

  * Allow building with `optparse-applicative-0.17.*`.

  1.5.12.0

  * Fix a bug introduced in version 1.5.9.0 in which benchmark names that include
    double quotes would produce broken HTML reports.

  1.5.11.0

  * Allow building with `aeson-2.0.0.0`.

  1.5.10.0

  * Fix a bug in which the `defaultMainWith` function would not use the
    `regressions` values specified in the `Config` argument. This bug only
    affected `criterion` the library—uses of the `--regressions` flag from
    `criterion` executables themselves were unaffected.

  1.5.9.0

  * Fix a bug where HTML reports failed to escape JSON properly.

  1.5.8.0

  * The HTML reports have been reworked.

    * The `flot` plotting library (`js-flot` on Hackage) has been replaced by
      `Chart.js` (`js-chart`).
    * Most practical changes focus on improving the functionality of the overview
      chart:
      * It now supports logarithmic scale (#213). The scale can be toggled by
        clicking the x-axis.
      * Manual zooming has been replaced by clicking to focus a single bar.
      * It now supports a variety of sort orders.
      * The legend can now be toggled on/off and is hidden by default.
      * Clicking the name of a group in the legend shows/hides all bars in that
        group.
    * The regression line on the scatter plot shows confidence interval.
    * Better support for mobile and print.
    * JSON escaping has been made more robust by no longer directly injecting
      reports as JavaScript code.

  1.5.7.0

  * Warn if an HTML report name contains newlines, and replace newlines with
    whitespace to avoid syntax errors in the report itself.

  1.5.6.2

  * Use unescaped HTML in the `json.tpl` template.

  1.5.6.1

  * Bundle `criterion-examples`' `LICENSE` file.

  1.5.6.0

  * Allow building with `base-compat-batteries-0.11`.

  1.5.5.0

  * Fix the build on old GHCs with the `embed-data-files` flag.
  * Require `transformers-compat-0.6.4` or later.

  1.5.4.0

  * Add `parserWith`, which allows creating a `criterion` command-line interface
    using a custom `optparse-applicative` `Parser`. This is usefule for sitations
    where one wants to add additional command-line arguments to the default ones
    that `criterion` provides.

    For an example of how to use `parserWith`, refer to
    `examples/ExtensibleCLI.hs`.

  * Tweak the way the graph in the HTML overview zooms:

    * Zooming all the way out resets to the default view (instead of continuing
      to zoom out towards empty space).
    * Panning all the way to the right resets to the default view in which zero
      is left-aligned (instead of continuing to pan off the edge of the graph).
    * Panning and zooming only affecs the x-axis, so all results remain in-frame.

  1.5.3.0

  * Make more functions (e.g., `runMode`) able to print the `µ` character on
    non-UTF-8 encodings.

  1.5.2.0

  * Fix a bug in which HTML reports would render incorrectly when including
    benchmark names containing apostrophes.

  * Only incur a dependency on `fail` on old GHCs.

  1.5.1.0

  * Add a `MonadFail Criterion` instance.

  * Add some documentation in `Criterion.Main` about `criterion-measurement`'s
    new `nfAppIO` and `whnfAppIO` functions, which `criterion` reexports.

  1.5.0.0

  * Move the measurement functionality of `criterion` into a standalone package,
    `criterion-measurement`. In particular, `cbits/` and `Criterion.Measurement`
    are now in `criterion-measurement`, along with the relevant definitions of
    `Criterion.Types` and `Criterion.Types.Internal` (both of which are now under
    the `Criterion.Measurement.*` namespace).
    Consequently, `criterion` now depends on `criterion-measurement`.

    This will let other libraries (e.g. alternative statistical analysis
    front-ends) to import the measurement functionality alone as a lightweight
    dependency.

  * Fix a bug on macOS and Windows where using `runAndAnalyse` and other
    lower-level benchmarking functions would result in an infinite loop.

  1.4.1.0

  * Use `base-compat-batteries`.

  1.4.0.0

  * We now do three samples for statistics:

    * `performMinorGC` before the first sample, to ensure it's up to date.
    * Take another sample after the action, without a garbage collection, so we
      can gather legitimate readings on GC-related statistics.
    * Then `performMinorGC` and sample once more, so we can get up-to-date
      readings on other metrics.

    The type of `applyGCStatistics` has changed accordingly. Before, it was:

    ```haskell
       Maybe GCStatistics -- ^ Statistics gathered at the end of a run.
    -> Maybe GCStatistics -- ^ Statistics gathered at the beginning of a run.
    -> Measured -> Measured
    ```

    Now, it is:

    ```haskell
       Maybe GCStatistics -- ^ Statistics gathered at the end of a run, post-GC.
    -> Maybe GCStatistics -- ^ Statistics gathered at the end of a run, pre-GC.
    -> Maybe GCStatistics -- ^ Statistics gathered at the beginning of a run.
    -> Measured -> Measured
    ```

    When diffing `GCStatistics` in `applyGCStatistics`, we carefully choose
    whether to diff against the end stats pre- or post-GC.

  * Use `performMinorGC` rather than `performGC` to update garbage collection
    statistics. This improves the benchmark performance of fast functions on large
    objects.

  * Fix a bug in the `ToJSON Measured` instance which duplicated the
    mutator CPU seconds where GC CPU seconds should go.

  * Fix a bug in sample analysis which incorrectly accounted for overhead
    causing runtime errors and invalid results. Accordingly, the buggy
    `getOverhead` function has been removed.

  * Fix a bug in `Measurement.measure` which inflated the reported time taken
    for `perRun` benchmarks.

  * Reduce overhead of `nf`, `whnf`, `nfIO`, and `whnfIO` by removing allocation
    from the central loops.

  1.3.0.0

  * `criterion` was previously reporting the following statistics incorrectly
    on GHC 8.2 and later:

    * `gcStatsBytesAllocated`
    * `gcStatsBytesCopied`
    * `gcStatsGcCpuSeconds`
    * `gcStatsGcWallSeconds`

    This has been fixed.

  * The type signature of `runBenchmarkable` has changed from:

    ```haskell
    Benchmarkable -> Int64 -> (a -> a -> a) -> (IO () -> IO a) -> IO a
    ```

    to:

    ```haskell
    Benchmarkable -> Int64 -> (a -> a -> a) -> (Int64 -> IO () -> IO a) -> IO a
    ```

    The extra `Int64` argument represents how many iterations are being timed.

  * Remove the deprecated `getGCStats` and `applyGCStats` functions (which have
    been replaced by `getGCStatistics` and `applyGCStatistics`).
  * Remove the deprecated `forceGC` field of `Config`, as well as the
    corresponding `--no-gc` command-line option.
  * The header in generated JSON output mistakenly used the string `"criterio"`.
    This has been corrected to `"criterion"`.

  1.2.6.0

  * Add error bars and zoomable navigation to generated HTML report graphs.

    (Note that there have been reports that this feature can be somewhat unruly
    when using macOS and Firefox simultaneously. See
    https://github.com/flot/flot/issues/1554 for more details.)

  * Use a predetermined set of cycling colors for benchmark groups in HTML
    reports. This avoids a bug in earlier versions of `criterion` where benchmark
    group colors could be chosen that were almost completely white, which made
    them impossible to distinguish from the background.

  1.2.5.0

  * Add an `-fembed-data-files` flag. Enabling this option will embed the
    `data-files` from `criterion.cabal` directly into the binary, producing
    a relocatable executable. (This has the downside of increasing the binary
    size significantly, so be warned.)

  1.2.4.0

  * Fix issue where `--help` would display duplicate options.

  1.2.3.0

  * Add a `Semigroup` instance for `Outliers`.

  * Improve the error messages that are thrown when forcing nonexistent
    benchmark environments.

  * Explicitly mark `forceGC` as deprecated. `forceGC` has not had any effect
    for several releases, and it will be removed in the next major `criterion`
    release.

  1.2.2.0

  * Important bugfix: versions 1.2.0.0 and 1.2.1.0 were incorrectly displaying
    the lower and upper bounds for measured values on HTML reports.

  * Have `criterion` emit warnings if suspicious things happen during mustache
    template substitution when creating HTML reports. This can be useful when
    using custom templates with the `--template` flag.

  1.2.1.0

  * Add `GCStatistics`, `getGCStatistics`, and `applyGCStatistics` to
    `Criterion.Measurement`. These are inteded to replace `GCStats` (which has
    been deprecated in `base` and will be removed in GHC 8.4), as well as
    `getGCStats` and `applyGCStats`, which have also been deprecated and will be
    removed in the next major `criterion` release.

  * Add new matchers for the `--match` flag:
    * `--match pattern`, which matches by searching for a given substring in
      benchmark paths.
    * `--match ipattern`, which is like `--match pattern` but case-insensitive.

  * Export `Criterion.Main.Options.config`.

  * Export `Criterion.toBenchmarkable`, which behaves like the `Benchmarkable`
    constructor did prior to `criterion-1.2.0.0`.

  1.2.0.0

  * Use `statistics-0.14`.

  * Replace the `hastache` dependency with `microstache`.

  * Add support for per-run allocation/cleanup of the environment with
    `perRunEnv` and `perRunEnvWithCleanup`,

  * Add support for per-batch allocation/cleanup with
    `perBatchEnv` and `perBatchEnvWithCleanup`.

  * Add `envWithCleanup`, a variant of `env` with cleanup support.

  * Add the `criterion-report` executable, which creates reports from previously
    created JSON files.

  1.1.4.0

  * Unicode output is now correctly printed on Windows.

  * Add Safe Haskell annotations.

  * Add `--json` option for writing reports in JSON rather than binary
    format.  Also: various bugfixes related to this.

  * Use the `js-jquery` and `js-flot` libraries to substitute in JavaScript code
    into the default HTML report template.

  * Use the `code-page` library to ensure that `criterion` prints out Unicode
    characters (like ², which `criterion` uses in reports) in a UTF-8-compatible
    code page on Windows.

  * Give an explicit implementation for `get` in the `Binary Regression`
    instance. This should fix sporadic `criterion` failures with older versions
    of `binary`.

  * Use `tasty` instead of `test-framework` in the test suites.

  * Restore support for 32-bit Intel CPUs.

  * Restore build compatibilty with GHC 7.4.

  1.1.1.0

  * If a benchmark uses `Criterion.env` in a non-lazy way, and you try
    to use `--list` to list benchmark names, you'll now get an
    understandable error message instead of something cryptic.

  * We now flush stdout and stderr after printing messages, so that
    output is printed promptly even when piped (e.g. into a pager).

  * A new function `runMode` allows custom benchmarking applications to
    run benchmarks with control over the `Mode` used.

  * Added support for Linux on non-Intel CPUs.

  * This version supports GHC 8.

  * The `--only-run` option for benchmarks is renamed to `--iters`.

  1.1.0.0

  * The dependency on the either package has been dropped in favour of a
    dependency on transformers-compat.  This greatly reduces the number
    of packages criterion depends on.  This shouldn't affect the
    user-visible API.

  * The documentation claimed that environments were created only when
    needed, but this wasn't implemented. (gh-76)

  * The package now compiles with GHC 7.10.

  * On Windows with a non-Unicode code page, printing results used to
    cause a crash.  (gh-55)

  1.0.2.0

  * Bump lower bound on optparse-applicative to 0.11 to handle yet more
    annoying API churn.

  1.0.1.0

  * Added a lower bound of 0.10 on the optparse-applicative dependency,
    as there were major API changes between 0.9 and 0.10.
changelog-type: markdown
description: "# Criterion: robust, reliable performance measurement\n\n[![Hackage](https://img.shields.io/hackage/v/criterion.svg)](https://hackage.haskell.org/package/criterion)
  [![Build Status](https://github.com/haskell/criterion/workflows/Haskell-CI/badge.svg)](https://github.com/haskell/criterion/actions?query=workflow%3AHaskell-CI)\n\n`criterion`
  is a library that makes accurate microbenchmarking in\nHaskell easy.\n\n<a href=\"https://hackage.haskell.org/package/criterion/src/www/fibber.html\"
  target=\"_blank\"><img src=\"https://hackage.haskell.org/package/criterion/src/www/fibber-screenshot.png\"></a>\n\n\n##
  Features\n\n* The simple API hides a lot of automation and details that you\n  shouldn't
  need to worry about.\n\n* Sophisticated, high-resolution analysis which can accurately
  measure\n  operations that run in as little as a few hundred picoseconds.\n\n* [Output
  to active HTML](https://hackage.haskell.org/package/criterion/src/www/report.html)
  (with JavaScript charts), CSV,\n  and JSON. Write your own report templates to customize
  exactly how\n  your results are presented.\n\n* Linear regression model that allows
  measuring the effects of garbage\n  collection and other factors.\n\n* Measurements
  are cross-validated to ensure that sources of\n  significant noise (usually other
  activity on the system) can be\n  identified.\n\n\nTo get started, read the [tutorial
  below](#tutorial), and take a look\nat the programs in the [examples\ndirectory](https://github.com/haskell/criterion/tree/master/examples).\n\n\n##
  Credits and contacts\n\nThis library is written by Bryan O'Sullivan\n(<bos@serpentine.com>)
  and maintained by Ryan Scott (<ryan.gl.scott@gmail.com>).\nPlease report bugs via
  the\n[GitHub issue tracker](https://github.com/haskell/criterion/issues).\n\n\n#
  Tutorial\n\n\n## Getting started\n\nHere's `Fibber.hs`: a simple and complete benchmark,
  measuring the performance of\nthe ever-ridiculous `fib` function.\n\n```haskell\n{-
  cabal:\nbuild-depends: base, criterion\n-}\n\nimport Criterion.Main\n\n-- The function
  we're benchmarking.\nfib :: Int -> Int\nfib m | m < 0     = error \"negative!\"\n
  \     | otherwise = go m\n  where\n    go 0 = 0\n    go 1 = 1\n    go n = go (n
  - 1) + go (n - 2)\n\n-- Our benchmark harness.\nmain = defaultMain [\n  bgroup \"fib\"
  [ bench \"1\"  $ whnf fib 1\n               , bench \"5\"  $ whnf fib 5\n               ,
  bench \"9\"  $ whnf fib 9\n               , bench \"11\" $ whnf fib 11\n               ]\n
  \ ]\n```\n([examples/Fibber.hs](https://github.com/haskell/criterion/blob/master/examples/Fibber.hs))\n\nThe\n[`defaultMain`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:defaultMain)\nfunction
  takes a list of\n[`Benchmark`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#t:Benchmark)\nvalues,
  each of which describes a function to benchmark.  (We'll come\nback to `bench` and
  `whnf` shortly, don't worry.)\n\nTo maximise our convenience, `defaultMain` will
  parse command line\narguments and then run any benchmarks we ask. Let's run our
  benchmark\nprogram (it might take some time if you never used Criterion before,
  since\nthe library has to be downloaded and compiled).\n\n```\n$ cabal run Fibber.hs\nbenchmarking
  fib/1\ntime                 13.77 ns   (13.49 ns .. 14.07 ns)\n                     0.998
  R²   (0.997 R² .. 1.000 R²)\nmean                 13.56 ns   (13.49 ns .. 13.70
  ns)\nstd dev              305.1 ps   (64.14 ps .. 532.5 ps)\nvariance introduced
  by outliers: 36% (moderately inflated)\n\nbenchmarking fib/5\ntime                 173.9
  ns   (172.8 ns .. 175.6 ns)\n                     1.000 R²   (0.999 R² .. 1.000
  R²)\nmean                 173.8 ns   (173.1 ns .. 175.4 ns)\nstd dev              3.149
  ns   (1.842 ns .. 5.954 ns)\nvariance introduced by outliers: 23% (moderately inflated)\n\nbenchmarking
  fib/9\ntime                 1.219 μs   (1.214 μs .. 1.228 μs)\n                     1.000
  R²   (1.000 R² .. 1.000 R²)\nmean                 1.219 μs   (1.216 μs .. 1.223
  μs)\nstd dev              12.43 ns   (9.907 ns .. 17.29 ns)\n\nbenchmarking fib/11\ntime
  \                3.253 μs   (3.246 μs .. 3.260 μs)\n                     1.000 R²
  \  (1.000 R² .. 1.000 R²)\nmean                 3.248 μs   (3.243 μs .. 3.254 μs)\nstd
  dev              18.94 ns   (16.57 ns .. 21.95 ns)\n\n```\n\nEven better, the `--output`
  option directs our program to write a\nreport to the file [`fibber.html`](fibber.html).\n\n```shellsession\n$
  cabal run Fibber.hs -- --output fibber.html\n...similar output as before...\n```\n\nClick
  on the image to see a complete report. If you mouse over the data\npoints in the
  charts, you'll see that they are *live*, giving additional\ninformation about what's
  being displayed.\n\n<a href=\"https://hackage.haskell.org/package/criterion/src/www/fibber.html\"
  target=\"_blank\"><img src=\"https://hackage.haskell.org/package/criterion/src/www/fibber-screenshot.png\"></a>\n\n\n###
  Understanding charts\n\nA report begins with a summary of all the numbers measured.\nUnderneath
  is a breakdown of every benchmark, each with two charts and\nsome explanation.\n\nThe
  chart on the left is a\n[kernel density estimate](https://en.wikipedia.org/wiki/Kernel_density_estimation)\n(also
  known as a KDE) of time measurements.  This graphs the\n*probability* of any given
  time measurement occurring.  A spike\nindicates that a measurement of a particular
  time occurred; its height\nindicates how often that measurement was repeated.\n\n>
  [!NOTE]\n> **Why not use a histogram?**\n> \n> A more popular alternative to the
  KDE for this kind of display is the\n> [histogram](https://en.wikipedia.org/wiki/Histogram).
  \ Why do we use a\n> KDE instead?  In order to get good information out of a histogram,
  you\n> have to\n> [choose a suitable bin size](https://en.wikipedia.org/wiki/Histogram#Number_of_bins_and_width).\n>
  This is a fiddly manual task.  In contrast, a KDE is likely to be\n> informative
  immediately, with no configuration required.\n\nThe chart on the right contains
  the raw measurements from which the\nkernel density estimate was built. The $x$
  axis indicates the number\nof loop iterations, while the $y$ axis shows measured
  execution time\nfor the given number of iterations. The line “behind” the values
  is a\nlinear regression generated from this data.  Ideally, all measurements\nwill
  be on (or very near) this line.\n\n\n### Understanding the data under a chart\n\nUnderneath
  the chart for each benchmark is a small table of\ninformation that looks like this.\n\n|
  \                     | lower bound | estimate   | upper bound |\n|----------------------|-------------|------------|-------------|\n|
  OLS regression       | 31.0 ms     | 37.4 ms    | 42.9 ms     |\n| R² goodness-of-fit
  \  | 0.887       | 0.942      | 0.994       |\n| Mean execution time  | 34.8 ms
  \    | 37.0 ms    | 43.1 ms     |\n| Standard deviation   | 2.11 ms     | 6.49 ms
  \   | 11.0 ms     |\n\nThe second row is the result of a linear regression run on
  the measurements displayed in the right-hand chart.\n\n* “**OLS regression**” estimates
  the time needed for a single\n  execution of the activity being benchmarked, using
  an\n  [ordinary least-squares regression model](https://en.wikipedia.org/wiki/Ordinary_least_squares).\n
  \ This number should be similar to the “mean execution time” row a\n  couple of
  rows beneath.  The OLS estimate is usually more accurate\n  than the mean, as it
  more effectively eliminates measurement\n  overhead and other constant factors.\n\n*
  “**R² goodness-of-fit**” is a measure of how accurately the linear\n  regression
  model fits the observed measurements. If the measurements\n  are not too noisy,
  R² should lie between 0.99 and 1, indicating an\n  excellent fit. If the number
  is below 0.99, something is confounding\n  the accuracy of the linear model.  A
  value below 0.9 is outright\n  worrisome.\n\n* “**Mean execution time**” and “**Standard
  deviation**” are\n  statistics calculated (more or less) from execution time divided
  by\n  number of iterations.\n\nOn either side of the main column of values are greyed-out
  lower and\nupper bounds.  These measure the *accuracy* of the main estimate using\na
  statistical technique called\n[*bootstrapping*](https://en.wikipedia.org/wiki/Bootstrapping_(statistics)).
  This\ntells us that when randomly resampling the data, 95% of estimates fell\nwithin
  between the lower and upper bounds.  When the main estimate is\nof good quality,
  the lower and upper bounds will be close to its\nvalue.\n\n\n## Reading command
  line output\n\nBefore you look at HTML reports, you'll probably start by inspecting\nthe
  report that criterion prints in your terminal window.\n\n```\nbenchmarking ByteString/HashMap/random\ntime
  \                4.046 ms   (4.020 ms .. 4.072 ms)\n                     1.000 R²
  \  (1.000 R² .. 1.000 R²)\nmean                 4.017 ms   (4.010 ms .. 4.027 ms)\nstd
  dev              27.12 μs   (20.45 μs .. 38.17 μs)\n```\n\nThe first column is a
  name; the second is an estimate. The third and\nfourth, in parentheses, are the
  95% lower and upper bounds on the\nestimate.\n\n* `time` corresponds to the “OLS
  regression” field in the HTML table\n  above.\n\n* `R²` is the goodness-of-fit metric
  for `time`.\n\n* `mean` and `std dev` have the same meanings as “Mean execution
  time”\n  and “Standard deviation” in the HTML table.\n\n\n## How to write a benchmark
  suite\n\nA criterion benchmark suite consists of a series of\n[`Benchmark`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#t:Benchmark)\nvalues.\n\n```haskell\nmain
  = defaultMain [\n  bgroup \"fib\" [ bench \"1\"  $ whnf fib 1\n               ,
  bench \"5\"  $ whnf fib 5\n               , bench \"9\"  $ whnf fib 9\n               ,
  bench \"11\" $ whnf fib 11\n               ]\n  ]\n```\n\n\nWe group related benchmarks
  together using the\n[`bgroup`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:bgroup)\nfunction.
  \ Its first argument is a name for the group of benchmarks.\n\n```haskell\nbgroup
  :: String -> [Benchmark] -> Benchmark\n```\n\nAll the magic happens with the\n[`bench`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:bench)\nfunction.
  \ The first argument to `bench` is a name that describes the\nactivity we're benchmarking.\n\n```haskell\nbench
  :: String -> Benchmarkable -> Benchmark\nbench = Benchmark\n```\n\nThe\n[`Benchmarkable`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#t:Benchmarkable)\ntype
  is a container for code that can be benchmarked.\n\nBy default, criterion allows
  two kinds of code to be benchmarked.\n\n* Any `IO` action can be benchmarked directly.\n\n*
  With a little trickery, we can benchmark pure functions.\n\n\n### Benchmarking an
  `IO` action\n\nThis function shows how we can benchmark an `IO` action.\n\n```haskell\nimport
  Criterion.Main\n\nmain = defaultMain [\n    bench \"readFile\" $ nfIO (readFile
  \"GoodReadFile.hs\")\n  ]\n```\n([examples/GoodReadFile.hs](https://github.com/haskell/criterion/blob/master/examples/GoodReadFile.hs))\n\nWe
  use\n[`nfIO`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:nfIO)\nto
  specify that after we run the `IO` action, its result must be\nevaluated to <span
  id=\"normal-form\">normal form</span>, i.e. so that\nall of its internal constructors
  are fully evaluated, and it contains\nno thunks.\n\n```haskell\nnfIO :: NFData a
  => IO a -> Benchmarkable\n```\n\nRules of thumb for when to use `nfIO`:\n\n* Any
  time that lazy I/O is involved, use `nfIO` to avoid resource\n  leaks.\n\n* If you're
  not sure how much evaluation will have been performed on\n  the result of an action,
  use `nfIO` to be certain that it's fully\n  evaluated.\n\n\n### `IO` and `seq`\n\nIn
  addition to `nfIO`, criterion provides a\n[`whnfIO`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:whnfIO)\nfunction
  that evaluates the result of an action only deep enough for\nthe outermost constructor
  to be known (using `seq`).  This is known as\n<span id=\"weak-head-normal-form\">**weak
  head normal form** (WHNF)</span>.\n\n```haskell\nwhnfIO :: IO a -> Benchmarkable\n```\n\nThis
  function is useful if your `IO` action returns a simple value\nlike an `Int`, or
  something more complex like a\n[`Map`](http://hackage.haskell.org/package/containers/docs/Data-Map-Lazy.html#t:Map)\nwhere
  evaluating the outermost constructor will do “enough work”.\n\n\n## Be careful with
  lazy I/O!\n\nExperienced Haskell programmers don't use lazy I/O very often, and\nhere's
  an example of why: if you try to run the benchmark below, it\nwill probably *crash*.\n\n```haskell\nimport
  Criterion.Main\n\nmain = defaultMain [\n    bench \"whnfIO readFile\" $ whnfIO (readFile
  \"BadReadFile.hs\")\n  ]\n```\n([examples/BadReadFile.hs](https://github.com/haskell/criterion/blob/master/examples/BadReadFile.hs))\n\nThe
  reason for the crash is that `readFile` reads the contents of a\nfile lazily: it
  can't close the file handle until whoever opened the\nfile reads the whole thing.
  \ Since `whnfIO` only evaluates the very\nfirst constructor after the file is opened,
  the benchmarking loop\ncauses a large number of open files to accumulate, until
  the\ninevitable occurs:\n\n```shellsession\n$ ./BadReadFile\nbenchmarking whnfIO
  readFile\nopenFile: resource exhausted (Too many open files)\n```\n\n\n## Beware
  “pretend” I/O!\n\nGHC is an aggressive compiler.  If you have an `IO` action that\ndoesn't
  really interact with the outside world, *and* it has just the\nright structure,
  GHC may notice that a substantial amount of its\ncomputation can be memoised via
  “let-floating”.\n\nThere exists a\n[somewhat contrived example](https://github.com/haskell/criterion/blob/master/examples/ConduitVsPipes.hs)\nof
  this problem, where the first two benchmarks run between 40 and\n40,000 times faster
  than they “should”.\n\nAs always, if you see numbers that look wildly out of whack,
  you\nshouldn't rejoice that you have magically achieved fast\nperformance—be skeptical
  and investigate!\n\n\n> [!TIP]\n> **Defeating let-floating**\n> \n> Fortunately
  for this particular misbehaving benchmark suite, GHC has\n> an option named\n> [`-fno-full-laziness`](https://downloads.haskell.org/ghc/latest/docs/users_guide/using-optimisation.html#ghc-flag-ffull-laziness)\n>
  that will turn off let-floating and restore the first two benchmarks\n> to performing
  in line with the second two.\n>\n> You should not react by simply throwing `-fno-full-laziness`
  into\n> every GHC-and-criterion command line, as let-floating helps with\n> performance
  more often than it hurts with benchmarking.\n\n\n## Benchmarking pure functions\n\nLazy
  evaluation makes it tricky to benchmark pure code. If we tried to\nsaturate a function
  with all of its arguments and evaluate it\nrepeatedly, laziness would ensure that
  we'd only do “real work” the\nfirst time through our benchmarking loop.  The expression
  would be\noverwritten with that result, and no further work would happen on\nsubsequent
  loops through our benchmarking harness.\n\nWe can defeat laziness by benchmarking
  an *unsaturated* function—one\nthat has been given *all but one* of its arguments.\n\nThis
  is why the\n[`nf`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:nf)\nfunction
  accepts two arguments: the first is the almost-saturated\nfunction we want to benchmark,
  and the second is the final argument to\ngive it.\n\n```haskell\nnf :: NFData b
  => (a -> b) -> a -> Benchmarkable\n```\n\nAs the\n[`NFData`](http://hackage.haskell.org/package/deepseq/docs/Control-DeepSeq.html#t:NFData)\nconstraint
  suggests, `nf` applies the argument to the function, then\nevaluates the result
  to <a href=\"#normal-form\">normal form</a>.\n\nThe\n[`whnf`](http://hackage.haskell.org/package/criterion/docs/Criterion-Main.html#v:whnf)\nfunction
  evaluates the result of a function only to <a\nhref=\"#weak-head-normal-form\">weak
  head normal form</a> (WHNF).\n\n```haskell\nwhnf :: (a -> b) -> a -> Benchmarkable\n```\n\nIf
  we go back to our first example, we can now fully understand what's\ngoing on.\n\n```haskell\nmain
  = defaultMain [\n  bgroup \"fib\" [ bench \"1\"  $ whnf fib 1\n               ,
  bench \"5\"  $ whnf fib 5\n               , bench \"9\"  $ whnf fib 9\n               ,
  bench \"11\" $ whnf fib 11\n               ]\n  ]\n```\n([examples/Fibber.hs](https://github.com/haskell/criterion/blob/master/examples/Fibber.hs))\n\nWe
  can get away with using `whnf` here because we know that an\n`Int` has only one
  constructor, so there's no deeper buried\nstructure that we'd have to reach using
  `nf`.\n\nAs with benchmarking `IO` actions, there's no clear-cut case for when\nto
  use `whfn` versus `nf`, especially when a result may be lazily\ngenerated.\n\nGuidelines
  for thinking about when to use `nf` or `whnf`:\n\n* If a result is a lazy structure
  (or a mix of strict and lazy, such\n  as a balanced tree with lazy leaves), how
  much of it would a\n  real-world caller use?  You should be trying to evaluate as
  much of\n  the result as a realistic consumer would.  Blindly using `nf` could\n
  \ cause way too much unnecessary computation.\n\n* If a result is something simple
  like an `Int`, you're probably safe\n  using `whnf`—but then again, there should
  be no additional cost to\n  using `nf` in these cases.\n\n\n## Using the criterion
  command line\n\nBy default, a criterion benchmark suite simply runs all of its\nbenchmarks.
  \ However, criterion accepts a number of arguments to\ncontrol its behaviour.  Run
  your program with `--help` for a complete\nlist.\n\n\n### Specifying benchmarks
  to run\n\nThe most common thing you'll want to do is specify which benchmarks\nyou
  want to run.  You can do this by simply enumerating each\nbenchmark.\n\n```shellsession\n$
  ./Fibber 'fib/fib 1'\n```\n\nBy default, any names you specify are treated as prefixes
  to match, so\nyou can specify an entire group of benchmarks via a name like\n`\"fib/\"`.
  \ Use the `--match` option to control this behaviour. There are\ncurrently four
  ways to configure `--match`:\n\n* `--match prefix`: Check if the given string is
  a prefix of a benchmark\n  path. For instance, `\"foo\"` will match `\"foobar\"`.\n\n*
  `--match glob`: Use the given string as a Unix-style glob pattern. Bear in\n  mind
  that performing a glob match on benchmarks names is done as if they were\n  file
  paths, so for instance both `\"*/ba*\"` and `\"*/*\"` will match `\"foo/bar\"`,\n
  \ but neither `\"*\"` nor `\"*bar\"` will match `\"foo/bar\"`.\n\n* `--match pattern`:
  Check if the given string is a substring (not necessarily\n  just a prefix) of a
  benchmark path. For instance `\"ooba\"` will match\n  `\"foobar\"`.\n\n* `--match
  ipattern`: Check if the given string is a substring (not necessarily\n  just a prefix)
  of a benchmark path, but in a case-insensitive fashion. For\n  instance, `\"oObA\"`
  will match `\"foobar\"`.\n\n### Listing benchmarks\n\nIf you've forgotten the names
  of your benchmarks, run your program\nwith `--list` and it will print them all.\n\n\n###
  How long to spend measuring data\n\nBy default, each benchmark runs for 5 seconds.\n\nYou
  can control this using the `--time-limit` option, which specifies\nthe minimum number
  of seconds (decimal fractions are acceptable) that\na benchmark will spend gathering
  data.  The actual amount of time\nspent may be longer, if more data is needed.\n\n\n###
  Writing out data\n\nCriterion provides several ways to save data.\n\nThe friendliest
  is as HTML, using `--output`.  Files written using\n`--output` are actually generated
  from Mustache-style templates.  The\nonly other template provided by default is
  `json`, so if you run with\n`--template json --output mydata.json`, you'll get a
  big JSON dump of\nyour data.\n\nYou can also write out a basic CSV file using `--csv`,
  a JSON file using\n`--json`, and a JUnit-compatible XML file using `--junit`.  (The
  contents\nof these files are likely to change in the not-too-distant future.)\n\n\n##
  Linear regression\n\nIf you want to perform linear regressions on metrics other
  than\nelapsed time, use the `--regress` option.  This can be tricky to use\nif you
  are not familiar with linear regression, but here's a thumbnail\nsketch.\n\nThe
  purpose of linear regression is to predict how much one variable\n(the *responder*)
  will change in response to a change in one or more\nothers (the *predictors*).\n\nOn
  each step through a benchmark loop, criterion changes the number of\niterations.
  \ This is the most obvious choice for a predictor\nvariable.  This variable is named
  `iters`.\n\nIf we want to regress CPU time (`cpuTime`) against iterations, we can\nuse
  `cpuTime:iters` as the argument to `--regress`.  This generates\nsome additional
  output on the command line:\n\n```\ntime                 31.31 ms   (30.44 ms ..
  32.22 ms)\n                     0.997 R²   (0.994 R² .. 0.999 R²)\nmean                 30.56
  ms   (30.01 ms .. 30.99 ms)\nstd dev              1.029 ms   (754.3 μs .. 1.503
  ms)\n\ncpuTime:             0.997 R²   (0.994 R² .. 0.999 R²)\n  iters              3.129e-2
  \  (3.039e-2 .. 3.221e-2)\n  y                  -4.698e-3  (-1.194e-2 .. 1.329e-3)\n```\n\nAfter
  the block of normal data, we see a series of new rows.\n\nOn the first line of the
  new block is an R² goodness-of-fit measure,\nso we can see how well our choice of
  regression fits the data.\n\nOn the second line, we get the slope of the `cpuTime`/`iters`
  curve,\nor (stated another way) how much `cpuTime` each iteration costs.\n\nThe
  last entry is the $y$-axis intercept.\n\n\n### Measuring garbage collector statistics\n\nBy
  default, GHC does not collect statistics about the operation of its\ngarbage collector.
  \ If you want to measure and regress against GC\nstatistics, you must explicitly
  enable statistics collection at\nruntime using `+RTS -T`.\n\n\n### Useful regressions\n\n|
  regression                     | `--regress`        | notes\n| -------------------------------|-------------------
  |-----------\n| CPU cycles                     | `cycles:iters`     |\n| Bytes allocated
  \               | `allocated:iters`  | `+RTS -T`\n| Number of garbage collections
  \ | `numGcs:iters`     | `+RTS -T`\n| CPU frequency                  | `cycles:time`
  \     |\n\n\n## Tips, tricks, and pitfalls\n\nWhile criterion tries hard to automate
  as much of the benchmarking\nprocess as possible, there are some things you will
  want to pay\nattention to.\n\n* Measurements are only as good as the environment
  in which they're\n  gathered.  Try to make sure your computer is quiet when measuring\n
  \ data.\n\n* Be judicious in when you choose `nf` and `whnf`.  Always think about\n
  \ what the result of a function is, and how much of it you want to\n  evaluate.\n\n*
  Simply rerunning a benchmark can lead to variations of a few percent\n  in numbers.
  \ This variation can have many causes, including address\n  space layout randomization,
  recompilation between runs, cache\n  effects, CPU thermal throttling, and the phase
  of the moon.  Don't\n  treat your first measurement as golden!\n\n* Keep an eye
  out for completely bogus numbers, as in the case of\n  `-fno-full-laziness` above.\n\n*
  When you need trustworthy results from a benchmark suite, run each\n  measurement
  as a separate invocation of your program.  When you run\n  a number of benchmarks
  during a single program invocation, you will\n  sometimes see them interfere with
  each other.\n\n\n### How to sniff out bogus results\n\nIf some external factors
  are making your measurements noisy, criterion\ntries to make it easy to tell.  At
  the level of raw data, noisy\nmeasurements will show up as “outliers”, but you shouldn't
  need to\ninspect the raw data directly.\n\nThe easiest yellow flag to spot is the
  R² goodness-of-fit measure\ndropping below 0.9.  If this happens, scrutinise your
  data carefully.\n\nAnother easy pattern to look for is severe outliers in the raw\nmeasurement
  chart when you're using `--output`.  These should be easy\nto spot: they'll be points
  sitting far from the linear regression line\n(usually above it).\n\nIf the lower
  and upper bounds on an estimate aren't “tight” (close to\nthe estimate), this suggests
  that noise might be having some kind of\nnegative effect.\n\nA warning about “variance
  introduced by outliers” may be printed.\nThis indicates the degree to which the
  standard deviation is inflated\nby outlying measurements, as in the following snippet
  (notice that the\nlower and upper bounds aren't all that tight, too).\n\n```\nstd
  dev              652.0 ps   (507.7 ps .. 942.1 ps)\nvariance introduced by outliers:
  91% (severely inflated)\n```\n\n## Generating (HTML) reports from previous benchmarks
  with criterion-report\n\nIf you want to post-process benchmark data before generating
  a HTML report you\ncan use the `criterion-report` executable to generate HTML reports
  from\ncriterion generated JSON. To store the benchmark results run criterion with
  the\n`--json` flag to specify where to store the results. You can then use:\n`criterion-report
  data.json report.html` to generate a HTML report of the data.\n`criterion-report`
  also accepts the `--template` flag accepted by criterion.\n"
