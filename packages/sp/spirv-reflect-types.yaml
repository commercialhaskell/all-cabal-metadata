changelog: |
  # Changelog for spirv-reflect-types

  ## [0.4] - 2026-06-23

  * **Breaking:** minimum GHC raised to 9.2 (`base >= 4.16`).
  * Updated to `vulkan-sdk-1.4.350` (via `spirv-enum-1.104.350.0`).
  * `SpecializationConstant`: added `type_description` and `default_value` fields.
  * Added `GENERATOR_SLANG_SHADER_COMPILER`.
  * Fixed `TYPE_FLAG_REF` label (was aliased to `ARRAY`).

  [0.4]: https://gitlab.com/dpwiz/spirv-reflect/-/tree/v0.4-types

  ## [0.3] - 2024-07-07

  * Update types to accomodate `vulkan-sdk-1.3.283.0`.

  [0.3]: https://gitlab.com/dpwiz/spirv-reflect/-/tree/v0.3-types

  ## [0.2] - 2022-09-04

  * Update types to accomodate FFI loader.

  [0.2]: https://gitlab.com/dpwiz/spirv-reflect/-/tree/v0.2-types

  ## [0.1] - 2022-06-11

  * Initial release.

  [0.1]: https://gitlab.com/dpwiz/spirv-reflect/-/tree/v0.1-types
