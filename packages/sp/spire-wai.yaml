changelog: |
  # Revision history for spire-wai

  ## 0.1.0.1 -- 2026-04-28

  * Bump `cabal-version` to 3.12. Older `cabal-install` (shipped with
    GHC < 9.10) was parsing the file before rejecting it on
    `default-language: GHC2024`, producing PlanningFailed on
    Hackage's GHC 9.8 build matrix row. Bumping forces clean
    rejection on older toolchains. No code changes.

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Wai/warp adapter for spire Service values: turns a
    Service into a wai Application so it can run on the standard
    Haskell HTTP stack.
changelog-type: markdown
description: |-
  Bridges spire Services (using http-core types) to WAI Applications
  running on warp. This is the only package that imports WAI; everything
  above is backend-agnostic.
