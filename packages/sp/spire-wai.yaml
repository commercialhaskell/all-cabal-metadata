changelog: |
  # Revision history for spire-wai

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Wai/warp adapter for spire Service values: turns a
    Service into a wai Application so it can run on the standard
    Haskell HTTP stack.
changelog-type: markdown
description: |-
  Bridges spire Services (using http-core types) to WAI Applications
  running on warp. This is the only package that imports WAI; everything
  above is backend-agnostic.
