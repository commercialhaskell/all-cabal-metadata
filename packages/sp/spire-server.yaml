changelog: |
  # Revision history for spire-server

  ## 0.1.0.1 -- 2026-04-28

  * Bump `cabal-version` to 3.12. Older `cabal-install` (shipped with
    GHC < 9.10) was parsing the file before rejecting it on
    `default-language: GHC2024`, producing PlanningFailed on
    Hackage's GHC 9.8 build matrix row. Bumping forces clean
    rejection on older toolchains. No code changes.

  ## 0.1.0.0 -- 2026-04-27

  * Initial release. Hand-rolled HTTP server backend for spire: parses
    requests, dispatches to a Service, and renders responses without
    pulling in warp or wai.
changelog-type: markdown
description: |-
  A lightweight HTTP server that speaks spire Service directly.
  No WAI, no warp: just network sockets, HTTP parsing, and dispatch
  to @Service IO (Request Body) (Response Body)@.
  .
  Supports HTTP/1.1 (custom parser), HTTP/2 (via the @http2@ package),
  TLS with ALPN protocol negotiation, and automatic HTTP/1.1 vs HTTP/2
  detection.
  .
  Proves the zero-WAI path: the entire acolyte stack
  (including gRPC) can run without any WAI dependency.
