changelog: |
  # Changelog

  ## Unreleased

  ## 0.1.1.0 - 2026-06-28

  ### Changed

  - Refreshed internal `shikumi` and `shikumi-cache` bounds for the current package
    set.
  - Updated Postgres backend internals to match the record-patterns conventions
    used across the package set.

  ## 0.1.0.1 - 2026-06-21

  ### Changed

  - Constrained the test suite's baikai dependency to the 0.2 series and refreshed internal shikumi-cache bounds.

  ## 0.1.0.0 - 2026-06-13

  ### Added

  - Initial Hackage release of the PostgreSQL backend for shikumi-cache.
  - Postgres connection lifecycle helpers, table initialization, lookup, store, and cache interpreter support.
changelog-type: markdown
description: |-
  A PostgreSQL backend for shikumi's @Cache@ effect (EP-6), in a separate
  package so the @hasql@ client (and libpq) is only pulled in when used. Entries
  live in a @shikumi_cache(key text primary key, value jsonb, stored_at
  timestamptz)@ table, upserted on conflict; the value is the JSON of a
  @CachedResponse@ (the @Response@ round-trip comes from @shikumi-cache@'s
  @Shikumi.Cache.ResponseJSON@). The test uses @ephemeral-pg@ to spin up a
  throwaway server, so it needs no external database.
