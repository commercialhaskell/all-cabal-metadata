changelog: |
  # Changelog

  ## Unreleased

  ## 0.1.1.0 - 2026-06-28

  ### Added

  - `EvalConfig` now derives `Generic`.

  ### Changed

  - Refreshed the internal `shikumi` bound for the `0.2` series.

  ## 0.1.0.1 - 2026-06-21

  ### Changed

  - Constrained the baikai dependency to the 0.2 series and refreshed internal shikumi bounds.

  ## 0.1.0.0 - 2026-06-13

  ### Added

  - Initial Hackage release of typed evaluation for shikumi programs.
  - Dataset, example, prediction, metric, score, report, embedding, golden-test, usage, and bounded evaluation APIs.
changelog-type: markdown
description: |-
  The evaluation framework for shikumi: the owned data model (@Example@,
  @Prediction@, @Dataset@, @Metric@, @Score@, @Report@ — MasterPlan integration
  point #5), built-in pure and LM-backed metrics, an @evaluate@ runner that
  scores a 'Shikumi.Program.Program' over a typed dataset with bounded
  parallelism and per-example error boundaries, and golden testing that pins a
  program's behaviour deterministically under a mock or replayed LM.
