changelog: |
  # Version history for fedora-repoquery

  ## 0.9 (2026-06-26)
  - add `--all-epel` releases
  - c10s: use mirror.stream.centos.org
  - improve handling of archived epel major and minor releases
  - preliminary support for pre-stream centos
  - fedora updates Everything was introduced from F28
  - error for i386 arch unless epel6, f25, c7, or older
  - do not include i386 in `--all-archs` (regression in 0.8.2)

  ## 0.8.2 (2026-05-10)
  - `--all-archs`: also include source and i386
  - `--koji`: map epel10 to epel10.x
  - `--time` stamp: show warning if url does not exist (no Last-Modified)
  - replace EPELNext with EPEL9Next and EPEL10Dot with EpelMinor

  ## 0.8.1 (2026-03-14)
  - shorter query aliases: `--wd` (--whatdepends), `--wr` (--whatrequires),
    `-p` (--provides), `-r` (--requires), `--wp` (--whatprovides)
  - new `--cf` option: to use CloudFront cache as the mirror
  - `--help-dnf` now correctly provides repoquery --help

  ## 0.8 (2025-09-23)
  - rework dnf option handling with full parsing and completions:
    with free ordering of arguments, releases and options
  - no longer outputs "(using system repos)" when no release specified
  - `--list-releases` lists in order (was `--list`)
  - rename `--arch` to `--repo-arch`
  - new `--all-fedora` releases option
  - alias `--changelog` to `--changelogs`
  - `--queryformat` now accepts format alias 'default'
  - add `--help-dnf` option for 'dnf --help' output

  ## 0.7.4 (2025-08-16)
  - Query renderRepoConfig: disable skip_if_unavailable
  - Query: don't use dnf --quiet output for --debug

  ## 0.7.3 (2025-06-03)
  - fix the naming of koji dnf repos
  - flip the --dl and --debug short options
  - add --queryformat "n" abbreviation
  - support riscv64 repoqueries in fedora.riscv.rocks

  ## 0.7.2 (2025-05-08)
  - warn when no release specified
  - add support for epel10.x minor releases
  - also parse cNs (c8s, c9s, c10s)
  - use eln via download.fp.o (or dl.fp.o) and drop its channels
  - support short pneumonics for common queryformats (nv,nvr,nvra,envr,envra)
  - improve branched pre-release logic using fedora-releases for Bodhi API
  - drop head/tail usage

  ## 0.7.1 (2024-09-08)
  - fix for branched: "frozen" state is still in development/ like "pending"
  - enable updates-testing for fedora branched from Beta freeze
  - help: can use -- for system repoquery
  - only output "slow redirection" for debug
  - refactor eitherRelease with lower case
  - curl connection: timeout for Location redirect but not Last-Modified

  ## 0.7 (2024-07-18)
  - use curl library for HTTP instead of http-directory
  - rename the executable back to fedora-repoquery to avoid confusion with fedrq

  ## 0.6 (2024-07-16)
  - defaults to no datestamp output: --time replaces --no-check
  - further speed improvements by reducing http checks
  - map latest pending release version to fedora-rawhide
  - add --dynamic redirect to not re-use first mirror redirect
  - update c8s url to Centos Vault
  - drop dep on utility-ht just for spanJust

  ## 0.5 (2024-07-02)
  - allow multiple release args
  - with no release arg use system yum repos
  - add --quick to skip url http checks, also done when multiple releases
  - dnf5 --qf does not add "\n" so we do it if no trailing "space"
  - update cache dir commands to support also dnf5 xdg cache path
  - use dnf5 repoquery.cpp list of --qf conflicts

  ## 0.4 (2024-05-24)
  - add --dnf4 option to use dnf4 (actually /usr/bin/dnf-3) instead of dnf5
  - oldest and newest active releases are now determined/cached via Bodhi API
  - can now query with rawhide by version (eg 41 currently)
  - disable --qf for --requires
  - --list now only shows active fedora releases
  - for centos and eln only check compose for the BaseOS repo
  - map version 11 to eln

  ## 0.3.2 (2024-02-19)
  - enable centos 10 stream (still alpha)
  - Query: disable --qf for --provides
  - minor debug tweaks

  ## 0.3.1 (2024-02-12)
  - use dnf5 when available
  - add --all-archs to query across all 64bit architectures

  ## 0.3 (2023-11-09)
  - Query: no --qf with --changelog
  - small OS versions now map to centos-stream
  - use hostname not full url for mirror repo name
  - repo urls should end with a slash
  - improve tests to fail if no results
  - map failing yzyu.jp http/3 mirror to main one
  - development/39 also needs os/
  - showRelease: reformat Centos and ELN repos
  - default to system arch and introduce sysarch and march

  ## 0.2 (2023-05-12)
  - support fedora and epel testing repos
  - fix fedora archive urls
  - support querying epel6 and older archives
  - support fedora-secondary urls for ppc64le and s390x including archive
  - rename --test to --test-channel and --centos-devel to --devel-channel
  - expand help to cover RELEASE and add readme url

  ## 0.1.0 (2023-05-07)
  - initial release with support for fedora releases, epel, eln and centos stream
changelog-type: markdown
description: "# fedora-repoquery\n\nA dnf wrapper to repoquery different Fedora releases,\ncaching
  repodata separately per release.\nIt also supports EPEL, Centos Stream and ELN repos.\n\n##
  Usage\nUsage examples:\n\n`$ fedora-repoquery rawhide firefox`\n\n```\nfirefox-152.0-1.fc45.x86_64
  (fedora-rawhide)\n```\n(note it is shorter to write `fedora-repoquery 45`).\n\n`$
  fedora-repoquery 43 --requires filesystem`\n\n```\ngroup(mail)\nsetup\n```\n\n`$
  fedora-repoquery epel10 ghc`\n\n```\nghc-9.6.6-146.el10_0.x86_64 (epel10)\n```\n\n`$
  fedora-repoquery c10 bash`\n\n```\nbash-5.2.26-4.el10.x86_64 (c10s-BaseOS)\nbash-5.2.26-6.el10.x86_64
  (c10s-BaseOS)\n```\n\n`$ fedora-repoquery eln kernel`\n\n```\nkernel-7.1.0-0.rc3.260512g50897c955902.24.eln156.x86_64
  (eln-BaseOS)\n```\n\nWithout a release argument, the system yum repo configuration
  is used:\n\n`$ fedora-repoquery pandoc-cli`\n\n```\npandoc-cli-3.7.0.2-40.fc44.x86_64
  (rawhide)\n```\n\n`$ fedora-repoquery --whatrequires pandoc`\n\n```\nopenqa-devel-5^20260604git6376095-3.fc45.noarch
  (rawhide)\npandoc-pdf-3.7.0.2-40.fc44.x86_64 (rawhide)\npython3-pypandoc-1.17-2.fc45.noarch
  (rawhide)\n```\n\nUse the --time (-T) option to display repo timestamps:\n```\n$
  fedora-repoquery -T 43 fedrq\n2025-10-26 01:59:02 +08 <https://mirror.freedif.org/fedora/fedora/linux/releases/43/>\n2026-03-12
  09:53:14 +08 <https://mirror.freedif.org/fedora/fedora/linux/updates/43/>\n\nfedrq-1.5.0-5.fc43.noarch
  (f43)\n```\n\nRepo timestamp(s) are output when there are no query args\nafter the
  release version:\n\n`$ fedora-repoquery 44`\n\n```\n2026-04-24 23:40:25 +08 <https://mirror.freedif.org/fedora/fedora/linux/releases/44/>\n2026-06-26
  08:57:49 +08 <https://mirror.freedif.org/fedora/fedora/linux/updates/44/>\n```\n\nOne
  can also query multiple releases (or arch's):\n\n`$ fedora-repoquery 43 44 python3.x86_64`\n\n```\npython3-3.14.0-1.fc43.x86_64
  (f43)\npython3-3.14.5-1.fc43.x86_64 (f43-updates)\npython3-3.14.3-2.fc44.x86_64
  (f44)\npython3-3.14.6-1.fc44.x86_64 (f44-updates)\n```\n\nThere is an option to
  use the CloudFront cache:\n\n`$ fedora-repoquery --cf 44 rust`\n\n```\nrust-1.94.1-1.fc44.x86_64
  (f44-cf)\nrust-1.96.0-1.fc44.x86_64 (f44-updates-cf)\n```\nwhich may be faster than
  dl.fp.o and fresher than other mirrors sometimes.\n\nQuerying of epel10 minor versions
  is supported:\n`$ fedora-repoquery epel10.2 nix`\n\n```\nnix-2.24.15-2.el10_2.x86_64
  (epel10.2)\n```\n\n## Help\n`$ fedora-repoquery --version`\n\n```\n0.9\n```\n\n`$
  fedora-repoquery --help`\n\n```\nfedora-repoquery tool for querying Fedora repos
  for packages.\n\nUsage: fedora-repoquery [--version] [-4|--dnf4] [(-q|--quiet) |
  (-v|--verbose)] \n                        [--dynamic] [-T|--time] [-K|--koji] \n
  \                       [(-m|--mirror URL) | --cf | (-d|--dl)] \n                        [(-F|--all-fedora)
  | (-E|--all-epel)] \n                        [(-s|--source) | (-A|--all-archs) |
  \n                          [-a|--repo-arch ARCH]] [-t|--testing] [-D|--debug] \n
  \                       [(-z|--cache-size) | (-e|--cache-clean-empty) | \n                          --list-releases
  | --help-dnf | \n                          [--advisories ARG | --advisory-severities
  ARG | \n                            --arch ARG | --available | --bugfix | --bzs
  ARG | \n                            --cves ARG | --disable-modular-filtering | \n
  \                           --duplicates | --enhancement | --exactdeps | \n                            --extras
  | (-f|--file ARG) | --installed | \n                            --installed-from-repo
  ARG | --installonly | \n                            --latest-limit ARG | --leaves
  | --newpackage | \n                            --providers-of ARG | --recent | --recursive
  | \n                            --security | --srpm | --unneeded | --upgrades |
  \n                            --userinstalled | --whatconflicts ARG | \n                            (--wd|--whatdepends
  ARG) | --whatenhances ARG | \n                            --whatobsoletes ARG |
  (--whatprovides|--wp ARG) | \n                            --whatrecommends ARG |
  (--whatrequires|--wr ARG) | \n                            --whatsuggests ARG | --whatsupplements
  ARG | \n                            --conflicts | --depends | --enhances | --files
  | \n                            (-l|--list) | --obsoletes | (-p|--provides) | \n
  \                           --recommends | (-r|--requires) | --requires-pre | \n
  \                           --sourcerpm | --suggests | --supplements | \n                            --location
  | (-i|--info) | \n                            (--changelog|--changelogs) | --querytags
  | \n                            (--qf|--queryformat ARG)] \n                          [[RELEASE]...
  [REPOQUERY_OPTS]... [PKGSPECIFIER]...]]\n\n  where RELEASE is {fN or N (fedora),
  'rawhide', epelN, epel10.x, epel9-next, cN\n  (centos stream), 'eln'}, with N the
  release version number.\n  <https://github.com/juhp/fedora-repoquery#readme>\n\nAvailable
  options:\n  -h,--help                Show this help text\n  --version                Show
  version\n  -4,--dnf4                Use dnf4 instead of dnf5 (if available)\n  -q,--quiet
  \              Avoid output to stderr\n  -v,--verbose             Show stderr from
  dnf repoquery\n  --dynamic                Redirect each HTTP through mirror\n  -T,--time
  \               Show time-stamp of repos\n  -K,--koji                Use Koji buildroot\n
  \ -m,--mirror URL          Fedora mirror [default:\n                           https://download.fedoraproject.org/pub]\n
  \ --cf                     Use CloudFront cache\n  -d,--dl                  Use
  dl.fp.o\n  -F,--all-fedora          Query all Fedora releases\n  -E,--all-epel            Query
  all EPEL releases\n  -s,--source              Query source repos\n  -A,--all-archs
  \          Query all arch repos\n  -a,--repo-arch ARCH      Specify repo arch [default:
  x86_64]\n  -t,--testing             Fedora updates-testing\n  -D,--debug               Show
  some debug output\n  -z,--cache-size          Show total dnf repo metadata cache
  disksize\n  -e,--cache-clean-empty   Remove empty dnf caches\n  --list-releases
  \         List Fedora versions\n  --help-dnf               Show dnf --help\n```\nThe
  default arch is the system arch.\n\n## Installation\nfedora-repoquery is available
  in Fedora and EPEL:\n<https://src.fedoraproject.org/rpms/fedora-repoquery>.\n\n##
  Building from source\nUse `stack install fedora-repoquery` or `cabal install fedora-repoquery`\nto
  build the latest release.\n\nTo build from git: `stack install` or `cabal install`
  or `cabal-rpm install`.\n\n## Contributing\nfedora-repoquery is distributed under
  the GPL license version 3 or later.\n\n<https://github.com/juhp/fedora-repoquery>\n"
