changelog: "5.1.0\n-----\n\n* Breaking: `MultiVerb` now documents each response alternative
  under its own\n  content types. `RespondAs ct` keeps `ct`, `Respond` inherits the
  endpoint's\n  media-type list, and `RespondEmpty` stays bodyless. Previously every\n
  \ alternative was rendered against a JSON default and then had the endpoint's\n
  \ content-type list reapplied wholesale, which discarded a `RespondAs`\n  content
  type. Alternatives sharing a status code now retain every media type\n  they declared
  instead of collapsing to one.\n* Breaking: `Servant.OpenApi.Internal`'s `IsSwaggerResponse`
  and\n  `IsSwaggerResponseList` take the enclosing `MultiVerb` content-type slot
  as an\n  additional poly-kinded parameter, and the separate `'()` and `[Type]`\n
  \ `HasOpenApi (MultiVerb …)` instances are replaced by a single instance.\n* Breaking:
  narrow the `openapi-hs` bound to `>=5.0 && <5.1`. Under PVP the\n  breaking axis
  is `A.B`, so the previous `<6` promised compatibility with an\n  `openapi-hs` 5.1
  that the policy explicitly permits to break this package.\n* Document the package's
  PVP versioning policy in the README.\n\n5.0.0\n-----\n\n* Breaking: require `openapi-hs
  >=5.0 && <6`, resolved from its published\n  Hackage release. `openapi-hs` 5 vendors
  the insertion-ordered map and set\n  types it previously took from `insert-ordered-containers`,
  so this package no\n  longer depends on `insert-ordered-containers` directly.\n*
  Breaking: code that imports `Servant.OpenApi.Internal` may need to replace\n  `Data.HashMap.Strict.InsOrd`
  with `Data.HashMap.Strict.InsOrd.Compat`. The\n  stable `Servant.OpenApi` generation
  API and generated schemas are unchanged.\n* Guard generated output with a byte-for-byte
  golden captured under\n  `openapi-hs-4.1.0` (`test/golden/openapi-hs-4.1-gen-openapi.json`).
  The\n  document `gen-openapi` produces under `openapi-hs-5.0.0` is identical to
  it,\n  and still lints with 0 errors under [`vacuum`](https://quobix.com/vacuum/).\n*
  Raise the `lens` lower bound to `>=5.3.3`.\n\n4.1.0\n-----\n\n* Support servant's
  `MultiVerb` combinator (servant ≥ 0.20.3): `toOpenApi`\n  now describes `MultiVerb`
  endpoints — one response object per status code,\n  merging alternatives that share
  a code — and `validateEveryToJSON` /\n  `Servant.OpenApi.Test` extract their body
  types. Ports\n  biocad/servant-openapi3#59 without taking on a `servant-server`
  dependency.\n\n4.0.0\n-----\n\n* Renamed to `servant-openapi-hs`, a fork of\n  [`biocad/servant-openapi3`](https://github.com/biocad/servant-openapi3)\n
  \ targeting OpenAPI 3.1.\n* Depend on [`openapi-hs`](https://github.com/shinzui/openapi-hs)
  instead of\n  `openapi3`. The `Data.OpenApi.*` and `Servant.OpenApi.*` namespaces
  are\n  unchanged. Generated documents now report `\"openapi\": \"3.1.0\"`.\n* Builds
  and passes its test suite against `openapi-hs`. The port required only\n  three
  library edits for OpenAPI-3.1 model changes — `type_` now takes\n  `OpenApiTypeSingle
  OpenApiArray` (the type-array model), and the `OpenApi` /\n  `PathItem` record combiners
  set the new 3.1 fields `webhooks` and `$ref`\n  (`_pathItemRef`).\n* Validate generated
  documents in two in-process layers beyond fixture\n  equality: a round-trip decode
  through `openapi-hs`'s version-enforcing\n  `FromJSON OpenApi`, and `validateEveryToJSON`
  example-conformance.\n* Add a `gen-openapi` executable that prints a representative
  API's OpenAPI 3.1\n  document to stdout; its output lints with 0 errors under\n
  \ [`vacuum`](https://quobix.com/vacuum/).\n* Require GHC 9.12.4 / 9.14.1; modernize
  to `cabal-version: 3.0`,\n  `build-type: Simple`, and `default-language: GHC2024`.\n*
  Drop the `cabal-doctest`-based `doctests` test-suite (use `cabal-docspec` to\n  run
  doctests instead).\n\n---\n\nEarlier history of the upstream `servant-openapi3`
  package:\n\n1.1.8\n-------\n\n* Support `servant-0.17`\n\n1.1.7.1\n-------\n\n*
  Support `swagger2-2.4`\n\n1.1.7\n-----\n\n* Support servant-0.15\n   - support for
  'Stream' and 'StreamBody' combinators\n   - orphan 'ToSchema (SourceT m a)' instance\n*
  Fix BodyTypes to work with generalized ReqBody' \n  [#88](https://github.com/haskell-servant/servant-swagger/pull/88)\n\n1.1.6\n-----\n\n*
  Fixes:\n  * `validateEveryToJSON` now prints validation errors\n\n* Notes:\n  *
  GHC-8.6 compatible release\n\n1.1.5\n-----\n\n* Notes:\n    * `servant-0.13` compatible
  release\n    * Drops compatibility with previous `servant` versions.\n\n1.1.4\n-----\n\n*
  Notes:\n    * `servant-0.12` compatible release\n\n1.1.3.1\n---\n\n* Notes:\n   *
  GHC-8.2 compatible release\n\n1.1.3\n---\n\n* Notes:\n   * `servant-0.11` compatible
  release\n\n1.1.2.1\n---\n\n* Notes:\n   * `servant-0.10` compatible release\n\n1.1.2\n---\n\n*
  Minor fixes:\n  * Support for aeson-1, insert-ordered-containers-0.2\n  * CaptureAll
  instance\n\n1.1.1\n---\n\n* Minor fixes:\n  * Fix `unused-imports` and `unused-foralls`
  warnings;\n  * Fix tests to match `swagger2-2.1.1` (add `example` property for `UTCTime`
  schema).\n\n1.1\n---\n\n* Breaking changes:\n    * Requires `swagger2 >= 2.1`\n
  \   * Requires `servant >= 0.5`\n\n* Notes:\n    * GHC-8.0 compatible release\n\n1.0.3\n---\n\n*
  Fixes:\n    * Improve compile-time performance of `BodyTypes` even further (see
  [18e0d95](https://github.com/haskell-servant/servant-swagger/commit/18e0d95ef6fe9076dd9621cb515d8d1a189f71d3))!\n\n1.0.2\n---\n\n*
  Minor changes:\n    * Add GHC 7.8 support (see [#26](https://github.com/haskell-servant/servant-swagger/pull/26)).\n\n*
  Fixes:\n    * Improve compile-time performance of `BodyTypes` (see [#25](https://github.com/haskell-servant/servant-swagger/issues/25)).\n\n1.0.1\n---\n\n*
  Fixes:\n    * Stop using `Data.Swagger.Internal`;\n    * Documentation fixes (links
  to examples).\n\n1.0\n---\n\n* Major changes (see [#24](https://github.com/haskell-servant/servant-swagger/pull/24)):\n
  \   * Switch to `swagger2-2.*`;\n    * Add automatic `ToJSON`/`ToSchema` validation
  tests;\n    * Add great documentation;\n    * Export some type-level functions for
  servant API.\n\n* Minor changes:\n    * Rework Todo API example;\n    * Stop exporting
  `ToResponseHeader`, `AllAccept` and `AllToResponseHeader` (see [bd50db4](https://github.com/haskell-servant/servant-swagger/commit/bd50db48ca6a106e4366560ded70932d409de1e2));\n
  \   * Change maintainer, update authors/copyrights (see [1a62681](https://github.com/haskell-servant/servant-swagger/commit/1a6268101dc826a92c42e832e402e251c0d32147));\n
  \   * Include changelog and example files into `extra-source-files`.\n\n0.1.2\n---\n\n*
  Fixes:\n    * Fix default spec for `ReqBody` param to be required (see [#22](https://github.com/haskell-servant/servant-swagger/issues/22));\n
  \   * Set version bounds for `swagger2`.\n\n0.1.1\n---\n\n* Fixes:\n    * Fix `subOperations`
  to filter endpoints also by method (see [#18](https://github.com/haskell-servant/servant-swagger/issues/18));\n
  \   * Fix response schema in `ToSwagger` instance for `Header` (see [b59e557](https://github.com/haskell-servant/servant-swagger/commit/b59e557a05bc2669332c52b397879e7598747b82)).\n\n0.1\n---\n*
  Major changes\n    * Use `swagger2` for data model (see [#9](https://github.com/dmjio/servant-swagger/pull/9));
  this changes almost everything.\n"
