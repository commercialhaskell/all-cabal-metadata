changelog: |
  # Revision history for typelet

  ## 0.1.7 -- 2026-05-20

  * Support ghc 9.14
  * Use ghc-tcplugin-api 0.19

  ## 0.1.6 -- 2025-07-19

  * Relax bounds [together with Gabriele Sales]
  * Use ghc-tcplugin-api 0.16

  ## 0.1.5 -- 2025-03-11

  * Use ghc-tcplugin-api 0.14 [Chan Siu Man]

  ## 0.1.4 -- 2024-05-30

  * Support ghc 9.6 (and drop ghc <= 8.8)
    [together with Gabriele Sales]

  ## 0.1.3 -- 2023-03-06

  * Support ghc 9.4

  ## 0.1.2 -- 2022-07-22

  * Add `constructLet` (#112)

  ## 0.1.1.0 -- 2022-03-24

  * Move to `ghc-tcplugin-api` 0.7

  ## 0.1.0.0 -- 2021-12-17

  * First version.
changelog-type: markdown
description: |-
  For a certain class of programs, type-level let is essential
  in order to be able to write these programs in such a way
  that they do not result in ghc core that is quadratic in
  size. Type-level let is not explicitly supported in ghc,
  but we can encode it. The @typelet@ library provides a
  type-checker plugin that makes the encoding more convenient
  to use as well as more effective.
