changelog: "## Unreleased\n\n## 0.7.1\n\n### Added\n- Added SIGHUP-triggered TLS credential
  reloading with fingerprint-based change detection\n- Added runtime-driven SNI certificate
  lookup backed by a mutable TLS credential store\n\n### Changed\n- Refactored Warp
  and QUIC to consume dynamic credentials from the runtime store instead of static
  defaults\n- Upgraded stack dependency snapshots and pinned TLS/QUIC-related packages
  to newer versions\n\n### Fixed\n- Stopped QUIC from keeping stale embedded credentials
  by using callback-based SNI resolution at handshake time\n- Fixed CONNECT tunnel
  handling on HTTP/1 by half-closing upstream writes when client input ends to avoid
  Windows hangs\n\n## 0.7.0\n\n### Added\n- Added an Hspec-based `hprox-test` suite
  with characterization coverage for CLI/default parsing, pure helpers, auth-file
  loading and rewriting, middleware endpoints, reverse-proxy routing and rewrites,
  HTTP/CONNECT proxy decisions, TLS/SNI selection, Warp/runtime exception handling,
  runner selection, DoH behavior, and naiveproxy padding.\n- Added internal domain/runtime
  seams for `Config`, auth loading, reverse routes, proxy runtime construction, TLS/SNI
  setup, Warp settings, runner selection, platform-specific Unix/QUIC startup, log
  output parsing, header policy, DoH requests, and runtime configuration.\n- Added
  runtime-spec coverage for safer QUIC defaults, including 0-RTT disablement, dual-stack
  wildcard binds, and Alt-Svc rendering assertions\n- Added pure `planPrivilegeDrop`
  coverage for Unix privilege-drop plans in `RuntimeSpec`\n\n### Changed\n- Refactored
  `Network.HProx.run` into focused internal modules while preserving the public `Network.HProx`
  API and existing runtime behavior.\n- Replaced tuple-heavy reverse-proxy internals
  with typed `ReverseRoute` and request rewrite helpers.\n- Made proxy logging effects
  explicit by removing the hidden `unsafePerformIO` logging path.\n- Centralized current
  header constants and strip/lookup policy, then made protocol header value comparisons
  case-insensitive for `X-Forwarded-Proto` and `X-Scheme`.\n- Refactored DoH handling
  into explicit parse/resolve/respond helpers and made POST body reading support split
  request chunks within the existing 4096-byte limit.\n- Named naiveproxy padding
  protocol constants and added deterministic parser/round-trip coverage.\n- Updated
  copyright notices to 2026 in LICENSE, package metadata, and all touched source/test
  headers\n- Hardened auth-file handling by stripping one trailing carriage return
  from each entry before parsing, hashing, and rewrite decisions\n- Normalized reverse
  route host/path matching behavior is now stricter and more tolerant of case in host
  names\n- Disabled QUIC 0-RTT startup by default and exposed configurable QUIC helper
  seams for safer runtime behavior tests\n- Changed default QUIC bind behavior to
  listen on both 0.0.0.0 and :: when no explicit bind is provided, while singleton
  binds remain single-address\n- Updated QUIC bind logging to report all interfaces
  when the bind address is not configured explicitly\n\n### Fixed\n- Removed avoidable
  partial functions in reverse-proxy host parsing and HTTP/WebSocket proxy target
  selection.\n- Hardened malformed HTTP proxy target parsing to reject malformed explicit
  ports and HTTP/2 proxy requests without a Host header while preserving bracketed
  IPv6 authorities.\n- Replaced the Argon2 password-hash `error` path with a typed
  `PasswordHashError` thrown at the IO boundary.\n- Normalized HTTP proxy forwarding
  authority to render Host from the parsed URI and omit default `:80`\n- Stripped
  inbound Host and proxy-boundary headers (including `Forwarded`) when forwarding
  proxied HTTP requests\n- Enforced strict `Proxy-Authorization` parsing for HTTP
  proxy authentication: only `Basic` credentials with valid base64 decode are accepted
  now\n- Ensured malformed auth-file warnings redact raw line contents and report
  line numbers with optional username context\n- Added tests covering CRLF plaintext
  auth-file verification/rewrite and malformed-line log redaction\n- Added bounded
  validation for `--port` and `--quic`, including `Config` runtime validation for
  direct values, and tightened `--rev` route parsing to reject empty upstream/domain
  components before startup\n- Normalized reverse-route prefixes from config tuples
  to canonical leading-slash form without trailing slash\n- Made reverse route prefix
  matching boundary-aware so /api matches /api/v1 but not /apiary or /apix\n- Made
  reverse proxy path rewrites preserve unmatched paths and handle exact and nested
  matches consistently\n- Compared reverse-route hostnames case-insensitively after
  stripping ports\n- Preserved `forceSSL` HTTPS redirect targets for origin-form requests
  by keeping request path and query; for absolute-form proxy requests the redirect
  now uses the parsed target and omits default `:80`/`:443` ports while preserving
  non-default ports\n- Updated CONNECT handling to establish upstream TCP before returning
  200 OK and return 502 on connect failures for HTTP/1 and HTTP/2\n- Differentiated
  DNS resolver failures in DoH by returning HTTP 502 (Bad Gateway) with `dns resolver
  failure` instead of reusing the malformed-request 400 response\n- Rejected chunked
  DoH POST bodies that exceed the 4096-byte limit with HTTP 400 malformed-request
  handling\n- Preserved malformed client input handling on HTTP 400 while adding successful
  chunked POST parsing support within existing size bounds\n- Preserved Alt-Svc advertisement
  formatting by centralizing it in a dedicated helper used by TLS setup\n- Hardened
  Unix privilege dropping to resolve target user/group entries before changing IDs\n-
  Hardened TLS credential loading by adding contextual IO failures for missing or
  unreadable cert/key paths\n\n### Security\n- Redacted proxy credentials in TRACE
  logs as `username:<redacted>` so passwords are never logged\n- Prevented auth-file
  logging from leaking password-like fragments by replacing raw-line diagnostics with
  non-sensitive context\n- Hardened SNI matching to use ASCII case-insensitive host
  checks and reject invalid wildcard matches\n- Disabled QUIC 0-RTT by default to
  reduce replay and forward-secrecy risk when accepting early data\n- Verified real/effective
  UID/GID and supplementary groups after privilege drop and enforced stricter safety
  checks for user/group transitions\n\n## 0.6.5\n\n- bump stack dependencies\n- build
  with GHC 9.10\n- remove DROP_ALL_CAPS_EXCEPT_BIND\n\n## 0.6.4\n\n- bump stack dependencies\n-
  build with GHC 9.8\n\n## 0.6.3\n\n- bump stack dependencies\n- fix Content-Length
  header for encoded HTTP responses in reverse proxy mode\n\n## 0.6.2\n\n- fixes to
  improve ssltest result\n- unix: support setuid after binding port\n- remove graceful
  close\n\n## 0.6.1\n\n- multiple certificates and SNI support for HTTP/3\n- install
  signal handler with graceful shutdown on Linux and macOS\n- support ACME `http-01`
  challenge (RFC8555)\n\n## 0.6.0\n\n- `--rev` now supports domain matching\n- fix
  `Content-Length` header in HTTP/2 responses\n- passwords are now Argon2 salt-hashed\n\n##
  0.5.4\n\n- routable `--rev` reverse proxy support\n- fix `Keep-Alive` header in
  reverse HTTP/2 proxy\n- add nix based build mode\n- naiveproxy padding: add protocol
  negotiation and packet fragmentation \n\n## 0.5.3\n\n- add macos-aarch64 build\n-
  add `--hide` option for probe resistance\n- gracefully close stream for HTTP CONNECT\n-
  `gzip` encoding middleware removed\n\n## 0.5.2\n\n- add Windows build\n- remove
  `--user` option\n\n## 0.5.1\n\n- export `LogLevel` type to make `Config` actually
  customizable\n- add `--log` option to specify logging type\n\n## 0.5.0\n\n- initial
  HTTP/3 (QUIC) support\n- add logging based on fast-logger\n- some minor tweaks\n\n##
  0.4.0\n\n- naiveproxy compatible [padding](https://github.com/klzgrad/naiveproxy/#padding-protocol-an-informal-specification)
  support (`--naive`)\n- strong TLS settings as advised by [SSL Labs ssltest](https://www.ssllabs.com/ssltest)\n\n##
  0.3.0\n\n- initial version with exposed library interface\n"
changelog-type: markdown
description: |
  ## hprox

  [![CircleCI](https://circleci.com/gh/bjin/hprox.svg?style=shield)](https://circleci.com/gh/bjin/hprox)
  [![macos-aarch64](https://github.com/bjin/hprox/actions/workflows/macos-aarch64.yml/badge.svg)](https://github.com/bjin/hprox/actions/workflows/macos-aarch64.yml)
  [![Release](https://img.shields.io/github/release/bjin/hprox.svg)](https://github.com/bjin/hprox/releases)
  [![Hackage](https://img.shields.io/hackage/v/hprox.svg)](https://hackage.haskell.org/package/hprox)
  [![License](https://img.shields.io/github/license/bjin/hprox.svg)](https://github.com/bjin/hprox/blob/master/LICENSE)

  `hprox` is a lightweight HTTP/HTTPS proxy server.

  ### Features

  * Basic HTTP proxy functionality.
  * [Basic](https://en.wikipedia.org/wiki/Basic_access_authentication) password authentication.
  * Enables TLS encryption, requiring a valid certificate. Supports TLS 1.3 and HTTP/2, also known as SPDY Proxy.
  * TLS SNI validation (blocks all clients with an invalid domain name).
  * Provides a PAC file for seamless client-side configuration, compatible with browsers like Chrome and Firefox.
  * Websocket redirection (compatible with [v2ray-plugin](https://github.com/shadowsocks/v2ray-plugin)).
  * Reverse proxy support (redirects requests to a fallback server).
  * DNS-over-HTTPS (DoH) support.
  * [naiveproxy](https://github.com/klzgrad/naiveproxy) compatible [padding](https://github.com/klzgrad/naiveproxy/#padding-protocol-an-informal-specification) (HTTP Connect proxy).
  * HTTP/3 (QUIC) support (`h3` protocol).
  * ACME `http-01` challenge as specified by RFC8555, see [acme.sh stateless mode](https://github.com/acmesh-official/acme.sh/wiki/Stateless-Mode).
  * Designed as a middleware, ensuring compatibility with any Haskell Web Application built using the `wai` interface.
    Refer to [library documents](https://hackage.haskell.org/package/hprox) for details.

  ### Installation

  `hprox` is designed to build and function seamlessly on all Unix-like operating systems with GHC support, as well as on Windows environments.

  [stack](https://docs.haskellstack.org/en/stable/README/#how-to-install) is recommended for building `hprox`.

  ```sh
  stack setup
  stack install
  ```

  Alternatively, you have the option to utilize the statically linked binary available in the [latest release](https://github.com/bjin/hprox/releases).

  ### Usage

  Utilize `hprox --help` to view a comprehensive list of options along with detailed explanations.

  * To run `hprox` on port 8080 with simple password authentication (passwords will be [Argon2-hashed](https://en.wikipedia.org/wiki/Argon2) after first run):

  ```sh
  echo "user:pass" > userpass.txt
  hprox -p 8080 -a userpass.txt
  ```

  * To run `hprox` with TLS encryption on port 443, with a certificate for `example.com` obtained with [acme.sh](https://acme.sh/):

  ```sh
  hprox -p 443 -s example.com:$HOME/.acme.sh/example.com/fullchain.cer:$HOME/.acme.sh/example.com/example.com.key
  ```

  Browsers can be configured with the PAC file URL `https://example.com/.hprox/config.pac`.

  * For integration with `v2ray-plugin` and a fallback page to the [Ubuntu archive](http://archive.ubuntu.com/):

  ```sh
  v2ray-plugin -server -localPort 8080 -mode websocket -host example.com -remotePort xxxx
  hprox -p 443 -s example.com:fullchain.pem:privkey.pem --ws 127.0.0.1:8080 --rev archive.ubuntu.com:80
  ```

  Clients can establish connections using the plugin option `tls;host=example.com`.

  * Enable HTTP/3 (QUIC) on UDP port 8443, enable DoH support (redirect to 8.8.8.8), and add naiveproxy compatible padding:

  ```sh
  hprox -p 443 -q 8443 -s example.com:fullchain.pem:privkey.pem -a userpass.txt --naive --doh 8.8.8.8
  ```

  Then DoH can be accessed at `https://example.com/dns-query`.

  ### License

  `hprox` is licensed under the Apache license. Refer to the `LICENSE` file for comprehensive details.
