changelog: "# Revision history for Mahjong\n\nSee git repo for more detailed commit
  information.\n\n## 0.1.0.0\nFirst functional prototype.\n\n## 0.1.0.1\nDependency
  versions reworked.\n\n## 0.2.0.0\nHelp messages improved. Module structure refactored.
  Documentation begun.\n\n## 0.2.0.1\nRevised cabal version in attempt to fix build
  error on Hackage. Build works\nlocally, suspect the problem is a quirk of Hackage
  build system.\nAdded some more documentation.\n\n## 0.2.0.2\nInternal library now
  unnamed. Hoping this fixes Hackage build fail.\n\n## 0.2.0.3\nAdded docs for yaku
  functions.\nReworked seven pairs detection to ensure hand has 14 tiles.\n9 gates
  now checks that the hand is closed.\n\n## 0.3.0.0\nFixed error in scoring triple
  triplets, was previously scored as 1 han open.\nImplemented new backend for scoring
  and yaku detection via \"context\" based\napproach, defined in new Context submodule.
  This helps simplify function\nsignatures for operations that need many pieces of
  information besides just the\nsuperficial composition of a hand.\n\n## 0.3.0.1\nNow
  only ask for dora after we know the hand is not a yakuman, as part of the\nmkContext
  function (previously handled dora in displayHandScore).\nFour concealed triplets
  now asks about concealment. It wasn't doing this before,\na bug introduced by the
  refactor, since mkYakumanContext intentionally gets less\ninformation than mkYakuContext
  since generally it needs less.\nNow only ask for wind context if we see a wind tile
  in the hand. Note even a\nwind pair could matter - it won't affect most yaku but
  affects Fu.\nSpeaking of - \n    NOTE: Seat+Round wind pair counts as a yakuhai
  pair and awards\n    2+2=4 Fu. Some rulesets would only award 2 Fu.\n"
changelog-type: markdown
description: "This package provides a CLI tool with commands for determining the yaku,
  fu, and score of a hand in Riichi Mahjong. It can also determine the waits of a
  partial hand.\n\nThe CLI tool supplied is the riichi command. Help information is
  as follows:\n\n    Command riichi:\n        Possible subcommands: yaku, waits, score
  (default = yaku)\n\n    Usage:\n        riichi <subcommand> \"<hand>\"\n\n        \"yaku\"
  and \"score\" subcommands expect a full hand.\n        \"waits\" subcommand expects
  a hand that is tenpai.\n\n        Example hands include:\n            \"123p 234m
  444p rrrr NN\"\n            \"344556s 444p 222m EE\"\n            \"19p 19s 19m
  1p NESWrgw\"\n\n        In detail, numeric tiles are denoted (1-9) + (m, p, or s),\n
  \       Winds are denoted N, E, S, W, and Dragons are r, w, g.\n        A 0 can
  be used to denote a red five.\n        Numeric tiles of the same suit, and honour
  tiles, can be \n        grouped as seen in the examples (but needn't be).\n\n        In
  scoring a hand, dora and seat/round wind must be supplied,\n        also in this
  format.\n\nInternal libraries are also exposed.\n\nHackage page: https://hackage.haskell.org/package/riichi-scoring\n"
