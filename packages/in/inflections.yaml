changelog: |
  ## Inflections 0.4.1.0
  * Fix `parameterize` emitting non-alphanumeric characters when the transliteration table maps an input to a string containing punctuation (e.g. `ŉ` previously produced `'n`; now produces `n`). The output is now filtered to `[a-z0-9_-]` as the docs imply. Note: this is an observable behavior change for affected inputs, hence the minor-version bump.
  * Bump bounds for `text` and `containers` to support GHC 9.10 and 9.12
  * Tighten lower bound on `text` to `>= 1.2.3` to reflect actual minimum
  * Widen upper bound on `exceptions` to `< 0.12`
  * Add `tested-with` covering GHC 8.4 through 9.12
  * CI now tests GHC 8.4 through 9.12

  ## Inflections 0.4.0.7
  * Bump bounds for `text` in order to support ghc-9.6.1

  ## Inflections 0.4.0.6
  * Support `megaparsec` == 9.0

  ## Inflections 0.4.0.5
  * Support `megaparsec` == 8.0

  ## Inflections 0.4.0.3
  * Support `megaparsec` == 7.0*.
  * **Drop support** for `GHC 7.8.4`.

  ## Inflections 0.4.0.3
  * Support `exceptions` == 0.10.*

  ## Inflections 0.4.0.2
  * Support `exceptions` == 0.9.*

  ## Inflections 0.4.0.1
  * Support `megaparsec` >= 6.4.0

  ## Inflections 0.4.0.0

  * Update megaparsec to version 6.

  ## Inflections 0.3.0.0

  * A more type-safe API forbidding creation of invalid words.

  * Made the API use `Text` instead of `String` (which significally improved
    speed).

  * Switched to Megaparsec 5 for parsing.

  * Renamed `defaultMap` to `defaultTransliterations`.

  * Words now can contain digits (recognized by all parsers).

  * `parseSnakeCase` now is not confused when a word happens to have prefix
    coinciding with an acronym. This is harder to fix for `parseCamelCase`
    because acronym may contain capital letters, so old behavior is preserved
    for `parseCamelCase` for now.

  * `parseCamelCase` and `parseSnakeCase` take any instance of `Foldable` as a
    collection of acronyms, not just lists.

  * Added the `CHANGELOG.md` file.

  * Switched test suite to Hspec.

  * The `toUnderscore`, `toDashed`, and `toCamelCased` are not partial
    anymore. They return parse error in `Left` just like parsing functions,
    but this result can be lifted into any instance of `MonadThrow` with
    `betterThrow` helper.

  * Improved documentation.

  ## Inflections 0.2.0.1

  * Support for GHC 8.0.

  ## Inflections 0.2.0.0

  * Added `other-modules` to test suite.

  ## Inflections 0.1.0.10

  * Support for GHC 7.10.

  ## Inflections 0.1.0.9

  * Support for GHC 7.8.

  ## Inflections 0.1.0.8

  * Fixed a typo in docs of `humanize`.

  * Added `toUnderscore`, `toDashed`, and `toCamelCased`.

  ## Inflections 0.1.0.7

  * Support for `base-4.7`.

  * Improved documentation.

  ## Inflections 0.1.0.6

  * Added `titleize` and `humanize`.

  * Improved documentation.

  ## Inflections 0.1.0.5

  * Added module documentation for `Text.Inflections`.

  ## Inflections 0.1.0.4

  * Reduced number of public modules to one: `Text.Inflections`.

  * Added `ordinal` and `ordinalize`.

  * Improved documentation.

  ## Inflections 0.1.0.3

  * Added `camelize`, `camelizeCustom`, `underscore`, and `underscoreCustom`.

  * Made the word parser accept empty input.

  * Improved documentation.

  ## Inflections 0.1.0.2

  * Added the `transliterate` and `transliterateCustom` functions.

  ## Inflections 0.1.0.1

  * No changes.

  ## Inflections 0.1.0.0

  * Initial release.
changelog-type: markdown
description: "# String Inflections for Haskell\n\n[![License MIT](https://img.shields.io/badge/license-MIT-brightgreen.svg)](http://opensource.org/licenses/MIT)\n[![Hackage](https://img.shields.io/hackage/v/inflections.svg)](http://hackage.haskell.org/package/inflections)\n[![Stackage
  Nightly](http://stackage.org/package/inflections/badge/nightly)](http://stackage.org/nightly/package/inflections)\n[![Stackage
  LTS](http://stackage.org/package/inflections/badge/lts)](http://stackage.org/lts/package/inflections)\n[![Build](https://github.com/stackbuilders/inflections-hs/actions/workflows/build.yml/badge.svg)](https://github.com/stackbuilders/inflections-hs/actions/workflows/build.yml)\n\n<!--
  ALL-CONTRIBUTORS-BADGE:START - Do not remove or modify this section -->\n[![All
  Contributors](https://img.shields.io/badge/all_contributors-18-orange.svg?style=flat-square)](#contributors-)\n<!--
  ALL-CONTRIBUTORS-BADGE:END -->\n\nThis library is a partial port of the\n[String
  Inflector](http://api.rubyonrails.org/classes/ActiveSupport/Inflector.html)\nfrom
  Ruby on Rails. It currently implements methods such as `parameterize`,\n`transliterate`,
  `camelize`, `underscore` and `dasherize`. Please see the\nhaddock documentation
  for a complete list of the functions implemented by this\nlibrary.\n\nUnlike the
  ActiveSupport (Rails) and Ember implementations of inflections, this\nlibrary uses
  a parser to verify the input to functions like `camelize`. This is\ndone to ensure
  that the output strings adhere to the syntax that they are\nsupposed to generate.
  You can read more about the philosophy behind this library\nin the\n[Haddock documentation](http://hackage.haskell.org/package/inflections/docs/Text-Inflections.html).\n\n##
  Usage\n\nThe following examples demonstrate usage of the `parameterize`, `transliterate`\nand
  `camelize` functions:\n\n```haskell\nλ: parameterize \"Hola. ¿Cómo estás?\"\n\"hola-como-estas\"\n\nλ:
  transliterate \"Hola. ¿Cómo estás?\"\n\"Hola. ?Como estas?\"\n\nλ: import Control.Monad
  (liftM)\nλ: liftM camelize $ parseSnakeCase \"hey_there\"\n\"HeyThere\"\n```\n\n##
  Customization\n\nPart of parameterizing strings is approximating all characters
  in the input\nencoding to ASCII characters. This library copies the character approximation\ntable
  from the Ruby i18n library. This data structure is provided as\n`defaultCharacterTransliterations`.
  You can provide your own transliteration map\nby passing a Map structure (from Data.Map)
  to the `parameterizeCustom` function.\n\nIf you want to specify a custom default
  replacement or approximation table for\nthe `transliterate` function, you should
  instead call the `transliterateCustom`\nfunction which accepts a String for replacements
  and a Map for substitution.\n\n## Future work\n\nIdeally, we want to implement other
  functions found in the Rails\ninflections library. If you need one of those functions,
  please submit a pull request!\n\n## Further documentation\n\nFor more information,
  please see the the\n[Haddock docs for this module](http://hackage.haskell.org/package/inflections/docs/Text-Inflections.html).\n\n##
