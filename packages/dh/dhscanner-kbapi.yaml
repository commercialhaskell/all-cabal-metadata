description: "This package defines the API for the knowledge base used by [dhscanner](https://dhscanner.org/docs/).\nThe
  documentation is intended for both humans \U0001F6B6and LLM agents \U0001F916.\nIn
  this context, a knowledge base is a structured collection of /code facts/.\nFor
  a detailed explanation of code facts and how they are generated,\nsee [dhscanner-kbgen](https://hackage.haskell.org/package/dhscanner-kbgen)\non
  [Hackage](https://hackage.haskell.org/).\n\nCode facts form an abstraction layer
  over the underlying data representation,\nwhich can be a graph database, a relational
  database (like Postgres),\na logic program etc.\n\nThe design aims to separate,
  as much as possible, the following entities:\n\n* the underlying data storage\n*
  the code facts abstraction layer\n* the exposed knowledge base API\n\nFor instance,
  migrating from a graph database to a logic program\nrepresentation should conceptually
  be straightforward.\n\nAs another example, changes to the API should ideally not
  require\nfundamental modifications to the structure or specification\nof code facts."
