  * [Blog](http://winterkoninkje.dreamwidth.org/)
  * [Twitter](https://twitter.com/wrengr)
  * [Hackage](http://hackage.haskell.org/package/prelude-safeenum)
  * [GitHub](https://github.com/wrengr/prelude-safeenum)
