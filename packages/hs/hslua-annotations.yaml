description: "<h1 align=\"center\">hslua-annotations</h1>\n\n<p align=\"center\">\n
  \  <a href=\"https://github.com/sondr3/hslua-annotations/actions\"><img alt=\"GitHub
  Actions Status\" src=\"https://github.com/sondr3/hslua-annotations/workflows/pipeline/badge.svg\"
  /></a>\n   <a href=\"https://hackage.haskell.org/package/hslua-annotations\"><img
  alt=\"Hackage version\" src=\"https://img.shields.io/hackage/v/hslua-annotations.svg?logo=haskell\"
  /></a>\n   <br />\n</p>\n\n<p align=\"center\">\n   <strong>A type annotation generator
  for HSLua targetting LuaLS and EmmyLua</strong>\n</p>\n\n<details>\n<summary>Table
  of Contents</summary>\n<br />\n\n**Table of Contents**\n\n- [Installation](#installation)\n-
  [Usage](#usage)\n- [License](#license)\n\n</details>\n\nThis is a small library
  to generate [LuaLS](https://luals.github.io/wiki/annotations) and [EmmyLua](https://github.com/EmmyLuaLs/emmylua-analyzer-rust/blob/main/docs/emmylua_doc/annotations_EN/README.md)
  \nannotations from HsLua.\n\n## Installation\n\nAdd `hslua-annotations` to your
  Cabal file:\n\n```cabal\nbuild-depends:\n  hslua-annotations ^>= 0.1\n```\n\n##
  Usage\n\n```haskell\nimport HsLua.Annotations (annotateModule, documentModule)\nimport
  HsLua.Module.Path qualified as Path\nimport HsLua.Packaging\nimport HsLua.Core qualified
  as Lua\nimport Data.Text (Text)\nimport Data.Text.IO qualified as TIO\n\n-- utility
  function might be needed to narrow the `Module e` type\nrenderDocs :: Module Lua.Exception
  -> Text\nrenderDocs mod = documentModule mod\n\n-- utility function might be needed
  to narrow the `Module e` type\nrenderAnnotations :: Module Lua.Exception -> Text\nrenderAnnotations
  mod = annotateModule mod\n\nmain :: IO ()\nmain = do\n  TIO.writeFile \"path.md\"
  $ renderDocs Path.documentedModule\n  TIO.writeFile \"path.lua\" $ renderAnnotations
  Path.documentedModule\n```\n\n## License\n\nThis project is licensed under either
  of\n\n- Apache License, Version 2.0, ([LICENSE_APACHE](LICENSE_APACHE) or\n  http://www.apache.org/licenses/LICENSE-2.0)\n-
  MIT license ([LICENSE](LICENSE) or http://opensource.org/licenses/MIT)\n\nat your
  option.\n"
