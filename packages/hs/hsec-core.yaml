changelog: |+
  ## 0.5.0.0

  * Add `AffectedApi` type and `affectedApi` field in `Affected`

  ## 0.4.0.0

  * Introduce `OsvId` and use it in `Advisory.{aliases,related}`

  ## 0.3.0.2

  * Update `cvss` dependency bounds

  ## 0.3.0.0

  * Add `Repository` and `ComponentIdentifier` in `Security.Advisories.Core.Advisory`

  ## 0.2.1.0

  * Introduce `isVersionAffectedBy` and `isVersionRangeAffectedBy` in `Security.Advisories.Core`

  ## 0.2.0.2

  * Update `osv` dependency bounds
  * Update `tasty` dependency bounds

changelog-type: markdown
description: |
  # hsec-core

  `hesc-core` aims to support [Haskell advisories database](https://github.com/haskell/security-advisories).

  ## Building

  We aim to support both regular cabal-based and nix-based builds.

  ## Testing

  Run (and auto update) the golden test:

  ```ShellSession
  cabal test -O0 --test-show-details=direct
  ```
