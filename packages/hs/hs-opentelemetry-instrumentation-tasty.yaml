changelog: |
  # Changelog for hs-opentelemetry-instrumentation-tasty

  ## Unreleased

  ## 1.0.0.0 - 2026-05-29

  - Update to `hs-opentelemetry-api` 0.4.
  - Internal: `result.description` attribute key is now a typed `AttributeKey` constant.
    Attribute name is unchanged.

  ## 0.1.0.1

  - Relax `hs-opentelemetry-api` bounds to support 0.3.x

  ## 0.1.0.0

  - Initial release
changelog-type: markdown
description: "# hs-opentelemetry-instrumentation-tasty\n\n[![hs-opentelemetry-instrumentation-tasty](https://img.shields.io/hackage/v/hs-opentelemetry-instrumentation-tasty?style=flat-square&logo=haskell&label=hs-opentelemetry-instrumentation-tasty&labelColor=5D4F85)](https://hackage.haskell.org/package/hs-opentelemetry-instrumentation-tasty)\n\nOpenTelemetry
  instrumentation for the [Tasty] test framework; it creates the following spans inside
  the instrumented `TestTree`:\n\n1. Individual test cases\n2. Test groups\n3. Resource
  setup and teardown\n\nAs Tasty executes all tests in parallel, this instrumentation
  should be robust in the presence of parallel execution.\n\n[Tasty]: https://hackage.haskell.org/package/tasty\n\n##
  Usage\n\nUsage requires:\n\n1. Setting and tearing down a trace provider as normal
  in your test executable.\n2. Calling `instrumentTestTree` on your `TestTree`.\n\nSee
  the test suite for examples of how to use the library. \n"
