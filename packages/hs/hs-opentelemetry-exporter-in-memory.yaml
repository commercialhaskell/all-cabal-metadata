changelog: "# Changelog for hs-opentelemetry-exporter-in-memory\n\n## Unreleased\n\n##
  1.0.0.0 - 2026-05-29\n\n- `OpenTelemetry.Exporter.InMemory` barrel now re-exports
  all three signals (Span, Metric, LogRecord); deprecated annotation removed\n- New
  `OpenTelemetry.Exporter.InMemory.LogRecord` module (in-memory log exporter for testing)\n-
  New `OpenTelemetry.Exporter.InMemory.Metric` module (in-memory metric exporter for
  tests)\n\n## 0.0.1.5\n\n- Relax `hs-opentelemetry-api` bounds to support 0.3.x\n\n##
  0.0.1.2 \n\n- Support newer dependencies\n\n## 0.0.1.1\n\n- Support hs-opentelemetry-api-0.0.2.0\n\n##
  0.0.1.0\n\n- Initial release\n"
