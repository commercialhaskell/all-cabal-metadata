changelog: |
  # Changelog for hs-opentelemetry-propagator-xray

  ## 1.0.0.0 - 2026-05-29

  - Promoted to 1.0.0.0 for the hs-opentelemetry 1.0 release.

  ## 0.0.1.0

  - Initial release.
  - Extract and inject `X-Amzn-Trace-Id` header (AWS X-Ray trace context).
  - Converts between X-Ray trace ID format (`1-{epoch}-{unique}`) and
    standard 128-bit OpenTelemetry trace IDs.
  - Registry integration under the name `"xray"`.
changelog-type: markdown
description: |-
  Propagator implementing the AWS X-Ray trace context format
  (@X-Amzn-Trace-Id@ header).

  The X-Ray format is used by AWS services such as Application Load
  Balancer, API Gateway, and Lambda. This package lets Haskell services
  participate in traces originated or propagated by AWS infrastructure.

  Use alongside W3C Trace Context for mixed environments:
  @OTEL_PROPAGATORS=tracecontext,baggage,xray@.

  See <https://docs.aws.amazon.com/xray/latest/devguide/xray-concepts.html#xray-concepts-tracingheader>.
