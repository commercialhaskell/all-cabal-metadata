changelog: |
  # Changelog for hs-opentelemetry-api-types

  ## 1.0.0.0 - 2026-05-29

  - Initial public release as part of the hs-opentelemetry 1.0 release. Provides
    the core `Attribute`, `PrimitiveAttribute`, and `AttributeKey` types shared by
    `hs-opentelemetry-api` and `hs-opentelemetry-semantic-conventions`.
changelog-type: markdown
description: |-
  Leaf package containing 'Attribute', 'PrimitiveAttribute', and 'AttributeKey'
  — the foundational value types of the OpenTelemetry API. Extracted so that
  @hs-opentelemetry-semantic-conventions@ and @hs-opentelemetry-api@ can both
  depend on these types without creating a circular dependency.
