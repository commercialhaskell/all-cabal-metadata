changelog: |
  # Changelog

  ## 0.4.0.0

  ### Breaking Changes

  - **Drop `vector` dependency.** Canvas pixel storage changed from `Data.Vector.Storable.Vector Word8` to strict `ByteString`. Users pattern-matching on `cPixels` will need to update. All public API functions are unchanged.

  ### New

  - **Native PNG export** (`GBSprite.PNG`): hand-rolled 32-bit RGBA PNG encoder using zlib for DEFLATE compression and a pure CRC32 implementation. PNG export is now always available тАФ no flags, no JuicyPixels.
  - `GBSprite.Export` now re-exports both `exportBmp` and `exportPng`.
  - 10 new PNG tests (366 total, up from 356).

  ### Removed

  - **`juicy-pixels` flag and `GBSprite.Export.PNG`** тАФ replaced by native `GBSprite.PNG`.
  - **`vector` dependency** тАФ pixel data backed by strict `ByteString` instead of `Vector.Storable`. Same performance characteristics, fewer dependencies.

  ### Dependencies

  - `base`, `bytestring`, `zlib` тАФ that's it. Down from `base`, `bytestring`, `vector`, optional `JuicyPixels`.

  ## 0.3.0.1

  ### Fixes

  - Fix BMP roundtrip test leaking temp files тАФ tests now clean up after themselves.
  - Replace partial `!!` with safe indexing in BMP test.
  - Fix CI: run haddock before build to avoid stale `.hi` files causing 0% doc coverage.
  - Fix README: correct `encodeBmp` return type, add missing API sections (Palette, Sprite, Tilemap), add missing exported functions.

  ## 0.3.0.0

  ### Bug Fixes

  - Fix `drawEllipse` midpoint algorithm: region 2 now continues from where region 1 ended instead of restarting at `(rx, 0)`. Ellipses now correctly plot all four cardinal edge pixels.
  - Fix `safeSetPixel` in VFX.hs: use `setPixel` directly instead of `fillCircle` with radius 0.
  - Replace partial `minimum`/`maximum` with safe folds in `fillPolygon` (Draw.hs) and `computeMaxWidth` (Sheet.hs).
  - Fix `grayscale4` palette: was a duplicate of `gameboy` (green-tinted). Now uses evenly-spaced true grayscale (0, 85, 170, 255).

  ### Performance

  - Replace 16 lazy `foldl` with strict `foldl'` across Draw.hs, VFX.hs, Sheet.hs, Tilemap.hs, and Text.hs.

  ### Internal

  - 356 tests (up from 105): comprehensive coverage of all modules.
  - CI and cabal: `tested-with` upgraded from GHC 9.6 to GHC 9.8.
  - Publish workflow: replace sed version-patching with tag/cabal version verification.

  ## 0.2.1.2

  - Change license from MIT to BSD-3-Clause.

  ### Bug Fixes

  - Fix `maximum` crash on empty list in `packSheet` (Sheet.hs).
  - Replace partial `!!` with safe indexing in Bayer dithering (Dither.hs).
  - Fix `-Wname-shadowing` warning in test suite.

  ### Documentation

  - Fix README Animation API section (wrong type name and signatures).
  - Add gb-vector as ecosystem companion in README.

  ### Internal

  - CI: cross-platform build matrix (Linux, macOS, Windows).

  ## 0.2.1.1

  - Remove unused `containers` dependency.

  ## 0.2.1.0

  ### Performance

  Library-wide elimination of O(n┬▓) per-pixel `setPixel`/`VS.//` mutation. All pixel-producing functions now use single-pass `VS.generate` for O(n) performance.

  - **NineSlice**: `renderNineSlice` тАФ rewritten for large target sizes that previously stalled.
  - **Transform**: `flipH`, `flipV`, `rotate90`, `rotate180`, `rotate270`, `scaleNearest`, `outline`, `dropShadow` тАФ all rewritten with direct index computation.
  - **Compose**: `stamp`, `stampAlpha` тАФ single-pass with inline source/destination byte reads.
  - **Gradient**: `linearGradient`, `radialGradient`, `diagonalGradient` тАФ generate directly from coordinate math.
  - **Noise**: `valueNoiseColor`, `fbm` тАФ generate noise samples directly into output vector.
  - **Dither**: `orderedDither` тАФ single-pass palette reduction.

  ## 0.2.0.0

  ### New Modules

  - **GBSprite.Noise**: Procedural noise generation тАФ `valueNoise`, `valueNoiseColor`, `fbm` (fractal Brownian motion). Deterministic LCG with bilinear interpolation and smoothstep.
  - **GBSprite.Gradient**: Gradient generation тАФ `linearGradient` (horizontal/vertical), `radialGradient`, `diagonalGradient`.
  - **GBSprite.NineSlice**: UI panel scaling тАФ `NineSlice` type with configurable border regions, `renderNineSlice` preserves corners and edges at any target size.
  - **GBSprite.Dither**: Ordered dithering тАФ `orderedDither` with Bayer2, Bayer4, Bayer8 matrices for palette reduction. Classic retro cross-hatch patterns.
  - **GBSprite.Export.PNG**: Separated from Export.hs, eliminating CPP. Only built when `juicy-pixels` flag is enabled.

  ### Bug Fixes

  - Eliminate CPP from Export.hs тАФ split into `GBSprite.Export` (BMP, always available) and `GBSprite.Export.PNG` (optional).

  ### Internal

  - 105 pure tests (up from 62)
  - 12 new Draw function tests (drawThickLine, drawPolygon, fillPolygon, drawEllipse, fillEllipse, drawBezier, drawRoundRect, fillRoundRect)
  - CI: ormolu glob `src/**/*.hs` replaces hardcoded file list
  - CI: jobs chained so lint/format gate build (saves Actions minutes on failure)
  - Metadata: cabal-version 3.0, stability experimental, CHANGELOG.md

  ## 0.1.0.0

  Initial release.

  ### Canvas & Color
  - `Canvas` type: width, height, RGBA pixel vector
  - `Color` type with `lerp`, `multiply`, `alphaBlend`, `withAlpha`, `scaleAlpha`
  - Bounds-checked `getPixel` / `setPixel` (out-of-bounds returns transparent)

  ### Drawing Primitives
  - Lines: `drawLine`, `drawThickLine`
  - Rectangles: `drawRect`, `fillRect`, `drawRoundRect`, `fillRoundRect`
  - Circles: `drawCircle`, `fillCircle`
  - Ellipses: `drawEllipse`, `fillEllipse`
  - Polygons: `drawPolygon`, `fillPolygon`
  - Curves: `drawBezier`, `drawArc`

  ### Transforms
  - `flipH`, `flipV`, `rotate90`, `rotate180`, `rotate270`
  - `scaleNearest`: nearest-neighbour scaling

  ### Composition
  - `stamp`: blit with transparency
  - `overlay`: layer multiple canvases

  ### Animation
  - `Animation` type with `Loop`, `Once`, `PingPong` modes
  - Frame indexing with `animationDone` predicate

  ### Sprites & Sheets
  - `Sprite` type: multi-frame sprite container
  - `packSheet`: bin-packing sprite sheet atlas

  ### Text
  - `renderText`: bitmap font text rendering
  - `textWidth`: measure text width in pixels

  ### VFX
  - `explosion`: animated explosion effect
  - `ring`: expanding ring effect
  - `flash`: screen flash frames

  ### Palettes
  - `Palette` type with indexed color lookup
  - `paletteSwap`: remap colors
  - Built-in: `gameboy` (4-color Game Boy palette)

  ### Export
  - `exportBmp`: native BMP file export (always available)
  - `exportPng`: PNG export via JuicyPixels (optional `juicy-pixels` flag)
changelog-type: markdown
description: |
  <div align="center">
  <h1>gb-sprite</h1>
  <p><strong>Procedural 2D Sprite & VFX Generation</strong></p>
  <p>Pure Haskell тАФ no image files, no textures, no asset pipeline. Just math.</p>
  <p><a href="#overview">Overview</a> ┬╖ <a href="#architecture">Architecture</a> ┬╖ <a href="#usage">Usage</a> ┬╖ <a href="#api">API</a> ┬╖ <a href="#example">Example</a></p>
  <p>

  [![CI](https://github.com/Gondola-Bros-Entertainment/gb-sprite/actions/workflows/ci.yml/badge.svg)](https://github.com/Gondola-Bros-Entertainment/gb-sprite/actions/workflows/ci.yml)
  [![Hackage](https://img.shields.io/hackage/v/gb-sprite.svg)](https://hackage.haskell.org/package/gb-sprite)
  ![Haskell](https://img.shields.io/badge/haskell-GHC%209.8-purple)

  </p>
  </div>

  ---

  ## Overview

  gb-sprite is a pure Haskell library for procedurally generating 2D sprites, animations, and visual effects. Define pixel art, VFX, and sprite sheets programmatically тАФ render to BMP with zero external image dependencies.

  Companion to [gb-synth](https://github.com/Gondola-Bros-Entertainment/gb-synth) (procedural audio) and [gb-vector](https://github.com/Gondola-Bros-Entertainment/gb-vector) (SVG generation).

  **Features:**
  - ByteString-backed RGBA canvas with drawing primitives (lines, circles, polygons, Bezier curves)
  - Transforms: flip, rotate, scale, outline, drop shadow
  - Alpha-blended compositing and layering
  - Sprite sheet packing (shelf bin packing) with metadata
  - Built-in 8x8 pixel font (full printable ASCII)
  - Procedural VFX generators (explosion, ring, glow, trail, flash, sparks)
  - Procedural noise (value noise, fractal Brownian motion)
  - Gradients (linear, radial, diagonal)
  - Nine-slice UI panel scaling
  - Ordered Bayer dithering for palette reduction
  - Tilemap rendering from sprite atlas
  - BMP export (32-bit BGRA, raw header bytes)
  - PNG export (32-bit RGBA, zlib compressed)

  **Core dependencies:** `base`, `bytestring`, `zlib`.

  ---

  ## Architecture

  ```
  src/GBSprite/
  тФЬтФАтФА Color.hs       RGBA type, named colors, lerp, multiply, alpha blend
  тФЬтФАтФА Canvas.hs      2D pixel grid (strict ByteString), drawing primitives
  тФЬтФАтФА Draw.hs        Thick lines, polygons, ellipses, arcs, Bezier curves
  тФЬтФАтФА Palette.hs     Indexed palettes (gameboy, NES), palette swap
  тФЬтФАтФА Sprite.hs      Named sprite with origin, frames, bounding box
  тФЬтФАтФА Animation.hs   Loop/Once/PingPong frame sequencing
  тФЬтФАтФА Transform.hs   Flip, rotate, scale, outline, drop shadow
  тФЬтФАтФА Compose.hs     Alpha-blended layering and stamping
  тФЬтФАтФА Sheet.hs       Shelf bin packing into sprite atlas
  тФЬтФАтФА Text.hs        Built-in 8x8 pixel font rendering
  тФЬтФАтФА Tilemap.hs     Tile-based map rendering from atlas
  тФЬтФАтФА VFX.hs         Procedural effects (explosion, ring, glow, trail, etc.)
  тФЬтФАтФА Noise.hs       Value noise, fractal Brownian motion
  тФЬтФАтФА Gradient.hs    Linear, radial, diagonal gradients
  тФЬтФАтФА NineSlice.hs   UI panel scaling with border preservation
  тФЬтФАтФА Dither.hs      Ordered Bayer dithering for palette reduction
  тФЬтФАтФА BMP.hs         32-bit BGRA BMP export
  тФЬтФАтФА PNG.hs         32-bit RGBA PNG export (zlib compressed)
  тФФтФАтФА Export.hs      Unified export API (BMP + PNG)
  ```

  ### Pipeline

  ```
  Canvas тЖТ Draw/Transform/Compose тЖТ Sprite тЖТ Animation тЖТ Sheet (atlas) тЖТ BMP/PNG
                                                    тЖЧ
  VFX generators тЖТ [Canvas] frames тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФШ
  ```

  ---

  ## Usage

  ### As a dependency

  Add to your `.cabal` file:

  ```cabal
  build-depends: gb-sprite >= 0.3
  ```

  ### Generating sprites

  ```haskell
  import GBSprite.Canvas (newCanvas, fillCircle)
  import GBSprite.Color (red, transparent)
  import GBSprite.BMP (writeBmp)

  main :: IO ()
  main = do
    let canvas = fillCircle (newCanvas 32 32 transparent) 16 16 12 red
    writeBmp "sprite.bmp" canvas
  ```

  ---

  ## API

  ### Color

  ```haskell
  data Color = Color { colorR, colorG, colorB, colorA :: !Word8 }

  -- Named colors
  red, green, blue, white, black, transparent :: Color

  -- Math
  lerp       :: Double -> Color -> Color -> Color   -- linear interpolation
  multiply   :: Color -> Color -> Color              -- component-wise multiply
  alphaBlend :: Color -> Color -> Color              -- Porter-Duff "over"
  withAlpha  :: Word8 -> Color -> Color              -- replace alpha channel
  scaleAlpha :: Double -> Color -> Color             -- scale alpha channel
  ```

  ### Canvas

  ```haskell
  data Canvas = Canvas { cWidth :: !Int, cHeight :: !Int, cPixels :: !BS.ByteString }

  newCanvas  :: Int -> Int -> Color -> Canvas        -- blank canvas filled with color
  setPixel   :: Canvas -> Int -> Int -> Color -> Canvas
  getPixel   :: Canvas -> Int -> Int -> Color
  drawLine   :: Canvas -> Int -> Int -> Int -> Int -> Color -> Canvas  -- Bresenham
  drawRect   :: Canvas -> Int -> Int -> Int -> Int -> Color -> Canvas
  fillRect   :: Canvas -> Int -> Int -> Int -> Int -> Color -> Canvas
  drawCircle :: Canvas -> Int -> Int -> Int -> Color -> Canvas
  fillCircle :: Canvas -> Int -> Int -> Int -> Color -> Canvas
  floodFill  :: Canvas -> Int -> Int -> Color -> Canvas
  ```

  ### Draw

  ```haskell
  drawThickLine :: Canvas -> Int -> Int -> Int -> Int -> Int -> Color -> Canvas
  drawPolygon   :: Canvas -> [(Int, Int)] -> Color -> Canvas
  fillPolygon   :: Canvas -> [(Int, Int)] -> Color -> Canvas  -- scanline fill
  drawEllipse   :: Canvas -> Int -> Int -> Int -> Int -> Color -> Canvas
  fillEllipse   :: Canvas -> Int -> Int -> Int -> Int -> Color -> Canvas
  drawArc       :: Canvas -> Int -> Int -> Int -> Int -> Double -> Double -> Color -> Canvas
  drawBezier    :: Canvas -> (Int,Int) -> (Int,Int) -> (Int,Int) -> Color -> Canvas
  drawRoundRect :: Canvas -> Int -> Int -> Int -> Int -> Int -> Color -> Canvas
  fillRoundRect :: Canvas -> Int -> Int -> Int -> Int -> Int -> Color -> Canvas
  ```

  ### Transform

  ```haskell
  flipH, flipV         :: Canvas -> Canvas
  rotate90, rotate180, rotate270 :: Canvas -> Canvas
  scaleNearest :: Int -> Canvas -> Canvas            -- nearest-neighbor upscale
  outline      :: Color -> Canvas -> Canvas          -- outline non-transparent pixels
  dropShadow   :: Int -> Int -> Color -> Canvas -> Canvas
  ```

  ### Compose

  ```haskell
  stamp      :: Canvas -> Int -> Int -> Canvas -> Canvas  -- direct overwrite
  stampAlpha :: Canvas -> Int -> Int -> Canvas -> Canvas   -- alpha blended
  overlay    :: Canvas -> Canvas -> Canvas                 -- same-size blend
  overlayAt  :: Canvas -> Int -> Int -> Canvas -> Canvas   -- offset blend
  ```

  ### Noise

  Deterministic procedural noise for textures and terrain:

  ```haskell
  valueNoise      :: Int -> Int -> Int -> Double -> Canvas              -- width, height, seed, scale
  valueNoiseColor :: Int -> Int -> Int -> Double -> Color -> Color -> Canvas  -- noise between two colors
  fbm             :: Int -> Int -> Int -> Int -> Double -> Canvas       -- fractal Brownian motion
  ```

  ### Gradient

  ```haskell
  linearGradient   :: Int -> Int -> Color -> Color -> Bool -> Canvas  -- horizontal or vertical
  radialGradient   :: Int -> Int -> Int -> Int -> Int -> Color -> Color -> Canvas  -- center, radius
  diagonalGradient :: Int -> Int -> Color -> Color -> Canvas          -- top-left to bottom-right
  ```

  ### NineSlice

  Scale UI panels while preserving borders:

  ```haskell
  data NineSlice = NineSlice
    { nsCanvas :: !Canvas, nsLeft :: !Int, nsRight :: !Int, nsTop :: !Int, nsBottom :: !Int }

  nineSlice       :: Canvas -> Int -> Int -> Int -> Int -> NineSlice  -- define border regions
  renderNineSlice :: NineSlice -> Int -> Int -> Canvas                -- render at target size
  ```

  ### Palette

  Indexed color palettes for retro-style coloring and palette swaps:

  ```haskell
  newtype Palette = Palette { paletteColors :: [Color] }

  -- Built-in palettes
  grayscale4, grayscale8 :: Palette            -- 4/8-shade grayscale ramps
  gameboy              :: Palette              -- authentic DMG green palette
  nes                  :: Palette              -- 16-color NES-inspired palette

  -- Operations
  fromColors   :: [Color] -> Palette           -- build palette from color list
  paletteColor :: Palette -> Int -> Color      -- look up color by index (clamped)
  paletteSwap  :: Palette -> Palette -> Color -> Color  -- remap source to destination
  ```

  ### Sprite

  Named multi-frame images with origin and bounding box:

  ```haskell
  data Sprite = Sprite
    { spriteName :: !String, spriteOriginX :: !Int, spriteOriginY :: !Int
    , spriteFrames :: ![Canvas], spriteBounds :: !(Maybe BoundingBox) }

  data BoundingBox = BoundingBox
    { bbX :: !Int, bbY :: !Int, bbWidth :: !Int, bbHeight :: !Int }

  singleFrame  :: String -> Canvas -> Sprite                 -- single-frame at origin (0,0)
  multiFrame   :: String -> Int -> Int -> [Canvas] -> Sprite -- name, originX, originY, frames
  spriteWidth  :: Sprite -> Int
  spriteHeight :: Sprite -> Int
  frameCount   :: Sprite -> Int
  getFrame     :: Sprite -> Int -> Maybe Canvas              -- safe index lookup
  ```

  ### Dither

  Ordered dithering for retro palette reduction:

  ```haskell
  data DitherMatrix = Bayer2 | Bayer4 | Bayer8

  orderedDither :: DitherMatrix -> Palette -> Canvas -> Canvas  -- reduce to palette with dithering
  ```

  ### Sheet

  ```haskell
  data SpriteSheet = SpriteSheet { sheetCanvas :: !Canvas, sheetEntries :: ![SheetEntry] }
  data SheetEntry  = SheetEntry  { entryName :: !String, entryX, entryY, entryWidth, entryHeight :: !Int }

  packSheet :: Int -> [(String, Canvas)] -> SpriteSheet   -- shelf bin packing
  ```

  ### Text

  ```haskell
  defaultFont :: Font                                     -- built-in 8x8 pixel font
  renderText  :: Font -> Color -> String -> Canvas
  renderChar  :: Font -> Color -> Char -> Canvas
  textWidth   :: Font -> String -> Int
  textHeight  :: Font -> Int
  ```

  ### VFX

  ```haskell
  explosionFrames  :: ExplosionConfig -> [Canvas]   -- radial particle burst
  ringExpandFrames :: RingConfig -> [Canvas]         -- expanding ring
  glowPulseFrames  :: GlowConfig -> [Canvas]        -- pulsing aura
  trailFrames      :: TrailConfig -> [Canvas]        -- fading trail
  flashFrames      :: Int -> Color -> [Canvas]       -- solid color fade-out
  sparksFrames     :: SparksConfig -> [Canvas]       -- directional spark burst
  ```

  ### Animation

  ```haskell
  data LoopMode = Loop | Once | PingPong

  data Animation = Animation
    { animFrameDelay :: !Int, animFrameCount :: !Int, animLoopMode :: !LoopMode }

  animation         :: Int -> Int -> LoopMode -> Animation -- delay, frame count, mode
  loopAnimation     :: Int -> Int -> Animation           -- delay, frame count
  onceAnimation     :: Int -> Int -> Animation
  pingPongAnimation :: Int -> Int -> Animation
  animationFrame    :: Animation -> Int -> Int            -- animation, tick тЖТ frame index
  animationDone     :: Animation -> Int -> Bool           -- animation, tick тЖТ finished?
  ```

  ### Tilemap

  Tile-based map rendering from a sprite atlas:

  ```haskell
  data TilemapConfig = TilemapConfig
    { tmTileWidth :: !Int, tmTileHeight :: !Int
    , tmGridWidth :: !Int, tmGridHeight :: !Int
    , tmTiles :: ![Int] }                                    -- row-major tile indices

  renderTilemap :: SpriteSheet -> TilemapConfig -> Canvas     -- render grid from atlas
  ```

  ### BMP / Export

  ```haskell
  encodeBmp :: Canvas -> BL.ByteString               -- pure: canvas тЖТ BMP bytes (lazy)
  writeBmp  :: FilePath -> Canvas -> IO ()            -- write BMP file
  encodePng :: Canvas -> BL.ByteString               -- pure: canvas тЖТ PNG bytes (lazy)
  writePng  :: FilePath -> Canvas -> IO ()            -- write PNG file
  exportBmp :: FilePath -> Canvas -> IO ()            -- re-export of writeBmp (GBSprite.Export)
  exportPng :: FilePath -> Canvas -> IO ()            -- re-export of writePng (GBSprite.Export)
  ```

  ---

  ## Example

  Generate a sprite sheet with explosion VFX and a dithered background:

  ```haskell
  import GBSprite.Canvas (newCanvas, fillCircle)
  import GBSprite.Color (red, yellow, transparent)
  import GBSprite.Dither (DitherMatrix (..), orderedDither)
  import GBSprite.Gradient (linearGradient)
  import GBSprite.Palette (gameboy)
  import GBSprite.Sheet (SpriteSheet (..), packSheet)
  import GBSprite.VFX (ExplosionConfig (..), explosionFrames)
  import GBSprite.BMP (writeBmp)

  main :: IO ()
  main = do
    -- Dithered background using Game Boy palette
    let gradient = linearGradient 64 64 red yellow True
        background = orderedDither Bayer4 gameboy gradient

    -- Simple character sprite
    let character = fillCircle (newCanvas 16 16 transparent) 8 8 6 red

    -- Generate explosion frames
    let explosion = explosionFrames ExplosionConfig
          { expSize = 32
          , expFrameCount = 8
          , expParticleCount = 20
          , expColor = yellow
          , expSeed = 42
          }

    -- Pack everything into a sprite sheet
    let items = ("background", background)
              : ("character", character)
              : zip (map (\i -> "explosion_" ++ show i) [0::Int ..]) explosion
        sheet = packSheet 1 items

    -- Export the atlas
    writeBmp "sprites.bmp" (sheetCanvas sheet)
  ```

  ---

  ## Build & Test

  Requires [GHCup](https://www.haskell.org/ghcup/) with GHC >= 9.8.

  ```bash
  cabal build                              # Build library
  cabal test                               # Run all tests (366 pure tests)
  cabal build --ghc-options="-Werror"      # Warnings as errors
  cabal haddock                            # Generate docs
  ```

