changelog: |
  # Changelog

  All notable changes to `tricorder` will be documented in this file.

  The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
  and this project adheres to the [PVP](https://pvp.haskell.org/).

  ## [0.1.1.0] - 2026-06-26

  ### Added

  - Configurable `watch_exclusion_patterns` to exclude paths from the file
    watcher.
  - The TUI now presents its different views as tabs.

  ### Fixed

  - Terminate the whole cabal process group on shutdown, so children that trap
    `SIGINT` are no longer left running.
  - Correct watch-directory scoping for bare package-name targets in a
    multi-package project.
  - Building no longer fails for packages that use a custom prelude.
  - Use the correct set of targets when constructing the build command.
  - Surface location-less GHCi load failures (e.g. plugin errors) without
    reporting false positives.
  - Clear stale diagnostics for failed executable and test `Main` modules.

  ## [0.1.0.1] - 2026-06-06

  ### Fixed

  - Renamed the installed executable from `tricorder-exe` to `tricorder` so
    `cabal install tricorder` provides a binary matching the package name.

  ## [0.1.0.0] - 2026-06-05

  ### Added

  - Initial release: daemon-based GHCi build monitor communicating over a Unix
    socket.
  - Commands: `start`, `stop`, `status [--wait]`, `watch`.
  - `status` outputs structured JSON with build phase, module count, duration,
    and messages; each message includes `severity`, `file`, `line`/`col`,
    `title` (first line), and `text` (full body).
  - Auto-detects cabal/stack projects and builds the
    `cabal repl --enable-multi-repl` command.
  - Parses `.cabal` files to resolve `hs-source-dirs` for targeted file watching.
  - Configurable via `.tricorder.toml` (targets, debounce, log file, etc.).
  - File watcher with debouncing; auto-restarts the GHCi session on crash
    (fixes ghcid's crash-on-file-removal bug).
changelog-type: markdown
description: |
  # tricorder

  `tricorder` empowers developers and LLM coding agents working with Haskell by surfacing the right information at each stage: build status, diagnostics, test results, and documentation.

  Like `ghcid` and `ghciwatch`, it rebuilds continuously on every change and reports diagnostics — but it runs builds in a background daemon so multiple clients (an interactive TUI, a `tricorder status` CLI, a Claude Code skill) can query a single shared build state without triggering redundant rebuilds. It discovers components across multi-package `cabal.project` workspaces automatically and ships context-friendly output for agentic use.

  See the [repository README](https://github.com/atelier-hub/tricorder#readme) for installation (Nix, Home Manager, NixOS), Claude Code plugin setup, configuration, and custom key bindings.

  ## Built on atelier

  `tricorder` is built on the **atelier** toolkit, also developed in this repository:

  - [`atelier-prelude`](https://github.com/atelier-hub/tricorder/tree/main/atelier-prelude) — relude-based prelude with Effectful conventions
  - [`atelier-core`](https://github.com/atelier-hub/tricorder/tree/main/atelier-core) — foundational effects and utilities
  - [`atelier-db`](https://github.com/atelier-hub/tricorder/tree/main/atelier-db) — relational database effect (Hasql/Rel8)
  - [`atelier-testing`](https://github.com/atelier-hub/tricorder/tree/main/atelier-testing) — database-backed test utilities

  ## License

  MIT — see [LICENSE](LICENSE).
