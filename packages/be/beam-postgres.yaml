changelog: "# 0.6.1.0\n\n## Added features\n\n* Added file-mode `COPY ... TO 'file'`
  / `COPY ... FROM 'file'` support\n  via the new `MonadBeamCopyTo` / `MonadBeamCopyFrom`
  instances on `Pg`.\n  Smart constructors `copyToText` / `copyToCSV` (and `copyFromText`
  /\n  `copyFromCSV`, plus `*With` variants) build the per-format options\n  records.
  Note that this requires the `pg_write_server_files` /\n  `pg_read_server_files`
  role (or superuser) on the connecting role —\n  see `Database.Beam.Postgres.Extensions.Copy.File`.\n*
  Added streaming `COPY ... TO STDOUT` / `COPY ... FROM STDIN` support\n  via the
  new `MonadBeamCopyToStream` / `MonadBeamCopyFromStream`\n  instances on `Pg`. Smart
  constructors `copyToTextStream` /\n  `copyToCSVStream` / `copyFromTextStream` /
  `copyFromCSVStream` build\n  the per-format options. Streaming COPY does not require
  any special\n  role attribute and is the appropriate choice when the client and\n
  \ server are on different hosts — see\n  `Database.Beam.Postgres.Extensions.Copy.Stream`.\n
  \ \n## Bug fixes\n\n* Fixed an issue where a window function applied over the result
  of `nub_` (or\n  the Postgres-specific `pgNubBy_`) would emit `DISTINCT` and the
  window\n  expression in the same `SELECT`, causing the window to evaluate against
  the\n  pre-deduplicated rows. The inner select is now materialised as a subquery\n
  \ whenever it carries `DISTINCT`, `GROUP BY`, or `HAVING` (#756).\n\n# 0.6.0.0\n\n##
  Interface changes\n\n* Removed `week_` from `Database.Beam.Postgres.PgSpecific`.
  The same\n  functionality is now available in `beam-core` as a backend-agnostic\n
  \ `week_` extract field; import it from `Database.Beam.Query.Extract` (or\n  re-exported
  through `Database.Beam`) instead.\n* Replaced the single `BeamSqlBackendHasSerial
  Postgres` instance with three\n  width-specific instances `BeamSqlBackendHasSerial
  Int16/Int32/Int64\n  Postgres`, mapping respectively to `smallserial`, `serial`,
  and\n  `bigserial`. Existing code using `genericSerial` for a `SqlSerial Int32`\n
  \ column continues to work; other widths are now also supported (#534).\n\n## Added
  features\n\n* Implemented the new `runInsertReturningListWith` /\n  `runUpdateReturningListWith`
  / `runDeleteReturningListWith` class methods\n  on the `Pg` monad. These let callers
  project a subset of columns from the\n  affected rows of an `INSERT` / `UPDATE`
  / `DELETE ... RETURNING` (#801).\n* Implemented `weekField` for `PgExtractFieldSyntax`,
  supporting the new\n  backend-agnostic `week_` extract field from `beam-core`.\n\n##
  Updated dependencies\n\n* Bumped the lower bound on `beam-core` to `0.11`.\n\n#
  0.5.6.1\n\n## Bug fixes\n\n* Fixed a critical bug introduced by the performance
  improvements of 0.5.6.0, which would\n  result in unexpected type errors when executing
  database queries.\n  While the bug has been fixed, performance remains as good as
  the 0.5.6.0 release (#803)\n\n# 0.5.6.0\n\n## Added features\n\n* Support for temporary
  tables.\n\n* `getDbConstraintsForSchemas` now discovers foreign key constraints\n
  \ via `pg_constraint`, including `ON DELETE` / `ON UPDATE` actions.\n\n## Performance
  improvements\n\n* By minimizing redundant work in the hot loop, the performance
  of `beam-postgres`\n  when fetching data from a database has been improved by 30%.
  The performance\n  of `beam-postgres` is now within 10% of raw queries via `postgresql-simple`
  (#797).\n\n# 0.5.5.0\n\n## Added features\n\n* Add support for creating secondary
  indices, supporting both `CREATE INDEX` and\n  `CREATE UNIQUE INDEX`. `getDbConstraintsForSchemas`
  now discovers user-created\n  secondary indices via `pg_index` (excluding primary
  keys and\n  constraint-backing indices).\n\n# 0.5.4.4\n\n## Added features\n\n*
  Added the array functions `arrayAppend_`, `arrayPrepend_`, `arrayRemove_`, `arrayReplace_`,
  `arrayShuffle_`, `arraySample_`, `arrayToString_`, and `arrayToStringWithNull_`
  (#770)\n\n## Updated dependencies\n\n* Updated the upper bound on `time` to include
  `time-1.14`\n\n# 0.5.4.3\n\n## Added features\n\n * Added `pgSelectWith`, a combinator
  like `selectWith` which allows to nest common table expressions in subqueries (#720).\n\n##
  Bug fixes\n\n * Added the ability to migrate Postgres' array types (#354).\n * Remove
  dependency on `haskell-src-exts`, which was not in use anymore.\n\n# 0.5.4.2\n\n##
  Bug fixes\n\n * Fixed an issue where columns of type `Maybe (Vector a)` did not
  marshall correctly from the database. In particular, querying a `Nothing` would
  return `Just (Vector.fromList [])` instead (#692).\n\n# 0.5.4.1\n\n## Bug fixes\n\n
  * Fixed an issue where inexact numeric literals (e.g. Haskell type `Double`) were
  implicitly converted to Postgres `NUMERIC`, triggering a runtime conversion error
  (#700).\n\n# 0.5.4.0\n\n## Added features\n\n * Better error messages on column
  type mismatches (#696).\n * Added support for creating and dropping database schemas
  and associated tables with `createDatabaseSchema`, `dropDatabaseSchema`, and `createTableWithSchema`
  (#716).\n\n## Documentation\n\n * Make `runBeamPostgres` and `runBeamPostgresDebug`
  easier to find (#663).\n\n# 0.5.3.1\n\n## Added features\n\n * Loosen some version
  bounds\n\n# 0.5.3.0\n\n## Bug fixes\n\n * Make sure lateral join names do not overlap\n
  * Fix `bool_or`\n\n## Addded features\n\n * Add `runSelectReturningFirst`\n * `IN
  (SELECT ...)` syntax via `inQuery_`\n\n# 0.5.2.1\n\n## Added features\n\n * Aeson
  2.0 support\n\n# 0.5.2.0\n\n## Added features\n\n * New `conduit` streaming variants
  which work directly in `MonadResource`\n * Heterogeneous variant of `ilike_`: `ilike_'`\n
  * Postgres-specific `EXTRACT` fields\n * GHC 9.2 and 9.0 support\n\n## Bug fixes\n\n
  * Throw correct exception for row errors in `conduit` implementation\n * Support
  emitting UUID values in context where type cannot be inferred by Postgres\n\n# 0.5.1.0\n\n##
  Added features\n\n * `MonadBase` and `MonadBaseControl` instances for `Pg`\n\n##
  Bug fixes\n\n * Fix possible memory corruption by copying row data\n * Remove invalid
  parentheses emitted by `pgUnnest`\n\n# 0.5.0.0\n\n## Interface changes\n\n * Removed
  instances for machine-dependent ambiguous integer types `Int` and `Word`\n * Fixed
  types for some functions that only work with `jsonb` and not `json`\n\n## Added
  features\n\n * Support for `in_` on row values\n * Various Postgres regex functions\n
  * Expose `fromPgIntegral` and `fromPgScientificOrIntegral`\n * Add `liftIOWithHandle
  :: (Connection -> IO a) -> Pg a`\n * Add `getDbConstraintsForSchemas` to get constraints
  without relying on the state of the connection\n * Poly-kinded instances for `Data.Tagged.Tagged`\n
  * Add `HasDefaultDatatype` for `UTCTime`\n * Support for specifically-sized `SqlSerial`
  integers (`smallserial`, `serial`, `bigserial`)\n * Predicate detection for extensions\n
  * `pgArrayToJson` for `array_to_json`\n * Extension definition and all functions
  provided by `uuid-ossp`\n * GHC 8.8 support\n\n## Bug fixes\n\n * Only detect primary
  keys of tables in visible schemas\n * Fix emitting of `DECIMAL` type\n * Report
  JSON correct decoding errors instead of throwing `UnexpectedNull`\n\n## Behavior
  changes\n\n * `runReturningOne` and `runResturningList` now fetch all rows at once
  instead of using cursors\n\n# 0.4.0.0\n\n# 0.3.2.0\n\nAdd `Semigroup` instances
  to prepare for GHC 8.4 and Stackage nightly\n\n# 0.3.1.0\n\nAdd `runBeamPostgres`
  and `runBeamPostgresDebug` functions.\n\n# 0.3.0.0\n\nInitial hackage beam-postgres\n"
