changelog: |
  # Revision history for beam-duckdb

  ## 0.1.1.0 -- unreleased

  * Fixed an issue with modeling boolean conditions, whereby, for example, checking if something was true was modeled as `... IS 1` (as for Sqlite), rather than `... IS TRUE` (like Postgres).
  * Added a `FromBackendRow DuckDB Scientific`, `HasSqlEqualityCheck DuckDB Scientific`, and `HasSqlQuantifiedEqualityCheck DuckDB Scientific` instances, which are required to build the documentation.

  ## 0.1.0.0 -- 2026-02-26

  * First version. Released on an unsuspecting world.
changelog-type: markdown
description: "# `beam-duckdb`: Beam backend for the DuckDB analytics database\n\n`beam-duckdb`
  is a beam backend for\nthe [DuckDB analytics database](https://duckdb.org/). \n\n`beam-duckdb`
  extends the set of capabilities provided by `beam-core` in a few key\nways. Most
  importantly, sources of data _other_ than database tables can be\nloaded by DuckDB
  and used for queries like a regular table. Currently, `beam-duckdb`\nsupports loading
  Parquet files, Apache Iceberg tables, and CSV files.\n\n`beam-duckdb` is the most
  recent backend for beam; do not hesitate to raise an issue\nif you'd like us to
  add support for something that isn't currently covered!\n\n## Installation\n\nThe
  underlying duckdb-ffi needs to link to libduckdb. By default the installation assumes:\n\n*
  The duckdb files are in `/usr/lib/duckdb`\n* You're using duckdb 1.4.*\n\nFor Linux
  you can install a blessed version of duckdb in the correct path by cloining the
  duckdb-hasekll repo and running `make install` in the [duckdb-ffi cbits folder](https://github.com/Tritlo/duckdb-haskell/tree/main/duckdb-ffi/cbits).\n\n##
  Example\n\nFrom the project root directory, execute `cabal run ./examples/ExamScores.hs`.\n"
