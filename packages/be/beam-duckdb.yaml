description: "# `beam-duckdb`: Beam backend for the DuckDB analytics database\n\n`beam-duckdb`
  is a beam backend for\nthe [DuckDB analytics database](https://duckdb.org/). \n\n`beam-duckdb`
  extends the set of capabilities provided by `beam-core` in a few key\nways. Most
  importantly, sources of data _other_ than database tables can be\nloaded by DuckDB
  and used for queries like a regular table. Currently, `beam-duckdb`\nsupports loading
  Parquet files, Apache Iceberg tables, and CSV files.\n\n`beam-duckdb` is the most
  recent backend for beam; do not hesitate to raise an issue\nif you'd like us to
  add support for something that isn't currently covered!\n"
