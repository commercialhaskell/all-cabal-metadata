description: |-
  ymonad is a tiling window manager for Wayland that utilizes river for
  low-level Wayland integration. It is designed to offer an API surface similar
  to xmonad, ensuring familiarity for existing xmonad users and delivering a
  composable, keyboard-driven workflow on Wayland.
