changelog: |
  # Revision history for time-domain

  ## 1.7

  * Introduce `Seconds` time domain
  * Base the `TimeDomain` class hierarchy on `Group` (from `monoid-extras`) and `RightAction` (from `changeset`)
  * Extend the `TimeDifference` type class

  ## 0.1.0.5

  * Support GHC 9.10

  ## 0.1.0.4

  * Relax time version bounds

  ## 0.1.0.3

  * Support GHC 9.8
changelog-type: markdown
description: |-
  This library mainly provides a type class, 'TimeDomain',
  which can be used to specify times and durations.
  There are some instances for standard types from @base@ and @time@.
