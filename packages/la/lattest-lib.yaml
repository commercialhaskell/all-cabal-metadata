changelog: |+
  # Changelog for `lattest-lib`

  All notable changes to this project will be documented in this file.

  The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
  and this project adheres to the
  [Haskell Package Versioning Policy](https://pvp.haskell.org/).

  ## Unreleased

  ## 0.1.1 - 2026-07-15
  Bugfix patch: adds instance OrdTraversable FreeLattice, and properly kills the reading thread before its socket is closed.

  ## 0.1.0.0 - 2026-07-14
  First release

changelog-type: markdown
description: |-
  Welcome to Lattest, the latest attested lattice testing tech!

  The purpose of Lattest to assist in model-based testing: set up a test for external systems, where the expected behaviour of that system
  is expressed as a specification model in the form of an automaton.

  For details on setting up such a test, see "Lattest.Exec.Testing"
