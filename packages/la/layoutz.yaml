description: "<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-demo.png\"
  width=\"750\">\n</p>\n\n# <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/layoutz.png\"
  width=\"60\"> layoutz\n\n**Simple, beautiful CLI output \U0001FAB6**\n\nA lightweight,
  zero-dep lib to build compositional ANSI strings, terminal plots, \nand interactive
  Elm-style TUI's in pure Haskell.\n\nPart of [d4](https://github.com/mattlianje/d4)
  · Also in [Scala](https://github.com/mattlianje/layoutz), [OCaml](https://github.com/mattlianje/layoutz/tree/master/layoutz-ocaml)\n\n##
  Features\n- Pure Haskell, zero dependencies (use `Layoutz.hs` like a header file)\n-
  Elm-style TUIs\n- Layout primitives, tables, trees, lists, CJK-aware\n- Colors,
  ANSI styles, rich formatting\n- Terminal charts and plots\n- Widgets: text input,
  spinners, progress bars\n- Implement `Element` to add your own primitives\n- Easy
  porting to MicroHs\n\n<p align=\"center\">\n<img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/showcase-demo.gif\"
  width=\"650\">\n<br>\n<sub><a href=\"examples/ShowcaseApp.hs\">ShowcaseApp.hs</a></sub>\n</p>\n\nLayoutz
  also lets you drop animations into build scripts or any stdout, without heavy \"frameworks\",\njust
  bring your Elements to life Elm-style and render them inline...\n\n<p align=\"center\">\n<img
  src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/inline-demo.gif\"
  width=\"650\">\n<br>\n<sub><a href=\"examples/InlineBar.hs\">InlineBar.hs</a></sub>\n</p>\n\n##
  Table of Contents\n- [Installation](#installation)\n- [Quickstart](#quickstart)\n-
  [Why layoutz?](#why-layoutz)\n- [Core Concepts](#core-concepts)\n- [Elements](#elements)\n-
  [Border Styles](#border-styles)\n- [Charts & Plots](#charts--plots)\n- [Colors &
  Styles](#colors-ansi-support)\n- [Custom Components](#custom-components)\n- [Interactive
  Apps](#interactive-apps)\n- [Examples](#examples)\n- [Contributing](#contributing)\n\n##
  Installation\n\n**Add Layoutz on [Hackage](https://hackage.haskell.org/package/layoutz)
  to your project's `.cabal` file:**\n```haskell\nbuild-depends: layoutz\n```\n\nAll
  you need:\n```haskell\nimport Layoutz\n```\n\n## Quickstart\n\n**(1/2) Static rendering**
  - Beautiful, compositional strings:\n\n```haskell\nimport Layoutz\n\ndemo = layout\n
  \ [ center $ row\n      [ withStyle StyleBold $ text \"Layoutz\"\n      , withColor
  ColorCyan $ underline' \"ˆ\" $ text \"DEMO\"\n      ]\n  , br\n  , row\n    [ statusCard
  \"Users\" \"1.2K\"\n    , withBorder BorderDouble $ statusCard \"API\" \"UP\"\n
  \   , withColor ColorRed $ withBorder BorderThick $ statusCard \"CPU\" \"23%\"\n
  \   , withStyle StyleReverse $ withBorder BorderRound $ table [\"Name\", \"Role\",
  \"Skills\"]\n\t[ [\"Gegard\", \"Pugilist\", ul [\"Armenian\", ul [\"bad\", ul[\"man\"]]]]\n
  \       , [\"Eve\", \"QA\", \"Testing\"]\n        ]\n    ]\n  ]\n\nputStrLn $ render
  demo\n```\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/intro-demo.png\"
  width=\"700\">\n</p>\n\n\n**(2/2) Interactive apps** - Build Elm-style TUI's:\n\n```haskell\nimport
  Layoutz\n\ndata Msg = Inc | Dec\n\ncounterApp :: LayoutzApp Int Msg\ncounterApp
  = LayoutzApp\n  { appInit = (0, CmdNone)\n  , appUpdate = \\msg count -> case msg
  of\n      Inc -> (count + 1, CmdNone)\n      Dec -> (count - 1, CmdNone)\n  , appSubscriptions
  = \\_ -> subKeyPress $ \\key -> case key of\n      KeyChar '+' -> Just Inc\n      KeyChar
  '-' -> Just Dec\n      _           -> Nothing\n  , appView = \\count -> layout\n
  \     [ section \"Counter\" [text $ \"Count: \" <> show count]\n      , ul [\"Press
  '+' or '-'\", \"ESC to quit\"]\n      ]\n  }\n\nmain = runApp counterApp\n```\n<p
  align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/counter-demo.gif\"
  width=\"650\">\n</p>\n\n## Why layoutz?\n- We have `printf` and [full-blown](https://hackage.haskell.org/package/brick)
  TUI libraries - but there's a gap in-between\n- **layoutz** is a tiny, declarative
  DSL for structured CLI output\n- On the side, it has a little Elm-style runtime
  + keyhandling DSL to animate your elements, much like a flipbook...\n     - But
  you can just use **Layoutz** without any of the TUI stuff\n\n## Core concepts\n-
  Every piece of content is an `Element`\n- Elements are **immutable** and **composable**
  - build complex layouts by combining simple elements\n- A `layout` arranges elements
  **vertically**:\n```haskell\nlayout [elem1, elem2, elem3]  -- Joins with \"\\n\"\n```\nCall
  `render` on any element to get a string\n\nThe power comes from **uniform composition**
  - since everything has the `Element` typeclass, everything can be combined.\n\n###
  String Literals\nWith `OverloadedStrings` enabled, you can use string literals directly:\n```haskell\nlayout
  [\"Hello\", \"World\"]  -- Instead of layout [text \"Hello\", text \"World\"]\n```\n\n**Note:**
  When passing to functions that take polymorphic `Element a` parameters (like `underline'`,
  `center'`, `pad`), use `text` explicitly:\n```haskell\nunderline' \"=\" $ text \"Title\"
  \ -- Correct\nunderline' \"=\" \"Title\"         -- Ambiguous type error\n```\n\n##
  Border Styles\n\nApplied via `withBorder` to any element with the `HasBorder` typeclass
  (`box`, `statusCard`, `table`):\n```haskell\nwithBorder BorderRound $ box \"Info\"
  [\"content\"]\nwithBorder BorderDouble $ statusCard \"API\" \"UP\"\nwithBorder BorderThick
  $ table [\"Name\"] [[\"Alice\"]]\n```\n\nWrite generic code over bordered elements:\n```haskell\nmakeThick
  :: HasBorder a => a -> a\nmakeThick = setBorder BorderThick\n```\n\n```haskell\nBorderNormal
  \                 -- ┌─┐ (default)\nBorderDouble                  -- ╔═╗\nBorderThick
  \                  -- ┏━┓\nBorderRound                   -- ╭─╮\nBorderAscii                   --
  +-+\nBorderBlock                   -- ███\nBorderDashed                  -- ┌╌┐\nBorderDotted
  \                 -- ┌┈┐\nBorderInnerHalfBlock          -- ▗▄▖\nBorderOuterHalfBlock
  \         -- ▛▀▜\nBorderMarkdown                -- |-|\nBorderCustom \"+\" \"=\"
  \"|\"      -- Custom border\nBorderNone                    -- No borders\n```\n\n##
  Elements\n\n### Text: `text`\n```haskell\ntext \"hello\"\n\"hello\"                                      --
  with OverloadedStrings\n```\n\n### Line Break: `br`\n```haskell\nlayout [text \"Line
  1\", br, text \"Line 2\"]\n```\n\n### Layout (vertical): `layout`\n```haskell\nlayout
  [\"First\", \"Second\", \"Third\"]\n```\n```\nFirst\nSecond\nThird\n```\n\n### Row
  (horizontal): `row`, `tightRow`\n```haskell\nrow [\"Left\", \"Middle\", \"Right\"]\ntightRow
  [text \"A\", text \"B\", text \"C\"]      -- no spacing\n```\n```\nLeft Middle Right\nABC\n```\n\n###
  Horizontal Rule: `hr`, `hr'`, `hr''`\n```haskell\nhr                                           --
  default ──────────\nhr' \"~\"                                      -- custom char\nhr''
  \"=\" 20                                  -- custom char + width\n```\n```\n──────────────────────────────────────────────────\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n====================\n```\n\n###
  Vertical Rule: `vr`, `vr'`, `vr''`\n```haskell\nvr                                           --
  default: 10 high with │\nvr' \"║\"                                      -- custom
  char\nvr'' \"|\" 5                                   -- custom char + height\n```\n\n###
  Box: `box`\n```haskell\nbox \"Status\" [text \"All systems go\"]\nwithBorder BorderDouble
  $ box \"Fancy\" [text \"Double border\"]\nwithBorder BorderRound $ box \"Smooth\"
  [text \"Rounded corners\"]\n```\n```\n┌──Status──────────┐\n│ All systems go   │\n└──────────────────┘\n╔══Fancy═══════════╗\n║
  Double border    ║\n╚══════════════════╝\n╭──Smooth────────────╮\n│ Rounded corners
  \   │\n╰────────────────────╯\n```\n\nPipe any element through `withBorder`:\n```haskell\nwithBorder
  BorderRound $ box \"Info\" [\"content\"]\nwithBorder BorderDouble $ statusCard \"API\"
  \"UP\"\nwithBorder BorderThick $ table [\"Name\"] [[\"Alice\"]]\n```\n\n### Status
  Card: `statusCard`\n```haskell\nrow [ withColor ColorGreen $ statusCard \"CPU\"
  \"45%\"\n    , withColor ColorCyan $ statusCard \"MEM\" \"2.1G\"\n    ]\n```\n```\n┌──────┐
  ┌───────┐\n│ CPU  │ │ MEM   │\n│ 45%  │ │ 2.1G  │\n└──────┘ └───────┘\n```\n\n###
  Table: `table`\n```haskell\ntable [\"Name\", \"Age\", \"City\"]\n  [ [\"Alice\",
  \"30\", \"New York\"]\n  , [\"Bob\", \"25\", \"\"]\n  , [\"Charlie\", \"35\", \"London\"]\n
  \ ]\n```\n```\n┌─────────┬─────┬──────────┐\n│ Name    │ Age │ City     │\n├─────────┼─────┼──────────┤\n│
  Alice   │ 30  │ New York │\n│ Bob     │ 25  │          │\n│ Charlie │ 35  │ London
  \  │\n└─────────┴─────┴──────────┘\n```\n\n### Key-Value: `kv`\n```haskell\nkv [(\"Name\",
  \"Alice\"), (\"Age\", \"30\"), (\"City\", \"NYC\")]\n```\n```\nName: Alice\nAge:
  \ 30\nCity: NYC\n```\n\n### Section: `section`, `section'`, `section''`\n```haskell\nsection
  \"Status\" [text \"All systems operational\"]\nsection' \"-\" \"Status\" [text \"ok\"]
  \           -- custom glyph\nsection'' \"#\" \"Report\" 5 [text \"42\"]         --
  custom glyph + width\n```\n```\n=== Status ===\nAll systems operational\n```\n\n###
  Unordered List: `ul`\n```haskell\nul [\"Backend\", ul [\"API\", ul [\"REST\", \"GraphQL\"],
  \"DB\"], \"Frontend\"]\n```\n```\n• Backend\n  ◦ API\n    ▪ REST\n    ▪ GraphQL\n
  \ ◦ DB\n• Frontend\n```\n\n### Ordered List: `ol`\n```haskell\nol [\"Setup\", ol
  [\"Install deps\", ol [\"npm\", \"pip\"], \"Configure\"], \"Deploy\"]\n```\n```\n1.
  Setup\n  a. Install deps\n    i. npm\n    ii. pip\n  b. Configure\n2. Deploy\n```\n\n###
  Tree: `tree`, `branch`, `leaf`\n```haskell\ntree \"Project\"\n  [ branch \"src\"
  [leaf \"main.hs\", leaf \"test.hs\"]\n  , branch \"docs\" [leaf \"README.md\"]\n
  \ ]\n```\n```\nProject\n├── src\n│   ├── main.hs\n│   └── test.hs\n└── docs\n    └──
  README.md\n```\n\n### Progress Bar: `inlineBar`\n```haskell\ninlineBar \"Download\"
  0.75\n```\n```\nDownload [███████████████─────] 75%\n```\n\n### Chart: `chart`\n```haskell\nchart
  [(\"Web\", 10), (\"Mobile\", 20), (\"API\", 15)]\n```\n```\nWeb    │████████████████████────────────────────│
  10\nMobile │████████████████████████████████████████│ 20\nAPI    │██████████████████████████████──────────│
  15\n```\n\n### Spinner: `spinner`\nStyles: `SpinnerDots` (default), `SpinnerLine`,
  `SpinnerClock`, `SpinnerBounce`\n```haskell\nspinner \"Loading\" frame SpinnerDots
  \           -- ⠋ ⠙ ⠹ ⠸ ⠼ ⠴ ⠦ ⠧ ⠇ ⠏\nspinner \"Working\" frame SpinnerLine            --
  | / - \\\nspinner \"Waiting\" frame SpinnerClock           -- \U0001F550 \U0001F551
  \U0001F552 ...\nspinner \"Thinking\" frame SpinnerBounce         -- ⠁ ⠂ ⠄ ⠂\n```\n\n###
  Alignment: `center`, `alignLeft`, `alignRight`, `justify`, `wrap`\n```haskell\ncenter
  $ text \"Auto-centered\"                  -- width from siblings\ncenter' 30 $ text
  \"Fixed width\"\nalignLeft 30 \"Left\"\nalignRight 30 \"Right\"\njustify 30 \"Spaces
  are distributed evenly\"\nwrap 20 \"Long text wrapped at word boundaries\"\n```\n\n###
  Underline: `underline`, `underline'`, `underlineColored`\n```haskell\nunderline
  $ text \"Title\"\nunderline' \"=\" $ text \"Double\"\nunderlineColored \"~\" ColorCyan
  $ text \"Fancy\"\n```\n```\nTitle\n─────\n\nDouble\n======\n```\n\n### Margin: `margin`\n```haskell\nmargin
  \"[error]\" [text \"Oops\", text \"fix it\"]\n```\n```\n[error] Oops\n[error] fix
  it\n```\n\n### Padding: `pad`\n```haskell\npad 2 $ text \"Padded content\"\n```\n\n##
  Charts & Plots\n\nSee also [Granite](https://github.com/mchav/granite) for terminal
  plots in Haskell.\n\n#### Line Plot\n```haskell\nlet sinePoints = [(x, sin x) |
  x <- [0, 0.1 .. 10.0]]\nplotLine 40 10 [Series sinePoints \"sine\" ColorBrightCyan]\n```\n<p
  align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-function-1.png\"
  width=\"500\">\n</p>\n\nMultiple series:\n```haskell\nlet sinPts = [(x, sin (x *
  0.15) * 5) | x <- [0..50]]\n    cosPts = [(x, cos (x * 0.15) * 5) | x <- [0..50]]\nplotLine
  50 12\n  [ Series sinPts \"sin(x)\" ColorBrightCyan\n  , Series cosPts \"cos(x)\"
  ColorBrightMagenta\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-function-2.png\"
  width=\"500\">\n</p>\n\n#### Pie Chart\n```haskell\nplotPie 20 10\n  [ Slice 50
  \"A\" ColorBrightCyan\n  , Slice 30 \"B\" ColorBrightMagenta\n  , Slice 20 \"C\"
  ColorBrightYellow\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-pie.png\"
  width=\"500\">\n</p>\n\n#### Bar Chart\n```haskell\nplotBar 40 10\n  [ BarItem 85
  \"Mon\" ColorBrightCyan\n  , BarItem 120 \"Tue\" ColorBrightGreen\n  , BarItem 95
  \"Wed\" ColorBrightMagenta\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-bar.png\"
  width=\"500\">\n</p>\n\n```haskell\nplotBar 40 10\n  [ BarItem 100 \"Sales\" ColorBrightMagenta\n
  \ , BarItem 80  \"Costs\" ColorBrightRed\n  , BarItem 20  \"Profit\" ColorBrightCyan\n
  \ ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-bar-custom.png\"
  width=\"500\">\n</p>\n\n#### Stacked Bar Chart\n```haskell\nplotStackedBar 40 10\n
  \ [ StackedBarGroup [BarItem 30 \"Q1\" ColorDefault, BarItem 20 \"Q2\" ColorDefault,
  BarItem 25 \"Q3\" ColorDefault] \"2022\"\n  , StackedBarGroup [BarItem 35 \"Q1\"
  ColorDefault, BarItem 25 \"Q2\" ColorDefault, BarItem 30 \"Q3\" ColorDefault] \"2023\"\n
  \ , StackedBarGroup [BarItem 40 \"Q1\" ColorDefault, BarItem 30 \"Q2\" ColorDefault,
  BarItem 35 \"Q3\" ColorDefault] \"2024\"\n  ]\n```\n<p align=\"center\">\n  <img
  src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-stacked.png\"
  width=\"500\">\n</p>\n\n#### Sparkline\n```haskell\nplotSparkline [1, 4, 2, 8, 5,
  7, 3, 6]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-sparkline.png\"
  width=\"500\">\n</p>\n\n#### Heatmap\n```haskell\nplotHeatmap $ HeatmapData\n  [
  [12, 15, 22, 28, 30, 25, 18]\n  , [14, 18, 25, 32, 35, 28, 20]\n  , [10, 13, 20,
  26, 28, 22, 15]\n  ]\n  [\"Mon\", \"Tue\", \"Wed\"]\n  [\"6am\", \"9am\", \"12pm\",
  \"3pm\", \"6pm\", \"9pm\", \"12am\"]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-heatmap.png\"
  width=\"500\">\n</p>\n\n## Colors\n\nAdd ANSI colors to any element:\n\n```haskell\nlayout\n
  \ [ withColor ColorRed $ text \"The quick brown fox...\"\n  , withColor ColorBrightCyan
  $ text \"The quick brown fox...\"\n  , underlineColored \"~\" ColorRed $ text \"The
  quick brown fox...\"\n  , margin \"[INFO]\" [withColor ColorCyan $ text \"The quick
  brown fox...\"]\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-color-2.png\"
  width=\"700\">\n</p>\n\n\n```haskell\nColorBlack\nColorRed\nColorGreen\nColorYellow\nColorBlue\nColorMagenta\nColorCyan\nColorWhite\nColorBrightBlack
  \             -- Bright 8\nColorBrightRed\nColorBrightGreen\nColorBrightYellow\nColorBrightBlue\nColorBrightMagenta\nColorBrightCyan\nColorBrightWhite\nColorFull
  196                 -- 256-color palette (0-255)\nColorTrue 255 128 0           --
  24-bit RGB\nColorDefault                  -- Conditional no-op\n```\n\n### Color
  Gradients\n\nCreate beautiful gradients with extended colors:\n\n```haskell\nlet
  palette   = tightRow $ map (\\i -> withColor (ColorFull i) $ text \"█\") [16, 19..205]\n
  \   redToBlue = tightRow $ map (\\i -> withColor (ColorTrue i 100 (255 - i)) $ text
  \"█\") [0, 4..255]\n    greenFade = tightRow $ map (\\i -> withColor (ColorTrue
  0 (255 - i) i) $ text \"█\") [0, 4..255]\n    rainbow   = tightRow $ map colorBlock
  [0, 4..255]\n      where\n        colorBlock i =\n          let r = if i < 128 then
  i * 2 else 255\n              g = if i < 128 then 255 else (255 - i) * 2\n              b
  = if i > 128 then (i - 128) * 2 else 0\n          in withColor (ColorTrue r g b)
  $ text \"█\"\n\nputStrLn $ render $ layout [palette, redToBlue, greenFade, rainbow]\n```\n\n<p
  align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-color-1.png\"
  width=\"700\">\n</p>\n\n\n## Styles\n\nAdd ANSI styles to any element:\n\n```haskell\nlayout\n
  \ [ withStyle StyleBold $ text \"The quick brown fox...\"\n  , withColor ColorRed
  $ withStyle StyleBold $ text \"The quick brown fox...\"\n  , withStyle StyleReverse
  $ withStyle StyleItalic $ text \"The quick brown fox...\"\n  ]\n```\n<p align=\"center\">\n
  \ <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-styles-1.png\"
  width=\"700\">\n</p>\n\n```haskell\nStyleBold\nStyleDim\nStyleItalic\nStyleUnderline\nStyleBlink\nStyleReverse\nStyleHidden\nStyleStrikethrough\nStyleDefault
  \                 -- Conditional no-op\nStyleBold <> StyleItalic      -- Combine
  with <>\n```\n\n**Combining Styles:**\n\nUse `<>` to combine multiple styles at
  once:\n\n```haskell\nlayout\n  [ withStyle (StyleBold <> StyleItalic <> StyleUnderline)
  $ text \"The quick brown fox...\"\n  , withStyle (StyleBold <> StyleReverse) $ text
  \"The quick brown fox...\"\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-styles-2.png\"
  width=\"700\">\n</p>\n\nYou can also combine colors and styles:\n\n```haskell\nwithColor
  ColorBrightYellow $ withStyle (StyleBold <> StyleItalic) $ text \"The quick brown
  fox...\"\n```\n\n## Custom Components\n\nCreate your own components by implementing
  the `Element` typeclass\n\n```haskell\ndata Square = Square Int\n\ninstance Element
  Square where\n  renderElement (Square size)\n    | size < 2 = \"\"\n    | otherwise
  = intercalate \"\\n\" (top : middle ++ [bottom])\n    where\n      w = size * 2
  - 2\n      top = \"┌\" ++ replicate w '─' ++ \"┐\"\n      middle = replicate (size
  - 2) (\"│\" ++ replicate w ' ' ++ \"│\")\n      bottom = \"└\" ++ replicate w '─'
  ++ \"┘\"\n\n-- Helper to avoid wrapping with L\nsquare :: Int -> L\nsquare n = L
  (Square n)\n\n-- Use it like any other element\nputStrLn $ render $ row\n  [ square
  3\n  , square 5\n  , square 7\n  ]\n```\n```\n┌────┐ ┌────────┐ ┌────────────┐\n│
  \   │ │        │ │            │\n└────┘ │        │ │            │\n       │        │
  │            │\n       └────────┘ │            │\n                  │            │\n
  \                 └────────────┘\n```\n\n## REPL\n\nDrop into GHCi to experiment:\n```bash\ncabal
  repl\n```\n\n```haskell\nλ> :set -XOverloadedStrings\nλ> import Layoutz\nλ> putStrLn
  $ render $ center $ box \"Hello\" [\"World!\"]\n┌──Hello──┐\n│ World!  │\n└─────────┘\nλ>
  putStrLn $ render $ table [\"A\", \"B\"] [[\"1\", \"2\"]]\n┌───┬───┐\n│ A │ B │\n├───┼───┤\n│
  1 │ 2 │\n└───┴───┘\n```\n\n## Interactive Apps\n\n`LayoutzApp` uses the [Elm Architecture](https://guide.elm-lang.org/architecture/)
  where your\nview is simply a `layoutz` `Element`.\n\n```haskell\ndata LayoutzApp
  state msg = LayoutzApp\n  { appInit          :: (state, Cmd msg)                 --
  Initial state + startup command\n  , appUpdate        :: msg -> state -> (state,
  Cmd msg) -- Pure state transitions\n  , appSubscriptions :: state -> Sub msg                 --
  Event sources\n  , appView          :: state -> L                       -- Render
  to UI\n  }\n```\n\nThree daemon threads coordinate rendering (~30fps), tick/timers,
  and input capture. State updates flow through `appUpdate` synchronously.\n\nPress
  **ESC** to exit.\n\n### App Options\n\nCustomise how your app runs with `runAppWith`
  and the `AppOptions` record. Override only the fields you need:\n\n```haskell\nrunApp
  app                                                          -- Default options\nrunAppWith
  defaultAppOptions { optAlignment = AppAlignCenter } app  -- Centered in terminal\nrunAppWith
  defaultAppOptions { optAlignment = AppAlignRight } app   -- Right-aligned\n```\n\nTerminal
  width is detected once at startup via ANSI cursor position report (zero dependencies).\n\n###
  Subscriptions\n\n```haskell\nsubKeyPress (\\key -> ...)              -- Keyboard
  input\nsubEveryMs 100 msg                     -- Periodic ticks (interval in ms)\nsubBatch
  [sub1, sub2, ...]             -- Combine subscriptions\n```\n\n### Commands\n\n```haskell\nCmdNone
  \                               -- No effect\ncmdFire (writeFile \"log.txt\" \"entry\")
  \ -- Fire and forget IO\ncmdTask (readFile \"data.txt\")          -- IO that returns
  a message\ncmdAfterMs 500 msg                     -- Fire a message after delay
  (ms)\nCmdBatch [cmd1, cmd2, ...]             -- Combine multiple commands\n```\n\n**Example:
  Logger with file I/O**\n```haskell\nimport Layoutz\n\ndata Msg = Log | Saved\ndata
  State = State { count :: Int, status :: String }\n\nloggerApp :: LayoutzApp State
  Msg\nloggerApp = LayoutzApp\n  { appInit = (State 0 \"Ready\", CmdNone)\n  , appUpdate
  = \\msg s -> case msg of\n      Log   -> (s { count = count s + 1 },\n                cmdFire
  $ appendFile \"log.txt\" (\"Entry \" <> show (count s) <> \"\\n\"))\n      Saved
  -> (s { status = \"Saved!\" }, CmdNone)\n  , appSubscriptions = \\_ -> subKeyPress
  $ \\key -> case key of\n      KeyChar 'l' -> Just Log\n      _           -> Nothing\n
  \ , appView = \\s -> layout\n      [ section \"Logger\" [text $ \"Entries: \" <>
  show (count s)]\n      , text (status s)\n      , ul [\"'l' to log\", \"ESC to quit\"]\n
  \     ]\n  }\n\nmain = runApp loggerApp\n```\n\n### Key Types\n\n```haskell\n--
  Printable\nKeyChar Char                  -- 'a', '1', ' '\n\n-- Editing\nKeyEnter
  \                     -- Enter/Return\nKeyBackspace                  -- Backspace\nKeyTab
  \                       -- Tab\nKeyEscape                     -- Escape\nKeyDelete
  \                    -- Delete\n\n-- Navigation\nKeyUp                         --
  Arrow up\nKeyDown                       -- Arrow down\nKeyLeft                       --
  Arrow left\nKeyRight                      -- Arrow right\n\n-- Modifiers\nKeyCtrl
  Char                  -- Ctrl+'C', Ctrl+'Q', etc.\nKeySpecial String             --
  Other unrecognized sequences\n```\n\n## Examples\n- [ShowcaseApp.hs](examples/ShowcaseApp.hs)
  - Tours every layoutz element and visualization across 7 scenes\n- [SimpleGame.hs](SimpleGame.hs)
  - Grid game where you collect gems and dodge enemies with WASD\n- [InlineBar.hs](examples/InlineBar.hs)
  - Renders a gradient progress bar in-place\n\n## Contributing\n\nYou need [GHC](https://www.haskell.org/ghcup/)
  (8.10+) and [Cabal](https://www.haskell.org/cabal/).\n\n```bash\nmake build         #
  build library\nmake test          # run tests\nmake repl          # GHCi with layoutz
  loaded\nmake clean         # clean build artifacts\n```\n\nFork, make your change,
  `make test`, open a PR. Keep it zero-dep.\n\n## Inspiration\n- Original Scala [layoutz](https://github.com/mattlianje/layoutz)\n"
