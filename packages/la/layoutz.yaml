changelog: |
  # Changelog

  All notable changes to layoutz-hs will be documented in this file.

  The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).

  ## [0.4.0.0] - 2026-07-12

  ### Added
  - Inline raster images via the kitty graphics protocol: `kittyImage`, `kittyImageFile`, `kittyRGB`, `kittyRGBA`. Images measure exactly `cols`×`rows` cells, so they compose with boxes, rows, tables, etc.
  - One-shot `ask*` prompts that collapse to a single line once answered
  - Progress `loader`s for wrapping work in build scripts and batch jobs: `loader`, `loaderStream`, and their `*Styled` variants

  ## [0.3.4.0] - 2026-03-31

  ### Added
  - `renderText :: Element a => a -> Text` for rendering directly to `Data.Text.Text`.
  - Unit tests for `renderText`.

  ### Changed
  - Added `text` as an explicit dep on boot (stil technically zero dep by GHC standards)
  - But easy to comment out `renderText` for porting to MicroHs

  ## [0.3.3.0] - 2026-03-14

  ### Added
  - `runAppFinal`: like `runApp` but returns the final application state.
  - `runAppWithFinal`: like `runAppWith` but returns the final application state.
  - `runInline`: renders app inline without alt-screen, for embedded spinners/progress bars.
  - New `InlineLoadingDemo` example.

  ## [0.3.2.0] - 2026-03-11

  ### Added
  - `CmdExit` command for graceful app shutdown from within `appUpdate`.
  - `cmdIsExit` helper to check if a command tree contains an exit.

  ### Fixed
  - Haddock markup errors.
  - `SpinnerDemo.hs` example.

  ## [0.3.1.0] - 2026-03-01

  ### Changed
  - Documentation tweaks and Haddock polish.

  ## [0.3.0.0] - 2026-03-01

  ### Added
  - TUI runtime (`LayoutzApp`, Elm Architecture style event loop).
  - Keyboard input handling (`Key`, `readKey`).
  - Commands (`Cmd`, `cmdFire`, `cmdTask`, `cmdAfterMs`).
  - Subscriptions (`Sub`, `subKeyPress`, `subEveryMs`).
  - `AppOptions` and `AppAlignment` for layout customization.
  - Spinner animations (`SpinnerDots`, `SpinnerLine`, `SpinnerClock`, `SpinnerBounce`).
  - Visualization primitives: `plotSparkline`, `plotLine`, `plotPie`, `plotBar`, `plotStackedBar`, `plotHeatmap`.
  - Braille-based line and pie chart rendering.
  - 256-color and RGB true-color support (`ColorFull`, `ColorTrue`).
  - Text styles with `Semigroup` combining (`StyleBold <> StyleItalic`).
  - `tightRow` for gapless horizontal layouts.
  - `wrap` for word-boundary text wrapping.
  - Ordered lists (`ol`) with nested numbering (arabic, alpha, roman).

  ## [0.1.0.0] - 2026-02-27

  ### Added
  - Initial Haskell port of layoutz.
  - Core DSL: `text`, `layout`, `box`, `row`, `center`, `ul`, `table`, `kv`, `tree`.
  - Border styles: normal, double, thick, round, ASCII, block, dashed, dotted, half-block, markdown, custom.
  - `withBorder`, `withColor`, `withStyle` combinators.
  - ANSI-aware width calculation (`charWidth`, `visibleLength`).
  - `hr`, `vr`, `pad`, `margin`, `chart`, `section`, `alignLeft`/`alignRight`/`alignCenter`/`justify`.
  - `OverloadedStrings` support for `L`.
changelog-type: markdown
description: "<div align=\"right\">\n  <sub><em>part of <a href=\"https://github.com/mattlianje/d4\"><img
  src=\"https://raw.githubusercontent.com/mattlianje/d4/master/pix/d4.png\" width=\"23\"></a>
  <a href=\"https://github.com/mattlianje/d4\">d4</a></em></sub>\n</div>\n\n<p align=\"center\">\n
  \ <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-demo.png\"
  width=\"750\">\n</p>\n\n# <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/layoutz.png\"
  width=\"60\"> layoutz\n\n**Simple, beautiful CLI output \U0001FAB6**\n\nA lightweight,
  zero-dep lib to build compositional ANSI strings, terminal plots,\nand interactive
  Elm-style TUI's in pure Haskell.\n\nAlso in [Scala](https://github.com/mattlianje/layoutz),
  [OCaml](https://github.com/mattlianje/layoutz/tree/master/layoutz-ocaml)\n\n## Features\n-
  Pure Haskell, zero-dependencies (use `Layoutz.hs` like a header file)\n- Elm-style
  TUIs\n- Layout primitives, tables, trees, lists, CJK-aware\n- Colors, ANSI styles,
  rich formatting\n- Terminal charts and plots\n- Widgets: text input, spinners, progress
  bars\n- Inline raster images via the [kitty graphics protocol](https://sw.kovidgoyal.net/kitty/graphics-protocol/)\n-
  One-shot interactive prompts (`askInput`, `askChoose`, `askFilter`, …)\n- Drop-in
  progress `loader`s for build scripts and batch jobs\n- Implement `Element` to add
  your own primitives\n- Easy porting to MicroHs\n\n<p align=\"center\">\n<img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/demos/showcase.gif\"
  width=\"650\">\n<br>\n<sub><a href=\"examples/ShowcaseApp.hs\">ShowcaseApp.hs</a></sub>\n</p>\n\nLayoutz
  also lets you easily drop animations into build scripts or any processes that use
  Stdout:\n\n<p align=\"center\">\n<img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/inline-demo.gif\"
  width=\"650\">\n<br>\n<sub><a href=\"examples/InlineBar.hs\">InlineBar.hs</a></sub>\n</p>\n\n##
  Table of Contents\n- [Installation](#installation)\n- [Quickstart](#quickstart)\n-
  [Why layoutz?](#why-layoutz)\n- [Core Concepts](#core-concepts)\n- [Elements](#elements)\n-
  [Border Styles](#border-styles)\n- [Charts & Plots](#charts--plots)\n- [Colors &
  Styles](#colors-ansi-support)\n- [Inline Images](#inline-images)\n- [Custom Elements](#custom-elements)\n-
  [Collections](#collections)\n- [Interactive Apps](#interactive-apps)\n- [Prompts
  (Ask)](#prompts-ask)\n- [Progress (loader)](#progress-loader)\n- [Examples](#examples)\n-
  [Contributing](#contributing)\n\n## Installation\n\n**Add Layoutz on [Hackage](https://hackage.haskell.org/package/layoutz)
  to your project's `.cabal` file:**\n```haskell\nbuild-depends: layoutz\n```\n\nAll
  you need:\n```haskell\nimport Layoutz\n```\n\n## Quickstart\n\n**(1/3) Static rendering**:
  pretty, composable strings.\n\n```haskell\nimport Layoutz\n\ndemo = layout\n  [
  center $ row\n      [ withStyle StyleBold $ text \"Layoutz\"\n      , withColor
  ColorCyan $ underline' \"ˆ\" $ text \"DEMO\"\n      ]\n  , br\n  , row\n    [ statusCard
  \"Users\" \"1.2K\"\n    , withBorder BorderDouble $ statusCard \"API\" \"UP\"\n
  \   , withColor ColorRed $ withBorder BorderThick $ statusCard \"CPU\" \"23%\"\n
  \   , withStyle StyleReverse $ withBorder BorderRound $ table [\"Name\", \"Role\",
  \"Skills\"]\n        [ [\"Gegard\", \"Pugilist\", ul [\"Armenian\", ul [\"bad\",
  ul[\"man\"]]]]\n        , [\"Eve\", \"QA\", \"Testing\"]\n        ]\n    ]\n  ]\n\nputStrLn
  $ render demo\n```\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/intro-demo.png\"
  width=\"700\">\n</p>\n\n\n**(2/3) Interactive apps** - Build Elm-style TUI's:\n\n```haskell\nimport
  Layoutz\n\ndata Msg = Inc | Dec\n\ncounterApp :: LayoutzApp Int Msg\ncounterApp
  = LayoutzApp\n  { appInit = (0, CmdNone)\n  , appUpdate = \\msg count -> case msg
  of\n      Inc -> (count + 1, CmdNone)\n      Dec -> (count - 1, CmdNone)\n  , appSubscriptions
  = \\_ -> subKeyPress $ \\key -> case key of\n      KeyChar '+' -> Just Inc\n      KeyChar
  '-' -> Just Dec\n      _           -> Nothing\n  , appView = \\count -> layout\n
  \     [ section \"Counter\" [text $ \"Count: \" <> show count]\n      , ul [\"Press
  '+' or '-'\", \"ESC to quit\"]\n      ]\n  }\n\nmain = runApp counterApp\n```\n<p
  align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/counter-demo.gif\"
  width=\"650\">\n</p>\n\n**(3/3) Prompts (Ask)**\n\nOne-shot CLI prompts (inputs,
  choosers, filters, file pickers, spinners) that collapse to a single line as you
  answer them.\n\n```haskell\nimport Layoutz\nimport Control.Concurrent (threadDelay)\n\nmain
  :: IO ()\nmain = do\n  name   <- askInput \"Name › \" \"anonymous\" \"\"\n  realm
  \ <- askChoose \"Choose a realm\" [\"The Shire\", \"Rivendell\", \"Mirkwood\"] id\n
  \ packs  <- askChooseMany \"Pack provisions\" [\"lembas\", \"pipe-weed\", \"rope\"]
  3 id\n  member <- askFilter \"Search a companion › \" [\"Bilbo\", \"Gandalf\", \"Thorin\"]
  8 id\n  riddle <- askWrite \"Pose a riddle\" \"This thing all things devours…\"
  \"\" \"Ctrl-D to save\"\n  quest  <- askConfirm \"Venture on the quest?\" True \"Yes\"
  \"No\"\n  smaug  <- askSpin \"Awaking Smaug…\" SpinnerDots (threadDelay 1500000
  >> pure \"ready\")\n  pure ()\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/demos/ask-mini.gif\"
  width=\"600\">\n  <br>\n  <sub><a href=\"examples/AskDemo.hs\">AskDemo.hs</a></sub>\n</p>\n\n##
  Why layoutz?\n- We have `printf` and [full-blown](https://hackage.haskell.org/package/brick)
  TUI libraries - but there's a gap in-between\n- **layoutz** is a tiny, declarative
  DSL for structured CLI output\n- On the side, it has a little Elm-style runtime
  + keyhandling DSL to animate your elements, much like a flipbook...\n     - But
  you can just use **Layoutz** without any of the TUI stuff\n\n## Core concepts\n-
  Every piece of content is an `Element`\n- Elements are **immutable** and **composable**
  - build complex layouts by combining simple elements\n- A `layout` arranges elements
  **vertically**:\n```haskell\nlayout [elem1, elem2, elem3]  -- Joins with \"\\n\"\n```\nCall
  `render` on any element to get a string\n\nThe power comes from **uniform composition**
  - since everything has the `Element` typeclass, everything can be combined.\n\n###
  String Literals\nWith `OverloadedStrings` enabled, you can use string literals directly:\n```haskell\nlayout
  [\"Hello\", \"World\"]  -- Instead of layout [text \"Hello\", text \"World\"]\n```\n\n>
  [!NOTE]\n> When passing to functions that take polymorphic `Element a` parameters
  (like `underline'`, `center'`, `pad`), use `text` explicitly:\n\n```haskell\nunderline'
  \"=\" $ text \"Title\"  -- Correct\nunderline' \"=\" \"Title\"         -- Ambiguous
  type error\n```\n\n## Border Styles\n\nApplied via `withBorder` to any element with
  the `HasBorder` typeclass (`box`, `statusCard`, `table`):\n```haskell\nwithBorder
  BorderRound $ box \"Info\" [\"content\"]\nwithBorder BorderDouble $ statusCard \"API\"
  \"UP\"\nwithBorder BorderThick $ table [\"Name\"] [[\"Alice\"]]\n```\n\nWrite generic
  code over bordered elements:\n```haskell\nmakeThick :: HasBorder a => a -> a\nmakeThick
  = setBorder BorderThick\n```\n\n```haskell\nBorderNormal                  -- ┌─┐
  (default)\nBorderDouble                  -- ╔═╗\nBorderThick                   --
  ┏━┓\nBorderRound                   -- ╭─╮\nBorderAscii                   -- +-+\nBorderBlock
  \                  -- ███\nBorderDashed                  -- ┌╌┐\nBorderDotted                  --
  ┌┈┐\nBorderInnerHalfBlock          -- ▗▄▖\nBorderOuterHalfBlock          -- ▛▀▜\nBorderMarkdown
  \               -- |-|\nBorderCustom \"+\" \"=\" \"|\"      -- Custom border\nBorderNone
  \                   -- No borders\n```\n\n## Elements\n\n### Layout\n\n#### Stacking
  & rows\n```haskell\nlayout [\"First\", \"Second\", \"Third\"]          -- vertical\n--
  First\n-- Second\n-- Third\n\nrow [\"Left\", \"Middle\", \"Right\"]              --
  horizontal\n-- Left Middle Right\n\ncolumns [layout [\"A\", \"B\"], layout [\"C\",
  \"D\"]]\n-- A  C\n-- B  D\n\ntightRow [text \"A\", text \"B\", text \"C\"]      --
  no spacing\n-- ABC\n```\n\n#### Spacing & rules\n```haskell\nlayout [text \"Line
  1\", br, text \"Line 2\"]    -- br is a blank line\n\nhr                 -- default
  ──────────...\nhr' \"~\"            -- custom char\nhr'' \"=\" 20        -- ====================\n\nvr
  \                -- vertical rule, 10 high with │\nvr' \"║\"            -- custom
  char\nvr'' \"|\" 5         -- custom char + height\n```\n\n#### Text transforms\n```haskell\ncenter
  $ text \"Auto-centered\"                -- width taken from siblings\ncenter' 20
  $ text \"TITLE\"                    -- │       TITLE        │\nalignLeft 20 \"Left\"
  \                         -- │Left                │\nalignRight 20 \"Right\"                        --
  │               Right│\n\njustify 30 \"Spread this out\"\n-- │Spread         this
  \       out│\n\nwrap 20 \"Long text here that should wrap\"\n-- Long text here that\n--
  should wrap\n\ntruncate' 15 (text \"Very long text that will be cut off\")     --
  Very long te...\ntruncate'' 20 \"…\" (text \"Custom ellipsis example text here\")
  \ -- Custom ellipsis exa…\n\npad 2 $ text \"content\"                       -- 2
  cells of padding all around\n\nunderline $ text \"Title\"                     --
  Title\n                                             -- ─────\nunderline' \"=\" $
  text \"Custom\"               -- Custom\n                                             --
  ══════\nunderlineColored \"~\" ColorCyan $ text \"Fancy\"\n\nmargin \"[error]\"\n
  \ [ text \"Ooops!\"\n  , row [text \"val result: Int = \", underline' \"^\" (text
  \"getString()\")]\n  , text \"Expected Int, found String\"\n  ]\n-- [error] Ooops!\n--
  [error] val result: Int =  getString()\n-- [error]                    ^^^^^^^^^^^\n--
  [error] Expected Int, found String\n```\n\n### Content\n\n#### Basics\n```haskell\ntext
  \"hello\"\n\"hello\"   - with OverloadedStrings\n\nsection \"Status\" [text \"All
  systems operational\"]\n-- === Status ===\n-- All systems operational\nsection'
  \"-\" \"Status\" [text \"ok\"]       -- custom glyph\nsection'' \"#\" \"Report\"
  5 [text \"42\"]    -- custom glyph + width\n\nkv [(\"Name\", \"Alice\"), (\"Age\",
  \"30\"), (\"City\", \"NYC\")]\n-- Name: Alice\n-- Age:  30\n-- City: NYC\n```\n\n####
  Boxes, cards & banners\n```haskell\nbox \"Status\" [text \"All systems go\"]\n--
  ┌──Status──────────┐\n-- │ All systems go   │\n-- └──────────────────┘\n\nwithBorder
  BorderDouble $ box \"Fancy\" [text \"Double border\"]\n-- ╔══Fancy═══════════╗\n--
  ║ Double border    ║\n-- ╚══════════════════╝\n\nwithBorder BorderRound $ box \"Smooth\"
  [text \"Rounded corners\"]\n-- ╭──Smooth────────────╮\n-- │ Rounded corners    │\n--
  ╰────────────────────╯\n\nrow [ withColor ColorGreen $ statusCard \"CPU\" \"45%\"\n
  \   , withColor ColorCyan  $ statusCard \"MEM\" \"2.1G\"\n    ]\n-- ┌──────┐ ┌───────┐\n--
  │ CPU  │ │ MEM   │\n-- │ 45%  │ │ 2.1G  │\n-- └──────┘ └───────┘\n\nbanner [\"System
  Dashboard\"]\n-- ╔══════════════════╗\n-- ║ System Dashboard ║\n-- ╚══════════════════╝\n```\n\nPipe
  any `HasBorder` element through `withBorder`:\n```haskell\nwithBorder BorderRound
  $ box \"Info\" [\"content\"]\nwithBorder BorderDouble $ statusCard \"API\" \"UP\"\nwithBorder
  BorderThick $ table [\"Name\"] [[\"Alice\"]]\n```\n\n#### Lists & trees\n```haskell\nul
  [\"Backend\", ul [\"API\", ul [\"REST\", \"GraphQL\"], \"DB\"], \"Frontend\"]\n--
  • Backend\n--   ◦ API\n--     ▪ REST\n--     ▪ GraphQL\n--   ◦ DB\n-- • Frontend\n\nol
  [\"Setup\", ol [\"Install deps\", ol [\"npm\", \"pip\"], \"Configure\"], \"Deploy\"]\n--
  1. Setup\n--   a. Install deps\n--     i. npm\n--     ii. pip\n--   b. Configure\n--
  2. Deploy\n\ntree \"Project\"\n  [ branch \"src\" [leaf \"main.hs\", leaf \"test.hs\"]\n
  \ , branch \"docs\" [leaf \"README.md\"]\n  ]\n-- Project\n-- ├── src\n-- │   ├──
  main.hs\n-- │   └── test.hs\n-- └── docs\n--     └── README.md\n```\n\n#### Table\n```haskell\ntable
  [\"Name\", \"Age\", \"City\"]\n  [ [\"Alice\", \"30\", \"New York\"]\n  , [\"Bob\",
  \"25\", \"\"]\n  , [\"Charlie\", \"35\", \"London\"]\n  ]\n```\n```\n┌─────────┬─────┬──────────┐\n│
  Name    │ Age │ City     │\n├─────────┼─────┼──────────┤\n│ Alice   │ 30  │ New
  York │\n│ Bob     │ 25  │          │\n│ Charlie │ 35  │ London   │\n└─────────┴─────┴──────────┘\n```\n\n####
  Progress & spinners\n```haskell\ninlineBar \"Download\" 0.75\n-- Download [███████████████─────]
  75%\n\nchart [(\"Web\", 10), (\"Mobile\", 20), (\"API\", 15)]\n-- Web    │████████████████████────────────────────│
  10\n-- Mobile │████████████████████████████████████████│ 20\n-- API    │██████████████████████████████──────────│
  15\n\nspinner \"Loading\" frame SpinnerDots     -- ⠋ ⠙ ⠹ ⠸ ⠼ ⠴ ⠦ ⠧ ⠇ ⠏\nspinner
  \"Loading\" frame SpinnerLine     -- | / - \\\nspinner \"Loading\" frame SpinnerClock
  \   -- \U0001F550 \U0001F551 \U0001F552 \U0001F553 \U0001F554 \U0001F555 \U0001F556
  \U0001F557 \U0001F558 \U0001F559 \U0001F55A \U0001F55B\nspinner \"Loading\" frame
  SpinnerBounce   -- ⠁ ⠂ ⠄ ⠂\nspinner \"Loading\" frame SpinnerEarth    -- \U0001F30D
  \U0001F30E \U0001F30F\nspinner \"Loading\" frame SpinnerMoon     -- \U0001F311 \U0001F312
  \U0001F313 \U0001F314 \U0001F315 \U0001F316 \U0001F317 \U0001F318\nspinner \"Loading\"
  frame SpinnerGrow     -- ▏ ▎ ▍ ▌ ▋ ▊ ▉ █ ▉ ▊ ▋ ▌ ▍ ▎\nspinner \"Loading\" frame
  SpinnerArrow    -- ← ↖ ↑ ↗ → ↘ ↓ ↙\n```\n\n#### Inline Images\n\nInline raster images
  via the [kitty graphics protocol](https://sw.kovidgoyal.net/kitty/graphics-protocol/).\nA
  `KittyImage` measures exactly `cols`×`rows` cells, so it composes with every other\nelement:
  drop it into boxes, rows, tables, `center`, etc.\n\n```haskell\nimg <- kittyImageFile
  \"pix/sakuraba.png\" 35 14   -- PNG sized to 35×14 cells\n\nputStrLn $ render $
  row\n  [ withBorder BorderRound $ box \"the gracie hunter\" [img]\n  , box \"stats\"
  [kv [(\"flying\", \"yes\"), (\"opponent\", \"grounded\"), (\"rules\", \"PRIDE\")]]\n
  \ ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/haskell-kitty-1.png\"
  width=\"600\">\n</p>\n\nBuild straight from bytes or raw pixels:\n\n```haskell\nkittyImage
  \ bytes 35 14       -- PNG bytes            -> cols rows\nkittyRGB    pixels w h
  18 9   -- raw RGB  pxW pxH     -> cols rows\nkittyRGBA   pixels w h 18 9   -- raw
  RGBA pxW pxH     -> cols rows\n```\n\n```haskell\nlet (w, h) = (96, 96)\n    pixels
  = [ channel i | i <- [0 .. w * h * 4 - 1] ]\n    channel i =\n      let p = i `div`
  4; x = p `mod` w; y = p `div` w\n      in fromIntegral $ case i `mod` 4 of\n           0
  -> x * 255 `div` w\n           1 -> y * 255 `div` h\n           2 -> 255 - (x *
  255 `div` w)\n           _ -> 255\n\nputStrLn $ render $ box \"gradient\" [kittyRGBA
  pixels w h 18 9]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/haskell-kitty-2.png\"
  width=\"600\">\n</p>\n\nNeeds a kitty-graphics-capable terminal (kitty, WezTerm,
  Ghostty). Inside a\n`LayoutzApp`, each distinct image is transmitted once and re-placed
  cheaply on\nevery frame.\n\n## Charts & Plots\n\nSee also [Granite](https://github.com/mchav/granite)
  for terminal plots in Haskell.\n\n#### Line Plot\n```haskell\nlet sinePoints = [(x,
  sin x) | x <- [0, 0.1 .. 10.0]]\nplotLine 40 10 [Series sinePoints \"sine\" ColorBrightCyan]\n```\n<p
  align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-function-1.png\"
  width=\"500\">\n</p>\n\nMultiple series:\n```haskell\nlet sinPts = [(x, sin (x *
  0.15) * 5) | x <- [0..50]]\n    cosPts = [(x, cos (x * 0.15) * 5) | x <- [0..50]]\nplotLine
  50 12\n  [ Series sinPts \"sin(x)\" ColorBrightCyan\n  , Series cosPts \"cos(x)\"
  ColorBrightMagenta\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-function-2.png\"
  width=\"500\">\n</p>\n\n#### Pie Chart\n```haskell\nplotPie 20 10\n  [ Slice 50
  \"A\" ColorBrightCyan\n  , Slice 30 \"B\" ColorBrightMagenta\n  , Slice 20 \"C\"
  ColorBrightYellow\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-pie.png\"
  width=\"500\">\n</p>\n\n#### Bar Chart\n```haskell\nplotBar 40 10\n  [ BarItem 85
  \"Mon\" ColorBrightCyan\n  , BarItem 120 \"Tue\" ColorBrightGreen\n  , BarItem 95
  \"Wed\" ColorBrightMagenta\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-bar.png\"
  width=\"500\">\n</p>\n\n```haskell\nplotBar 40 10\n  [ BarItem 100 \"Sales\" ColorBrightMagenta\n
  \ , BarItem 80  \"Costs\" ColorBrightRed\n  , BarItem 20  \"Profit\" ColorBrightCyan\n
  \ ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-bar-custom.png\"
  width=\"500\">\n</p>\n\n#### Stacked Bar Chart\n```haskell\nplotStackedBar 40 10\n
  \ [ StackedBarGroup [BarItem 30 \"Q1\" ColorDefault, BarItem 20 \"Q2\" ColorDefault,
  BarItem 25 \"Q3\" ColorDefault] \"2022\"\n  , StackedBarGroup [BarItem 35 \"Q1\"
  ColorDefault, BarItem 25 \"Q2\" ColorDefault, BarItem 30 \"Q3\" ColorDefault] \"2023\"\n
  \ , StackedBarGroup [BarItem 40 \"Q1\" ColorDefault, BarItem 30 \"Q2\" ColorDefault,
  BarItem 35 \"Q3\" ColorDefault] \"2024\"\n  ]\n```\n<p align=\"center\">\n  <img
  src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-stacked.png\"
  width=\"500\">\n</p>\n\n#### Sparkline\n```haskell\nplotSparkline [1, 4, 2, 8, 5,
  7, 3, 6]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-sparkline.png\"
  width=\"500\">\n</p>\n\n#### Heatmap\n```haskell\nplotHeatmap $ HeatmapData\n  [
  [12, 15, 22, 28, 30, 25, 18]\n  , [14, 18, 25, 32, 35, 28, 20]\n  , [10, 13, 20,
  26, 28, 22, 15]\n  ]\n  [\"Mon\", \"Tue\", \"Wed\"]\n  [\"6am\", \"9am\", \"12pm\",
  \"3pm\", \"6pm\", \"9pm\", \"12am\"]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/pix/chart-heatmap.png\"
  width=\"500\">\n</p>\n\n## Colors\n\nAdd ANSI colors to any element:\n\n```haskell\nlayout\n
  \ [ withColor ColorRed $ text \"The quick brown fox...\"\n  , withColor ColorBrightCyan
  $ text \"The quick brown fox...\"\n  , underlineColored \"~\" ColorRed $ text \"The
  quick brown fox...\"\n  , margin \"[INFO]\" [withColor ColorCyan $ text \"The quick
  brown fox...\"]\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-color-2.png\"
  width=\"700\">\n</p>\n\n\n```haskell\nColorBlack\nColorRed\nColorGreen\nColorYellow\nColorBlue\nColorMagenta\nColorCyan\nColorWhite\nColorBrightBlack
  \     -- Bright 8\nColorBrightRed\nColorBrightGreen\nColorBrightYellow\nColorBrightBlue\nColorBrightMagenta\nColorBrightCyan\nColorBrightWhite\nColorFull
  196         -- 256-color palette (0-255)\nColorTrue 255 128 0   -- 24-bit RGB\nColorDefault
  \         -- Conditional no-op\n```\n\n### Color Gradients\n\nCreate gradients with
  extended colors:\n\n```haskell\nlet palette   = tightRow $ map (\\i -> withColor
  (ColorFull i) $ text \"█\") [16, 19..205]\n    redToBlue = tightRow $ map (\\i ->
  withColor (ColorTrue i 100 (255 - i)) $ text \"█\") [0, 4..255]\n    greenFade =
  tightRow $ map (\\i -> withColor (ColorTrue 0 (255 - i) i) $ text \"█\") [0, 4..255]\n
  \   rainbow   = tightRow $ map colorBlock [0, 4..255]\n      where\n        colorBlock
  i =\n          let r = if i < 128 then i * 2 else 255\n              g = if i <
  128 then 255 else (255 - i) * 2\n              b = if i > 128 then (i - 128) * 2
  else 0\n          in withColor (ColorTrue r g b) $ text \"█\"\n\nputStrLn $ render
  $ layout [palette, redToBlue, greenFade, rainbow]\n```\n\n<p align=\"center\">\n
  \ <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-color-1.png\"
  width=\"700\">\n</p>\n\n\n## Styles\n\nAdd ANSI styles to any element:\n\n```haskell\nlayout\n
  \ [ withStyle StyleBold $ text \"The quick brown fox...\"\n  , withColor ColorRed
  $ withStyle StyleBold $ text \"The quick brown fox...\"\n  , withStyle StyleReverse
  $ withStyle StyleItalic $ text \"The quick brown fox...\"\n  ]\n```\n<p align=\"center\">\n
  \ <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-styles-1.png\"
  width=\"700\">\n</p>\n\n```haskell\nStyleBold\nStyleDim\nStyleItalic\nStyleUnderline\nStyleBlink\nStyleReverse\nStyleHidden\nStyleStrikethrough\nStyleDefault
  \                 -- Conditional no-op\nStyleBold <> StyleItalic      -- Combine
  with <>\n```\n\n**Combining Styles:**\n\nUse `<>` to combine multiple styles at
  once:\n\n```haskell\nlayout\n  [ withStyle (StyleBold <> StyleItalic <> StyleUnderline)
  $ text \"The quick brown fox...\"\n  , withStyle (StyleBold <> StyleReverse) $ text
  \"The quick brown fox...\"\n  ]\n```\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/layoutz-hs/pix/layoutz-styles-2.png\"
  width=\"700\">\n</p>\n\nYou can also combine colors and styles:\n\n```haskell\nwithColor
  ColorBrightYellow $ withStyle (StyleBold <> StyleItalic) $ text \"The quick brown
  fox...\"\n```\n\n## Custom Elements\n\nCreate your own components by implementing
  the `Element` typeclass\n\n```haskell\ndata Square = Square Int\n\ninstance Element
  Square where\n  renderElement (Square size)\n    | size < 2 = \"\"\n    | otherwise
  = intercalate \"\\n\" (top : middle ++ [bottom])\n    where\n      w = size * 2
  - 2\n      top = \"┌\" ++ replicate w '─' ++ \"┐\"\n      middle = replicate (size
  - 2) (\"│\" ++ replicate w ' ' ++ \"│\")\n      bottom = \"└\" ++ replicate w '─'
  ++ \"┘\"\n\n-- Helper to avoid wrapping with L\nsquare :: Int -> L\nsquare n = L
  (Square n)\n\n-- Use it like any other element\nputStrLn $ render $ row\n  [ square
  3\n  , square 5\n  , square 7\n  ]\n```\n```\n┌────┐ ┌────────┐ ┌────────────┐\n│
  \   │ │        │ │            │\n└────┘ │        │ │            │\n       │        │
  │            │\n       └────────┘ │            │\n                  │            │\n
  \                 └────────────┘\n```\n\n## Collections\n```haskell\nimport Data.List
  (groupBy, sortOn)\nimport Data.Function (on)\n\ndata User = User { userName :: String,
  userRole :: String }\n\nusers :: [User]\nusers =\n  [ User \"Alice\" \"Admin\"\n
  \ , User \"Bob\"   \"User\"\n  , User \"Tom\"   \"User\"\n  ]\n\nputStrLn $ render
  $ section \"Users by Role\"\n  [ layout\n      [ box (userRole (head grp)) [ul [text
  (userName u) | u <- grp]]\n      | grp <- groupBy ((==) `on` userRole) (sortOn userRole
  users)\n      ]\n  ]\n```\n```\n=== Users by Role ===\n┌──Admin──┐\n│ • Alice │\n└─────────┘\n┌──User──┐\n│
  • Bob  │\n│ • Tom  │\n└────────┘\n```\n\n## REPL\n\nDrop into GHCi to experiment:\n```bash\ncabal
  repl\n```\n\n```haskell\nλ> :set -XOverloadedStrings\nλ> import Layoutz\nλ> putStrLn
  $ render $ center $ box \"Hello\" [\"World!\"]\n┌──Hello──┐\n│ World!  │\n└─────────┘\nλ>
  putStrLn $ render $ table [\"A\", \"B\"] [[\"1\", \"2\"]]\n┌───┬───┐\n│ A │ B │\n├───┼───┤\n│
  1 │ 2 │\n└───┴───┘\n```\n\n## Interactive Apps\n\n`LayoutzApp` uses the [Elm Architecture](https://guide.elm-lang.org/architecture/)
  where your\nview is a `layoutz` `Element`.\n\n```haskell\ndata LayoutzApp state
  msg = LayoutzApp\n  { appInit          :: (state, Cmd msg)                 -- Initial
  state + startup command\n  , appUpdate        :: msg -> state -> (state, Cmd msg)
  -- Pure state transitions\n  , appSubscriptions :: state -> Sub msg                 --
  Event sources\n  , appView          :: state -> L                       -- Render
  to UI\n  }\n```\n\nThree daemon threads coordinate rendering (~30fps), tick/timers,
  and input capture. State updates flow through `appUpdate` synchronously.\n\nPress
  **ESC** to exit.\n\n### App Options\n\nCustomise how your app runs with `runAppWith`
  and the `AppOptions` record. Override only the fields you need:\n\n```haskell\nrunApp
  app                                                          -- Default options\nrunAppWith
  defaultAppOptions { optAlignment = AppAlignCenter } app  -- Centered in terminal\nrunInline
  app                                                       -- Animate in-place, no
  alt screen\n```\n\n`runInline` renders the app below existing terminal output without
  clearing the screen. Useful for embedding progress bars or spinners in build scripts...
  use `CmdExit` to quit programmatically.\n\nTerminal width is detected once at startup
  via ANSI cursor position report (zero dependencies).\n\n### Subscriptions\n\n```haskell\nsubKeyPress
  (\\key -> ...)    -- Keyboard input\nsubEveryMs 100 msg           -- Periodic ticks
  (interval in ms)\nsubBatch [sub1, sub2, ...]   -- Combine subscriptions\n```\n\n###
  Commands\n\n```haskell\nCmdNone                                -- No effect\nCmdExit
  \                               -- Quit the app gracefully\ncmdFire (writeFile \"log.txt\"
  \"entry\")  -- Fire and forget IO\ncmdTask (readFile \"data.txt\")          -- IO
  that returns a message\ncmdAfterMs 500 msg                     -- Fire a message
  after delay (ms)\nCmdBatch [cmd1, cmd2, ...]             -- Combine multiple commands\n```\n\n**Example:
  Logger with file I/O**\n```haskell\nimport Layoutz\n\ndata Msg = Log | Saved\ndata
  State = State { count :: Int, status :: String }\n\nloggerApp :: LayoutzApp State
  Msg\nloggerApp = LayoutzApp\n  { appInit = (State 0 \"Ready\", CmdNone)\n  , appUpdate
  = \\msg s -> case msg of\n      Log   -> (s { count = count s + 1 },\n                cmdFire
  $ appendFile \"log.txt\" (\"Entry \" <> show (count s) <> \"\\n\"))\n      Saved
  -> (s { status = \"Saved!\" }, CmdNone)\n  , appSubscriptions = \\_ -> subKeyPress
  $ \\key -> case key of\n      KeyChar 'l' -> Just Log\n      _           -> Nothing\n
  \ , appView = \\s -> layout\n      [ section \"Logger\" [text $ \"Entries: \" <>
  show (count s)]\n      , text (status s)\n      , ul [\"'l' to log\", \"ESC to quit\"]\n
  \     ]\n  }\n\nmain = runApp loggerApp\n```\n\n### Key Types\n\n```haskell\n--
  Printable\nKeyChar Char        -- 'a', '1', ' '\n\n-- Editing\nKeyEnter\nKeyBackspace\nKeyTab\nKeyEscape\nKeyDelete\n\n--
  Navigation\nKeyUp\nKeyDown\nKeyLeft\nKeyRight\nKeyPageUp\nKeyPageDown\nKeyHome\nKeyEnd\n\n--
  Modifiers\nKeyCtrl Char        -- Ctrl+'C', Ctrl+'Q', etc.\nKeySpecial String   --
  Other unrecognized sequences\n```\n\n## Prompts (Ask)\n\nYou often just want a one-shot
  CLI prompt (a spinner, a filter, a file picker)\nwithout dropping into \"Elm-territory\"
  and thinking about a whole flipbook each time.\n\n**layoutz** offers one-shot interactive
  actions with the `ask*` family. Each takes\nover the tty briefly, returns a value,
  and leaves a single committed line behind.\n`Nothing` means the user cancelled (Esc
  / Ctrl-C / Ctrl-D).\n\n```haskell\nimport Layoutz\nimport Control.Concurrent (threadDelay)\n\nmain
  :: IO ()\nmain = do\n  name     <- askInput \"Name › \" \"anonymous\" \"\"\n  ok
  \      <- askConfirm \"Venture on the quest?\" True \"Yes\" \"No\"\n  realm    <-
  askChoose \"Choose a realm\" [\"The Shire\", \"Rivendell\", \"Mirkwood\", \"Lake-town\",
  \"Erebor\"] id\n  packs    <- askChooseMany \"Pack provisions\" [\"lembas\", \"pipe-weed\",
  \"waybread\", \"miruvor\", \"rope\"] 3 id\n  riddle   <- askWrite \"Pose a multi-line
  riddle\" \"This thing all things devours…\" \"\" \"Ctrl-D to save\"\n  member   <-
  askFilter \"Search > \" [\"Bilbo\", \"Balin\", \"Dwalin\", \"Thorin\", \"Gandalf\"]
  8 id\n  path     <- askFile \".\" 12\n  askPager longString 0 True\n  answer   <-
  askSpin \"Awaking Smaug…\" SpinnerDots (do threadDelay 1500000; pure (42 :: Int))\n
  \ pure ()\n```\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/demos/ask-mini.gif\"
  width=\"650\">\n</p>\n\nEach `ask*` returns in `IO`... and a `Maybe` if the user
  can cancel midway:\n\n```haskell\naskInput      prompt placeholder initial       --
  IO (Maybe String)\naskConfirm    question default yes no          -- IO Bool\naskChoose
  \    prompt items render              -- IO (Maybe a)\naskChooseMany prompt items
  limit render        -- IO (Maybe [a])\naskWrite      prompt placeholder initial
  hint  -- IO (Maybe String)\naskFilter     prompt items height render       -- IO
  (Maybe a)\naskFile       start height                     -- IO (Maybe String)\naskPager
  \     content height lineNumbers       -- IO ()\naskSpin       label style task
  \                -- IO a\n```\n\n## Progress (loader)\n\nWrap any list with `loader`
  to get a live progress bar while you process it: map\nan `IO` action over each item.
  Unbounded work gets `loaderStream`, a spinner\nwith a running count.\n\n```haskell\n_
  <- loader \"Resizing\" imageFiles resize\n_ <- loader \"Inserting\" rows insertRow\n_
  <- loaderStream \"Tailing\" logLines indexLine\n```\n\nPick a `LoaderStyle` with
  `loaderStyled` / `loaderStreamStyled`\n```\nstyleBlocks -- (default)\nstyleBar\nstyleAscii\nstyleDots\nstyleLine\nstylePipes\nLoaderStyle
  { .. } -- (custom)\n```\n\n```haskell\n_ <- loaderStyled styleAscii \"Reindexing\"
  docIds reindex\n_ <- loaderStyled stylePipes \"Crawling\" urls fetch\n```\n\nEvery
  built-in style, then an unbounded stream:\n\n```haskell\nimport Layoutz\nimport
  Control.Concurrent (threadDelay)\n\nmain :: IO ()\nmain = do\n  _ <- loaderStyled
  styleBlocks \"Blocks \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStyled
  styleDots   \"Dots   \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStyled
  styleLine   \"Line   \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStyled
  stylePipes  \"Pipes  \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStyled
  styleBar    \"Bar    \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStyled
  styleAscii  \"Ascii  \" [1..60] (const (threadDelay 16000))\n  _ <- loaderStream
  \"Streaming\" [1..90] (const (threadDelay 45000))\n  pure ()\n```\n\n<p align=\"center\">\n
  \ <img src=\"https://raw.githubusercontent.com/mattlianje/layoutz/refs/heads/master/demos/loader.gif\"
  width=\"600\">\n</p>\n\n## Examples\n\nSmall, copy-pasteable snippets for everyday
  CLI chores.\n\n<details>\n<summary>Print a deploy / status summary (<code>section</code>
  + <code>statusCard</code> + <code>kv</code>)</summary>\n\n```haskell\nimport Layoutz\n\nmain
  :: IO ()\nmain = putStrLn $ render $ section \"Deploy\"\n  [ row\n      [ withColor
  ColorGreen  $ statusCard \"build\"  \"OK\"\n      , withColor ColorGreen  $ statusCard
  \"tests\"  \"142 ✓\"\n      , withColor ColorYellow $ statusCard \"deploy\" \"staging\"\n
  \     ]\n  , kv [(\"commit\", \"a1b2c3d\"), (\"branch\", \"master\"), (\"by\", \"matt\")]\n
  \ ]\n```\n</details>\n\n<details>\n<summary>Compiler-style error message (<code>margin</code>
  + <code>underline'</code>)</summary>\n\n```haskell\nimport Layoutz\n\nmain :: IO
  ()\nmain = putStrLn $ render $ margin \"error:\"\n  [ text \"type mismatch\"\n  ,
  row [text \"let x: Int = \", underline' \"^\" (text \"getString()\")]\n  , text
  \"  expected Int, found String\"\n  ]\n-- error: type mismatch\n-- error: let x:
  Int = getString()\n--                     ^^^^^^^^^^^^\n-- error:   expected Int,
  found String\n```\n</details>\n\n<details>\n<summary>Render a table straight from
  records (<code>table</code>)</summary>\n\n```haskell\nimport Layoutz\n\ndata Svc
  = Svc { svcName :: String, svcStatus :: String, svcCpu :: String }\n\nsvcs :: [Svc]\nsvcs
  =\n  [ Svc \"api\"   \"up\"   \"23%\"\n  , Svc \"db\"    \"up\"   \"61%\"\n  , Svc
  \"cache\" \"down\" \"0%\"\n  ]\n\nmain :: IO ()\nmain = putStrLn $ render $ table
  [\"Service\", \"Status\", \"CPU\"]\n  [ [text (svcName s), text (svcStatus s), text
  (svcCpu s)] | s <- svcs ]\n```\n</details>\n\n<details>\n<summary>Progress bar over
  a batch of work (<code>loader</code>)</summary>\n\n```haskell\nimport Layoutz\nimport
  Control.Concurrent (threadDelay)\n\nmain :: IO ()\nmain = do\n  let files = [\"a.png\",
  \"b.png\", \"c.png\"]\n  _ <- loader \"Resizing\" files $ \\f -> threadDelay 200000
  \ -- your IO per item\n  putStrLn \"done\"\n```\n</details>\n\n<details>\n<summary>Gate
  a destructive action behind a confirm (<code>askConfirm</code>)</summary>\n\n```haskell\nimport
  Layoutz\n\nmain :: IO ()\nmain = do\n  ok <- askConfirm \"Drop production table?\"
  False \"Yes\" \"No\"\n  if ok then putStrLn \"dropping…\" else putStrLn \"cancelled\"\n```\n</details>\n\n<details>\n<summary>Wrap
  a slow query in a spinner (<code>askSpin</code>)</summary>\n\n```haskell\nimport
  Layoutz\nimport Control.Concurrent (threadDelay)\n\nmain :: IO ()\nmain = do\n  rows
  <- askSpin \"Querying…\" SpinnerDots runQuery\n  putStrLn $ render $ section \"Result\"
  [text $ show rows <> \" rows\"]\n  where\n    runQuery = do\n      threadDelay 1500000
  -- stand-in for your slow IO\n      pure (1234 :: Int)\n```\n</details>\n\n## Contributing\n\nYou
  need [GHC](https://www.haskell.org/ghcup/) (8.10+) and [Cabal](https://www.haskell.org/cabal/).\n\n```bash\nmake
  build     # build library\nmake test      # run tests\nmake repl      # GHCi with
  layoutz loaded\nmake clean     # clean build artifacts\n```\n\nFork, make your change,
  `make test`, open a PR. Keep it zero-dep.\n\n## Inspiration\n- Original Scala [layoutz](https://github.com/mattlianje/layoutz)\n"
