changelog-type: markdown
description: "# Bitmasks\r\n\r\n[![Haskell](https://img.shields.io/badge/language-Haskell-orange.svg)](https://haskell.org)
  [![BSD3 License](https://img.shields.io/badge/license-BSD3-blue.svg)](https://github.com/AliceRixte/bitmasks/LICENSE)
  [![Hackage](https://img.shields.io/hackage/v/bitmasks.svg)](https://hackage.haskell.org/package/bitmasks)
  [![Nightly](https://www.stackage.org/package/bitmasks/badge/nightly)](https://www.stackage.org/nightly/package/bitmasks)
  [![LTS](https://www.stackage.org/package/bitmasks/badge/lts)](https://www.stackage.org/lts/package/bitmasks)\r\n\r\n\r\nBitmasks
  for efficient storing of boolean flags.\r\n\r\n## Alternatives\r\n\r\nYou might
  prefer the [bitset](https://hackage.haskell.org/package/bitset) package, that uses
  a similar implementation to this library. The main difference between `bitset` and
  `bitmasks` is that, contrarily to `bitset`, `bitmasks` is intended to be imported
  non qualified.\r\n\r\n## Usage\r\n\r\nDefine your flags as an enumeration:\r\n\r\n```haskell\r\nimport
  Data.Word\r\nimport Data.Bitmask\r\n\r\ndata PizzaTopping =\r\n    Cheese\r\n  |
  Mushrooms\r\n  | Pineapple\r\n  | Ham\r\n  deriving (Show, Eq, Bounded, Enum)\r\n\r\n--
  We only need 8 bits since there are only 4 toppings\r\ntype PizzaMask = Bitmask8
  PizzaTopping\r\n```\r\n\r\n### Creating bitmasks\r\n\r\n```haskell\r\n-- A Margherita
  pizza (cheese only)\r\nmargherita :: PizzaMask\r\nmargherita = fromFlags [Cheese]\r\n\r\nveggie
  :: PizzaMask\r\nveggie = fromExceptFlags [Ham]\r\n\r\n```\r\n\r\n### Access and
  modify flags\r\n\r\nUse `getFlag` to check if a pizza has a specific topping:\r\n\r\n```haskell\r\n>>>
  getFlag Cheese funghi\r\nTrue\r\n>>> getFlag Pineapple funghi\r\nFalse\r\n```\r\n\r\nAdd
  toppings to a pizza:\r\n\r\n```haskell\r\n>>> hawaiian = addFlags [Pineapple, Ham]
  margherita\r\n>>> getFlags [Pineapple, Mushroom] hawaiian\r\nTrue\r\n```\r\n\r\nMake
  any pizza vegetarian (bitwise AND):\r\n\r\n```haskell\r\n>>> veggieHawaiian = veggie
  .&. hawaiian\r\n>>> getFlag Ham veggieHawaiian\r\n```\r\n\r\nToggle the toppinsertFlages,
  topping toggling should be a thing):\r\n\r\n```haskell\r\n>>> funghi = flipFlags
  [Pineapple, Mushroom] veggieHawaiian\r\n>>> toFlags funghi\r\n[Cheese,Mushrooms]\r\n```\r\n\r\nRemove
  a topping:\r\n\r\n```haskell\r\n>>> margherita == deleteFlag Mushroom funghi\r\nTrue\r\n```\r\n\r\n###
  Convert to lists\r\n\r\n```haskell\r\n-- Get all toppings as a list\r\n>>> toFlags
  funghi\r\n[Cheese,Mushrooms]\r\n>>> toFlags hawaiian\r\n[Cheese,Pineapple,Ham]\r\n\r\n--
  Convert to association lists\r\n>>> toFlagsBool funghi\r\n[(Cheese,True),(Mushrooms,True),(Pineapple,False),(Ham,False)]\r\n```\r\n"
