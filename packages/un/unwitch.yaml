changelog: "# Change log for unwitch project\n\n## Version 0.1.0 \n\nImplement some
  of Double.\nWrite description\n\n## Version 0.0.0 \n\nimport [template](https://github.com/jappeace/haskell-template-project).\n\n"
changelog-type: markdown
description: "[![https://jappieklooster.nl](https://img.shields.io/badge/blog-jappieklooster.nl-lightgrey)](https://jappieklooster.nl/tag/haskell.html)\n[![Jappiejappie](https://img.shields.io/badge/twitch.tv-jappiejappie-purple?logo=twitch)](https://www.twitch.tv/jappiejappie)\n[![Jappiejappie](https://img.shields.io/badge/discord-jappiejappie-black?logo=discord)](https://discord.gg/Hp4agqy)\n\n>
  Three hundred and twenty years have passed since the coven sank in the dark. \n\nRemoves
  the magic from witch.\nThis provides safe conversions like witch does.\nBut it [doesn't](https://jappie.me/death-to-type-classes.html)
  use [type classes](https://www.haskellforall.com/2012/05/scrap-your-type-classes.html)\nor
  exceptions.\nThis has a couple of advantages:\n\n1. No need to use type application
  for function selection.\n2. Functions get names that describe what they do.\n   This
  allows ctags to work as well.\n3. No trouble with orphans.\n4. Custom errors instead
  of the prelude based ones allow client\n   code to recover with typesafety even
  on partial conversions.\n   \n## Usage\n\nThe idea is to select some module *from*
  which type you want to convert.\nSo if you have a double you do:\n\n```haskell\nimport
  qualified Unwitch.Convert.Double as Double\n\n```\nNext you simply use the functions
  within the module\nto convert to something you want, for example:\n\n```haskell\nspec
  = do\n  Double.toFloat 5.6 `shouldBe` 5.6\n```\n\nAlthough dubious since float holds
  less information\nthen double,\nthis can never fail in the current implementation.\nBut
  there are situation where conversion can fail,\nsuch as when converting to an integer:\n```haskell\nspec
  = do\n  Double.toInteger 5.0 `shouldBe` Right 5\n  Double.toInteger 5.6 `shouldBe`
  Left $ RationalConversion $ DenomNotOne (5 % 6)\n```\n\nIn these situation you'll
  `Right` for success, or `Left`\nfor an error.\nThe library will attempt to give
  you as much information\nas possible,\nin this case the denominator wasn't 1 so
  the rational\nconversion failed.\n\n## Comparison \n\n### Witch\n\nType applications
  are unnecessary because there is no polymorphism.\nSince there are no polymorphic
  types we don't need to distinct\nbetween conversions that fail and conversions that
  don't,\nThis is encoded in types.\nFurthermore on failure, if the client can figure
  out how to go on with a\nRational, they can.\nIn witch this information gets squashed,
  we happily provide it.\nIt's not an exception like witch implied.\n\n\n## Hacking\n###
  Tools\nEnter the nix shell.\n```\nnix-shell\n```\nYou can checkout the makefile
  to see what's available:\n```\ncat makefile\n```\n\n### Running\n```\nmake run\n```\n\n###
  Fast filewatch which runs tests\n```\nmake ghcid\n```\n\n## Design decisions\n\n+
  Modules names indicate where you're converting *from*.\n+ Errors should be packed
  with information to allow recovery\n+ Only restricted to primitives in base.\n  The
  original witch had support for Map, and Text.\n  I feel this is out of scope.\n\nhttps://serokell.io/blog/introduction-to-template-haskell\n
  \ \n"
