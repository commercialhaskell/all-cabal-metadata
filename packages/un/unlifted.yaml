changelog: |
  # Revision history for unlifted

  ## 0.2.4.0 -- 2026-07-14

  * Add `Show#`
  * Add `equalsSingletonChar` for ShortText
  * Add a type constructor `Lifted` for lifting unlifted types
  * Add `Word128#`

  ## 0.2.3.0 -- 2025-04-07

  * Add `IO#` and `MaybeWord16#`.

  ## 0.2.2.0 -- 2024-02-07

  * Export `Text#` in `Data.Unlifted`.

  ## 0.2.1.1 -- 2024-02-06

  * Update package metadata.

  ## 0.2.1.0 -- 2023-08-31

  ## 0.2.0.0 -- 2023-08-22

  * Add `Text#`. Change `Bool#` to use `Word#` instead of `Int#`.

  ## 0.1.0.0 -- 2023-05-31

  * First version.
changelog-type: markdown
description: |
  # unlifted

  Sadly, the library cannot define types like `Maybe#` because of
  [GHC issue #17178](https://gitlab.haskell.org/ghc/ghc/issues/17178).
  However, there are other fun things like `Bool#` and `ShortText#`
  that we are able to provide. This is intended for use with `vext`.
