description: "# hanalyze\n\n> \U0001F310 **English** | [日本語](README.ja.md)\n\n[![License:
  BSD-3](https://img.shields.io/badge/License-BSD%203--Clause-blue.svg)](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/LICENSE)\n[![GHC](https://img.shields.io/badge/GHC-9.6.7-blueviolet.svg)](https://www.haskell.org/ghc/)\n\n**hanalyze**
  is a Haskell-native statistical engineering toolkit: regression, GLMM, Bayesian
  inference (HMC/NUTS/Gibbs/ADVI/SMC), Gaussian processes, machine learning (SVM /
  gradient boosting / neural networks), survival analysis (KM / Cox / AFT / competing
  risks), time series (ARIMA / GARCH / state space), causal discovery (LiNGAM) and
  treatment-effect estimation, design of experiments (classical + custom optimal design),
  multi-objective optimisation, native plotting, and HTML reporting integrated under
  one API.\nCore modelling and optimisation logic is implemented in Haskell, with
  numerical linear algebra delegated to hmatrix/BLAS/LAPACK. **No R/Stan/Python bridge
  required**.\nBenchmarks (see below) show competitive accuracy with Python/R references
  in the tested cases. Performance varies by domain: optimisation and small-to-medium
  MCMC workloads are often faster in these benchmarks, while large-scale ML/GLM workloads
  are currently slower than sklearn.\n\n---\n\n## Highlights\n\n- **Haskell-native**:
  types catch many dtype/API mismatches; shape checks happen at runtime where needed\n-
  **Algorithms in Haskell, BLAS for numerics**: hmatrix/BLAS/LAPACK powers linear
  algebra; no R/Stan/Python bridge\n- **Native plotting**: 90+ documented figure types
  through the [hgg](https://github.com/frenzieddoll/hgg) grammar-of-graphics integration
  (`plot-integration` flag) — pure-Haskell SVG output, no browser required (see [Gallery](#gallery))\n-
  **HTML reporting**: MathJax/Mermaid + Vega-Lite visualisations in one call; PNG/SVG
  export available for supported plots\n- **Dirty-data defence**: 8 warning codes
  + auto-sniff (delim/header/encoding) + cleaning DSL\n- **Hackage `dataframe`**:
  Polars-like DataFrame used directly; CSV native, Parquet/JSON support through `dataframe`\n\n---\n\n##
  Gallery\n\nEvery figure below (and 90+ more across [`docs/`](https://github.com/frenzieddoll/hanalyze/tree/v0.2.0.0/docs/))
  is generated straight\nfrom analysis results via the hgg integration — pure Haskell,
  SVG out.\n\n| | |\n|:--:|:--:|\n| ![Linear regression with CI band](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/lm-scatter-ci.svg)<br>Linear
  regression — fit + 95% CI ([docs](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/regression/01-lm.md))
  | ![HBM MCMC dashboard](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/hbm-dashboard.svg)<br>Bayesian
  MCMC dashboard — trace / density / R̂ / ESS ([docs](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/bayesian/viz-diagnostics.md))
  |\n| ![Gaussian process mean and credible band](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/gp-mean-ci.svg)<br>Gaussian
  process — mean + credible band ([docs](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/regression/04-gp.md))
  | ![Kernel SVM decision boundary](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/svm-rbf-boundary.svg)<br>Kernel
  SVM (RBF) — decision boundary + support vectors ([docs](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/ml/usage-ml-extensions.md))
  |\n| ![DOE prediction profiler](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/doe-profiler.svg)<br>DOE
  prediction profiler — response vs each factor + CI ([docs](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/api-guide/09-doe.md))
  | ![RSM 3D response surface](https://raw.githubusercontent.com/frenzieddoll/hanalyze/v0.2.0.0/docs/images/rsm-surface-3d.svg)<br>RSM
