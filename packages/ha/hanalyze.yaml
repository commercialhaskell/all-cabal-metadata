  guide | — | [optim/03-algorithm-guide.md](docs/optim/03-algorithm-guide.md) | —
  |\n\n### Design of experiments (`Hanalyze.Design.*`)\n\n| Feature | Module | Usage
  | Theory |\n|---|---|---|---|\n| DoE (Factorial / Block / Mixed / RSM / Optimal
  / Power / Quality) | `Hanalyze.Design.{Factorial,Block,Mixed,RSM,Optimal,Power,Quality,MultiRSM,Anova}`
