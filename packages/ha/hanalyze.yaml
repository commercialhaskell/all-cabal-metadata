  (`Hanalyze.Optim.*`)\n\n| Feature | Module | Usage | Theory |\n|---|---|---|---|\n|
  Single-obj (gradient): NM / L-BFGS / Brent | `Hanalyze.Optim.NelderMead`<br>`Hanalyze.Optim.LBFGS`<br>`Hanalyze.Optim.LineSearch`
