description: "# hanalyze\n\n> \U0001F310 **English** | [日本語](README.ja.md)\n\n[![License:
  BSD-3](https://img.shields.io/badge/License-BSD%203--Clause-blue.svg)](LICENSE)\n[![GHC](https://img.shields.io/badge/GHC-9.6.7-blueviolet.svg)](https://www.haskell.org/ghc/)\n\n**hanalyze**
  is a Haskell-native statistical engineering toolkit: regression, GLMM, Bayesian
  inference (HMC/NUTS/Gibbs/ADVI), Gaussian processes, design of experiments, multi-objective
  optimisation, and HTML reporting integrated under one API.\nCore modelling and optimisation
  logic is implemented in Haskell, with numerical linear algebra delegated to hmatrix/BLAS/LAPACK.
  **No R/Stan/Python bridge required**.\nBenchmarks (see below) show competitive accuracy
  with Python/R references in the tested cases. Performance varies by domain: optimisation
  and small-to-medium MCMC workloads are often faster in these benchmarks, while large-scale
  ML/GLM workloads are currently slower than sklearn.\n\n---\n\n## Highlights\n\n-
  **Haskell-native**: types catch many dtype/API mismatches; shape checks happen at
  runtime where needed\n- **Algorithms in Haskell, BLAS for numerics**: hmatrix/BLAS/LAPACK
  powers linear algebra; no R/Stan/Python bridge\n- **HTML reporting**: MathJax/Mermaid
  + Vega-Lite visualisations in one call; PNG/SVG export available for supported plots\n-
  **Dirty-data defence**: 8 warning codes + auto-sniff (delim/header/encoding) + cleaning
  DSL\n- **Hackage `dataframe`**: Polars-like DataFrame used directly; CSV native,
  Parquet/JSON support through `dataframe`\n\n---\n\n## Capabilities\n\nFeatures grouped
  by category. Each capability links to a usage doc and (where relevant) a theory
  doc.\n\n### Statistical inference (`Hanalyze.Stat.*`)\n\n| Feature | Module | Usage
  | Theory |\n|---|---|---|---|\n| 12 hypothesis tests (t/χ²/ANOVA/Wilcoxon/KS/Shapiro/Levene/Bartlett/...)
  | `Hanalyze.Stat.Test` | [stat/01-test.md](docs/stat/01-test.md) | — |\n| Multiple-testing
  correction (Bonferroni/Holm/BH/BY) | `Hanalyze.Stat.MultipleTesting` | [stat/06-multipletesting.md](docs/stat/06-multipletesting.md)
  | — |\n| Bootstrap CI / permutation tests | `Hanalyze.Stat.Bootstrap` | [stat/07-bootstrap.md](docs/stat/07-bootstrap.md)
  | — |\n| Effect size + power analysis (Cohen's d/η²/Cramér V/n estimation) | `Hanalyze.Stat.Effect`
  | [stat/09-effect.md](docs/stat/09-effect.md) | — |\n| Cross-validation (k-fold/stratified/LOO)
  + Grid search | `Hanalyze.Stat.CV` | [stat/04-cv.md](docs/stat/04-cv.md) | — |\n\n###
  Regression (`Hanalyze.Model.*`)\n\n| Feature | Module | Usage | Theory |\n|---|---|---|---|\n|
  Linear regression (LM) + inference stats (SE/t/p, F, AIC/BIC, leverage, Cook's)
  | `Hanalyze.Model.LM` / `Hanalyze.Model.LM.Diagnostics` | [regression/01-lm.md](docs/regression/01-lm.md)
  | [principles/lm.md](docs/principles/lm.md) |\n| GLM (Binomial / Poisson / Gaussian)
  | `Hanalyze.Model.GLM` | [regression/02-glm.md](docs/regression/02-glm.md) | [principles/glm.md](docs/principles/glm.md)
  |\n| GLMM / mixed-effects model (LME) | `Hanalyze.Model.GLMM` | [regression/03-glmm.md](docs/regression/03-glmm.md)
  | [principles/glmm.md](docs/principles/glmm.md) |\n| Spline regression (B-spline
  / NaturalCubic) | `Hanalyze.Model.Spline` | [regression/04-spline.md](docs/regression/04-spline.md)
  | [regression/theory-regression-extensions.md](docs/regression/theory-regression-extensions.md)
  |\n| Kernel regression (NW / Kernel Ridge) + multi-D inputs | `Hanalyze.Model.Kernel`
  | [regression/04-kernel.md](docs/regression/04-kernel.md) | same |\n| Regularised
  (Ridge / Lasso / ElasticNet) | `Hanalyze.Model.Regularized` | [regression/04-regularized.md](docs/regression/04-regularized.md)
  | same |\n| Gaussian process (RBF / Matérn / Periodic + ARD + multi-input) | `Hanalyze.Model.GP`
  | [regression/04-gp.md](docs/regression/04-gp.md) | [principles/gp.md](docs/principles/gp.md)
  |\n| Random Fourier Features (large-scale GP approximation) | `Hanalyze.Model.RFF`
  | [regression/04-rff.md](docs/regression/04-rff.md) | [regression/theory-regression-extensions.md](docs/regression/theory-regression-extensions.md)
  |\n| Multivariate regression / Multi-output GP | `Hanalyze.Model.{Multivariate,MultiGP,MultiOutput}`
  | [regression/05-multivariate.md](docs/regression/05-multivariate.md) | [regression/theory-multivariate.md](docs/regression/theory-multivariate.md)
  |\n| Quantile regression | `Hanalyze.Model.Quantile` | [regression/06-quantile.md](docs/regression/06-quantile.md)
  | [regression/theory-regression-extensions.md](docs/regression/theory-regression-extensions.md)
  |\n| Generalized additive model (GAM) | `Hanalyze.Model.GAM` | [regression/06-gam.md](docs/regression/06-gam.md)
  | same |\n| Random forest (regression) | `Hanalyze.Model.RandomForest` | [regression/06-randomforest.md](docs/regression/06-randomforest.md)
  | same |\n| Multi-output regression + interactive HTML | `Hanalyze.Model.MultiOutput`
  | [regression/07-multireg.md](docs/regression/07-multireg.md) | [regression/theory-multivariate.md](docs/regression/theory-multivariate.md)
  |\n\n### Machine learning (`Hanalyze.Model.*` / `Hanalyze.Stat.*`)\n\n| Feature
  | Module | Usage | Theory |\n|---|---|---|---|\n| PCA + cumulative variance + standardisation
  | `Hanalyze.Model.PCA` | [stat/02-pca.md](docs/stat/02-pca.md) | — |\n| Clustering
  (K-means + k-means++ + silhouette) | `Hanalyze.Model.Cluster` | [stat/05-cluster.md](docs/stat/05-cluster.md)
  | — |\n| Decision tree (CART classifier) | `Hanalyze.Model.DecisionTree` | [regression/08-decisiontree.md](docs/regression/08-decisiontree.md)
  | — |\n| Time series (ARIMA / Holt-Winters / STL / ACF / PACF) | `Hanalyze.Model.TimeSeries`
  | [regression/09-timeseries.md](docs/regression/09-timeseries.md) | — |\n| Survival
  analysis (Kaplan-Meier / Nelson-Aalen / Log-rank / Cox PH) | `Hanalyze.Model.Survival`
  | [regression/10-survival.md](docs/regression/10-survival.md) | — |\n| Classification
  metrics (Confusion / AUC / F1 / MCC / log-loss / Brier) | `Hanalyze.Stat.ClassMetrics`
  | [stat/03-classmetrics.md](docs/stat/03-classmetrics.md) | — |\n| Model interpretation
  (Permutation imp / PDP / ICE) | `Hanalyze.Stat.Interpret` | [stat/13-interpret.md](docs/stat/13-interpret.md)
  | — |\n\n### Bayesian (`Hanalyze.MCMC.*` / `Hanalyze.Stat.*` / `Hanalyze.Model.HBM`)\n\n|
  Feature | Module | Usage | Theory |\n|---|---|---|---|\n| 27 probability distributions
  (Truncated/Censored/MvNormal/LKJ/Multinomial/...) | `Hanalyze.Stat.Distribution`
