  | [doe/theory-doe.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/doe/theory-doe.md)
  |\n| Custom optimal design (coordinate exchange + modified Fedorov: D/A/G/I criteria,
  Bayesian D, linear constraints, split-plot, augment menus, design comparison via
  efficiency/FDS/alias) | `Hanalyze.Design.Custom.*` | [doe/usage-custom-design.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/doe/usage-custom-design.md)
  + [manual](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/doe/manual-custom-design.md)
  | — |\n| DOE workflow layer (R-style interactive `Design` object over the low-level
  design functions) | `Hanalyze.Design.Workflow` | [api-guide/09-doe.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/api-guide/09-doe.md)
  | — |\n\n### Visualisation (`Hanalyze.Viz.*`)\n\n| Feature | Module | Usage |\n|---|---|---|\n|
  Scatter / bar / histograms / MCMC diagnostics / GP plot / Pareto plot | `Hanalyze.Viz.{Scatter,Bar,Histogram,MCMC,GP,Pareto,ModelGraph,Taguchi}`
  | [visualization/01-visualization.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/visualization/01-visualization.md)
  |\n| Integrated HTML report (MathJax + Mermaid + interactive) | `Hanalyze.Viz.ReportBuilder`
  | [visualization/02-report-builder.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/visualization/02-report-builder.md)
  |\n| Unified fit-and-plot operator `df \\|-> spec` (one entry point across LM/GLM/GAM/GP/HBM/...
  specs) + plot-free coefficient diagnostics | `Hanalyze.Fit` / `Hanalyze.Diagnostics`
  | [io/04-fit-api.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/04-fit-api.md)
  |\n| **hgg integration** (experimental): `toPlot`/`Plottable` overlays a fitted
  model (LM line+CI / GP mean+credible band) on the layer grammar; `module Hanalyze`
  quickstart entry. Flag-gated (`plot-integration`, default off). | `Hanalyze.Plot`
  + `module Hanalyze` | [visualization/03-plot-integration.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/visualization/03-plot-integration.md)
  |\n| **HBM ModelGraph (3 routes)**: Mermaid HTML / Graphviz DOT / direct SVG via
  hgg | `Hanalyze.Viz.{ModelGraph,ModelGraphDot}` + `Hgg.Plot.Bridge.Analyze` | see
  \"ModelGraph — 3 routes\" below |\n\n#### ModelGraph — 3 routes\n\nThere are three
  ways to visualise the DAG of an HBM model; pick by use case:\n\n| Route | Module
  | Output / Deps | When to use |\n|---|---|---|---|\n| **Mermaid HTML** | `Hanalyze.Viz.ModelGraph.renderModelGraph`
  | `.html` + Mermaid CDN script | GitHub / GitLab READMEs, notebook attachments —
  auto-rendered on GitHub |\n| **Graphviz DOT** | `Hanalyze.Viz.ModelGraphDot.renderModelGraphDot`
  | `.dot` text + `dot` CLI (install required) | graphviz ecosystem interop (xdot
  / gephi / `dot -Tpng`), fine-grained directives (`rank=same` / `constraint=false`
  etc) |\n| **hgg direct** | `Hgg.Plot.Bridge.Analyze.renderModelGraphSVG` ([hgg-analyze-bridge](https://github.com/frenzieddoll/hgg))
  | `.svg` (**zero deps**, pure Haskell) | production app embedding, offline batch,
  fast rendering of large DAGs |\n\nAll three routes take the same `Hanalyze.Model.HBM.ModelGraph`
  as input. Layout\nquality vs dependency trade-off:\n\n- Mermaid: lightweight, but
  no offline rendering\n- Graphviz DOT: best layout quality, but requires the `dot`
  CLI\n- hgg: intermediate quality (roughly 70-80% of graphviz dot, pure Haskell);
  the only option when zero dependencies are required\n\nCode example (with `hgg-analyze-bridge`
  added as a dependency):\n\n```haskell\nimport qualified Hanalyze.Viz.ModelGraph
  \   as Mermaid\nimport qualified Hanalyze.Viz.ModelGraphDot as Dot\nimport qualified
  Data.Text.IO               as TIO\nimport           Hgg.Plot.Bridge.Analyze (renderModelGraphSVG)\nimport
  \          Hanalyze.Model.HBM          (buildModelGraph)\n\nmain = do\n  let mg
  = buildModelGraph myHBM\n  Mermaid.renderModelGraph \"out/dag.html\" \"My HBM\"
  mg            -- Route 1\n  TIO.writeFile \"out/dag.dot\" (Dot.renderModelGraphDot
  mg)       -- Route 2\n  renderModelGraphSVG     \"out/dag.svg\"  \"My HBM\" mg             --
  Route 3\n```\n\nNote: for standard plots, hgg also ships native PNG (Rasterific)
  and PDF\nbackends. For the ModelGraph SVG route, convert via `rsvg-convert` / `inkscape`\nwhen
  PNG / PDF is needed.\n\n### Data I/O (`Hanalyze.DataIO.*`)\n\n| Feature | Module
  | Usage |\n|---|---|---|\n| CSV/TSV/SSV (cassava) + Parquet/JSON (Hackage `dataframe`)
  | `Hanalyze.DataIO.{CSV,External,Convert}` | [io/01-dirty-data.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/01-dirty-data.md)
  |\n| Dirty-data defence (W001-W008 warnings + auto-sniff + clean DSL) | `Hanalyze.DataIO.{Health,Sniff,Clean,Log}`
  | [io/01-dirty-data.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/01-dirty-data.md)
  |\n| Reshape (pivot_wider / one-hot / lag-lead / rolling window) | `Hanalyze.DataIO.Reshape`
  | [io/02-reshape.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/02-reshape.md)
  |\n| Preprocessing (impute / groupBy / derived columns / melt) | `Hanalyze.DataIO.Preprocess`
  | [io/01-dirty-data.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/01-dirty-data.md)
  |\n| Long-form regrid (`regridLong`) | `Hanalyze.DataIO.Preprocess` + `Hanalyze.Stat.Interpolate`
  | [io/03-regrid.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/io/03-regrid.md)
  |\n\n---\n\n## Quick start\n\n### 30 seconds via CLI\n\n```bash\ngit clone https://github.com/frenzieddoll/hanalyze\ncd
  hanalyze\ncabal build all\n\n# Regress sales on price + promo, write an HTML report.\nhanalyze
  regress data/readme/sales.csv \"price promo\" sales --report sales.html\n# β₀=185.05
  \ β(price)=-4.37  β(promo)=+32.29  R²=0.995\n```\n\n`data/readme/sales.csv` is a
  20-row demo CSV shipped with the repository\n(`price`, `promo`, `sales`). The generated
  `sales.html` includes coefficients,\nfit diagnostics, and an interactive prediction
  widget — straight from one\ncommand.\n\n### 30 seconds via Haskell API\n\n```haskell\nimport
  qualified Hanalyze.Stat.Test as ST\nimport qualified Numeric.LinearAlgebra as LA\n\nmain
  = do\n  let xs = LA.fromList [12, 14, 13, 15, 17, 11]\n      ys = LA.fromList [18,
  22, 20, 19, 25, 17]\n      result = ST.tTestWelch xs ys ST.TwoSided\n  print (ST.trPValue
  result, ST.trEffect result)\n  -- (0.012, Just (\"Cohen's d\", -1.85))\n```\n\nA
  single `import Hanalyze` re-exports the core entry points (linear / GLM models,\ndescriptive
  stats, tests, effect sizes, distributions, plotting helpers and CSV\nI/O) for quick
  exploration; reach for the individual `Hanalyze.Model.*` /\n`Hanalyze.Stat.*` modules
  when you need their full surface.\n\nSee [docs/01-quickstart.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/01-quickstart.md)
  for a fuller introduction.\n\n---\n\n## CLI\n\n```\nhanalyze help                     list
  subcommands\nhanalyze regress <file> <x> <y>   LM/GLM/GP/HBM regression + HTML report\nhanalyze
  info <file>              per-column type/statistics\nhanalyze hist <file> <col>
  \       histogram with theoretical PDF overlay\nhanalyze ridge <file> ...         regularised
  regression (Ridge/Lasso/EN)\nhanalyze kernel <file> ...        kernel regression
  (NW/KR/RFF), multi-D inputs\nhanalyze spline <file> ...        spline regression\nhanalyze
  multireg <file> ...      multi-output regression + interactive HTML\nhanalyze melt
  <file> ...          long-form transform\nhanalyze regrid <file> ...        time-axis
  grid alignment\nhanalyze doe ortho <NAME> -f ...  orthogonal-array generation\nhanalyze
  taguchi sn / analyze     Taguchi method\nhanalyze clean <file> --rule ...  dirty-data
  cleaning\n```\n\nFor per-command flags, run `hanalyze <cmd> --help` or see [docs/01-quickstart.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/01-quickstart.md).\n\n---\n\n##
  Examples / demos\n\n`demo/` contains many demos (76 as of this release). Highlights:\n\n|
  Demo | Summary |\n|---|---|\n| `demo/regression/HBMRegressionDemo.hs` | HBM Bayesian
  linear regression with NUTS + HTML |\n| `demo/regression/RFFDemo.hs` | Large-scale
  GP via Random Fourier Features |\n| `demo/regression/RobustGPDemo.hs` | Robust GP
  with Student-t observation likelihood |\n| `demo/doe-optim/NSGADemo.hs` | NSGA-II
  + Pareto on the ZDT suite |\n| `demo/doe-optim/BayesOptDemo.hs` | BO on Branin /
  Hartmann6 |\n| `demo/bayesian/HBMComparisonDemo.hs` | Compare HBMs with WAIC / LOO
  |\n| `demo/bayesian/SimpsonParadoxDemo.hs` | Disentangle Simpson's paradox via hierarchical
  model |\n| `demo/io/DirtyDataDemo.hs` | Auto-defend against 19 dirty CSV variants
  |\n\nRun: `dist-newstyle/build/x86_64-linux/ghc-9.6.7/hanalyze-0.2.0.0/x/<demo-name>/build/<demo-name>/<demo-name>`.\n\n---\n\n##
  Where hanalyze fits\n\nRather than a complete Python/R replacement, hanalyze targets
  specific\nworkflows where Haskell integration, single-binary CLI, and tight reporting\nadd
  value.\n\n**Strong fit**\n\n- Haskell-native pipelines that need stats/Bayes/optim
  without calling out to Python\n- Single-binary CLI distribution (one `hanalyze`
  binary, no Python venv)\n- Dirty-CSV defence + cleaning + analysis in one workflow\n-
  DoE / Taguchi / orthogonal arrays for manufacturing and process tuning\n- HTML reports
  straight from the analysis (no separate templating step)\n- Type-safe analysis pipelines
  that catch dtype/API mismatches early\n\n**Not a goal — keep using existing tools
  for**\n\n- Large-scale DataFrame work (pandas / polars / data.table)\n- GPU deep
  learning (PyTorch / JAX)\n- The full breadth of scikit-learn's mature model zoo\n-
  The full Stan / PyMC MCMC diagnostics ecosystem\n- The full expressive range of
  ggplot2\n\n---\n\n## Comparison vs Python\n\n> R is included in the feature map
  only — no numerical bench against R has been run.\n\nNumbers below come from `bench/results/{haskell,python}/*.csv`;
  see\n[bench/results/SUMMARY.md](bench/results/SUMMARY.md) for the full table and\nbenchmark
  conditions (`OPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1`,\nsingle-thread, deterministic
  seeds).\n\n| Domain | Result in these benchmarks |\n|---|---|\n| **Single-objective
  optim** (DE/CMAES/L-BFGS/NM) | Often faster than scipy in tested cases (Rosenbrock_2D/DE
  134×, Ackley/CMAES 49×, Griewank/CMAES 54×). On Sphere_30D/L-BFGS the reported objective
  value is 8.1e-40 vs scipy 2.6e-11 in this run. |\n| **Multi-objective optim** (NSGA-II)
  | Comparable or favourable in the ZDT/DTLZ suite (DTLZ2_3 1.43× faster, ZDT1/2/3
  within ±5% of pymoo). HV/IGD figures match or slightly improve on pymoo in these
  runs. |\n| **Bayesian optim** (BO) | Comparable on Branin (1.15×); on Hartmann6
  the best objective in this run was -3.07 vs skopt -2.77. |\n| **Simulated annealing**
  (Tsallis SA) | Comparable; Rastrigin_10D reaches 0.0 in this run (scipy `dual_annealing`
  reports 7.8e-14). |\n| **Classical regression** (LM/Ridge/Lasso/GLMM) | Comparable
  in tested cases; LME 30× faster than statsmodels in our LME run. |\n| **Large-scale
  GLM/Lasso** (n ≥ 10k) | Currently slower than sklearn (3-5× in tested cases) — sklearn's
  Cython inner loops dominate. |\n| **Kernel/GP** | Currently slower than sklearn
  (2.5-4.7× in tested cases). |\n| **Bayesian MCMC** (NUTS/HMC) | NUTS with ESS comparable
  to blackjax (mu: 839 vs 810) on the 8-schools benchmark; 7.4× faster than PyMC;
  2.8× slower than blackjax (JAX-JIT advantage). |\n| **HBM (probabilistic programming)**
  | Polymorphic DSL with selected PyMC-style modelling features and selected distributions
  (Truncated/Censored/MvNormal/LKJ/...). |\n| **VI / WAIC / LOO** | ADVI 3.0× faster
  than numpyro SVI on a small logistic posterior; LOO 2.9× faster than arviz on (S=1000,
  N=200) log-lik matrix. |\n| **Hypothesis tests / bootstrap / k-fold** | Welch t-test
  39× faster, KS 11×, k-fold split 2.2× faster than scipy/sklearn in tested cases.
  |\n| **Time series / Spline / GAM** | ARIMA 128× faster than statsmodels; Spline
  PCHIP comparable to scipy; GAM ~1.6× slower than pygam in tested cases. |\n| **Survival
  analysis** (KM/Cox PH) | Comparable to lifelines in tested cases (KM/CoxPH). |\n|
  **Multi-output regression / Regrid** | MultiLM 2.3× faster than sklearn; `regridLong`
  20× faster than a hand-written pandas+scipy synthesis. |\n| **Visualisation** |
  Vega-Lite specs via hvega (grammar-of-graphics-style); HTML reports built-in. |\n\nSee
  [docs/comparison/python-r.md](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/docs/comparison/python-r.md)
  for the feature map, and [bench/results/SUMMARY.md](bench/results/SUMMARY.md) for
  numbers.\n\n---\n\n## Benchmark highlights\n\nSelected results from `bench/results/SUMMARY.md`.
  Each entry is a single\nbenchmark configuration; absolute objective values depend
  on iteration\ncounts, seeds, and tolerances — see the SUMMARY for full conditions.\nNUTS
  is additionally validated against posteriordb reference posteriors\n(see [bench/posteriordb/](bench/posteriordb/)).\n\n-
  **NUTS 8-schools** (warmup 500, samples 1000): hanalyze 1492 ms with ESS(mu) 839
  vs blackjax 530 ms / ESS 810 in this run\n- **Holt-Winters seasonal n=500 p=12**:
  hanalyze 0.19 ms vs statsmodels MLE 96 ms in this run (note: hanalyze uses fixed
  α=0.3 closed-form; statsmodels does MLE)\n- **Sphere_30D/DE**: hanalyze 1.0e-26
  vs scipy 2.8e-5 on this benchmark\n- **Sphere_30D/L-BFGS**: hanalyze 8.1e-40 vs
  scipy 2.6e-11 on this benchmark\n- **Rastrigin_10D/SA**: hanalyze 0.0 vs scipy `dual_annealing`
  7.8e-14 in this run\n- **Hartmann6/BO**: hanalyze -3.07 vs skopt -2.77 in this run\n-
  **DTLZ2_3/NSGA-II**: hanalyze 528 ms vs pymoo 758 ms (1.43× faster in this run)\n-
  **DE Rosenbrock_2D**: hanalyze 1.2 ms vs scipy 164 ms (134× faster in this run)\n-
  **Constrained Quad2D (eq)**: hanalyze 0.062 ms vs scipy SLSQP 0.69 ms in this run\n-
  **regridLong on jagged long-form**: hanalyze 0.99 ms vs pandas+scipy synthesis 19.4
  ms in this run\n\nReproduce: `OPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1 cabal run
  bench-{regression,kernel,optim,mo,bo,mcmc-b7,mcmc-extras,ts-extras,optim-plus,stat-util,multi-output,regrid}`,
  then `bench/python/bench_*.py` (see [bench/README.md](bench/README.md)).\n\n---\n\n##
  Architecture\n\n```mermaid\ngraph TD\n  IO[DataIO.* CSV/Parquet/JSON]\n  IO -->
  DF[Hackage dataframe]\n  DF --> Models[Model.* regression/ML/Bayesian/TS/Survival]\n
  \ DF --> Stat[Stat.* tests/CV/effect/interpret]\n  Models --> Optim[Optim.* optimisation]\n
  \ Models --> MCMC[MCMC.* samplers]\n  Models --> Viz[Viz.* HTML/PNG/SVG]\n  Stat
  --> Viz\n  MCMC --> Viz\n  Optim --> Design[Design.* DoE/Taguchi]\n```\n\n**All
  modules talk to Hackage `dataframe` directly**. The internal `DataFrame.Core` was
  retired.\n\n---\n\n## Roadmap & API stability\n\n- **Stable** (API expected to remain
  backward-compatible within minor versions): `Hanalyze.DataIO.*`, `Hanalyze.Stat.{Test,
  Bootstrap, MultipleTesting, ClassMetrics, CV, Effect, Distribution}`, `Hanalyze.Model.{LM,
  GLM, Spline, Regularized, RandomForest, DecisionTree, TimeSeries, Survival, GAM}`,
  `Hanalyze.Optim.{NelderMead, LBFGS, DifferentialEvolution, CMAES, NSGA, BayesOpt,
  SimulatedAnnealing, ParticleSwarm}`, `Hanalyze.Design.*`, `Hanalyze.Viz.{Scatter,
  Bar, Histogram}`.\n- **Experimental** (API may evolve): `Hanalyze.Model.HBM` DSL,
  `Hanalyze.MCMC.NUTS` (mass-matrix adaptation is opt-in), `Hanalyze.Stat.VI` (ADVI),
  `Hanalyze.Model.{GP, RFF, GPRobust, GLMM}`, `Hanalyze.Model.{SVM, GradientBoosting,
  NeuralNetwork}`, `Hanalyze.Model.LiNGAM.*`, `Hanalyze.Design.Custom.*`, the `df
  |-> spec` fit operator (`Hanalyze.Fit`), the hgg integration (`plot-integration`
  flag), `Hanalyze.Viz.ReportBuilder`. Behaviour is benchmarked but type signatures
  may shift.\n- **Future direction**: a backend-abstraction typeclass for swapping
  hmatrix/Massiv/Accelerate is under consideration but not on a fixed schedule. (The
  unified top-level re-export layer and the fit-operator API planned earlier landed
  in 0.2.0.0 as `module Hanalyze` and `Hanalyze.Fit`.)\n\n---\n\n## Module layout\n\n```\nsrc/\n
  \ DataIO/      — CSV/JSON/Parquet IO + health checks + sniff + clean DSL + reshape
  (9 mods)\n  Stat/        — tests/distributions/effect/CV/bootstrap/interpret/causal/MCMC
  diagnostics (33 mods)\n  Model/       — LM/GLM/GLMM/GP/HBM/SVM/GBM/NN/Cluster/TS/Survival/LiNGAM/FDA
  etc. (75 mods)\n  Optim/       — single-obj (NM/LBFGS/DE/CMAES/SA/PSO) + multi-obj
  (NSGA/BO/Pareto) (18 mods)\n  Design/      — Factorial/Block/RSM/Orthogonal/Taguchi
  + Custom optimal design (30 mods)\n  Viz/         — Vega-Lite-based visualisation
  + ReportBuilder (19 mods)\n  MCMC/        — MH/HMC/NUTS/Gibbs/Slice/SMC + progress
  (9 mods)\n  Math/ Data/ Plot/ + Fit/Diagnostics — numeric kernels, data helpers,
  hgg integration, fit operator\n```\n\nAs of this release: 212 modules, ~1,390 test
  examples.\n\n---\n\n## Build\n\n```bash\ncabal build all                  # library
  + all executables (76 demos)\ncabal test                       # hspec test suite\ncabal
  repl                       # interactive REPL\n```\n\nMajor dependencies: `hmatrix`
  (BLAS/LAPACK), `hvega` (Vega-Lite), `statistics`, `mwc-random`, `dataframe` (Hackage
  Polars-like), `massiv` (parallel arrays), `ad` (auto-diff), `async`.\n\nTested on
  GHC 9.6.7 + cabal 3.14.2.\n\n---\n\n## Running benchmarks\n\n```bash\n# 1. Generate
  shared test data (fixed-seed, deterministic)\ncabal run bench-data-gen\n\n# 2. Haskell
  side\nOPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1 \\\n  cabal run bench-regression
  bench-kernel bench-optim bench-mo bench-bo\n\n# 3. Python side (need bench/venv
  from bench/requirements.txt)\nOPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1 \\\n  bench/venv/bin/python
  bench/python/bench_regression.py\n# (similarly for kernel, optim, mo, bo)\n\n# 4.
  Aggregate (Markdown table)\nbench/venv/bin/python bench/aggregate.py > bench/results/SUMMARY.md\n```\n\n---\n\n##
  Development\n\n- **Issues / PRs**: [github.com/frenzieddoll/hanalyze](https://github.com/frenzieddoll/hanalyze)\n-
  **Adding tests**: append hspec specs in `test/Spec.hs`\n- **Adding benchmarks**:
  place `bench/haskell/Bench*.hs` and matching Python script\n- **Coding rules**:
  see `CONTRIBUTING.md` (no list-passing on hot paths, minimise `unsafe*`, ...)\n\n---\n\n##
  License\n\nBSD-3-Clause License — see [LICENSE](https://github.com/frenzieddoll/hanalyze/blob/v0.2.0.0/LICENSE).\n\n##
  Author\n\nToshiaki Honda <frenzieddoll@gmail.com>\n"
