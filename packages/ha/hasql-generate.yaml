changelog: |
  # Changelog

  1.0.0: Hello, world! The README is probably a better source for what this is

  1.0.1:
  - Added `withDefaultedCols`
  - Removed `withholdPk`, in favor of `withDefaultedCols ["myPrimaryKeyColumn"]`.
