changelog: |
  # Changelog

  ## 0.1.0.2 - 2026-07-22

  - Documentation: the `Moonlight.Core` umbrella header now carries the worked
    recipes — persistent union-find, bounded fixpoints, checked total maps, and
    the matching seam. The README is reduced to a dependency and module map.

  ## 0.1.0.1 - 2026-07-22

  - Public named sublibraries drop the redundant package prefix:
    `moonlight-core-automata` becomes `automata`, `moonlight-core-syntax`
    becomes `syntax`, and `moonlight-core-egraph-program` becomes
    `egraph-program`. Depend on them as `moonlight-core:automata`,
    `moonlight-core:syntax`, and `moonlight-core:egraph-program`. The
    aggregate `Moonlight.Core` surface and every exposed module are
    unchanged; only the component names differ.

  ## 0.1.0.0 - 2026-07-12

  - Initial release of the Level-0 foundation: the numeric tower (`Scalar`,
    `Numeric`) and its scalar type classes (`AdditiveGroup`,
    `MultiplicativeMonoid`, `Ring`, `Field`, `Metric`, ordered and continuous
    fields), with instances for the primitive numeric types.
  - Approximate equality with absolute, relative, and ULP tolerance kinds
    (`ApproxEq`).
  - Canonical and exact numeric representations (`CanonicalNumber`, `Canon`,
    `ExactToken`), including one self-delimiting structural sequence grammar.
  - Order and reachability: partial-order classes (`Order`), finite universes
    (`Finite`), bounded fixpoint combinators (`Fixpoint`), and persistent
    union-find (`UnionFind`) with checked persistent and transactional class-id
    allocation.
  - Identity and lookup: stable structural hashing (`StableHash`, `Hash`), checked
    total registries (`TotalRegistry`), and the relational term database
    (`Term.Database`).
  - Syntax layer: Moonlight-owned authored patterns (`PatternVar`, `PatternNode`),
    `Language`/`ZipMatch`, typed substitutions, structural theories whose
    canonicalization reads node children through `Foldable`, and `Fix.Order`.
  - Pure proof-manifest rendering/parsing for the EGraph emitter and Rewrite-owned
    external proof boundary; package-local law tests do not impersonate that
    integration.
  - `Moonlight.Core` is the aggregate public surface. Public named sublibraries
    provide syntax, pattern automata, and the host-neutral e-graph program
    algebra; `Moonlight.Core.Unsound` provides the explicit trust boundary.
changelog-type: markdown
description: |
  # moonlight-core

  > Part of **Moonlight**, the sheaf-theoretic computation layer beneath
  > [Melusine](https://bluerose.blue) and Pale Meridian.

  `moonlight-core` is Moonlight's foundation tier. The front door is the total
  umbrella module `Moonlight.Core`; its header carries the contract, the API map,
  and the worked recipes. This page is the dependency map and the build commands.

  ## Surface & boundaries

  Most downstream code imports the umbrella. Lower-level packages may depend on one
  of the public sublibraries.

  | Cabal dependency | Import | What you get |
  | --- | --- | --- |
  | `moonlight-core` | `Moonlight.Core` | The ordinary total vocabulary. This is the default. |
  | `moonlight-core:moonlight-core-syntax` | `Moonlight.Core.Pattern.AntiUnify` | Patterns and term anti-unification without the full umbrella. |
  | `moonlight-core:moonlight-core-automata` | `Moonlight.Core.Pattern.Automata` or `.Kernel` | The bottom-up automata substrate and compiled matcher. Depend on syntax too when naming its types directly. |
  | `moonlight-core:moonlight-core-egraph-program` | `Moonlight.Core.EGraph.Program` | The host-neutral e-graph program algebra without the rest of the foundation. |
  | `moonlight-core` | `Moonlight.Core.Unsound` | The explicit trust boundary. |

  The private implementation slices remain **basis**, **numeric**, **solver**, and
  **term**. Syntax, automata, and e-graph programs are public because other foundation
  packages consume those exact owners. The umbrella re-exports the
  syntax and e-graph-program vocabulary; automata are imported only through the sublibrary.

  ## Test

  ```bash
  cabal test moonlight-core:moonlight-core-test
  ```

  ## Benchmarks

  ```bash
  cabal bench moonlight-core:moonlight-core-bench --benchmark-options='--timeout=2s --csv=comparison.csv'
  ```

  `hackage:` rows measure a package-level baseline (`containers`, `memory`, `scientific`,
  `equivalence`) on the same fixture; `world:` rows are source-equivalent baselines where
  no package owner exists. Fixtures assert result agreement with the baseline before
  timing. Dated receipts live in `docs/BENCHMARKS-m4-pro.md`.

  ## License

  MIT. See `LICENSE`.
