changelog-type: markdown
description: "# Flexible Logging with Monad-Effect\n\n`monad-effect-logging` is a
  pure structured logging library for the `monad-effect` ecosystem.\n\nThe current
  API is centered on one unified message payload `LogDoc`.\n\n## Highlights\n\n* You
  build one `LogDoc` value and decide at the boundary how to render it:\n\n  - plain
  text\n  - ANSI colored text\n  - different `Show` strategies\n  - custom logger
  pipelines\n  \n* Color stays semantic until rendering time. A file logger can ignore
  color while a console logger can emit ANSI codes from the exact same log event.\n\n*
  Excellent `TraceId` support\n\n* Open log categories, extensible\n\n* Easy JSON
  logging by tagging `loggerJson`\n\nThis enables you to easily add JSON logging to
  your files while keeping the console output colorful and readable: you can write
  no-color json logging to a file while use `pSho` and color constructors to display
  stuff on the screen at the same time.\n\n## Core types\n\n- `LogEvent` for the event
  envelope\n- `LogWithSourceMeta` for source-location metadata\n- `LogDoc` for the
  structured log message\n- `Logger` for the sink\n- `LogEffect` for the installed
  effect\n\n```haskell\ndata LogEvent a = LogEvent\n  { logEventCats :: [LogCat]\n
  \ , logEventPayload :: a\n  }\n\ndata LogWithSourceMeta a = LogWithSourceMeta\n
  \ { logMetaLoc :: Maybe Loc\n  , logMetaSource :: Maybe LogSource\n  , logMetaDoc
  :: a\n  }\n\nnewtype Logger m a = Logger\n  { runLogger :: LogEvent a -> m ()\n
  \ }\n\ndata LogEffect m a\n\ndata LogDoc\n```\n\nThe default installed logging effect
  is:\n\n```haskell\ntype Logging = LogEffect IO LogDoc\n```\n\n## Building messages\n\nString
  literals work through `IsString`, and deferred values use `logShow`.\n\n```haskell\nimport
  Module.Logging\n\nexample :: (Monad m, In (LogEffect m LogDoc) mods) => EffT mods
  es m ()\nexample = do\n  $(logTH Info) $ \"starting request \" <> logShow (42 ::
  Int)\n  $(logTH Warn) $ logFg Yellow \"slow query: \" <> toLog (\"SELECT ...\" ::
  String)\n```\n\nUseful helpers:\n\n- `logRaw`\n- `logShow`\n- `logFg`\n- `logBg`\n-
  `logBold`\n- `toLog`\n\nLiteral strings can be directly typed in using `IsString`
  class, no need to convert using helpers.\n\n## Rendering and base loggers\n\nMost
  applications should use one options-based helper from `Module.Logging.Logger`:\n\n```haskell\nimport
  Module.Logging\nimport Module.Logging.Logger\n\nrunApp :: EffT '[LogEffect IO LogDoc]
  NoError IO () -> IO ()\nrunApp app = do\n  stdoutBase <- createSimpleConcurrentStdoutBaseLogger\n
  \ fileBase <- createFileLogger \"app.log\"\n\n  let stdoutLogger = makeLoggerFromBase
  ( buildLoggerStyle loggerUseAnsi                ) stdoutBase\n  let fileLogger   =
  makeLoggerFromBase ( buildLoggerStyle (loggerJson . loggerNoStyle) ) fileBase\n\n
  \ runEffT00 $ withLoggerCleanup (stdoutLogger <> fileLogger) app\n```\n\nHere each
  style is a builder function `LoggerOptions -> LoggerOptions`, and the `buildLoggerStyle`
  function is just a composition of them on the `defaultLoggerStyle`.\n\nFor custom
  pipelines, use the lower-level building blocks:\n\n- `renderLogEvent`\n- `loggerFromRenderer`\n-
  your own `Logger`\n\nStyles compose as normal functions:\n\n```haskell\nverboseConsole
  :: LoggerOptions\nverboseConsole =\n  buildLoggerStyle\n    $ loggerUseAnsi\n    .
  loggerOrder [LogTimeChunk, LogCatChunk, LogLocChunk, LogDocChunk]\n```\n\n## Categories\n\nCategories
  are open and extensible:\n\n```haskell\ndata ProxyLog = Bytes | Logic deriving (Lift)\n--
  The `Lift` class is only necessary if you want to use them inside `logTH` template
  haskell\n-- utilities, otherwise you can remove it.\n\ninstance IsLogCat ProxyLog
  where\n  severity Bytes = severity Debug\n  severity Logic = severity Info\n  logTypeName
  Bytes = \"BYTES\"\n  logTypeName Logic = \"LOGIC\"\n```\n\nYou can add local categories
  with `effAddLogCat`, and filter them with the existing combinators.\n\n## `MonadLogger`
  compatibility\n\n`MonadLogger` and `MonadLoggerIO` are implemented for `LogEffect
  m LogDoc`.\n\nIncoming `monad-logger` messages are wrapped as `logRaw`, so compatibility
  fits directly into the unified payload model.\n\n## `TraceId`\n\nThis library also
  provides a super convenient `TraceId` mechanism that can attach scoped trace IDs
  to log events.\n`TraceId` is just a log category. Use `withTraceId` or one of the
  provided generators from `Module.Logging.TraceId`.\n\n## Status\n\nThis release
  presents the library around `LogDoc`, options-based logger construction, open categories,
  and boundary-driven rendering.\n"
