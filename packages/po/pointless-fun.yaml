description: "pointless-fun\n=============\n[![CI Status](https://github.com/wrengr/pointless-fun/actions/workflows/ci.yml/badge.svg)](https://github.com/wrengr/pointless-fun/actions?query=workflow%3Aci+-event%3Apull_request)\n[![Hackage
  version](https://img.shields.io/hackage/v/pointless-fun.svg?style=flat)](https://hackage.haskell.org/package/pointless-fun)
  \n[![Stackage LTS version](https://stackage.org/package/pointless-fun/badge/lts)](https://stackage.org/lts/package/pointless-fun)\n[![Stackage
  Nightly version](https://stackage.org/package/pointless-fun/badge/nightly)](https://stackage.org/nightly/package/pointless-fun)\n\nSome
  common point-free combinators. Including strict composition,\nand type-signature-like
  combinators for coercing inputs and outputs\nof functions.\n\n\n## Install\n\nThis
  is a simple package and should be easy to install. You should\nbe able to use the
  standard:\n\n    $> cabal install pointless-fun\n    \n\n## Portability\n\nThis
  library is fully Haskell98 compliant.\n\n\n## Links\n\n* [Website](http://wrengr.org/)\n*
  [Blog](http://winterkoninkje.dreamwidth.org/)\n* [Twitter](https://twitter.com/wrengr)\n*
  [Hackage](http://hackage.haskell.org/package/pointless-fun)\n* [GitHub](https://github.com/wrengr/pointless-fun)\n"
