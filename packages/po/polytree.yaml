changelog: |
  0.1.2

  * Add comprehensive test infrastructure with 115 doctests
  * Add explicit export list for better API control
  * Add classy optics hierarchy (GetTree, HasTree, ReviewTree, AsTree and TreeForest variants)
  * Add utility functions: singleton, unfoldTree, unfoldTreeM, pruneLeaves, countNodes, countLeaves, levels
  * Add makeTree constructor (makeChild now delegates to it)
  * Fix CPP conditional import of liftA2 for GHC < 9.6 compatibility
  * Document why Biapplicative/Biapply instances are not possible
  * Add comprehensive README.md with examples and design decisions
  * Add .hlint.yaml and .ormolu configuration files
  * Update to cabal-version 2.4 with modern formatting
  * Add System-F logo to package description
  * Update copyright to 2025-2026
  * Change license to BSD-3-Clause (SPDX identifier)
  * Add dev flag for -Werror during development
  * Simplify build scripts and update GitLab CI to System-F style
  * Add GitLab Pages integration for documentation publishing

  0.1.1

  * Make `TreeForest` its own data type

  0.1.0

  * Complete refactor and change of data structure

  0.0.10

  * New combinators for traversing Node
  * Update build

  0.0.9

  * Delete `leaves` function (use `traverse`)

  0.0.8

  * Add `leaves` function

  0.0.7

  * Fix `Show` instance
  * Add `traverseNode` and `traverseNode_` functions

  0.0.6

  * Add `foldTreeM_`

  0.0.5

  * Add `nodeA` constructor function
  * Rearrange and rename fold functions, adding `foldTreeM`

  0.0.4

  * Add `nodeValue` and `nodeChildren`
  * Add `node` and `node0` and `node1` constructor functions
  * Add `foldTreeFix`
  * Add isomorphisms to Free monad

  0.0.3

  * Add Semigroup and Monoid instance

  0.0.2

  * Add more optics and functions

  0.0.1

  * This change log starts
changelog-type: markdown
description: "# polytree\n\nA polymorphic rose tree with different types for node
  labels and leaf values.\n\n## Overview\n\nThe `polytree` library provides `Tree
  f a b` and `TreeForest f a b` data types where:\n- `f` is a polymorphic container
  type (list, vector, etc.)\n- `a` is the type of node labels\n- `b` is the type of
  leaf values\n\nThis design allows for flexible tree representations where internal
  nodes and leaves can have different types, and the choice of container affects performance
  characteristics.\n\n## Key Features\n\n### Data Types\n\n- **`Tree f a b`** - A
  tree with labels of type `a` at nodes and values of type `b` at leaves\n- **`TreeForest
  f a b`** - A forest (collection) of trees and leaves\n- **Type aliases**: `Tree'`,
  `TreeList`, `TreeList'`, `Tree1`, `Tree1'`\n\n### Type Class Instances\n\nComprehensive
  instances for:\n- **Standard classes**: `Eq`, `Ord`, `Show` (with lifted variants
  `Eq1`, `Eq2`, etc.)\n- **Functors**: `Bifunctor`, `Functor`\n- **Applicatives**:
  `Apply`, `Applicative` (operates over leaves with `Monoid`/`Semigroup` on labels)\n-
  **Foldables**: `Bifoldable`, `Foldable`, `Bifoldable1`, `Foldable1`\n- **Traversables**:
  `Bitraversable`, `Traversable`, `Bitraversable1`, `Traversable1`\n- **Lens integration**:
  `Wrapped`, `Plated`, and custom optics\n\n### Optics\n\nFour-level classy optics
  hierarchy:\n- **`GetX`** - Read-only access via `Getter`\n- **`HasX`** - Read-write
  access via `Lens'`\n- **`ReviewX`** - Construction via `Review`\n- **`AsX`** - Full
  prism access via `Prism'`\n\nAvailable for both `Tree` and `TreeForest` types.\n\n###
  Utility Functions\n\n- **Construction**: `makeTree`, `makeChild`, `makeLeaves`,
  `makeChildren`, `singleton`\n- **Unfolding**: `unfoldTree`, `unfoldTreeM`\n- **Traversal**:
  `dfs` (depth-first), `bfs` (breadth-first)\n- **Analysis**: `countNodes`, `countLeaves`,
  `levels`\n- **Transformation**: `pruneLeaves`\n- **Conversion**: `baseTree` (to/from
  `Data.Tree.Tree`)\n\n## Example Usage\n\n```haskell\nimport Data.PolyTree\nimport
  Control.Lens\n\n-- Create a tree with string labels and integer leaves\ntree ::
  TreeList String Int\ntree = Tree \"root\" \n         (TreeForest \n           [
  Left 42                    -- A leaf\n           , makeChild \"child1\" [Left 10,
  Left 20]  -- A subtree\n           , makeChild \"child2\" []      -- An empty subtree\n
  \          ])\n\n-- Traverse leaves\n>>> toListOf treeLeaves tree\n[42,10,20]\n\n--
  Map over leaves\n>>> fmap (*2) tree\nTree \"root\" (TreeForest [Left 84,Right (Tree
  \"child1\" (TreeForest [Left 20,Left 40])),Right (Tree \"child2\" (TreeForest []))])\n\n--
  Depth-first traversal\n>>> dfs tree\nLeft \"root\" :| [Right 42,Left \"child1\",Right
  10,Right 20,Left \"child2\"]\n\n-- Breadth-first traversal\n>>> bfs tree\nLeft \"root\"
  :| [Right 42,Left \"child1\",Left \"child2\",Right 10,Right 20]\n\n-- Unfold a tree\n>>>
  unfoldTree (\\n -> (n, if n > 0 then [Right (n-1)] else [])) 3\nTree 3 (TreeForest
  [Right (Tree 2 (TreeForest [Right (Tree 1 (TreeForest [Right (Tree 0 (TreeForest
  []))]))]))])\n\n-- Use applicative instance (operates over leaves with Monoid on
  labels)\n>>> Tree \"a\" (TreeForest [Left (+1)]) <*> Tree \"b\" (TreeForest [Left
  5])\nTree \"ab\" (TreeForest [Left 6])\n```\n\n## Design Decisions\n\n### Why Different
  Types for Nodes and Leaves?\n\nMany tree algorithms distinguish between internal
  nodes (which have structural/organizational data) and leaves (which have payload
  data). For example:\n- Decision trees: nodes contain split criteria, leaves contain
  predictions\n- Expression trees: nodes contain operators, leaves contain values\n-
  File systems: nodes are directories, leaves are files\n\n### Why Polymorphic Container?\n\nThe
  `f` parameter allows you to choose the container type:\n- `[]` for simple lists
  (default, most flexible)\n- `Vector` for efficient random access\n- `NonEmpty` for
  non-empty forests (with `Foldable1`/`Traversable1` instances)\n- `Identity` for
  single-child trees\n\n### Why Not Biapplicative?\n\nWhile `Bifunctor`, `Bifoldable`,
  and `Bitraversable` instances are possible, `Biapply` and `Biapplicative` instances
  are **not** implementable due to the recursive `Either`-based structure. The combination
  of a tree of functions with a single value has no canonical semantics.\n\n## Testing\n\nThe
  library includes comprehensive doctests (115 examples). Run with:\n\n```bash\ncabal
  test\n```\n\n## Related Work\n\n- `Data.Tree` from `containers` - Standard rose
  tree (single type for all nodes)\n- `Data.Tree.Class` - Type class approach to trees\n-
  This library's approach: Separate types for nodes/leaves with polymorphic container\n\n![System-F](https://logo.systemf.com.au/systemf-450x450.jpg)\n"
