changelog: |
  # Changelog

  All notable changes to this project will be documented in this file.

  ## 1.2.0.4

  - Relaxed the upper bound on `time` to allow `time-1.15`.

  ## 1.2.0.3

  - Updated the lower bound of `openapi3` so the package no longer
    depends directly on `insert-ordered-containers`.

  ## 1.2.0.2

  - Added GHC 9.14 support.

  ## 1.2.0.1

  - Upgraded the json-spec dependency (adapts to json-spec 1.3 breaking change
    where `JsonEither` takes a type-level list of specs instead of two
    arguments).
changelog-type: markdown
description: |
  # json-spec-openapi

  This package provides a way to produce
  [`openapi3`](https://hackage.haskell.org/package/openapi3) documentation from a
  [`json-spec`](https://hackage.haskell.org/package/json-spec-0.1.0.0)
  specification.

  ## Example

  Given this data type:

  ```haskell
  data User = User
    {      name :: Text
    , lastLogin :: Maybe UTCTime
    }
    deriving ToSchema via (EncodingSchema User) -- <-- ToSchema instance defined here
  instance HasJsonEncodingSpec User where
    type EncodingSpec User =
      JsonObject
        '[ Required "name" JsonString
         , Optional "last-login" JsonDateTime
         ]
    toJSONStructure user =
      (Field @"name" (name user),
      (fmap (Field @"last-login") (lastLogin user),
      ()))
  ```

  Calling `Data.Aeson.encode (Data.OpenApi3.toSchema (Proxy :: Proxy User))`
  will produce the following Schema:

  ```json
  {
    "additionalProperties": false,
    "properties": {
      "last-login": {
        "format": "date-time",
        "type": "string"
      },
      "name": {
        "type": "string"
      }
    },
    "required": [
      "name"
    ],
    "type": "object"
  }
  ```
