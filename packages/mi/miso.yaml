description: "<h1 align=\"center\">miso</h1>\n\n<p align=\"center\">\n\n<a href=\"https://haskell-miso.org\">\n
  \ <img width=10% src=\"https://em-content.zobj.net/thumbs/240/apple/325/steaming-bowl_1f35c.png\">\n\n
  \  </a>\n<p align=\"center\">A <i>tasty</i> <a href=\"https://www.haskell.org/\"><strong>Haskell</strong></a>
  web and <a href=\"https://github.com/haskell-miso/miso-lynx\">mobile</a> framework
  \U0001F35C</p>\n</p>\n\n<p align=\"center\"> \n  <a href=\"https://matrix.to/#/#haskell-miso:matrix.org\">\n
  \   <img src=\"https://img.shields.io/badge/matrix.org-miso-FF4B33.svg?style=for-the-badge\"
  alt=\"Matrix #haskell-miso:matrix.org\">\n  </a>\n  <a href=\"https://www.npmjs.com/package/haskell-miso\">
  \ \n    <img src=\"https://img.shields.io/npm/v/haskell-miso?style=for-the-badge\"
  />\n  </a>  \n  <a href=\"https://haskell-miso-cachix.cachix.org\">\n    <img src=\"https://img.shields.io/badge/build-cachix-yellow.svg?style=for-the-badge\"
  alt=\"Cachix\">\n  </a>\n  <a href=\"https://actions-badge.atrox.dev/dmjio/miso/goto?ref=master\">\n
  \   <img alt=\"Build Status\" src=\"https://img.shields.io/endpoint.svg?url=https%3A%2F%2Factions-badge.atrox.dev%2Fdmjio%2Fmiso%2Fbadge%3Fref%3Dmaster&style=for-the-badge\"
  />\n  </a>\n  <a href=\"http://hackage.haskell.org/package/miso\">\n    <img src=\"https://img.shields.io/hackage/v/miso.svg?style=for-the-badge\"
  alt=\"Hackage\">\n  </a>\n</p>\n\n##\n\n**Miso** is a small, production-ready, component-oriented,
  [reactive](https://github.com/haskell-miso/miso-reactive), [isomorphic](http://nerds.airbnb.com/isomorphic-javascript-future-web-apps/)
  [Haskell](https://www.haskell.org/) front-end framework for quickly building highly
  interactive single-page web and [mobile](https://github.com/dmjio/miso-native) applications.
  It features a virtual-dom, recursive diffing / patching algorithm, attribute and
  property normalization, event delegation, event batching, SVG, 2D/3D Canvas (WebGL),
  Server-sent events ([SSE](https://github.com/haskell-miso/miso-sse)), [Websockets](https://github.com/haskell-miso/miso-websocket),
  type-safe [servant](https://haskell-servant.github.io/)-style routing and an extensible
  Subscription-based subsystem. Inspired by [Elm](http://elm-lang.org/) and [React](http://react.dev/).
  **Miso** is pure by default, but side effects can be introduced into the system
  via the `Effect` data type.\n\n**Miso** makes heavy use of the [GHC Javascript FFI](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/wasm.html#javascript-ffi-in-the-wasm-backend)
  and therefore has minimal dependencies. **Miso** can be considered a shallow [embedded
  domain-specific language](https://wiki.haskell.org/Embedded_domain_specific_language)
  for modern web programming.\n\n**Miso** supports compilation to both [JavaScript](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/javascript.html)
  and [WebAssembly](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/wasm.html)
  using [GHC](https://www.haskell.org/ghc/). For hot-reload, `miso` uses [WASM browser
  mode](https://www.tweag.io/blog/2025-04-17-wasm-ghci-browser/). When used with [ghciwatch](https://github.com/MercuryTechnologies/ghciwatch)
  this enables a rapid development workflow.\n\n> [!IMPORTANT]\n> Check out the new
  [Haskell miso Organization](https://github.com/haskell-miso) \U0001F35C\n\n## Table
  of Contents\n- [History](#history-)\n- [Docs](#docs-)\n- [Quick Start](#quick-start-)\n-
  [Getting Started](#getting-started)\n- [Setup](#setup-%EF%B8%8F)\n- [Hot Reload](#hot-reload-)\n-
  [Haddocks](#haddocks)\n- [Wiki](#wiki)\n- [Architecture](#architecture)\n- [Examples](#examples)\n-
  [Building examples](#building-examples)\n- [HTTP](#interacting-with-http-apis-)\n-
  [Coverage](#coverage-)\n- [Native](#native)\n- [Benchmarks](#benchmarks-%EF%B8%8F)\n-
  [Nix](#nix-)\n  - [Pinning nixpkgs](#pinning-nixpkgs-)\n  - [Binary cache](#binary-cache)\n-
  [Community](#community-)\n- [Maintainers](#maintainers)\n- [Commercial](#commercial-)\n-
  [Contributing](#contributing)\n- [Contributors](#contributors-)\n- [Partnerships](#partnerships-)\n-
  [Backers](#backers)\n- [Organizations](#organizations)\n- [License](#license)\n\n#
  History \U0001F4DC\n\n> **miso** is a play on the words ***micro*** and ***isomorphic***.\n\n[miso](https://haskell-miso.org)
  began in 2016 as research in:\n  - Expressing the [Elm architecture](https://elm-lang.org)
  in [GHCJS](https://github.com/ghcjs/ghcjs) as an [embedded domain-specific language](https://wiki.haskell.org/Embedded_domain_specific_language).\n
  \ - Implementing modern JavaScript frontend techniques as found in [react](https://react.dev)
  (e.g. [Reconciliation](https://legacy.reactjs.org/docs/reconciliation.html#the-diffing-algorithm),
  [isomorphic](https://en.wikipedia.org/wiki/Isomorphic_JavaScript))\n\nMiso aims
  to [bridge the gap](https://wiki.haskell.org/The_JavaScript_Problem) between modern
  JavaScript frameworks (such as [React](https://reactjs.org), [Vue.js](https://vuejs.org),
  etc.) and functional programming in [Haskell](https://haskell.org). It has since
  grown to encompass more features from the JavaScript community like [Components](https://react.dev/learn/your-first-component)
  and [Renderers](https://github.com/chentsulin/awesome-react-renderer). Miso also
  now supports [native development](https://github.com/haskell-miso/miso-lynx) for
  [iOS](https://www.apple.com/ios/), [Android](https://www.android.com/) and [HarmonyOS](https://device.harmonyos.com/en/)
  devices via [LynxJS](https://lynxjs.org) and targets additional backends like [Web
  Assembly](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/wasm.html).\n\n> [!Note]\n>
  [React-style Components](https://github.com/dmjio/miso/pull/766) are now added to
  `miso` as of version `1.9`. This has not yet been released, we recommend developing
  against `master` if you'd like to use latest features.\n\n## Docs \U0001F4DA\n \nSee
  the [Miso](https://haddocks.haskell-miso.org/miso/Miso.html) module.\n\n## Quick
  start ⚡\n\n> [!TIP]\n> We have a [template repository](https://github.com/haskell-miso/miso-sampler)
  that includes a sample counter application and build scripts for all platforms.\n\n```bash\n#
  Install nix \ncurl -L https://nixos.org/nix/install | sh\n\n# Enable flakes\necho
  'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n\n# Clone,
  build and host\ngit clone https://github.com/haskell-miso/miso-sampler && cd miso-sampler\nnix
  develop .#wasm --command bash -c 'make && make serve'\n```\n\nThe fastest way to
  get started is to clone and build the [miso sampler](https://github.com/haskell-miso/miso-sampler)
  repository \U0001F371 This has build scripts for Web Assembly, JS and vanilla [GHC](https://haskell.org/ghc).
  This requires [Nix Flakes](https://wiki.nixos.org/wiki/Flakes) usage. See also the
  section on using [miso's binary cache](#binary-cache).\n\n## Getting started\n\nTo
  start developing applications with `miso` you will need to acquire [GHC](https://www.haskell.org/ghc/)
  and [cabal](https://www.haskell.org/cabal/). This can be done via [GHCup](https://www.haskell.org/ghcup/)
  or [Nix](https://nixos.org/).\n\n> [!TIP]\n> For new Haskell users we recommend
  using [GHCup](https://www.haskell.org/ghcup/) to acquire both [GHC](https://www.haskell.org/ghc/)
  and [cabal](https://www.haskell.org/cabal/)\n\n## Setup \U0001F3D7️\n\nTo develop
  and build your first `miso` application you will need 3 files:\n\n  - `cabal.project`\n
  \ - `app.cabal`\n  - `Main.hs`\n\n### `cabal.project`\n\n```yaml\npackages:\n  .\n\nsource-repository-package\n
  \ type: git\n  location: https://github.com/dmjio/miso\n  branch: master\n```\n\n###
  `app.cabal`\n\nWe recommend using at least `cabal-version: 2.2`, this will give
  you the [common sections](https://vrom911.github.io/blog/common-stanzas) feature
  which we will use later to allow multiple compilers to build our project (so we
  can target `WASM` and `JS` backends)\n\n```yaml\ncabal-version: 2.2\nname: app\nversion:
  0.1.0.0\nsynopsis: Sample miso app\ncategory: Web\n\ncommon options\n  if arch(wasm32)\n
  \   ghc-options:\n      -no-hs-main\n      -optl-mexec-model=reactor\n      \"-optl-Wl,--export=hs_start\"\n
  \   cpp-options:\n      -DWASM\n\n  if arch(javascript)\n     ld-options:\n       -sEXPORTED_RUNTIME_METHODS=HEAP8\n\nexecutable
  app\n  import:\n    options\n  main-is:\n    Main.hs\n  build-depends:\n    base,
  miso\n  default-language:\n    Haskell2010\n```\n\n### `Main.hs`\n\nThis file contains
  a simple `miso` counter application.\n\n```haskell\n----------------------------------------------------------------------------\n{-#
  LANGUAGE OverloadedStrings #-}\n{-# LANGUAGE LambdaCase        #-}\n{-# LANGUAGE
  CPP               #-}\n----------------------------------------------------------------------------\nmodule
  Main where\n----------------------------------------------------------------------------\nimport
  \          Miso\nimport qualified Miso.Html as H\nimport qualified Miso.Html.Property
  as P\nimport           Miso.Lens\n----------------------------------------------------------------------------\n--
  | Sum type for App events\ndata Action\n  = AddOne\n  | SubtractOne\n  | SayHelloWorld\n
  \ deriving (Show, Eq)\n----------------------------------------------------------------------------\n--
  | Entry point for a miso application\nmain :: IO ()\nmain = startApp defaultEvents
  app\n----------------------------------------------------------------------------\n--
  | WASM export, required when compiling w/ the WASM backend.\n#ifdef WASM\nforeign
  export javascript \"hs_start\" main :: IO ()\n#endif\n----------------------------------------------------------------------------\n--
  | `component` takes as arguments the initial model, update function, view function\napp
  :: App Int Action\napp = component 0 updateModel viewModel\n----------------------------------------------------------------------------\n--
  | Updates model, optionally introduces side effects\nupdateModel :: Action -> Effect
  parent Int Action\nupdateModel = \\case\n  AddOne -> this += 1\n  SubtractOne ->
  this -= 1\n  SayHelloWorld -> io_ $ do\n    alert \"Hello World\"\n    consoleLog
  \"Hello World\"\n----------------------------------------------------------------------------\n--
  | Constructs a virtual DOM from a model\nviewModel :: Int -> View Int Action\nviewModel
  x =\n  H.div_\n    [ P.className \"counter\"\n    ]\n    [ H.button_ [ H.onClick
  AddOne ] [ text \"+\" ]\n    , text (ms x)\n    , H.button_ [ H.onClick SubtractOne
  ] [ text \"-\" ]\n    , H.br_ []\n    , H.button_ [ H.onClick SayHelloWorld ] [
  text \"Alert Hello World!\" ]\n    ]\n----------------------------------------------------------------------------\n```\n\nNow
  that your project files are populated, development can begin.\n\n## Hot Reload \U0001F525\n\nSee
  the [WASM browser mode](https://github.com/haskell-miso/miso-sampler/blob/main/README.md#browser-mode-)
  section of the [miso-sampler](https://github.com/haskell-miso/miso-sampler) repository
  for usage of hot reload development w/ [ghciwatch](https://github.com/MercuryTechnologies/ghciwatch).
  Also see this [blog post](https://www.tweag.io/blog/2025-04-17-wasm-ghci-browser/).\n##
  Installation\n\nSee [Installation](docs/Install.md) for more information.\n\n##
  Haddocks\n\nOffical [Haskell](https://haskell.org) documentation of the [Miso](https://haskell-miso.org)
  web framework.\n\n| Platform | URL |\n|------|-------------|\n| GHCJS | [Link](https://haddocks.haskell-miso.org/)
  |\n| GHC | [Link](http://hackage.haskell.org/package/miso) |\n\n## Wiki\n\nSee the
  [DeepWiki](https://deepwiki.com/dmjio/miso) entry to explore the source code.\n\n[![Ask
  DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/dmjio/miso)\n\n##
  Architecture\n\nFor constructing client and server applications, we recommend using
  one `cabal` file with two executable sections, where the `buildable` attribute set
  is contingent on the compiler. An example of this layout is [here](https://github.com/haskell-miso/haskell-miso.org/blob/master/haskell-miso.cabal).\n\n>
  [!TIP]\n> For more information on how to use `nix` with a `client`/`server` setup,
  see the [nix scripts](https://github.com/haskell-miso/haskell-miso.org/blob/master/default.nix)
  for [https://haskell-miso.org](https://haskell-miso.org).\n\n## Examples\n\nFor
  real-world examples of Haskell `miso` applications, see below.\n\n| Name                  |
  Description                               | Source Link                                                   |
  Live Demo Link                                            | Author                                            |\n|-----------------------|-------------------------------------------|---------------------------------------------------------------|-----------------------------------------------------------|---------------------------------------------------|\n|
