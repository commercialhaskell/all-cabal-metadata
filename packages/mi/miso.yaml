  Chess game                                | [Source](https://github.com/haskell-miso/chess)
  \              | [Demo](https://chess.haskell-miso.org)         | [@dmjio](https://github.com/dmjio)
  \               |\n\n## Interacting with HTTP APIs \U0001F50C\n\nTwo approaches
  are supported:\n\n  1. For simple JSON-based APIs, use the [Fetch](https://haddocks.haskell-miso.org/miso/Miso-Fetch.html)
  module directly.\n\n  2. For more complex cases, define a [Servant](https://www.servant.dev/)
  API and derive client functions via [servant-miso-client](https://github.com/haskell-miso/servant-miso-client).\n\n
  \    The [Fetch example](https://github.com/haskell-miso/miso-fetch) ([Demo](https://fetch.haskell-miso.org/))
  demonstrates the required setup. Add the following to `cabal.project` to use `servant-miso-client`:\n\n
  \    ```\n     source-repository-package\n       type: git\n       location: https://github.com/haskell-miso/servant-miso-client\n
  \      tag: master\n     ```\n\n## Testing ✅\n\nThe test suite spans three layers:\n\n-
  **Unit tests** — the TypeScript runtime (virtual DOM, diffing, event delegation)
  is tested with [bun](https://github.com/oven-sh/bun), covering the core `diff` engine
  and supporting utilities.\n- **Integration tests** — Haskell internals are exercised
  via a WASM test suite that runs the runtime in a headless browser environment, verifying
  component lifecycle, subscriptions, and state transitions.\n- **End-to-end tests**
  — selected applications such as [TodoMVC](https://github.com/haskell-miso/miso-todomvc)
  are tested end-to-end against a live browser to validate full-stack rendering and
  event handling.\n\nA full coverage report for the TypeScript layer is available
  at [coverage.haskell-miso.org](http://coverage.haskell-miso.org).\n\n> [!NOTE]\n>
  To run the TypeScript tests, install [bun](https://github.com/oven-sh/bun) first.\n\n```bash\n$
  curl -fsSL https://bun.sh/install | bash\n```\nor\n\n```bash\n$ nix-env -iA bun
  -f '<nixpkgs>'\n```\n\nand\n\n```bash\n$ bun install && bun run test\n```\n\n##
  Native \U0001F4F1\n\niOS and Android applications are supported via [LynxJS](https://lynxjs.org).
  See the [miso-lynx](https://github.com/haskell-miso/miso-lynx) repository for details.\n\n##
  Benchmarks \U0001F3CE️\n\n[According to benchmarks](https://krausest.github.io/js-framework-benchmark/current.html),
  `miso` performs competitively relative to other frameworks.\n\n## Nix <img src=\"https://raw.githubusercontent.com/NixOS/nixos-artwork/refs/heads/master/logo/nix-snowflake-colours.svg\"
  alt=\"nixos-snowflake\" width=\"25\"/>\n\n`Nix` provides a reproducible environment
  for building, configuring, and deploying applications. The [haskell-miso.org](https://github.com/dmjio/miso/tree/master/haskell-miso.org)
  source serves as a reference for this workflow.\n\n### Pinning nixpkgs \U0001F4CC\n\nBy
  default, `miso` uses a pinned version of [`nixpkgs`](https://github.com/dmjio/miso/blob/master/nix/nixpkgs.json)
  known as `pkgs`.\n\n> [!NOTE]\n> `miso` also maintains a `legacyPkgs` nixpkgs pin
  for tools such as `nixops` and for builds using the original `GHCJS 8.6` backend.\n\n###
  Binary cache\n\nLinux and macOS users can use a [binary cache](https://haskell-miso-cachix.cachix.org)
  to avoid rebuilding dependencies. Follow the setup instructions on [cachix](https://haskell-miso-cachix.cachix.org/).\n\n```bash\n$
  cachix use haskell-miso-cachix\n```\n\nFor CI pipelines using GitHub Actions:\n\n```yaml\n-
  name: Install cachix\n  uses: cachix/cachix-action@v16\n  with:\n    name: haskell-miso-cachix\n```\n\n##
  Community :octocat:\n\n- [Github](https://github.com/haskell-miso)\n- [Matrix](https://matrix.to/#/#haskell-miso:matrix.org)\n-
  [Discord](https://discord.gg/QVDtfYNSxq)\n\n## Maintainers\n\n[@dmjio](https://github.com/dmjio)\n\n##
  Commercial \U0001F680\n\nSince its launch, `miso` has been deployed across a range
  of domains, including quantitative finance, network security, defense research,
  academia, SaaS, the public sector, and non-profit organizations. The largest known
  deployment consisted of approximately 200,000 LOC serving over 10,000 users.\n\n##
  Contributing\n\nContributions are welcome. [Open an issue](https://github.com/dmjio/miso/issues/new)
  or submit a [pull request](https://github.com/dmjio/miso/pulls).\n\nSee [CONTRIBUTING](https://github.com/dmjio/miso/blob/master/CONTRIBUTING.md)
  for guidelines.\n\n## Contributors \U0001F9BE\n\n> [!NOTE]\n> This project exists
  thanks to all the people who [contribute](CONTRIBUTING.md).\n\n<a href=\"https://github.com/dmjio/miso/graphs/contributors\"><img
  src=\"https://opencollective.com/miso/contributors.svg?width=890&button=false\"
  /></a>\n\n## Partnerships \U0001F91D\n\nFor inquiries regarding feature sponsorship
  or corporate partnerships, contact <a href=\"mailto:support@haskell-miso.org\">support@haskell-miso.org</a>.\n\n##
  Backers\n\nBecome a [financial contributor](https://opencollective.com/miso/contribute)
  to help sustain the project.\n\n<a href=\"https://opencollective.com/miso\"><img
  src=\"https://opencollective.com/miso/individuals.svg?width=890\"></a>\n\n## organizations\n\n[Support
  this project](https://opencollective.com/miso/contribute) with your organization.
  Your logo will appear here with a link to your website.\n\n<a target=\"_blank\"
  href=\"https://opencollective.com/miso/organization/0/website\"><img src=\"https://opencollective.com/miso/organization/0/avatar.svg\"></a>\n\n##
  History \U0001F4DC\n\n> **miso** is a portmanteau of ***micro*** and ***isomorphic***.\n\n[miso](https://haskell-miso.org)
  was initiated in 2016 as a research project exploring two directions:\n\n- Expressing
  the [Elm architecture](https://elm-lang.org) in [GHCJS](https://github.com/ghcjs/ghcjs)
  as an [embedded domain-specific language](https://wiki.haskell.org/Embedded_domain_specific_language)\n-
  Implementing reconciliation and isomorphic rendering techniques from the JavaScript
  ecosystem ([Reconciliation](https://legacy.reactjs.org/docs/reconciliation.html#the-diffing-algorithm),
  [isomorphic JavaScript](https://en.wikipedia.org/wiki/Isomorphic_JavaScript)) within
  a purely functional setting\n\nThe project addresses the [JavaScript problem](https://wiki.haskell.org/The_JavaScript_Problem)
  in Haskell by providing component abstractions and rendering primitives familiar
  to practitioners of frameworks such as [React](https://reactjs.org) and [Vue.js](https://vuejs.org).
  The library has since expanded to include multiple rendering backends and native
  mobile support for [iOS](https://www.apple.com/ios/), [Android](https://www.android.com/),
  and [HarmonyOS](https://device.harmonyos.com/en/) via [LynxJS](https://lynxjs.org).\n\n##
