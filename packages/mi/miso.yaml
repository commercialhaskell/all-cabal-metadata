  An example demonstrating AJAX requests    | [Source](https://github.com/haskell-miso/miso-fetch)
  \         | [Demo](https://fetch.haskell-miso.org)         | [@dmjio](https://github.com/dmjio)
  \               |\n| **File Reader**       | A FileReader API example                  |
  [Source](https://github.com/haskell-miso/miso-filereader)     | [Demo](https://file-reader.haskell-miso.org/)
  \   | [@dmjio](https://github.com/dmjio)                |\n| **Mario**             |
  A Super Mario physics example             | [Source](https://github.com/haskell-miso/miso-mario)
  \         | [Demo](https://mario.haskell-miso.org)         | [@dmjio](https://github.com/dmjio)
  \               |\n| **WebSocket**         | A simple WebSocket example                |
  [Source](https://github.com/haskell-miso/miso-websocket)      | [Demo](https://websocket.haskell-miso.org)
