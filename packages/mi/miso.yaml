description: "<h1 align=\"center\">miso</h1>\n\n<p align=\"center\">\n\n<a href=\"https://haskell-miso.org\">\n
  \ <img width=10% src=\"https://em-content.zobj.net/thumbs/240/apple/325/steaming-bowl_1f35c.png\">\n\n
  \  </a>\n<p align=\"center\">A <a href=\"https://www.haskell.org/\"><strong>Haskell</strong></a>
  library for building web and <a href=\"https://github.com/haskell-miso/miso-lynx\">mobile</a>
  applications</p>\n</p>\n\n<p align=\"center\"> \n  <a href=\"https://matrix.to/#/#haskell-miso:matrix.org\">\n
  \   <img src=\"https://img.shields.io/badge/matrix.org-miso-FF4B33.svg?style=for-the-badge\"
  alt=\"Matrix #haskell-miso:matrix.org\">\n  </a>\n  <a href=\"https://www.npmjs.com/package/haskell-miso\">
  \ \n    <img src=\"https://img.shields.io/npm/v/haskell-miso?style=for-the-badge\"
  />\n  </a>  \n  <a href=\"https://haskell-miso-cachix.cachix.org\">\n    <img src=\"https://img.shields.io/badge/build-cachix-yellow.svg?style=for-the-badge\"
  alt=\"Cachix\">\n  </a>\n  <a href=\"https://actions-badge.atrox.dev/dmjio/miso/goto?ref=master\">\n
  \   <img alt=\"Build Status\" src=\"https://img.shields.io/endpoint.svg?url=https%3A%2F%2Factions-badge.atrox.dev%2Fdmjio%2Fmiso%2Fbadge%3Fref%3Dmaster&style=for-the-badge\"
  />\n  </a>\n  <a href=\"http://hackage.haskell.org/package/miso\">\n    <img src=\"https://img.shields.io/hackage/v/miso.svg?style=for-the-badge\"
  alt=\"Hackage\">\n  </a>\n</p>\n\n<p align=\"center\"> \nInspired by <a href=\"http://elm-lang.org/\">Elm</a>
  and <a href=\"http://react.dev/\">React</a>. See the <a href=\"https://github.com/haskell-miso\">GitHub</a>
  org. <a href=\"https://try.haskell-miso.org\">Try it</a>. Read the <a href=\"https://haddocks.haskell-miso.org/miso/Miso.html\">docs</a>.\n</p>\n\n##
  Key features\n\n- [Virtual DOM](https://en.wikipedia.org/wiki/Virtual_DOM) with
  recursive diffing and patching algorithm\n- Attribute and property normalization,
  event delegation, and event batching\n- Model-View-Update paradigm\n- Pure by default
  \n- SVG, 2D Canvas, and WebGL (via [three.js](https://threejs.org))\n- [Fetch](https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API),
  [Server-Sent Events](https://github.com/haskell-miso/miso-sse), and [WebSocket](https://github.com/haskell-miso/miso-websocket)
  support\n- Type-safe client-side routing\n- An extensible subscription system for
  long-running effects and third-party library integration\n- Lifecycle hooks (`onCreated`,
  `onDestroyed`, `mount`, `unmount`)\n- [Reactive](https://github.com/haskell-miso/miso-reactive)
  extensions for fine-grained reactivity\n- [Component](https://react.dev/reference/react/Component),
  [Fragment](https://react.dev/reference/react/Fragment) and [Props](https://react.dev/learn/passing-props-to-a-component)
  features.\n\nIt makes heavy use of the [GHC JavaScript FFI](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/wasm.html#javascript-ffi-in-the-wasm-backend)
  and maintains minimal dependencies. It can be considered a shallow [embedded domain-specific
  language](https://wiki.haskell.org/Embedded_domain_specific_language) for modern
  web programming. Compilation targets include [JavaScript](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/javascript.html)
  and [WebAssembly](https://ghc.gitlab.haskell.org/ghc/doc/users_guide/wasm.html)
  via [GHC](https://www.haskell.org/ghc/). Hot reload is provided through [WASM browser
  mode](https://www.tweag.io/blog/2025-04-17-wasm-ghci-browser/) integrated with [ghciwatch](https://github.com/MercuryTechnologies/ghciwatch).\n\n>
  [!TIP]\n> See the [Haskell miso organization](https://github.com/haskell-miso) on
  GitHub for the full ecosystem of packages and examples \U0001F35C\n\n## Table of
  Contents\n- [Playground](#playground-)\n- [Quick Start (Nix)](#quick-start-nix-)\n-
  [Manual Setup (GHCup / Cabal)](#manual-setup-ghcup--cabal)\n  - [cabal.project](#cabalproject)\n
  \ - [app.cabal](#appcabal)\n  - [Main.hs](#mainhs)\n- [Hot Reload](#hot-reload-)\n-
  [Installation](#installation)\n- [Haddocks](#haddocks)\n- [Wiki](#wiki)\n- [Architecture](#architecture)\n-
  [Examples](#examples)\n- [HTTP](#interacting-with-http-apis-)\n- [Testing](#testing-)\n-
  [Native](#native-)\n- [Benchmarks](#benchmarks-%EF%B8%8F)\n- [Nix](#nix-)\n  - [Pinning
  nixpkgs](#pinning-nixpkgs-)\n  - [Binary cache](#binary-cache)\n- [Community](#community-)\n-
  [Maintainers](#maintainers)\n- [Commercial](#commercial-)\n- [Contributing](#contributing)\n-
  [Contributors](#contributors-)\n- [Partnerships](#partnerships-)\n- [Backers](#backers)\n-
  [Organizations](#organizations)\n- [History](#history-)\n- [License](#license)\n\n##
  Playground \U0001F6DD\n\nAn interactive playground is available at [try.haskell-miso.org](https://try.haskell-miso.org).
  It allows editing and running applications directly in the browser without any local
  toolchain setup, and is useful for experimentation and sharing minimal reproducible
  examples.\n\n## Quick Start (Nix) ⚡\n\n> [!TIP]\n> The [miso-sampler](https://github.com/haskell-miso/miso-sampler)
  template repository includes a counter application with build scripts for WebAssembly,
  JavaScript, and native GHC targets.\n\nThe following requires [Nix Flakes](https://wiki.nixos.org/wiki/Flakes).
  See also [Binary cache](#binary-cache) to avoid rebuilding dependencies.\n\n```bash\n#
  Install nix \ncurl -L https://nixos.org/nix/install | sh\n\n# Enable flakes\necho
  'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n\n# Clone,
  build and serve\ngit clone https://github.com/haskell-miso/miso-sampler && cd miso-sampler\nnix
  develop .#wasm --command bash -c 'make && make serve'\n```\n\n## Manual Setup (GHCup
  / Cabal)\n\nTo develop applications without Nix, acquire [GHC](https://www.haskell.org/ghc/)
  and [cabal](https://www.haskell.org/cabal/) via [GHCup](https://www.haskell.org/ghcup/).\n\n>
  [!TIP]\n> For users new to Haskell tooling, [GHCup](https://www.haskell.org/ghcup/)
  is the recommended way to install both [GHC](https://www.haskell.org/ghc/) and [cabal](https://www.haskell.org/cabal/).\n\nA
  minimal application requires three files:\n\n  - `cabal.project`\n  - `app.cabal`\n
  \ - `Main.hs`\n\n### `cabal.project`\n\n```cabal\npackages:\n  .\n\nsource-repository-package\n
  \ type: git\n  location: https://github.com/dmjio/miso\n  branch: master\n```\n\n>
  [!NOTE]\n> Pinning to a specific `tag:` or `commit:` rather than `branch: master`
  is recommended for reproducible builds.\n\n### `app.cabal`\n\nUsing `cabal-version:
  2.2` or later enables [common stanzas](https://vrom911.github.io/blog/common-stanzas),
  which allow a single `.cabal` file to target both the WASM and JS backends.\n\n```cabal\ncabal-version:
  2.2\nname: app\nversion: 0.1.0.0\nsynopsis: Sample miso app\ncategory: Web\n\ncommon
  options\n  if arch(wasm32)\n    ghc-options:\n      -no-hs-main\n      -optl-mexec-model=reactor\n
  \     \"-optl-Wl,--export=hs_start\"\n    cpp-options:\n      -DWASM\n\n  if arch(javascript)\n
  \    ld-options:\n       -sEXPORTED_RUNTIME_METHODS=HEAP8\n\nexecutable app\n  import:\n
  \   options\n  main-is:\n    Main.hs\n  build-depends:\n    base, miso\n  default-language:\n
  \   Haskell2010\n```\n\n### `Main.hs`\n\nA counter application demonstrating the
  Model-View-Update pattern:\n\n```haskell\n----------------------------------------------------------------------------\n{-#
  LANGUAGE OverloadedStrings #-}\n{-# LANGUAGE LambdaCase        #-}\n{-# LANGUAGE
  CPP               #-}\n----------------------------------------------------------------------------\nmodule
  Main where\n----------------------------------------------------------------------------\nimport
  \          Miso\nimport qualified Miso.Html as H\nimport           Miso.Lens\n----------------------------------------------------------------------------\n--
  | Sum type for App events\ndata Action\n  = AddOne\n  | SubtractOne\n  | SayHelloWorld\n
  \ deriving (Show, Eq)\n----------------------------------------------------------------------------\n--
  | Entry point for a miso application\nmain :: IO ()\nmain = startApp defaultEvents
  app\n----------------------------------------------------------------------------\n--
  | WASM export, required when compiling w/ the WASM backend.\n#ifdef WASM\nforeign
  export javascript \"hs_start\" main :: IO ()\n#endif\n----------------------------------------------------------------------------\n--
  | `vcomp` takes as arguments the initial model, update function, view function\napp
  :: App Int Action\napp = vcomp 0 updateModel viewModel\n----------------------------------------------------------------------------\n--
  | Updates model, optionally introduces side effects\nupdateModel :: Action -> Effect
  parent props Int Action\nupdateModel = \\case\n  AddOne -> this += 1\n  SubtractOne
  -> this -= 1\n  SayHelloWorld -> io_ $ do\n    alert \"Hello World\"\n    consoleLog
  \"Hello World\"\n----------------------------------------------------------------------------\n--
  | Constructs a virtual DOM from a model\nviewModel :: () -> Int -> View Int Action\nviewModel
  _props x = vfrag\n    [ H.button_ [ H.onClick AddOne ] [ text \"+\" ]\n    , text
  (ms x)\n    , H.button_ [ H.onClick SubtractOne ] [ text \"-\" ]\n    , H.br_ []\n
  \   , H.button_ [ H.onClick SayHelloWorld ] [ text \"Alert Hello World!\" ]\n    ]\n----------------------------------------------------------------------------\n```\n\n##
  Hot Reload \U0001F525\n\nHot reload is supported via [WASM browser mode](https://www.tweag.io/blog/2025-04-17-wasm-ghci-browser/)
  and [ghciwatch](https://github.com/MercuryTechnologies/ghciwatch). This provides
  incremental recompilation with automatic browser refresh on file changes. See the
  [miso-sampler browser mode documentation](https://github.com/haskell-miso/miso-sampler/blob/main/README.md#browser-mode-)
  for setup instructions.\n\n## Installation\n\nSee [Installation](docs/Install.md)
  for platform-specific installation instructions.\n\n## Haddocks\n\nOfficial API
  reference. See also the [Miso](https://haddocks.haskell-miso.org/miso/Miso.html)
  module for a guided entry point into the library.\n\n| Platform | URL |\n|------|-------------|\n|
  GHCJS | [Link](https://haddocks.haskell-miso.org/) |\n| GHC | [Link](http://hackage.haskell.org/package/miso)
  |\n\n## Wiki\n\nSee the [DeepWiki](https://deepwiki.com/dmjio/miso) entry for an
  AI-assisted exploration of the source code.\n\n[![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/dmjio/miso)\n\n##
  Architecture\n\n**miso** follows the [Model-View-Update](https://guide.elm-lang.org/architecture/)
  (MVU) pattern. A `Component` is parameterized by a `model` type and an `action`
  type. The `update` function maps actions to `Effect` values — a monad over the Reader/Writer/State
  stack — which can both modify the model and schedule `IO` operations. Long-running
  effects are expressed as `Sub`scriptions that push actions into the component via
  a `Sink`.\n\nFor (client/server) applications, the recommended layout is a single
  `.cabal` file with separate executable stanzas conditioned on the compiler target.
  An example of this structure is the [haskell-miso.org source](https://github.com/haskell-miso/haskell-miso.org/blob/master/haskell-miso.cabal).\n\n>
  [!TIP]\n> For a worked example of a Nix-based client/server deployment, see the
  [nix scripts](https://github.com/haskell-miso/haskell-miso.org/blob/master/default.nix)
  for [haskell-miso.org](https://haskell-miso.org).\n\n## Examples\n\nExamples are
  hosted under the [haskell-miso](https://github.com/haskell-miso) GitHub organization.
  Each repository contains its own build instructions. The recommended approach is
  to build via [`nix`](https://nixos.org/nix/).\n\n> [!TIP]\n> Use [cachix](https://cachix.org)
  to avoid rebuilding shared dependencies: `cachix use haskell-miso-cachix`\n\n| Name
