  SSE (Server-sent events) Example          | [Source](https://github.com/haskell-miso/miso-sse)
  \           | [Demo](https://sse.haskell-miso.org)           | [@dmjio](https://github.com/dmjio)
  \               |\n| **Three.js**          | A 3D rendering example using Three.JS
  \    | [Source](https://github.com/haskell-miso/three-miso)          | [Demo](https://threejs.haskell-miso.org/)
  \       | [@juliendehos](https://github.com/juliendehos)    |\n| **Space Invaders**
  \   | A Space-Invaders-like game                | [Source](https://github.com/haskell-miso/miso-invaders)
  \      | [Demo](https://space-invaders.haskell-miso.org/)     | [@juliendehos](https://github.com/juliendehos)
  \   |\n| **Audio**             | Audio examples                            | [Source](https://github.com/haskell-miso/miso-audio)
  \         | [Demo](https://audio.haskell-miso.org/)        | [@juliendehos](https://github.com/juliendehos)
  \   |\n| **Video**             | Video examples                            | [Source](https://github.com/haskell-miso/miso-video)
  \         | [Demo](https://video.haskell-miso.org/)        | [@juliendehos](https://github.com/juliendehos)
  \   |\n| **WebVR**             | WebVR examples                            | [Source](https://github.com/haskell-miso/miso-aframe)
  \        | [Demo](https://aframe.haskell-miso.org/)        | [@dmjio](https://github.com/dmjio)
  \   |\n| **Reactivity**             | Reactive examples                            |
  [Source](https://github.com/haskell-miso/miso-reactive)         | [Demo](https://reactive.haskell-miso.org/)
  \       | [@dmjio](https://github.com/dmjio)    |\n\n\n## Building examples\n\nThe
  easiest way to build the examples is with the [`nix`](https://nixos.org/nix/) package
  manager.\n\n> [!TIP]\n> Use [cachix](https://cachix.org) to ensure you're not building
  dependencies unnecessarily `cachix use haskell-miso-cachix`\n\nSee the [@HaskellMiso](https://github.com/haskell-miso)
  organization for all examples, and how to build then.\n\n## Interacting with HTTP
  APIs \U0001F50C\n\nIf you want to interact with an HTTP API, we recommend one of
  the following approaches:\n\n  1. For a simple JSON-based API, you can use Miso's
  [Fetch](https://haddocks.haskell-miso.org/miso/Miso-Fetch.html) module.\n\n  2.
  In more complex cases, you can define a [Servant](https://www.servant.dev/) API
  and automatically obtain client functions via [servant-miso-client](https://github.com/haskell-miso/servant-miso-client).\n\n
  \    The Fetch example ([Source](https://github.com/haskell-miso/miso-fetch), [Demo](https://fetch.haskell-miso.org/))
  demonstrates the necessary ingredients. Make sure to add the following to your `cabal.project`:\n\n
  \    ```cabal\n     source-repository-package\n       type: git\n       location:
  https://github.com/haskell-miso/servant-miso-client\n       tag: master\n     ```\n\n##
  Coverage ✅\n\nThe core engine of `miso` is the [diff](https://github.com/dmjio/miso/blob/master/ts/miso/dom.ts)
  function. It is responsible for all DOM manipulation that occurs in a miso application
  and has [100% code coverage](http://coverage.haskell-miso.org). Tests and coverage
  made possible using [bun](https://github.com/oven-sh/bun).\n\n> [!NOTE]\n> To run
  the tests and build the coverage report ensure [bun](https://github.com/oven-sh/bun)
  is installed.\n\n```bash\n$ curl -fsSL https://bun.sh/install | bash\n```\nor\n\n```bash\n$
  nix-env -iA bun -f '<nixpkgs>'\n```\n\nand\n\n```bash\n$ bun install && bun run
  test\n```\n\n```bash\n--------------------------|---------|---------|-------------------\nFile
  \                     | % Funcs | % Lines | Uncovered Line #s\n--------------------------|---------|---------|-------------------\nAll
  files                 |   93.50 |   92.28 |\n ts/happydom.ts           |  100.00
  |  100.00 |\n ts/miso/context/dom.ts   |  100.00 |  100.00 |\n ts/miso/context/patch.ts
  |   75.00 |   81.17 | 68-76,79-84,87-93,99-107,193-202\n ts/miso/dom.ts           |
  \ 100.00 |   98.86 | 41,302-303\n ts/miso/event.ts         |  100.00 |   92.75 |
  28-30,52,81,85-90,116,161\n ts/miso/hydrate.ts       |  100.00 |   98.15 | 11-12\n
  ts/miso/patch.ts         |  100.00 |   80.00 | 26-32,36,38,42-43,85-86,91,93\n ts/miso/smart.ts
  \        |   85.00 |   93.33 | 45-48\n ts/miso/types.ts         |  100.00 |  100.00
  |\n ts/miso/util.ts          |   75.00 |   78.53 | 79,83,122,137,169,172,175-186,197-202,223-229,233-236,249-254\n--------------------------|---------|---------|-------------------\n\n
  223 pass\n 0 fail\n 7598 expect() calls\nRan 223 tests across 9 files. [497.00ms]\n```\n\n##
  Native\U0001F4F1\nMiso supports the creation of iOS and Android applications via
  [LynxJS](https://lynxjs.org). See the [miso-lynx](https://github.com/haskell-miso/miso-lynx)
  repository for more information.\n\n## Benchmarks \U0001F3CE️\n\n[According to benchmarks](https://krausest.github.io/js-framework-benchmark/current.html)
  `miso` is competitive. `miso.js` depicted below is how `miso` performs with its
  JS engine relative to vanilla JS. The `miso` column shows performance using the
  [GHC](https://www.haskell.org/ghc/) JS backend. We're currently researching [staged
  meta-programming](https://dl.acm.org/doi/abs/10.1145/3498723) as a way to remove
  excess allocations in our DSL and to increase performance when compiling from Haskell.\n\n<a
  target=\"_blank\" href=\"https://krausest.github.io/js-framework-benchmark/current.html\"><img
  width=\"657\" height=\"739\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c217df73-8c30-4965-977a-2e949c114291\"
  /></a>\n\n## Nix <img src=\"https://raw.githubusercontent.com/NixOS/nixos-artwork/refs/heads/master/logo/nix-snowflake-colours.svg\"
  alt=\"nixos-snowflake\" width=\"25\"/>\n\n`Nix` is a powerful option for building
  web applications with `miso` since it encompasses development workflow, configuration
  management, and deployment. The source code for [`haskell-miso.org`](https://github.com/dmjio/miso/tree/master/haskell-miso.org)
  is an example of this.\n\n> [!TIP]\n> If unfamiliar with `nix`, we recommend [@Gabriella439](https://github.com/Gabriella439)'s
  [\"Nix and Haskell in production\"](https://github.com/Gabriella439/haskell-nix)
  guide.\n\n### Pinning nixpkgs \U0001F4CC\n\nBy default `miso` uses a known-to-work,
  pinned version of [`nixpkgs`](https://github.com/dmjio/miso/blob/master/nix/nixpkgs.json)
  known as `pkgs`.\n\n> [!NOTE]\n> `miso` also maintains a legacy version of nixpkgs
  known as `legacyPkgs` so we can use tools like `nixops` for deployment and to build
  `miso` with the original `GHCJS 8.6` backend.\n\n### Binary cache\n\n`nix` users
  on a Linux or OSX distros can take advantage of a [binary cache](https://haskell-miso-cachix.cachix.org)
  for faster builds. To use the binary cache follow the instructions on [cachix](https://haskell-miso-cachix.cachix.org/).\n\n>
  [!TIP]\n> We highly recommend nix users consume the [cachix](https://cachix.org)
  cache. `cachix use haskell-miso-cachix`.\n\n```bash\n$ cachix use haskell-miso-cachix\n```\n\nWhen
  building `miso` projects w/ GitHub workflow CI, we recommend the Cachix GitHub action\n\n```yaml\n-
  name: Install cachix\n  uses: cachix/cachix-action@v16\n  with:\n    name: haskell-miso-cachix\n```\n\n##
  Community :octocat:\n\n- [Github](https://github.com/haskell-miso)\n- [Matrix](https://matrix.to/#/#haskell-miso:matrix.org)\n-
  [Discord](https://discord.gg/QVDtfYNSxq)\n- [Slack](https://haskell-miso.slack.com/join/shared_invite_confirmed/zt-37vusrcdw-HH6~hY0DGT7MLCjNWZvLDQ#/email-invite/credentials)\n-
  [IRC](https://www.irccloud.com/invite?channel=%23haskell-miso&hostname=irc.libera.chat&port=6697&ssl=1)\n\n##
  Maintainers\n\n[@dmjio](https://github.com/dmjio)\n\n## Commercial \U0001F680\n\nSince
  it's launch, `miso` has been used in a variety of industries, including but not
  limited to:\n\n  - Quantitative finance\n  - Network security\n  - Defense research\n
  \ - Academia\n  - SaaS companies\n  - Public sector\n  - Non-profit sector\n  -
  etc.\n\nThe largest `miso` installation known was ~200,000 lines of `miso` code
  with 10,000+ users.\n\n## Contributing\n\nFeel free to dive in! [Open an issue](https://github.com/dmjio/miso/issues/new)
  or a submit [Pull Request](https://github.com/dmjio/miso/pulls).\n\nSee [CONTRIBUTING](https://github.com/dmjio/miso/blob/master/CONTRIBUTING.md)
  for more info.\n\n## Contributors \U0001F9BE\n\n> [!NOTE]\n> This project exists
  thanks to all the people who [contribute](CONTRIBUTING.md)\n\n<a href=\"https://github.com/dmjio/miso/graphs/contributors\"><img
  src=\"https://opencollective.com/miso/contributors.svg?width=890&button=false\"
  /></a>\n\n## Partnerships \U0001F91D\n\nIf you'd like to support this project financially,
  be it through requesting feature development, or a corporate partnership, please
  drop us a line and we will be in touch shortly. <p><a href=\"mailto:support@haskell-miso.org\">support@haskell-miso.org</a></p>\n\n##
  Backers\n\nBecome a [financial contributor](https://opencollective.com/miso/contribute)
  and help us sustain our project and community. We are very grateful and thankful
  for our individual sponsors.\n\n  - Moses Tschanz\n  - [@MaxGabriel](https://github.com/MaxGabriel)\n
  \ - [@maybetonyfu](https://github.com/maybetonyfu)\n  - [@jhrcek](https://github.com/jhrcek)\n
  \ - etc.\n\n<a href=\"https://opencollective.com/miso\"><img src=\"https://opencollective.com/miso/individuals.svg?width=890\"></a>\n\n##
  Organizations\n\n[Support this project](https://opencollective.com/miso/contribute)
  with your organization. Your logo will show up here with a link to your website.
  We are also very grateful and thankful for our corporate sponsors.\n\n<a target=\"_blank\"
  href=\"https://opencollective.com/miso/organization/0/website\"><img src=\"https://opencollective.com/miso/organization/0/avatar.svg\"></a>\n\n##
  License\n\n[BSD3](LICENSE) © dmjio\n"
