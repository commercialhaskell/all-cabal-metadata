description: "# Micro Haskell\nThis repository contains an implementation of an extended
  subset of Haskell.\nIt uses combinators for the runtime execution.\n\n[Try it in
  your browser](https://augustss.github.io/MicroHs/web-mhs/)\n\nThe runtime system
  has minimal dependencies, and can be compiled even for micro-controllers.\nThe `boards/`
  directory contains some samples, e.g., some sample code for an STM32F407G-DISC1
  board.\n\nThe compiler can compile itself.\n\n## Presentation\nYou can find my [presentation
  from the Haskell Symposium 2024](https://docs.google.com/presentation/d/1WsSiSwypNVTm0oZ3spRYF8gA59wyteOsIkPRjCUAZec/edit?usp=sharing),
  [video](https://m.youtube.com/watch?v=uMurx1a6Zck&t=36m).\nThere is also a short
  paper at [`doc/hs2024.pdf`](https://github.com/augustss/MicroHs/blob/master/doc/hs2024.pdf).\n\n##
  Compiling MicroHs\nThere are two different ways to compile MicroHs:\n* Using GHC.
  `Makefile` target `bin/gmhs`\n* Using the included combinator file and runtime.
  \ `Makefile` target `bin/mhs`\n\nThese different ways of compiling need slightly
  different imports etc.\nThis happens by GHC looking in the `ghc/` subdirectory first
  for any extras/overrides.\n\nCompiling MicroHs is really best done using `make`,
  but there is also a `MicroHs.cabal` file\nfor use with `cabal`/`mcabal`.  This only
  builds what corresponds to the first target.\nDoing `cabal install` will install
  the compiler.\nNote that `mhs` built with ghc does not have all the functionality.\n\nAlso
  note that there is no need to have a Haskell compiler to run MicroHs.\nAll you need
  is a C compiler, and MicroHs can bootstrap, given the included combinator file.\n\nTo
  install `mhs` use `make minstall`.  This will install `mhs` in `~/.mcabal` in the
  same\nway as `mcabal` (MicroCabal) would have.  It will install a compiler binary
  and a compiled base package.\nYou will have to add `~/.mcabal/bin` to your `PATH`.\n\nAlternatively,
  to install `mhs` use `make oldinstall`.  By default this copies the files to `/usr/local`,\nbut
  this can be overridden by `make PREFIX=dir oldinstall`.\nYou also need to set the
  environment variable `MHSDIR`.\n\nTo compile on Windows make sure `cl` is in the
  path, and then use `nmake` with `Makefile.windows`.\n\nThe compiler can also be
  used with emscripten to produce JavaScript/WASM.\n\n### Using GMP for `Integer`\nThe
  default implementation of the `Integer` type is written in Haskell and is quite
  slow.\nIt is possible to use the [GMP](https://gmplib.org/) library instead.\nTo
  use GMP you need to uncomment the first few lines in the `Makefile`, and also\nmodify
  the definition that directs the C compiler where to find GMP.\n\n***NOTE*** To switch
  between using and not using GMP you need to do `make clean`.\nYou might also need
  to do `make USECPPHS=cpphs bootstrapcpphs` if there are complaints.\n\n## Example\nThe
  file `Example.hs` contains the following:\n```Haskell\nmodule Example(main) where\n\nfac
  :: Int -> Int\nfac 0 = 1\nfac n = n * fac(n-1)\n\nmain :: IO ()\nmain = do\n  let
  rs = map fac [1,2,3,10]\n  putStrLn \"Some factorials\"\n  print rs\n```\n\nFirst,
  make sure the compiler is built by doing `make`.\nThen compile the file by `bin/mhs
  Example -oEx` which produces `Ex`.\nFinally, run the binary file by `./Ex`.\nThis
  should produce\n```\nSome factorials\n[1,2,6,3628800]\n```\n\n## Libraries\nThe
  `Prelude` contains the functions from the Haskell Report and a few extensions,\nwith
  the notable exception that `Foldable` and `Traversable` are not part of the `Prelude`.\nThey
  can be imported separately, though.\n\n### Not importing `Prelude`\nTo completely
  avoid importing the prelude (which can be needed in base to\navoid circular imports)
  use the incantation `import qualified Prelude()`.\nThis will not even try to open
  `Prelude.hs`.  It also avoids the automagic\n(qualified) import of `Mhs.Builtin`
  that normally happens.\n\n\n## Interactive mode\nIf no module name is given the
  compiler enters interactive mode.\nYou can enter expressions to be evaluated, or
  top level definitions (including `import`).\nSimple line editing is available.\n\n##
  MHS as a cross compiler\nWhen `mhs` is built, targets.conf is generated. It will
  look something like this:\n```ini\n[default]\ncc = \"cc\"\nconf = \"unix-64\"\n```\n\nYou
  can add other targets to this file, changing which compiler command is used and
  which runtime is\nselected and then use the `-t` argument to select which target
  you would like.\n\n## Files\nThere is a number of subdirectories:\n* `Tools/` a
  few useful tools for compressions etc.\n* `bin/` executables are put here\n* `generated/`
  this contains the (machine generated) combinator file for the compiler.\n* `lib/`
  this contains the `Prelude` and other base library file.\n* `src/MicroHs/` the compiler
  source\n* `src/runtime/` the runtime source\n* `tests/` some tests\n\n# Preprocessor\nSadly,
  compiling a lot of Haskell packages needs the C preprocessor.\nTo this end, the
  distribution contains the combinator code for `cpphs`.\nDoing `make bin/cpphs` will
  create the binary for the preprocessor.\n\nTo bootstrap `cpphs` you can do `make
  bootstrapcpphs`.\nThis assumes that you have `git` to download the needed packages.\nAt
  the moment, the downloaded packages are forks of the original to\nmake it compile
  with `mhs`.\n\nTo identify that it is MicroHs that is the compiler it defines the
  symbol `__MHS__`.\n\n# Contributing\nContributions are very welcome!\n\nWhen modifying
  the compiler, run `make newmhs` or `make newmhsz` (the latter compresses the binary)\nto
  generate a compiler that includes your changes.\n\n## Libraries\n\nThe libraries
  live in the `lib/` directory. Adding missing functions/instances/types from the
  report is a welcome contribution.\nCommon things from `base` and GHC boot libraries
  that use a lot of GHC-specific code (such as `array`, `bytestring`, `text`, ...)
  can also be added.\n\n## Tests\n\nThe test suite is located in the `tests/` directory.\n\nTo
  add a new test, create a `MyTest.hs` file and a corresponding `MyTest.ref` file
  for the expected output.\nThen add it to the `test` rule in `tests/Makefile`:\n```makefile\n\t$(TMHS)
  MyTest     && $(EVAL) > MyTest.out     && diff MyTest.ref MyTest.out\n```\n\nIf
  you want to test that a module fails to compile with a certain error message,\nadd
  it to `tests/errmsg.test`, for example:\n```\nmodule E() where\nx :: Int\nx = y\n-----\n\"../tmp/E.hs\":
  line 4, col 5: undefined value: y\n\n=====\n```\n\nTo run the test suite, do\n*
  `make runtest` to use the GHC-compiled compiler\n* `make runtestmhs` to use the
  MicroHs-compiled compiler\n* `make runtestemscripten` to use the MicroHs-compiled
  compiler targeting JavaScript\n\n## Primitives\n\nIf you want to add a new primitive,
  you need to modify a few things:\n* in `src/runtime/eval.c`\n  - add a variant to
  `enum node_tag`\n  - add an entry to the `primops` table (mapping the name of your
  primitive to the tag)\n  - add a `case` in `printrec`\n  - implement the primitive
  by adding a `case` in `evali` (you can use the other primitives as a guide)\n* in
  `src/MicroHs/Translate.hs`\n  - add an entry to the `primTable`, to make the primitive
  available in the interactive mode\n* in `ghc/PrimTable.hs`\n  - add an entry to
  `primOps`, if the primitive should be available in the GHC-compiled interactive
  mode\n* in `hugs/PrimTable.hs`\n  - add an entry to `primOps`, if the primitive
  should be available in the Hugs-compiled interactive mode\n\nThen you can use the
  primitive via the `_primitive` keyword (`_primitive \"myPrimitive\"`).\n\n# Thank
  You\nA big thanks goes to the people who have contributed to MicroHs:\n@amigalemming\n@arossato\n@benclifford\n@claudeha\n@dmjio\ngay@disroot.org\n@gergoerdi\n@ikervagyok\n@jmaessen\n@juhp\n@kolmodin\n@konsumlamm\n@liolin\n@lortabac\n@MaximilianAlgehed\n@meooow25\n@philderbeast\n@rewbert\n@sol\n@Superstar64\n@thielema\n@thimc\n@thma\n@treeowl\n@TristanCacqueray\n@tvmaaren\n@yobson\n\n\n#
  FAQ\n*\n  * Q: When will it get _insert feature_?\n  * A: Maybe some time, maybe
  never.  But it doesn't hurt to ask for it.\n*\n  * Q: Why are the error messages
  so bad?\n  * A: Error messages are boring.\n\n---\n\nFor more information, see the
  [wiki](https://github.com/augustss/MicroHs/wiki).\n\n---\n\n# Finding modules *NOT
  YET IMPLEMENTED*\nA module `M` is located using the _sourcePath_ and the _packageDbPath_.\nBoth
  of the paths are a list of directories and are searched left-to-right.\nThis lookup
  is used both `import` and modules given on the command line.\n\nNote: If the module
  name given on the command line has suffix `.hs` or `.lhs`\nit is used as a file
  name, rather than a module name.\n\nFirst, the the _sourcePath_ is used.  For each
  directory in the\npath:\n * the module name `M` is appended with `.` changed to
  `/`.\n * then the suffixes `.hs`, `.hsc`, and `.lhs` are tried in order\n * if the
  file exists it is assumed to be the source for module `M`\n\nSecond, if no source
  file is found, then each directory in the\n_packageDbPath_ is tried.  If the module
  is found, the corresponing\npackage is loaded and the compiled module 'M' from that
  package is used.\n\n## Setting the _sourcePath_\nThe default _sourcePath_ is just
  the current directory, `.`.\nThe path can be cleared by using the `-i` command line
  flag.\nTo append to the path use `-iPATH`, where `PATH` is a colon (`:`)\nseparated
  list of directories.\n\n## Setting the _packageDbPath_\nThe default _packageDbPath_
  is take from the `mhs.conf` file\nin the section `[mhs]` and key `packageDbPath`.\nThe
  path can contain environment variables that are expanded.\nIn addition $MHSPKG expand
  to the package directory relative to the executing binary.\nFurthermore $VERSION
  expands to the mhs version number.\n\nThe path can be cleared by using the `-a`
  command line flag.\nTo append to the path use `-aPATH`, where `PATH` is a colon
  (':')\nseparated list if directories.\n\n## Installing packages\n\nThe _packageDb_
  directory can be given directly with the `-Q`\nflag used to install.\n\nThe `mcabal`
  command can install to a particular package db by using\n`--install=PATH`.\n"
