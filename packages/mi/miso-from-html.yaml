description: "\U0001F35C miso-from-html\n===================\nUse [live](https://miso-from-html.haskell-miso.org)
  from your browser.\n\nConvert HTML into [miso](https://github.com/dmjio/miso) `View`
  syntax.\n\n### Usage\n\nGiven some HTML\n\n```html\n<nav class=\"navbar\" role=\"navigation\">\n
  \ <div class=\"navbar-brand\">\n    <a class=\"navbar-item\" href=\"https://bulma.io\">\n
  \     <img src=\"https://bulma.io/images/bulma-logo.png\" width=\"112\" height=\"28\"
  />\n      <a>ok<p>hey</p></a>\n    </a>\n  </div>\n</nav>\n```\n\nConvert it to
  [miso](https://github.com/dmjio/miso) `View` syntax.\n\n```bash\n$ cabal run miso-from-html
  < index.html\n```\n\nResult\n\n```haskell\nnav_\n    [ class_ \"navbar\"\n    ,
  role_ \"navigation\"\n    ]\n    [ div_ [ class_ \"navbar-brand\" ]\n\t[ a_\n\t
  \   [ class_ \"navbar-item\"\n\t    , href_ \"https://bulma.io\"\n\t    ]\n\t    [
  img_\n\t\t[ src_ \"https://bulma.io/images/bulma-logo.png\"\n\t\t, width_ \"112\"\n\t\t,
  height_ \"28\"\n\t\t]\n\t    , a_ []\n\t\t[ \"ok\"\n\t\t, p_ [][ \"hey\" ]\n\t\t]\n\t
  \   ]\n\t]\n    ]\n```\n\n### Limitations\n\nCurrently operates on a single top-level
  node, not on a list of nodes.\n\nThis is invalid since there is no single top-level
  parent node.\n\n```html\n<div>\n    foo\n</div>\n<div>\n   bar\n</div>\n```\n\nThis
  is valid\n\n```html\n<div>\n  <div>\n      foo\n  </div>\n  <div>\n     bar\n  </div>\n</div>\n```\n\nAlso,
  if your HTML isn't parsing, make sure it's valid.\n\nWhen in doubt, check the [W3C
  validation service](https://validator.w3.org/#validate_by_input).\n\n### Test\n\n```bash\nnix
  develop --command bash -c cabal run < index.html'\n```\n"
