changelog: |
  # Changelog

  ## 0.1.0.0 — 2026-03-18

  * Initial release.
  * Core `Layer` type with `Monad`, `Arrow`, `Category`, `ArrowChoice`,
    `Profunctor`, `Traversing`, `Alternative`, and `Selective` instances.
  * Three construction primitives: `effect`, `resource`, `bracketed`.
  * `Service` for singleton caching with thread-safe initialisation.
  * `LayerInterceptor` for observability hooks.
  * `Fractal.Layer.Diagnostics` for tree-structured initialisation tracing.
