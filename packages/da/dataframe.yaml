changelog: "# Revision history for dataframe\n\n## 3.1.0.0\n* Fix toSeparated's handling
  of nulls\n* Fix build failing.\n\n## 3.0.0.0\n\nA breaking release that removes
  internal functions from the public API.\n\n### Highlights\n* Internalish modules
  now have public APIs/contracts. `DataFrame.Core`, `DataFrame.Schema`, and `DataFrame.Learn`.\n*
  `import DataFrame` now surfaces `Columnable`, `Columnable'`, `eSize`, `NamedExpr`,\n
  \ `SchemaType(..)`, and the `Semigroup`/`Monoid DataFrame` instances directly.\n\n###
  Breaking changes\n* Internal modules are no longer on the public surface.\n* Subpackage
  major bumps.\n\n## 2.3.0.0\n\n### Breaking changes\n* HuggingFace (`hf://`) Parquet
  reading moved out of `dataframe-parquet` and\n  `dataframe-lazy` into a new dedicated
  `dataframe-huggingface` package, so the\n  heavy `aeson` and `http-conduit` dependencies
  are no longer pulled in by the\n  Parquet/lazy stack (or by this meta-package).
  `D.readParquet \"hf://...\"` no\n  longer fetches; depend on `dataframe-huggingface`
  and use\n  `DataFrame.IO.HuggingFace.readParquet` (eager) or `scanParquet` (lazy,\n
  \ download-then-scan) instead.\n* Coordinated major bumps: `dataframe-parquet` and
  `dataframe-lazy` →\n  `1.1.0.0`, with inter-package lower bounds raised to `^>=
  1.1`; umbrella\n  `dataframe` → `2.3.0.0`.\n\n## 2.2.0.0\n\nA large performance
  and ML release.\n\n### Highlights\n* **Much faster I/O and analytics.** CSV reading,
  group-by, joins and sorting were rebuilt on compact unboxed / `PackedText` columns,
  parallel open-addressing hash tables, and vectorized aggregation; the default reader
  drops `cassava` for a single-pass scanner and `dataframe-fastcsv` adds multicore
  chunking. The end-to-end join + group-by pipeline runs several times faster with
  much lower memory and scales with `-threaded` / `+RTS -N`; results are byte-identical
  (golden-tested).\n* **Lazy engine on par with eager** — bounded-source queries route
  through the same fast paths (streaming preserved for unbounded); lazy `sortBy` now
  also orders non-`Text` columns correctly.\n* **New ML library (`dataframe-learn`).**
  scikit-learn-style estimators behind a uniform `fit` / `predict`: linear / ridge
  / lasso / logistic regression, SVM, trees, boosting, k-means, GMM, DBSCAN, PCA and
  kernel PCA, symbolic regression and feature synthesis, with metrics and cross-validation.
  Pure and deterministic; every model also compiles to a dataframe `Expr`.\n* **Typed
  joins are checked at compile time** — keys must exist in both schemas with matching
  types (previously a runtime failure or silent empty result).\n\n### Breaking changes\n*
  The `Column` GADT gains a `PackedText` constructor — exhaustive matches need a new
  arm (`materializePacked` decodes it back to boxed `Text`). CSV reads are now strict
  / fully forced; schema columns parse as their declared type; ragged rows pad with
  null instead of silently misaligning columns; overflowing integers parse as `Double`.
  `dataframe-learn`'s old beam-search synthesis and per-model `fit*` helpers are replaced
  by `fit` / `predict`.\n* Coordinated major bumps (`dataframe-core`, `dataframe-learn`
  → `1.1.0.0`; umbrella `dataframe` → `2.2.0.0`) with inter-package lower bounds tightened
  so a newer package cannot resolve against an incompatible sibling. Drops `cassava`
  and `unordered-containers`; requires `text >= 2.1`.\n\n## 2.1.0.3\n### Packaging\n*
  Fix dependency resolution for the `dataframe` meta-package and its satellites\n
  \ so a clean `cabal install dataframe` resolves and builds. `dataframe-core\n  1.0.2.0`
  introduced the `UnaryOp`/`BinaryOp` typeclasses whose method names\n  overlap the
  `UnUDF`/`BinUDF` record fields; only `dataframe-operations >= 1.1`\n  enables the
  disambiguation. The bounds now keep the two in lockstep:\n  `dataframe-operations
  1.1.0.2` requires `dataframe-core >= 1.0.2 && < 1.1`,\n  and `dataframe-parquet
  1.0.1.1` / `dataframe-th 1.0.1.1` publish their\n  `dataframe-operations ^>= 1.1`
  bound. The meta re-pins its lower bounds to the\n  fixed satellite versions.\n\n##
  0.1.3.0.0\n### New features\n* New `DataFrame.Typed.TH.deriveSchemaFromType` Template
  Haskell splice generates a typed schema synonym and a `HasSchema` instance from
  a Haskell record ADT. Pair with `DataFrame.fromRecords` / `DataFrame.toRecords`
  (or `DataFrame.Typed.fromRecordsTyped` / `toRecordsTyped`) to convert between `[Order]`
  and `DataFrame`/`TypedDataFrame OrderSchema`. Field names are translated `camelCase
  → snake_case` by default; the transform is configurable via `SchemaOptions`.\n*
  New `DataFrame.Typed.Generic` exposes `SchemaOf`/`SchemaOfRaw` plus `genericToColumns`
  / `genericFromColumns`, so users who prefer `GHC.Generics` over a TH splice can
  derive the same schema and row bridge.\n* New `DataFrame.Internal.Schema.deriveSchema`
  Template Haskell splice generates, from a record ADT, both a runtime `Schema` value
  (`orderSchema :: Schema`, suitable for `readCsvWithSchema` / `readCsvWithOpts`)
  and one `Expr` accessor per field (`orderCustomerId :: Expr Int`, etc.), so expression-DSL
  code can refer to columns by typed name without writing `col @T \"snake_case_name\"`
  at each call site. Re-exported from `DataFrame`.\n\n### Refactor\n* The untyped
  Template Haskell splices (`declareColumns`, `declareColumnsFromCsvFile`, `declareColumnsFromCsvWithOpts`,
  `declareColumnsFromParquetFile`, `declareColumnsWithPrefix`, `declareColumnsWithPrefix'`)
  have moved from `DataFrame.Functions` to a new `DataFrame.TH` module (re-exported
  from `DataFrame`). Update imports accordingly; the bundled `dataframe.ghci` already
  points to the new module.\n\n## 1.2.0.0\n### Breaking changes\n* Remove `Eq` and
  `Ord` instances for `Expr` — they were buggy under cross-type comparison. Use `eqExpr`
  / `compareExpr` from `DataFrame.Internal.Expression` directly.\n* Lazy executor:
  `ExecutorConfig` removed; `execute` now takes only a `PhysicalPlan`. `CsvSource`
  carries the `CsvReader` per scan, so the executor no longer has to know about the
  CSV implementation.\n\n### New features\n* New `dataframe-fusion` package: typed
  Apache DataFusion-backed query API (`DataFrame.Fusion.Typed`).\n* Can now use any
  CSV reader for the lazy pipeline.\n* New `readCsvWithSchema :: Schema -> FilePath
  -> IO DataFrame` for schema-driven CSV reads, plus a `CsvReader` type alias exported
  from `DataFrame.IO.CSV`.\n* Numeric comparison operators (`.==`, `./=`, `.<`, `.>`,
  `.<=`, `.>=`) now widen their operands to a common numeric type, so e.g. `Expr Double
  .== Expr Int` typechecks. Mirrors the existing arithmetic widening.\n\n### Internal\n*
  Bump `cabal-version` to 3.0; add `dataframe-fastcsv` to the lint targets; nix flake
  and `cabal.project` improvements.\n* `dataframe-persistent` license corrected to
  MIT in cabal (#201).\n\n## 1.1.2.1\n* Add `over` and `median` functions to typed
  API\n* Fix bug opening web plots in MacOS\n\n## 1.1.2.0\n* Safe read can now choose
  between Either and Maybe for error handling.\n* Add countAll and over (window) functions.\n*
  Add mkRandom to make random columns.\n* Faster CSV parsing.\n\n## 1.1.1.0\n### New
  features\n* Add `DataFrame.Typed.Lazy` module — a type-safe lazy query pipeline
  combining compile-time schema tracking with deferred execution.\n* Add `fromCsv`
  function for parsing a CSV string directly into a DataFrame.\n* Add `DataKinds`
  extension and `DataFrame.Typed` import to the GHCi file for easier interactive typed
  dataframe workflows.\n\n### Performance\n* Specialize and inline aggregation functions
  (`sum`, `mean`, `variance`, `median`, `stddev`, etc.) to avoid expensive numeric
  conversions at runtime.\n* Remove `Ord` constraint from `Columnable'` and move it
  to call sites, reducing unnecessary constraint propagation.\n* Replace exponential
  type-level `If` nesting in typed schema families with linear helper type families,
  fixing slow compilation times.\n\n### Bug fixes\n* Fix Functions module compilation
  under GHC 9.10 (#194).\n* Document and test `safeColumns` option in `ParquetReadOptions`
  (#190).\n\n## 1.1.0.0\n### Breaking changes\n* Remove `OptionalColumn` constructor;
  fold nullability into `BoxedColumn`/`UnboxedColumn` via bit-packed bitmap.\n* Remove
  `NFData` instance from `Columnable` constraint.\n\n### New features\n* Add `toCsv`
  and `toSeparated` for converting a DataFrame to CSV/delimited text without writing
  to a file.\n* `safeRead` now defaults reading columns to `Maybe a`.\n* Split SIMD
  CSV reader into a separate `dataframe-fastcsv` package.\n\n### Bug fixes\n* Fix
  joins for missing key columns (#187).\n* Fix single column not found error when
  using typed dataframe.\n* Fix Synthesis to use `SafeLookup` constraint.\n* Fix `writeSeparated`
  ignoring separator parameter (was hardcoded to comma).\n\n### Internal\n* Slice
  groups now use custom backpermute instead of converting unboxed vectors.\n* Reuse
  comparison operators in Subset.\n* Refactor `getRowAsText` for readability using
  pattern guards.\n\n## 1.0.0.1\n* toMarkdownTable is now toMarkdown (mostly used
  internally)\n* Provide toMarkdown' that outputs string\n* Add associativity to nullable
  operators\n* Better null dataframe handling/error messages for core operations.\n*
  Fix some function display names.\n* Examples now build with CI\n\n## 1.0.0.0\n*
  Fix mappend to respect schema of empty columns.\n* Add cast operators that force
  column schema\n* Add null aware operators so some operations are easier.\n* Add
  arrow shim with python example.\n* Add numeric promotion for numeric operations.\n*
  Add column provenance tracking\n* Add stratified sampling\n* Read files from hugging
  face\n\n## 0.7.0.0\n* This release adds A LOT of AI code to the repo (which we'll
  now pause in favour of refactoring, testing, and completeness for 1.0)\n* The lazy
  reader now has a custom binary format that it spills to. This almost halved the
  time it takes to run the 1 billion row challenge. The lazy evaluation now also supports
  Parquet.\n* You can now explicitly set the schema of a subset of columns (named)
  as opposed to setting a list.\n* Join order is changed from pipelining style to
  function call style.\n* Bug in division being marked as commutative.\n* Columnable
  now requires nfdata.\n* Parquet reads are now faster across the board.\n* Better
  test coverage.\n\n## 0.6.0.0\n* New typed API see https://dataframe.readthedocs.io/en/latest/using_dataframe_in_a_standalone_script.html\n*
  Faster joins\n* Fine grained parquet reads using `readParquetFilesWithOpts`.\n\n##
  0.5.0.0\n* SortOrder now takes an expression rather than a string.\n* selectBy now
  respects the original column order.\n* Some changes to the internal representation
  of the expression GADT.\n* Added fixity to binary operations for column comparisons.\n*
  Fixed ZSTD decompression for Parquet files.\n* Added logical type handling for timestamps
  and decimals.\n* aggregation now handles null dataframes gracefully.\n* Drop random
  dep to 1.2 and use random-shuffle for shuffling instead.\n* Join now merges columns
  to a `These`.\n* Added writeTsv function.\n* Move expression operators to `Operators`
  namespace.\n\n## 0.4.1.0\n* Improve signal handling of dataframe repl.\n* `writeCsv`
  not correctly writes `Maybe` values (thanks to @mcoady).\n* Create a boilerplate
  package in cache that will be used to start repl.\n* Tree implementation is now
  a TAO tree instead of greedy cart trees.\n* Add `sampleM` and `takeM` functions.\n\n##
  0.4.0.10\n* License in cabal was wrong.\n* Remove ollama-haskell dependencies.\n*
  readParquetFiles for reading globs.\n* Fixed printing of `neq` function. \n\n##
  0.4.0.9\n* Update license to MIT.\n\n## 0.4.0.8\n* LLM guided decision tree\n* Parquet
  fixes: floats read properly and bit width now properly interpreted.\n* renameM added
  to monadic functions.\n* No need to explicitly import text for declareColumns\n\n##
  0.4.0.7\n* Pretty printer for expression\n* Fix issue with how `pow` was getting
  displayed.\n* `exposeColumns` has been renamed to `declareColumns`\n\n## 0.4.0.6\n*
  Even faster groupby: uses radix sort rather than mergesort.\n* Created `rowValue`
  function - `df |> D.toRowList |> map (D.rowValue some_column)`.\n* SIMD reads for
  TSV files (thanks to @jhingon).\n* Fix string representation of recodeWithDefault.\n*
  Fix gain function for decision tree.\n* Add disallowed pairs for decision tree analyst.\n*
  Decision tree percentiles are now a tree-level configuration.\n\n## 0.4.0.5\n* Faster
  groupby: does less allocations by keeping everything in a mutable vector.\n* declareColumnsFromCsvFile
  now infers types from a sample rather than reading the whole dataframe.\n* Decision
  trees API is now more configurable.\n* Add annotation to show what expressions were
  used to derive a column.\n\n## 0.4.0.4\n* More robust synthesis based decision tree\n*
  Improved performance on sum and mean.\n* recodeWithCondition - to change a value
  given a condition\n* medianMaybe, genericPercentile, percentile - self explanatory\n*
  all the maybe functions as dataframe functions\n* Fix concatColumnsEither when types
  are the same.\n* Decision tree implementation is more robust now.\n\n## 0.4.0.3\n*
  Improved performance for folds and reductions.\n* Improve standalone mean and correlation
  functions.\n* Remove buggy boxedness check in aggregations.\n* CSV files shouldn't
  have spaces in headers.\n* Small decision tree implementation (experimental).\n\n##
  0.4.0.1\n* Fuse literals in binary expressions and conditionals: we can now express
  computations like: `df |> D.groupBy [F.name ocean_proximity] |> D.aggregate [\"rand\"
  .= F.sum (F.ifThenElse (ocean_proximity .== \"ISLAND\") 1 0)]`.\n* Unary aggregations
  do not mistakenly boxed unboxed instances.\n\n## 0.4.0.0\n* `readSeparated` no longer
  takes the separator as an argument. This is not placed into readOptions.\n* Some
  improvements to the synthesis demo\n* Add a `declareColumnsParquetFile` function.
  \n* Column conversion functions now take expressions instead of strings.\n* Add
  more monadic functions to make previously tricky transformations easier to write:\n
  \   ```haskell\n    {-# LANGUAGE OverloadedStrings #-}\n    {-# LANGUAGE TemplateHaskell
  #-}\n\n    module Main where\n\n    import qualified DataFrame as D\n    import
  qualified DataFrame.Functions as F\n\n    import DataFrame.Monad\n\n    import Data.Text
  (Text)\n    import DataFrame.Functions ((.&&), (.>=))\n\n    $(F.declareColumnsFromCsvFile
  \"./data/housing.csv\")\n\n    main :: IO ()\n    main = do\n        df <- D.readCsv
  \"./data/housing.csv\"\n        print $ execFrameM df $ do\n            is_expensive
  <- deriveM \"is_expensive\" (median_house_value .>= 500000)\n            meanBedrooms
  <- inspectM (D.meanMaybe total_bedrooms)\n            totalBedrooms <- imputeM total_bedrooms
  meanBedrooms\n            filterWhereM (totalBedrooms .>= 200 .&& is_expensive)\n
  \   ```\n\n## 0.3.5.0\n* Add a `deriveWithExpr` that returns an expression that
  you can use in a subsequent expressions.\n* Add `declareColumnsFromCsvFile` which
  can create the expressions up front for use in scripts.\n    ```haskell\n    import
  qualified DataFrame as D\n    import qualified DataFrame.Functions as F\n\n    import
  Data.Text (Text)\n    import DataFrame.Functions ((.==), (.>=))\n\n    $(F.declareColumnsFromCsvFile
  \"./data/housing.csv\")\n\n    main :: IO ()\n    main = do\n        df <- D.readCsv
  \"./data/housing.csv\"\n        let (df', test) = D.deriveWithExpr \"test\" (median_house_value
  .>= 500000) df\n        print (D.filterWhere test df')\n    ```\n* Fix bounds on
  random.\n* Parquet Column chunks weren't reading properly because we didn't correctly
  calculate the list size.\n* Sum function had a bug where the first number was summed
  twice.\n* Add monadic interface for building dataframe expressions that makes schema
  evolution nice.\n    ```haskell\n    {-# LANGUAGE OverloadedStrings #-}\n    {-#
  LANGUAGE TemplateHaskell #-}\n\n    module Main where\n\n    import qualified DataFrame
  as D\n    import qualified DataFrame.Functions as F\n\n    import DataFrame.Monad\n\n
  \   import Data.Text (Text)\n    import DataFrame.Functions ((.&&), (.>=))\n\n    $(F.declareColumnsFromCsvFile
  \"./data/housing.csv\")\n\n    main :: IO ()\n    main = do\n        df <- D.readCsv
  \"./data/housing.csv\"\n        print $ runFrameM df $ do\n            is_expensive
  <- deriveM \"is_expensive\" (median_house_value .>= 500000)\n            filterWhereM
  is_expensive\n            luxury <- deriveM \"luxury\" (is_expensive .&& median_income
  .>= 8)\n            filterWhereM luxury\n    ```\n* Change order of exponentiation
  to putting the exponent second. It was initially first cause of some internal efficiency
  detail but that's silly.\n* Fix bug where we didn't concat columns from row groups.\n\n##
  0.3.4.1\n* Faster sum operation (now does a reduction instead of collecting the
  vector and aggregating)\n* Update the fixity of comparison operations. Before `(x
  + y) .<= 10`. Now: `x + y ,<= 10`.\n* Revert sort for groupby back to mergesort.\n\n##
  0.3.4.0\n* Fix right join - previously erased some values in the key.\n* Change
  sort API so we can sort on different rows.\n* Add meanMaybe and stddevMaybe that
  work on `Maybe` values.\n* More efficient numeric groupby - use radix sort for indices
  and pre-sort when collecting.\n\n## 0.3.3.9\n* Fix compilation issue for ghc 9.12.*\n\n##
  0.3.3.8\n* More efficient inner joins using hashmaps.\n* Initial JSON lines implementation\n*
  More robust logic when specifying CSV types.\n* Strip spaces from titles and rows
  in CSV reading.\n* Auto parsing bools in CSV.\n* Add `imputeWith`, `bind`, `nRows`,
  `nColumns`, `recodeWitDefault` function that takes \n* Better support for proper
  markdown\n* Fix bug with full outer join.\n* Unify `insertVector` and `insertList`
  functions into insert.\n\n## 0.3.3.7\n* Many functions how rely on expressions (not
  strings).\n* full, left, and right join now implemented.\n* fastCsv now strips quotations
  from text.\n* Add \"NA\" as a nullish pattern.\n* Add bin parameter to terminal
  plotting.\n* Implement filterAllNothing for null handling.\n* Remove behaviour where
  we parse mixed types as `Either`\n* Add `whenPresent`, `whenBothPresent` and `recode`
  functions.\n* Web charts now show on first load.\n* Add deriveMay function for multiple
  column derivations.\n\n## 0.3.3.6\n* Fix bug where doubles were parsing as ints\n*
  Fix bugs where optionals were left in boxed column (instead of optionals)\n* Change
  syntax for conditional operations so it doesn't clash with regular operations.\n\n##
  0.3.3.5\n* Fix parsing logic for doubles. Entire parsing logic is still a work in
  progress.\n* Speed up index selection by using backPermute.\n* Add `mode` function
  to `Functions`.\n* Rewrite some expressions to evaluation more efficient.\n* Show
  correct number of rows in message after truncating for display.\n* Add experimental
  fast CSV parsers (thanks @jhingon)\n* Add support to read dataframes from SQL databases.\n\n##
  0.3.3.4\n* Add linting CI step + fix existing lint errors.\n* Show now only prints
  10 row. To print more you should use the new `display` function that takes the number
  of rows as a parameter in its configuration.\n* Add `toDouble`, `div`, and, `mod`
  functions.\n* Define an `IsString` instance for columns so you can use string literals
  without `F.lit`.\n* Include variance expression.\n* Improved filter performance.\n*
  Make beam search loss function configurable for synthesizing features.\n\n## 0.3.3.3\n*
  Split `toMatrix` into more specific `to<Type>Matrix` functions.\n\n## 0.3.3.2\n*
  Update documentation on both readthedocs and hackage.\n\n## 0.3.3.1\n* Fix bug in
  `randomSplit` causing two splits to overlap.\n\n## 0.3.3.0\n* Better error messaging
  for expression failures.\n* Fix bug where exponentials were not being properly during
  CSV parsing.\n* `toMatrix` now returns either an exception or the a vector of vector
  doubles.\n* Add `sample`, `kFolds`, and `randomSplit` to sample dataframes.\n\n##
  0.3.2.0\n* Fix dataframe semigroup instance. Appending two rows of the same name
  but different types now gives a row of `Either a b` (work by @jhrcek).\n* Fix left
  expansion of semigroup instance (work by @jhrcek). \n* Added `hasElemType` function
  that can be used with `selectBy` to filter columns by type. E.g. `selectBy [byProperty
  (hasElemType @Int)] df.`\n* Added basic support for program synthesis for feature
  generation (`synthesizeFeatureExpr`) and symbolic regression (`fitRegression`).\n*
  Web plotting doesn't embed entire script anymore.\n* Added `relu`, `min`, and `max`
  functions for expressions.\n* Add `fromRows` function to build a dataframe from
  rows. Also add `toAny` function that converts a value to a dynamic-like Columnable
  value.\n* `isNumeric` function now recognises `Integer` types.\n* Added `readCsvWithOpts`
  function that allows read specification.\n* Expose option to specify data formats
  when parsing CSV.\n* Added setup script for Hasktorch example.\n\n\n## 0.3.1.2\n*
  Update granite version, again, for stackage.\n\n## 0.3.1.1\n* Aggregation now works
  on expressions rather than just column references.\n* Export writeCsv\n* Loosen
  bounds for dependencies to keep library on stackage.\n* Add `filterNothing` function
  that returns all empty rows of a column.\n* Add `IfThenElse` function for conditional
  expressions.\n* Add `synthesizeFeatureExpr` function that does a search for a predictive
  variable in a `Double` dataframe.\n\n## 0.3.1.0\n* Add new `selectBy` function which
  subsumes all the other select functions. Specifically we can:\n    * `selectBy [byName
  \"x\"] df`: normal select.\n    * `selectBy [byProperty isNumeric] df`: all columns
  with a given property.\n    * `selectBy [byNameProperty (T.isPrefixOf \"weight\")]
  df`: select by column name predicate.\n    * `selectBy [byIndexRange (0, 5)] df`:
  picks the first size columns.\n    * `selectBy [byNameRange (\"a\", \"c\")] df`:
  select names within a range.\n* Cut down dependencies to reduce binary/installation
  size.\n* Add module for web plots that uses chartjs.\n* Web plots can open in the
  browser.\n\n## 0.3.0.4\n* Fix bug with parquet reader.\n\n## 0.3.0.3\n* Improved
  parquet reader. The reader now supports most parquet files downloaded from internet
  sources\n  * Supports all primitive parquet types plain and uncompressed.\n  * Can
  decode both v1 and v2 data pages.\n  * Supports Snappy and ZSTD compression.\n  *
  Supports RLE/bitpacking encoding for primitive types\n  * Backward compatible with
  INT96 type.\n  * From the parquet-testing repo we can successfully read the following:\n
  \   * alltypes_dictionary.parquet\n    * alltypes_plain.parquet\n    * alltypes_plain.snappy.parquet\n
  \   * alltypes_tiny_pages_plain.parquet\n    * binary_truncated_min_max.parquet\n
  \   * datapage_v1-corrupt-checksum.parquet\n    * datapage_v1-snappy-compressed-checksum.parquet\n
  \   * datapage_v1-uncompressed-checksum.parquet\n* Improve CSV parsing: Parse bytestring
  and convert to text only at the end. Remove some redundancies in parsing with suggestions
  from @Jhingon.\n* Faster correlation computation.\n* Update version of granite that
  ships with dataframe and add new scatterBy plot.\n\n## 0.3.0.2\n* Re-enable Parquet.\n*
  Change columnInfo to describeColumns\n* We can now convert columns to lists.\n*
  Fast reductions and groupings. GroupBys are now a dataframe construct not a column
  construct (thanks to @stites).\n* Filter is now faster because we do mutation on
  the index vector.\n* Frequencies table nnow correctly display percentages (thanks
  @kayvank)\n* Show table implementations have been unified (thanks @metapho-re)\n*
  We now compute statistics on null columns\n* Drastic improvement in plotting since
  we now use granite.\n\n## 0.3.0.1\n* Temporarily remove Parquet support. I think
  it'll be worth creating a spin off of snappy that doesn't rely on C bindings. Also
  I'll probably spin Parquet off into a separate library.\n\n## 0.3.0.0\n* Now supports
  inner joins\n```haskell\nghci> df |> D.innerJoin [\"key_1\", \"key_2\"] other\n```\n*
  Aggregations are now expressions allowing for more expressive aggregation logic.
  Previously: `D.aggregate [(\"quantity\", D.Mean), (\"price\", D.Sum)] df` now ``D.aggregate
  [(F.sum (F.col @Double \"label\") / (F.count (F.col @Double \"label\")) `F.as` \"positive_rate\")]``\n*
  In GHCI, you can now create type-safe bindings for each column and use those in
  expressions.\n\n```haskell\nghci> :exposeColumns df\nghci> D.aggregate  [(F.sum
  label / F.count label) `F.as` \"positive_rate\"]\n```\n* Added pandas and polars
  benchmarks.\n* Performance improvements to `groupBy`.\n* Various bug fixes.\n\n##
  0.2.0.2\n* Experimental Apache Parquet support.\n* Rename conversion columns (changed
  from toColumn and toColumn' to fromVector and fromList).\n* Rename constructor for
  dataframe to fromNamedColumns\n* Create an error context for error messages so we
  can change the exceptions as they are thrown.\n* Provide safe versions of building
  block functions that allow us to build good traces.\n* Add readthedocs support.\n\n##
  0.2.0.1\n* Fix bug with new comparison expressions. gt and geq were actually implemented
  as lt and leq.\n* Changes to make library work with ghc 9.10.1 and 9.12.2\n\n##
  0.2.0.0\n### Replace `Function` adt with a column expression syntax.\n\nPreviously,
  we tried to stay as close to Haskell as possible. We used the explicit\nordering
  of the column names in the first part of the tuple to determine the function\narguments
  and the a regular Haskell function that we evaluated piece-wise on each row.\n\n```haskell\nlet
  multiply (a :: Int) (b :: Double) = fromIntegral a * b\nlet withTotalPrice = D.deriveFrom
  ([\"quantity\", \"item_price\"], D.func multiply) \"total_price\" df\n```\n\nNow,
  we have a column expression syntax that mirrors Pyspark and Polars.\n\n```haskell\nlet
  withTotalPrice = D.derive \"total_price\" (D.lift fromIntegral (D.col @Int \"quantity\")
  * (D.col @Double\"item_price\")) df\n```\n\n### Adds a coverage report to the repository
  (thanks to @oforero)\nWe don't have good test coverage right now. This will help
  us determine where to invest.\n@oforero provided a script to make an HPC HTML report
  for coverage.\n\n### Convenience functions for comparisons\nInstead of lifting all
  bool operations we provide `eq`, `leq` etc.\n\n## 0.1.0.3\n* Use older version of
  correlation for ihaskell itegration\n\n## 0.1.0.2\n* Change namespace from `Data.DataFrame`
  to `DataFrame`\n* Add `toVector` function for converting columns to vectors.\n*
  Add `impute` function for replacing `Nothing` values in optional columns.\n* Add
  `filterAllJust` to filter out all rows with missing data.\n* Add `distinct` function
  that returns a dataframe with distict rows.\n\n## 0.1.0.1\n* Fixed parse failure
  on nested, escaped quotation.\n* Fixed column info when field name isn't found.\n\n##
  0.1.0.0\n* Initial release\n"
