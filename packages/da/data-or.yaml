description: "data-or\n=======\n[![CI Status](https://github.com/wrengr/data-or/actions/workflows/ci.yml/badge.svg)](https://github.com/wrengr/data-or/actions?query=workflow%3Aci+-event%3Apull_request)\n[![Hackage
  version](https://img.shields.io/hackage/v/data-or.svg?style=flat)](https://hackage.haskell.org/package/data-or)
  \n[![Stackage LTS version](https://stackage.org/package/data-or/badge/lts)](https://stackage.org/lts/package/data-or)\n[![Stackage
  Nightly version](https://stackage.org/package/data-or/badge/nightly)](https://stackage.org/nightly/package/data-or)\n\nThis
  package provides a data type for non-exclusive disjunction.\nIn addition we provide
  a non-truncating version of `zip`, `zipWith`,\netc.\n\n\n## Install\n\nThis is a
  simple package and should be easy to install. You should\nbe able to use the standard:\n\n
  \   $> cabal install data-or\n    \n\n## Portability\n\nAn attempt has been made
  to keep this library as portable as possible.\nIt is Haskell98 except for the use
  of CPP, which allows some functions\nto be good producers for list fusion in GHC.\n\n\n##
  Links\n\n* [Website](http://wrengr.org/)\n* [Blog](http://winterkoninkje.dreamwidth.org/)\n*
  [Twitter](https://twitter.com/wrengr)\n* [Hackage](http://hackage.haskell.org/package/data-or)\n*
  [GitHub](https://github.com/wrengr/data-or)\n"
