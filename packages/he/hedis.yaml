  ## 0.10.10

  * Only disable warnings for GHC 8.6, fix build

  ## 0.10.9

  * Remove deprecation warnings

  ## 0.10.8

  * PR #121. make xgroupCreate return Status

  ## 0.10.7

  * PR #121. Fix streaming on redis 5.0.2
  * PR #121. Get rid of slave-thread

  ## 0.10.6

