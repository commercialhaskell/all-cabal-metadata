description: "# tesths\nsample Spec.hs\n\n```\nimport qualified TestHS as T\nimport
  Test.Something as S\n\nmain :: IO ()\nmain = do\n  putStrLn \"\\n\"\n  putStrLn
  $ \"Test Begins\"\n  T.reportTests $ S.fastTests \n  T.reportTestsIO $ S.ioTests
  \n```\n\n`S.fastTests` is a list of tests `[Test]` and\n`S.ioTests` is a list of
  IO tests `[IO Test]` defined in `Test.Something`\n"
