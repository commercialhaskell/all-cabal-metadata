changelog: |+
  # Changelog

  - 0.3.0 (2026-05-16)
    * Features order-of-magnitude performance improvements in both
      encoding and decoding, especially on ARM platforms where NEON
      intrinsics are available.

  - 0.2.1 (2025-12-28)
    * Adds an 'llvm' build flag and is now tested with GHC 9.10.3.

  - 0.2.0 (2025-03-10)
    * Fix bug in which inputs with uppercase hex characters failed to
      decode.

  - 0.1.1 (2025-02-28)
    * Roughly 2x faster decoding performance.

  - 0.1.0 (2025-01-17)
    * Initial release, supporting basic encoding/decoding.

