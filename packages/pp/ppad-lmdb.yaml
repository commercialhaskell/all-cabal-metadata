changelog: |+
  # Changelog

  - 0.1.0 (2026-05-24)
    * Initial release, consisting of support for LMDB environments,
      transactions, basic row operations (get, put, del), and range scans.

changelog-type: text
description: |-
  Minimal bindings to
  [LMDB](https://www.symas.com/lmdb) (Lightning Memory-Mapped
  Database), an embedded ACID key-value store. The upstream LMDB C
  source is vendored at release @LMDB_0.9.33@ under @cbits/@; no
  external @liblmdb@ is required.
