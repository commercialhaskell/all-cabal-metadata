description: "# pgqueuer-hs: PostgreSQL-powered job queues for Haskell\n\nA PostgreSQL-powered
  job queue library. fully compatible Haskell implementation of [pgqueuer](https://github.com/janbjorge/pgqueuer).\n\n##
  Overview\n\nYour PostgreSQL database is already a job queue.\n\n`pgqueuer-hs` turns
  PostgreSQL into a fast, reliable background job processor. Jobs live in the same
  database as your application data. One stack, full ACID guarantees, and no separate
  message broker to run.\n\n### Key Features\n\n- **PostgreSQL-Native**: Jobs stored
  directly in PostgreSQL with ACID guarantees\n- **Transactional Enqueue**: Enqueue
  jobs in the same transaction as your application data\n- **Safe Concurrency**: `FOR
  UPDATE SKIP LOCKED` prevents duplicate processing\n- **Per-Entrypoint Limits**:
  Configure concurrency limits per job type\n- **Global Limits**: Optional global
  concurrency control across all entrypoints\n- **Instant Dispatch**: `LISTEN/NOTIFY`
  wakes workers immediately when jobs arrive\n- **Deferred Jobs**: Schedule job execution
  with `execute_after`\n- **Deduplication**: Prevent duplicate jobs with `dedupe_key`\n-
  **Cross-Language Compatible**: Jobs created in Python can be processed by Haskell
  (and vice versa)\n- **Job Tracking**: Complete logging of job status transitions\n-
  **Error Handling**: Failed jobs can be retried or held for manual inspection\n\n##
  Database Schema\n\nThe Haskell port uses the **exact same schema** as Python pgqueuer:\n\n##
  Examples\n\nFully working examples are available in `./example` directory\n\n##
  Installation\n\nAdd `pgqueuer-hs` to your `package.yaml` or `project.cabal` dependencies:\n\n```yaml\ndependencies:\n
  \ - pgqueuer-hs\n  - postgresql-simple\n  - uuid\n  - time\n  - text\n  - aeson\n\n##
  Quick start\n\nInstall schema if not installed.\n\n```haskell\n{-# LANGUAGE OverloadedStrings
  #-}\n\nimport Data.UUID.V4 (nextRandom)\nimport PGQueuer\nimport Data.Either (isLeft)\nimport
  Data.UUID.V4 (nextRandom)\n\nmain :: IO ()\nmain = do\n    let conStr = \"postgresql://queue_user:queue_pass@localhost:5432/queue_db\"\n
  \   queueMgrId <- nextRandom\n    withQueueManager conStr defaultDBSettings queueMgrId
  $ \\qm -> do\n        -- setup schema\n        eInstalled <- verifyStructure qm\n
  \       when (isLeft eInstalled) (installSchema qm)\n\n        -- Enqueue a job\n
  \       let ep = Entrypoint \"hello\"\n        let params = [EntrypointExecutionParameter
  ep 0]\n        qm1 <- registerEntrypoint qm ep (\\_ -> pure ())\n        _ <- enqueue
  qm1 ep Nothing 0 Nothing Nothing Nothing\n\n        -- Dequeue jobs\n        pickedJobs
  <- dequeue qm1 20 params Nothing 3\n        mapM_ (\\job -> jobStatus job) pickedJobs\n```\n\n##
  Core Concepts\n### Architecture\n\nPGQueuer creates a self-contained ecosystem within
  your PostgreSQL database:\n  1. pgqueuer table: The primary ledger for active jobs
  (status: queued, picked).\n  2. pgqueuer_log table: An unlogged table used for fast,
  high-volume event logging of job state transitions.\n  3. pgqueuer_statistics table:
  Aggregates queue throughput and metrics.\n  4. pgqueuer_schedules table: Manages
  cron-like recurring jobs and future executions.\n  \n  Database Triggers: Automatically
  emit pub/sub notifications via fn_pgqueuer_changed when queue states mutate.\n\n###
  Status Lifecycle\n\n- Jobs transition through various states defined by JobStatus:\n-
  Queued - Waiting for a worker.\n- Picked - Claimed by a worker (protected by a heartbeat
  timeout).\n- Successful - Completed without errors.\n- Failed / Exception - Encountered
  an error (eligible for retry).\n- Canceled / Deleted - Terminated or scrubbed.\n\n>
  [!IMPORTANT]  \n> Codebase is currently highly unstable.\n\n## Notes\n\n- Postgresql-simple
  is currently being used as the primary database driver. In the future, adapter drivers
  will be implemented.\n- Scheduling is not supported right now.\n\n## License\n\nThis
  project is licensed under the MIT License - see the LICENSE file for details.\n\n##
  See Also\n\n- [Python pgqueuer](https://github.com/janbjorge/pgqueuer)\n- [PostgreSQL
  Documentation](https://www.postgresql.org/docs/)\n- [postgresql-simple](http://hackage.haskell.org/package/postgresql-simple)\n"
