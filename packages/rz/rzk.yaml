changelog: "# Changelog for `rzk`\n\nAll notable changes to this project will be documented
  in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand
  this project adheres to the\n[Haskell Package Versioning Policy](https://pvp.haskell.org/).\n\n##
  v0.9.2 — 2026-07-13\n\nAdded:\n\n- **Language server: cross-file references, hover,
  symbols, and better highlighting** (see [#282](https://github.com/rzk-lang/rzk/pull/282)).
  Go-to-definition and find-references work across the files of a project. Hover shows
  a definition's elaborated type (falling back to the written annotation), rendered
  as an rzk code block; long signatures are split across lines, pair binders are split
  through weak head normalisation, and shaped binders are shown with their tope. Document
  symbols populate the outline view. Semantic tokens are computed from the lexer token
  stream, and a per-file parse cache keeps the last good parse across syntax errors,
  so highlighting, hover, and references keep working while a file is temporarily
  broken. No grammar changes are involved. A matching `vscode-rzk` release should
  be pinned to this version, so editor users actually receive the new UX.\n\n- **Language
  server: typecheck progress reporting and a responsive server** (see [#283](https://github.com/rzk-lang/rzk/pull/283)).
  Typechecking now reports its progress to the editor (via `$/progress`), showing
  the file being checked and the fraction of modules done. The project re-check runs
  on a worker thread, so requests such as formatting on save are answered while the
  re-check is still running; a newer change cancels and restarts the re-check, keeping
  the modules it has finished. Checking stops at the first module with errors; the
  modules a run never reaches are now marked with a warning naming the blocker (e.g.
  `Not checked: blocked by an error in …`) instead of keeping stale diagnostics.\n\n-
  **Language server: workspace symbol search** (see [#285](https://github.com/rzk-lang/rzk/pull/285)).
  Every definition of the project is searchable by name. In VS Code, press `Ctrl+T`
  (`⌘T` on macOS, \"Go to Symbol in Workspace…\"), or type `#` followed by the name
  in Quick Open, e.g. `#yoneda`; Enter jumps to the definition. Matching is case-insensitive
  and by infix, and the results span all files of the project, not just the open one
  (that remains the job of document symbols, `Ctrl+Shift+O`). Definitions are served
  from the typecheck cache, so a module becomes searchable once it has been checked.\n\n-
  **Language server: holes are highlighted** (see [#284](https://github.com/rzk-lang/rzk/pull/284)).
  A hole (`?` or `?name`) now gets its own semantic token. It is computed from the
  lexer token stream, so holes stay highlighted while the file temporarily fails to
  parse.\n\nChanged:\n\n- Function types no longer show unused anonymous binders (see
  [#286](https://github.com/rzk-lang/rzk/pull/286)). A goal `#!rzk U → U` used to
  print as `#!rzk (x₁ : U) → U`, with a machine-generated name; the domain is now
  rendered as a plain parameter everywhere a type is shown (hover, hole goals, error
  messages). A user-written name is kept even when unused.\n\nFixed:\n\n- Subtype
  checks now respect variance. Three asymmetric checks (tope-family domains, the domain
  topes of Π-types, and restriction faces) ran in a fixed direction regardless of
  the ambient variance, so in negative positions they ran backwards. For example,
  `#!rzk k : (f : (t : 2 | ⊤) → A) → A` was accepted where `#!rzk (f : (t : 2 | t
  ≡ 0₂) → A) → A` is expected, letting `#!rzk k` apply a partial `#!rzk f` outside
  its domain. Each check now consults the variance flag; six regression fixtures are
  added, and the sHoTT corpus is unaffected (see [#269](https://github.com/rzk-lang/rzk/pull/269)).\n\n-
  Unification no longer equates identity types over different types. Identity types
  were equated whenever their endpoints unified, accepting e.g. a free homotopy (a
  path in `#!rzk Δ¹ → A`) where an endpoint-fixing one (a path in `#!rzk hom A x y`)
  is expected. The underlying types are now compared, invariantly, so subtyping does
  not leak into equality of identity types (see [#270](https://github.com/rzk-lang/rzk/pull/270)).\n\nPerformance:\n\n-
  A performance pass over the typechecker roughly halves the wall-clock time of a
  full sHoTT check (26–28 s down to ~13.5 s) and cuts its maximum residency fourfold
  (8 GB down to 2.1 GB):\n\n  - the tope solver short-circuits its Boolean search,
  maintains the flat-cube discreteness axioms incrementally, and builds its debug
  traces only at `Debug` verbosity (see [#273](https://github.com/rzk-lang/rzk/pull/273));\n
  \ - variable lookups no longer project the whole context (see [#276](https://github.com/rzk-lang/rzk/pull/276));\n
  \ - top-level entries are kept unshifted and embedded on lookup (see [#277](https://github.com/rzk-lang/rzk/pull/277));\n
  \ - the name-shadowing check no longer embeds global payloads (see [#279](https://github.com/rzk-lang/rzk/pull/279));\n
  \ - the saturated tope context is cached lazily, recomputed only when the context
  changes (see [#280](https://github.com/rzk-lang/rzk/pull/280)).\n\n  A corpus benchmark
  harness under `bench/` records the measurements (see [#274](https://github.com/rzk-lang/rzk/pull/274)).\n\nCI
  / infrastructure:\n\n- The parser-drift workflow now also fails on LR conflicts
  and unused rules in the grammar (`make -C rzk check-parser-conflicts`), so a grammar
  change cannot silently introduce ambiguity (see [#281](https://github.com/rzk-lang/rzk/pull/281)).\n\n##
  v0.9.1 — 2026-06-26\n\nFixed:\n\n- In lenient (`--allow-holes`) mode, an unused
  `#!rzk uses` variable is now tolerated whenever the section contains a hole, not
  only when the hole sits in the declaration itself. For example, with `#!rzk #def
  in-progress uses (P) : U := ?` and a hole-free wrapper `#!rzk #def check uses (P)
  : U := in-progress`, the wrapper's `#!rzk uses (P)` reads as unused only because
  `#!rzk in-progress` is incomplete; it no longer masks the hole the player is meant
  to see. Strict mode (the default, and CI) still reports a genuinely unused `#!rzk
  uses` (see [#262](https://github.com/rzk-lang/rzk/pull/262)).\n\n- A multi-variable
  binder in a function type, such as `#!rzk (x y : A) → A`, no longer crashes the
  checker with `expected a pattern but got x y`. It is now desugared into nested one-variable
  binders `#!rzk (x : A) → (y : A) → A`, as one would expect. The crash was an uncaught
  `error` reached during translation, so it took down the playground, the game, and
  the LSP rather than surfacing as a diagnostic; both `rzk typecheck` and the hole
  query (`--allow-holes`) are fixed (see [#263](https://github.com/rzk-lang/rzk/pull/263)).\n\n-
  A hole's hint inventory no longer drops a hypothesis or allow-listed lemma whose
  elimination spine is long. For a goal `#!rzk B` and a lemma `#!rzk deep : A -> A
  -> A -> A -> A -> A -> A -> A -> B`, the candidate `#!rzk deep ? ? ? ? ? ? ? ?`
  was silently omitted, because filling each of the eight arguments with a hole spent
  one unit of the search-depth bound. Filling a function's arguments is a forced spine
  step, so it no longer counts against the bound; only the genuinely branching eliminators
  (Σ/cube projections and `#!rzk idJ`) do. This affects only the candidate hints surfaced
  to the game and the LSP, not the strict `rzk typecheck` path (see [#261](https://github.com/rzk-lang/rzk/pull/261)).\n\n-
  In lenient (`--allow-holes`) mode, a hole standing for an entire shape-restricted
  argument is now reported with its goal instead of failing the enclosing extension-type
  boundary check. When the hole is the whole point of a shape (e.g. a `#!rzk 2 × 2
  | Δ¹×Δ¹` point), the surrounding term can unfold to a `#!rzk recOR` whose faces
  mention the hole (such as `#!rzk π₁ ? ≤ π₂ ?`). Checking an extension-type boundary
  then enters one of those faces, and a reduction there can drop the hole from the
  compared terms while the assumed face still depends on it. The boundary mismatch
  was reported as `cannot unify term`, even though filling the hole makes the term
  typecheck. A mismatch found under a tope context that still mentions an unfilled
  hole is now deferred, just like one whose terms still contain a hole. Strict mode
  (the default, and CI) still reports the hole as unsolved (see [#267](https://github.com/rzk-lang/rzk/pull/267)).\n\nPackaging:\n\n-
  Add upper bounds on all dependencies, as Hackage asks for. The bounds are at the
  next super-major version, so a new GHC's boot libraries (`array`, `bytestring`,
  `directory`, `mtl`, `template-haskell`, `text`) and the pinned Nix/GHCJS package
  set both stay in range without a Hackage revision on every minor dependency bump.
  The loose lower bounds are unchanged, so the GHCJS path still resolves (see [#259](https://github.com/rzk-lang/rzk/issues/259),
  [#134](https://github.com/rzk-lang/rzk/issues/134)).\n\nCI / infrastructure:\n\n-
  Upgrade the playground's build toolchain to Vite 7 and `tsx` 4.20, picking up the
  upstream security fixes, and build it with Node 22 under Nix to match (see [#265](https://github.com/rzk-lang/rzk/pull/265)).\n\n-
  Fix the playground's `ASSET_URL` so the root (`main`) deployment loads its assets
  from the correct path.\n\n## v0.9.0 — 2026-06-24\n\nAdded:\n\n- **Typed holes and
  a structured goal/context query.** Write `?` (or a named `?goal`) for an unfilled
  subterm. By default `rzk typecheck` reports any hole as an error, so finished work
  and CI never admit holes. With `rzk typecheck --allow-holes` it instead prints,
  for each hole, its expected type (the goal) and its local context. The local context
  lists the term variables, cube variables, and tope assumptions in scope; the global
  environment is excluded. The same data is available to library consumers (the playground/game
  and the LSP) through `typecheckModulesWithHoles`, which returns structured `HoleInfo`
  values. Holes are checked only where their type is known, that is, in checking position.
  A hole in inference position is reported rather than guessed. When a hole is the
  argument of a shape-restricted function, its goal is shown as the shape `(s : I
  | ψ s ∧ φ s)` (the membership tope), and extension-type goals show their boundary
  `A [φ ↦ a]` (see [#237](https://github.com/rzk-lang/rzk/pull/237), [#240](https://github.com/rzk-lang/rzk/pull/240)).\n\n-
  **Hint inventory for a hole.** Alongside the goal and context, the query records
  the moves that fit. It offers three kinds of move. The first is type-directed *elimination
  candidates* over the hypotheses (a function applied to holes, a projection of a
  Σ, or path induction by `idJ`, see [#244](https://github.com/rzk-lang/rzk/pull/244)).
  The second is *introduction forms* that build the goal from its head (a λ, a pair,
  `refl`, or a tope constructor). The third, in a shape setting, is the context-driven
  `recBOT` (ex falso) and `recOR` case-splits (see [#245](https://github.com/rzk-lang/rzk/pull/245)).
  A caller may additionally allow-list named lemmas in scope, so they surface as candidates
  applied to holes (see [#256](https://github.com/rzk-lang/rzk/pull/256)). Pattern
  binders are restored throughout goals, errors, and candidates, so a goal reads `\\
  (t , s) → ?` rather than in terms of projections (see [#242](https://github.com/rzk-lang/rzk/pull/242),
  [#246](https://github.com/rzk-lang/rzk/pull/246)).\n\n- **Structured diagnostics.**
  Type errors and holes are now available as structured data, not only as a formatted
  string. A diagnostic in `Rzk.Diagnostic` carries a severity, a stable code, a source
  location, and a message. `rzk typecheck --json` emits all diagnostics (both type
  errors and holes) as JSON on stdout, for editor-agnostic tooling and CI (see [#238](https://github.com/rzk-lang/rzk/pull/238),
  [#243](https://github.com/rzk-lang/rzk/pull/243)). The language server consumes
  the same structured diagnostics. It shows each hole's goal and context as a warning
  rather than a hard error, in the spirit of Agda's yellow \"unsolved\" highlight,
  and it now reports all diagnostics for a file together. Source spans remain line-level.\n\n-
  **Goal-cell diagrams.** When a hole's goal is a shape (an arrow, triangle, or square),
  the query exposes an SVG of the cell the hole must inhabit, drawn from an abstract
  inhabitant of the goal. A new `render-hide-term` option draws the shape with the
  proof term hidden, keeping only the given boundary labels (see [#253](https://github.com/rzk-lang/rzk/pull/253)).\n\n-
  Experimental **cubical interval** `#!rzk II` (`#!rzk \U0001D540`), a lattice cube
  added on top of the modal type system. This is the intended sound home for an amazing
  right adjoint `#!rzk √`, as flagged in the v0.8.0 release notes (see [#228](https://github.com/rzk-lang/rzk/pull/228)).\n\nChanged:\n\n-
  Experimental **modal syntax** is less noisy. A modal type is now written `#!rzk
  m A` instead of `#!rzk <| m | A |>`, and a modal binding is `#!rzk (x :m A)` (see
  [#227](https://github.com/rzk-lang/rzk/pull/227)). Modal bindings on Π-, Σ-, and
  λ-types are now primitive rather than sugar for `#!rzk let mod`, and modal extraction
  is restricted to the right-adjoint modalities (`#!rzk ♯`, `#!rzk ᵒᵖ`, `#!rzk _id`)
  (see [#248](https://github.com/rzk-lang/rzk/pull/248)).\n\n- Experimental: modalities
  are tracked through the tope layer, so the tope solver knows which topes are accessible
  under which modality (see [#230](https://github.com/rzk-lang/rzk/pull/230)).\n\n-
  The `#!rzk uses`/unused-variable check now keys off the definition as written rather
  than its weak head normal form. Reduction can drop or expose a variable occurrence,
  so a genuine use could be reported as unused, or a transitive dependency on an assumption
  hidden. Both are now classified from the written term (see [#255](https://github.com/rzk-lang/rzk/pull/255)).\n\nOther
  changes:\n\n- In lenient (`--allow-holes`) mode, we tolerate diagnostics that only
  a finished term must satisfy, so an in-progress sketch still typechecks. These are
  an unused `#!rzk uses`-variable (see [#249](https://github.com/rzk-lang/rzk/pull/249)),
  a hole-introduction binder that would shadow a name in scope (see [#250](https://github.com/rzk-lang/rzk/pull/250)),
  and a term whose type fails only around a hole (see [#251](https://github.com/rzk-lang/rzk/pull/251)).
  We also show the boundary in a `#!rzk recOR` branch goal (see [#252](https://github.com/rzk-lang/rzk/pull/252))
  and accept holes in more positions (see [#239](https://github.com/rzk-lang/rzk/pull/239)).\n\n-
  Build `rzk` with `build-type: Simple` instead of `Custom`. Thus the package now
  builds under the **GHC WebAssembly backend** (a `Custom` `Setup.hs` cannot run there)
  and no longer requires BNFC, `alex`, or `happy` to install (e.g. from Hackage).
  The parser and lexer are still generated from `grammar/Syntax.cf`, but out of band:
  run `make -C rzk regen-parser` after editing the grammar. A new `Parser up-to-date`
  CI workflow regenerates from the grammar and fails on drift, and the WASM/GHCJS
  CI lanes no longer patch the package before building (see [#236](https://github.com/rzk-lang/rzk/pull/236)).\n\nFixes:\n\n-
  A `#!rzk recOR` in the cube or tope layer is now a type error instead of a panic
  (see [#254](https://github.com/rzk-lang/rzk/pull/254)).\n- Check each `#!rzk recOR`
  branch against the expected type (see [#247](https://github.com/rzk-lang/rzk/pull/247)).\n-
  Warn about overhanging `#!rzk recOR` faces and reject disjoint (vacuous) ones, replacing
  two checks that were silently vacuous (see [#233](https://github.com/rzk-lang/rzk/pull/233)).\n-
  Check a term even under an absurd (`#!rzk recBOT`) context, so an ill-formed body
  is no longer admitted under a false hypothesis (see [#234](https://github.com/rzk-lang/rzk/pull/234)).\n-
  Experimental modal layer: several corrections (see [#258](https://github.com/rzk-lang/rzk/pull/258)).
  The coercion relation is completed with `#!rzk ♭ ⇒ ᵒᵖ` and `#!rzk ᵒᵖ ⇒ ♯`, so a
  flat variable is now accessible under `#!rzk ᵒᵖ`. The normal form of `#!rzk let
  mod` extracts only for the right-adjoint modalities, matching the typechecker. And
  `#!rzk unflipᵒᵖ` now expects an interval cube under `#!rzk ᵒᵖ` (i.e. `#!rzk ᵒᵖ 2`
  or `#!rzk ᵒᵖ \U0001D540`) rather than a bare cube, mirroring `#!rzk flipᵒᵖ`.\n\nDocumentation:\n\n-
  Remove a malicious `polyfill.io` dependency from the docs (see [#231](https://github.com/rzk-lang/rzk/pull/231)).\n\nCI
  / infrastructure:\n\n- Add a CI job that builds the `rzk` library with the GHC WebAssembly
  backend (see [#235](https://github.com/rzk-lang/rzk/pull/235)).\n- Import `RzkConfig`
  qualified (see [#232](https://github.com/rzk-lang/rzk/pull/232)).\n- Deploy the
  docs and the playground reliably on tag pushes, so a release publishes both (past
  releases sometimes skipped them).\n- Move the MkDocs typecheck and deploy into the
  GHC workflow and reuse the `rzk` binary built in the same run, so the docs are checked
  with the version they document rather than with an older release.\n- Build all four
  OS only on pull requests, tags, and `main`. A `develop` push, already validated
  by its pull request, builds Linux only. A per-ref concurrency group cancels a superseded
  pull-request run, but never a push or tag run that may be deploying.\n\n## v0.8.0
  — 2026-06-04\n\nMajor changes:\n\n- Experimental **modal extension** by [Islam Talipov](https://github.com/LIshy2)
  for reasoning in the style of Triangulated Type Theory (see [#225](https://github.com/rzk-lang/rzk/pull/225)
  and [#224](https://github.com/rzk-lang/rzk/pull/224)):\n  - Four modalities: discretization
  `#!rzk _b` (`#!rzk ♭`), codiscretization `#!rzk _#` (`#!rzk ♯`), orientation reversal
  `#!rzk _op` (`#!rzk ᵒᵖ`), and identity `#!rzk _id`, composed by a fixed mode theory.\n
  \ - Modal types `#!rzk <| m | A |>`, introduction form `#!rzk mod m x`, and the
  eliminator `#!rzk let mod m x := … in …`.\n  - Modal tope axioms (`#!rzk inv`/`#!rzk
  uninv`, `#!rzk flip`/`#!rzk unflip`) with η-rules and reductions for the cube/tope
  layer under `#!rzk _op`.\n  - New documentation page [Modalities (experimental)](https://rzk-lang.github.io/rzk/en/v0.8.0/reference/modalities.rzk/)
  (also [in Russian](https://rzk-lang.github.io/rzk/ru/v0.8.0/reference/modalities.rzk/)).\n\n
  \ !!! warning \"Known unsoundness footgun\"\n      Users formalizing Triangulated
  Type Theory must **not** postulate the amazing right adjoint `√` to `#!rzk (2 →
  -)` (or any \"tininess of `2`\") on the existing cube `#!rzk 2` — this is unsound
  in the standard RS17 model because `#!rzk 2` carries a totally-ordered tope layer
  (GWB §1.3). A sound place to assert `√` (a lattice cube `\U0001D540`) is planned
  for the next release.\n\n- Experimental **`let`-bindings** at the MLTT level (see
  [#222](https://github.com/rzk-lang/rzk/pull/222)), with formatter support and tests.
  Documented in [Let bindings](https://rzk-lang.github.io/rzk/en/v0.8.0/reference/let-bindings.rzk/).\n\n-
  Data-driven **typechecking test suite** (see [#223](https://github.com/rzk-lang/rzk/pull/223)):
  YAML-described fixtures under `rzk/test/typecheck/cases/`, with paired (`foo.rzk`
  + `foo.expect.yaml`) and directory layouts, regression-traceability metadata, and
  a schema (`rzk/test/typecheck/SCHEMA.md`).\n\nOther changes:\n\n- Run BNFC with
  `--text-token` and bump the Stack resolver to `lts-24.34` (see [#221](https://github.com/rzk-lang/rzk/pull/221)).\n-
  Add an agda-input-like extension to input Unicode symbols in the Rzk Playground,
  including superscript and subscript symbols (see [#210](https://github.com/rzk-lang/rzk/pull/210)).\n\nFixes:\n\n-
  Apply a prettier formatter pass (see [#214](https://github.com/rzk-lang/rzk/pull/214)).\n-
  Fix formatting for colon in parameters/parens (see [#216](https://github.com/rzk-lang/rzk/pull/216),
  fixes [#215](https://github.com/rzk-lang/rzk/issues/215)).\n- Normalize tabs to
  spaces in the formatter; use whole-document formatting with LSP (see [#217](https://github.com/rzk-lang/rzk/pull/217)).\n-
  Insert newline after `=_{…}` if it was on its own line; avoid an extra trailing
  newline (see [#218](https://github.com/rzk-lang/rzk/pull/218)).\n- Fix `#unset-option`
  for `render`.\n\nDocumentation:\n\n- Add commands documentation and complete the
  Russian translation of the Reference section (see [#211](https://github.com/rzk-lang/rzk/pull/211)).\n-
  Translate documentation for modalities and let-bindings into Russian.\n\nCI / infrastructure:\n\n-
  Bump GitHub Actions versions and switch to better-maintained actions (see [#212](https://github.com/rzk-lang/rzk/pull/212)).\n\n##
  v0.7.7 — 2025-11-04\n\nImportant fixes:\n\n- Fix subtyping (automatic coercion for
  extension types and tope disjunction elimination) (see [#207](https://github.com/rzk-lang/rzk/pull/207))\n
  \ 1. Do not assume variance for the argument of function/type family application
  (fixes #206).\n  2. Separately check tope families and extension types (and $\\Pi$-types),
  since, for tope families, variance of the argument is different.\n  3. Fix `refl`
  to check for equality, not subtyping.\n  4. Fix `inferAs` to perform `typecheck`
  instead (where appropriate).\n\nMinor fix:\n\n- Add version bounds for successful
  Hackage upload (see [`9aba39c`](https://github.com/rzk-lang/rzk/commit/9aba39c9d63799a00438774e947a986fe8bb9d69))\n\n##
  v0.7.6 — 2025-08-14\n\nMinor fixes:\n\n- Support BNFC 2.9.6 (see [#201](https://github.com/rzk-lang/rzk/pull/201))\n-
  Fix typo in the sHoTT link (see [#194](https://github.com/rzk-lang/rzk/pull/194))\n-
  Fix tuple pattern syntax (see [#193](https://github.com/rzk-lang/rzk/pull/193) and
  [#191](https://github.com/rzk-lang/rzk/pull/191))\n\n## v0.7.5 — 2024-08-18\n\nMinor
  changes:\n\n- Support syntax sugar for nested Σ-types (see [#183](https://github.com/rzk-lang/rzk/pull/183))\n-
  Improve error reporting (see [#176](https://github.com/rzk-lang/rzk/pull/176) and
  [#179](https://github.com/rzk-lang/rzk/pull/179))\n\nFixes:\n\n- Support newer `lsp`
  (specifically, `lsp-2.7.0.0`, see [#188](https://github.com/rzk-lang/rzk/pull/188))\n-
  Fix CI (see [#184](https://github.com/rzk-lang/rzk/pull/184))\n- Fix build of nix
  flake on aarch64-darwin (see [#181](https://github.com/rzk-lang/rzk/pull/181))\n-
  Small documentation fixes (see [#178](https://github.com/rzk-lang/rzk/pull/178))\n\n##
  v0.7.4 — 2024-04-01\n\nFixes:\n\n- Fix caching in Rzk Language Server, especially
  in presence of errors (see [#167](https://github.com/rzk-lang/rzk/pull/167))\n-
  Fix CI for the Rzk Playground (see [#174](https://github.com/rzk-lang/rzk/pull/174))\n\nThis
  release also contains minor refactoring (see [#165](https://github.com/rzk-lang/rzk/pull/165))\nand
  a typo fix (see [#171](https://github.com/rzk-lang/rzk/pull/171)).\n\n## v0.7.3
  — 2023-12-16\n\nFixes:\n\n- Fix overlapping edits in the formatter, hopefully making
  it idempotent (see [#160](https://github.com/rzk-lang/rzk/pull/160));\n- Fix formatter
  crashing the language server (see [#161](https://github.com/rzk-lang/rzk/pull/161));\n-
  Avoid unnecessary typechecking when semantics of a file has not changed (see [#159](https://github.com/rzk-lang/rzk/pull/159));\n-
  Stop typechecking after the first parse error (avoid invalid cache) (see [`68ab0b4`](https://github.com/rzk-lang/rzk/commit/68ab0b4dd3d627756e10adb55cb16845b08d09d9));\n\nOther:\n\n-
  Add unit tests for the formatter (see [#157](https://github.com/rzk-lang/rzk/pull/157));\n\n##
  v0.7.2 — 2023-12-12\n\nFixes:\n\n- Fixes for `rzk format`:\n  - Fix extra space
  after open parens in formatter (see [#155](https://github.com/rzk-lang/rzk/pull/155));\n
  \ - Replace line string content with tokens when checking open parens (see [#156](https://github.com/rzk-lang/rzk/pull/156));\n-
  Throw an error when `rzk.yaml`'s `include` is empty (see [#154](https://github.com/rzk-lang/rzk/pull/154));\n\nChanges
  to the Rzk website:\n\n- Support multiple languages in the documentation (see [#150](https://github.com/rzk-lang/rzk/pull/150));\n
  \ - English is the default;\n  - Russian documentation is partially translated and
  is available at <http://rzk-lang.github.io/rzk/ru/>;\n- Add a blog (see [#153](https://github.com/rzk-lang/rzk/pull/153)
  and [`e438820`](https://github.com/rzk-lang/rzk/commit/e4388202cea59531903c4c24b939841b2771ceb7));\n
  \ - The blog is not versioned and is always available at <https://rzk-lang.github.io/rzk/en/blog/>;\n-
  Add a new [Other proof assistants for HoTT](https://rzk-lang.github.io/rzk/en/v0.7.2/related/)
  page (also [in Russian](https://rzk-lang.github.io/rzk/ru/v0.7.2/related/));\n-
  Add a new [Introduction to Dependent Types](https://rzk-lang.github.io/rzk/en/v0.7.2/getting-started/dependent-types.rzk/)
  page (also [in Russian](https://rzk-lang.github.io/rzk/ru/v0.7.2/getting-started/dependent-types.rzk/))\n-
  Add (default) social cards\n- Integrate ToC on the left\n- Use Inria Sans for English,
  PT Sans for Russian\n\n## v0.7.1 — 2023-12-08\n\n- Fix default build to include
  Rzk Language Server (`rzk lsp`) (see [`9b78a15`](https://github.com/rzk-lang/rzk/commit/9b78a15c750699afa93c4dab3735c2aa31e6faac));\n-
  Apply formatting to `recId.rzk.md` example (see [`4032724`](https://github.com/rzk-lang/rzk/commit/40327246954332f40cd82c48d102bf4257ad719e));\n\n##
  v0.7.0 — 2023-12-08\n\nMajor changes:\n\n- Add an experimental `rzk format` command
  (by [Abdelrahman Abounegm](https://github.com/aabounegm), with feedback by [Fredrik
  Bakke](https://github.com/fredrik-bakke) (see [sHoTT#142](https://github.com/rzk-lang/sHoTT/pull/142))
  and [Nikolai Kudasov](https://github.com/fizruk)):\n  - Automatically format files,
  partially automating the [Code Style of the sHoTT project](https://rzk-lang.github.io/sHoTT/STYLEGUIDE/)\n
  \ - Notable features:\n    - Adds a space after the opening parenthesis to help
  with the [code tree structure](https://rzk-lang.github.io/sHoTT/STYLEGUIDE/#the-tree-structure-of-constructions)\n
  \   - Puts the definition conclusion (type, starting with `:`) and construction
  (body, starting with `:=`) on new lines\n    - Adds a space after the `\\` of a
  lambda term and around binary operators (like `,`)\n    - Moves binary operators
  to the beginning of the next line if they appear at the end of the previous one.\n
  \   - Replaces [common ASCII sequences](https://rzk-lang.github.io/sHoTT/STYLEGUIDE/#use-of-unicode-characters)
  with their Unicode equivalent\n    - A CLI subcommand (`rzk format`) with `--check`
  and `--write` options\n  - Known limitations\n    - The 80 character line limit
  is currently not enforced due to the difficulty of determining where to add line
  breaks (for reference, check out [this post](https://journal.stuffwithstuff.com/2015/09/08/the-hardest-program-ive-ever-written/)
  by a Dart `fmt` engineer)\n    - Fixing indentation is not yet implemented due to
  the need for more semantics than the lexer provides to determine indentation level.\n
  \   - There may be rare edge cases in which applying the formatter twice could result
  in additional edits that were not detected the first time.\n\nMinor changes:\n\n-
  Fix \"latest\" Rzk Playground link (see [#137](https://github.com/rzk-lang/rzk/pull/137));\n-
  Add more badges to README (see [#136](https://github.com/rzk-lang/rzk/pull/136));\n\n##
  v0.6.7 — 2023-10-07\n\n- Fix build on some systems (fix `BNFC:bnfc` executable dependency,
  see [#125](https://github.com/rzk-lang/rzk/pull/125))\n- Improve Rzk Playground
  (see [#124](https://github.com/rzk-lang/rzk/pull/124) by @deemp):\n  - Add `snippet_url`
  parameter\n  - Migrated from NextJS to Vite\n  - Use `setText` on `params` attribute\n-
  Slightly improve documentation:\n  - Add links to Rzk Zulip (see [#131](https://github.com/rzk-lang/rzk/pull/131))\n
  \ - Add `cabal update` to instructions (see [`3aa8fd3`](https://github.com/rzk-lang/rzk/commit/3aa8fd38902fc8cbb29f86122410d24398a15b0b))\n\n##
  v0.6.6 — 2023-10-02\n\n- Fix builds on Windows (and macOS) (see [#121](https://github.com/rzk-lang/rzk/pull/121))\n\n##
  v0.6.5 — 2023-10-01\n\nThis version contains mostly infrastructure improvements:\n\n-
  Typecheck using `rzk.yaml` if it exists (see [#119](https://github.com/rzk-lang/rzk/pull/119))\n-
  Update Rzk Playground and Nix Flake (see [#84](https://github.com/rzk-lang/rzk/pull/84))\n
  \ - Rzk Playground now uses CodeMirror 6 and NextJS\n  - `miso` dependency is dropped\n
  \ - GHCJS 9.6 is now used\n  - Support `snippet={code}` or `code={code}` param (see
  [#118](https://github.com/rzk-lang/rzk/pull/118))\n    - Support for `snippet_url={URL}`
  is temporarily dropped\n- Update to GHC 9.6, the latest Stackage Nightly, improve
  Rzk setup, and GitHub Actions (see [#116](https://github.com/rzk-lang/rzk/pull/116))\n-
  Add logging for Rzk Language Server (see [#114](https://github.com/rzk-lang/rzk/pull/114))\n\nFixes:\n\n-
  Fix error messages in Rzk Playground (see [#115](https://github.com/rzk-lang/rzk/pull/115))\n\n##
  v0.6.4 — 2023-09-27\n\nThis version improves the structure of the project, in particular
  w.r.t dependencies:\n\n- Add custom snapshot and explicit lower bounds (see [#108](https://github.com/rzk-lang/rzk/pull/108))\n\n##
  v0.6.3 — 2023-09-27\n\nThis version contains a fix for the command line interface
  of `rzk`:\n\n- Fix command line `rzk typecheck` (see [#106](https://github.com/rzk-lang/rzk/pull/106))\n
  \ - Previous version ignored failures in the command line\n    (the bug was introduced
  when allowing better autocompletion in LSP).\n\n## v0.6.2 — 2023-09-26\n\nThis version
  contains some improvements in efficiency and also to the language server:\n\n- Improve
  efficiency of the tope solver, applying LEM for directed interval only as a fallback
  option (see [#102](https://github.com/rzk-lang/rzk/pull/102))\n- Support autocompleting
  definitions from previous modules (see [#102](https://github.com/rzk-lang/rzk/pull/103))\n
  \ - Well-typed definitions from the same module also work if the module is only
  partially well-typed!\n- Improve information order in the error messages given in
  LSP diagnostics (see [#104](https://github.com/rzk-lang/rzk/pull/104))\n\n## v0.6.1
  — 2023-09-24\n\nThis version contains a minor fix:\n\n- Catch exceptions in the
  parser, fixing LSP for files where layout resolver fails (see [#99](https://github.com/rzk-lang/rzk/pull/99)).\n\n##
  v0.6.0 — 2023-09-23\n\nThis version introduces a proper LSP server with basic support
  for incremental typechecking\nand some minor improvements:\n\n1. LSP server with
  incremental typechecking (see [#95](https://github.com/rzk-lang/rzk/pull/95));\n2.
  Improve error messages for unclosed `#section` and extra `#end` (see [#91](https://github.com/rzk-lang/rzk/pull/91)).\n\n##
  v0.5.7 — 2023-09-21\n\nThis version contains two fixes (see [#88](https://github.com/rzk-lang/rzk/pull/88))
  for issues discovered in [rzk-lang/sHoTT#30](https://github.com/rzk-lang/sHoTT/pull/30#issuecomment-1729212862):\n\n1.
  We now only generate well-typed LEM instances in the tope solver, speeding up significantly.\n2.
  We fix $\\eta$-rule for product cubes, to not get stopped by reflexive equality
  topes like $\\langle \\langle \\pi_1 (t_{12}), \\pi_2 (t_{12}) \\rangle, t_3 \\rangle
  \\equiv \\langle t_{12}, t_3 \\rangle$.\n\n## v0.5.6 — 2023-09-19\n\nThis version
  fixes the behavior of glob (see [`77b7cc0`](https://github.com/rzk-lang/rzk/commit/77b7cc0494fe0bfd1c9f1aa83db20f42cfda5794)).\n\n##
  v0.5.5 — 2023-09-19\n\nThis version contains Unicode and tope logic-related fixes:\n\n1.
  Fix (add missing checks) for subshapes (see [#85](https://github.com/rzk-lang/rzk/pull/85));\n2.
  Allow handling wildcards in `rzk` itself (see [#83](https://github.com/rzk-lang/rzk/pull/83));\n3.
  Fix Unicode on machines with non-standard locales (see [#82](https://github.com/rzk-lang/rzk/pull/82));\n4.
  Specify `happy` and `alex` as build tools to fix cabal build from Hackage (see [#80](https://github.com/rzk-lang/rzk/pull/80)).\n5.
  Add configuration for MkDocs plugin for Rzk (see [#79](https://github.com/rzk-lang/rzk/pull/79)).\n\n##
  v0.5.4 — 2023-08-19\n\nThis version contains minor improvements:\n\n1. Improve typechecking
  by trying an easier unification strategy first (see [#76](https://github.com/rzk-lang/rzk/pull/76));\n2.
  Update GitHub Action for Nix (see [#74](https://github.com/rzk-lang/rzk/pull/74)).\n\n##
  v0.5.3 — 2023-07-12\n\nThis version contains a few minor improvements:\n\n1. Allow
  patterns in dependent function types (see [#67](https://github.com/rzk-lang/rzk/pull/67));\n2.
  Hint about possible shape coercions (see [#67](https://github.com/rzk-lang/rzk/pull/67));\n3.
  Enable doctests (see [#68](https://github.com/rzk-lang/rzk/pull/68));\n4. Improve
  documentation (add recommended installation instructions via VS Code)\n5. Migrate
  from `fizruk` to `rzk-lang` organization on GitHub (see [`ee0d063`](https://github.com/rzk-lang/rzk/commit/ee0d0638283232c99003a83fdf41eb109ae78983));\n6.
  Speed up GHCJS build with Nix (see [#66](https://github.com/rzk-lang/rzk/pull/66));\n\n##
  v0.5.2 — 2023-07-05\n\nThis version introduces support for Unicode syntax, better
  recognition of Markdown code blocks and improves documentation a bit:\n\n- Support
  some Unicode syntax (see [#61](https://github.com/rzk-lang/rzk/pull/61));\n- Support
  curly braces syntax for code blocks (see [#64](https://github.com/rzk-lang/rzk/pull/64));\n-
  Update documentation a bit (see [07b520a6](https://github.com/rzk-lang/rzk/commit/07b520a67eb432105fad908202949c93a1639ca8)
  and [7cc7f383](https://github.com/rzk-lang/rzk/commit/7cc7f383b1785130277ed79d123c1dd357162d9d));\n-
  Factor out Pygments highlighting to https://github.com/rzk-lang/pygments-rzk;\n-
  Use new cache action for Nix (see [#60](https://github.com/rzk-lang/rzk/pull/60)).\n\n##
  v0.5.1 — 2023-06-29\n\nThis version fixes `Unit` type and makes some changes to
  documentation:\n\n- Fix computation for `Unit` (see [2f7d6295](https://github.com/rzk-lang/rzk/commit/2f7d6295));\n-
  Update documentation (see [ea2d176b](https://github.com/rzk-lang/rzk/commit/ea2d176b));\n-
  Use mike to deploy versioned docs (see [99cf721a](https://github.com/rzk-lang/rzk/commit/99cf721a));\n-
  Replace MkDocs hook with the published plugin (see [#58](https://github.com/rzk-lang/rzk/pull/58));\n-
  Switch to Material theme for MkDocs (see [#57](https://github.com/rzk-lang/rzk/pull/57));\n-
  Fix links to `*.rzk.md` in `mkdocs.yml` (see [8ba1c55b](https://github.com/rzk-lang/rzk/commit/8ba1c55b));\n\n##
  v0.5 — 2023-06-20\n\nThis version contains the following changes:\n\n- `Unit` type
  (with `unit` value) (see [ede02611](https://github.com/rzk-lang/rzk/commit/ede02611)
  and [bf9d6cd9](https://github.com/rzk-lang/rzk/commit/bf9d6cd9);\n- Add basic tokenizer
  support via `rzk tokenize` (see [#53](https://github.com/rzk-lang/rzk/pull/53));\n-
  Add location information for shadowing warnings and duplicate definition errors
  (see [bf9d6cd9](https://github.com/rzk-lang/rzk/commit/bf9d6cd9)).\n\n## v0.4.1
  — 2023-06-16\n\nThis is version contains minor changes, primarily in tools around
  rzk:\n\n- Add `rzk version` command (see [f1709dc7](https://github.com/rzk-lang/rzk/commit/f1709dc7));\n-
  Add action to release binaries (see [9286afae](https://github.com/rzk-lang/rzk/commit/9286afae));\n-
  Automate SVG rendering in MkDocs (see [#49](https://github.com/rzk-lang/rzk/pull/49));\n-
  Read `stdin` when no filepaths are given (see [936c15a3](https://github.com/rzk-lang/rzk/commit/936c15a3));\n-
  Add Pygments highlighting (see [01c2a017](https://github.com/rzk-lang/rzk/commit/01c2a017),
  [cbd656cc](https://github.com/rzk-lang/rzk/commit/cbd656cc), [5220ddf9](https://github.com/rzk-lang/rzk/commit/5220ddf9),
  [142ec003](https://github.com/rzk-lang/rzk/commit/142ec003), [5c7425f2](https://github.com/rzk-lang/rzk/commit/5c7425f2));\n-
  Update HighlightJS config for rzk v0.4.0 (see [171ee63f](https://github.com/rzk-lang/rzk/commit/171ee63f));\n\n##
  v0.4.0 — 2023-05-18\n\nThis version introduces sections and variables. The feature
  is similar to <a href=\"https://coq.inria.fr/refman/language/core/assumptions.html#coq:cmd.Variable\"
  target=\"_blank\">`Variable` command in Coq</a>. An important difference, however,
  is that `rzk` does not allow definitions to use variables implicitly and adds `uses
  (...)` annotations to ensure such dependencies are not accidental.\n\n- Variables
  and sections (Coq-style) (see [#38](https://github.com/rzk-lang/rzk/pull/38));\n\nMinor
  improvements:\n\n- Add flake, set up nix and cabal builds, cache nix store on CI
  (see [#39](https://github.com/rzk-lang/rzk/pull/39));\n- Apply stylish-haskell (see
  [7d42ef62](https://github.com/rzk-lang/rzk/commit/7d42ef62));\n\n## v0.3.0 — 2023-04-28\n\nThis
  version introduces an experimental feature for generating visualizations for simplicial
  terms in SVG.\nTo enable rendering, enable option `\"render\" = \"svg\"` (to disable,
  `\"render\" = \"none\"`):\n\n```rzk\n#set-option \"render\" = \"svg\"  -- enable
  rendering in SVG\n```\n\nMinor changes:\n\n- Exit with non-zero code upon a type
  error (see b135c4fb)\n- Fix external links and some typos in the documentation\n\nFixes:\n\n-
  Fixed an issue with tope solver when context was empty (see 6196af9e);\n- Fixed
  #33 (missing coherence check for restricted types).\n\n## v0.2.0 - 2023-04-20\n\nThis
  version was a complete rewrite of the proof assistant, using a new parser, a new
  internal representation, and a rewrite of the typechecking logic. This is still
  a prototype, but, arguably, significantly more stable and manageable than version
  0.1.0.\n\n### Language\n\nSyntax is almost entirely backwards compatible with version
  0.1.0.\nType checking has been fixed and improved.\n\n#### Breaking Changes\n\nThe
  only known breaking changes are:\n\n1. Terms like `second x y` which previous have
  been parsed as `second (x y)`\n   now are properly parsed as `(second x) y`.\n2.
  It is now necessary to have at least a minimal indentation in the definition of
  a term after a newline.\n3. Unicode syntax is temporarily disabled, except for dependent
  sums and arrows in function types.\n4. The restriction syntax `[ ... ]` now has
  a slightly different precedence, so some parentheses are required, e.g. in `(A ->
  B) [ phi |-> f]` or `(f t = g t) [ phi |-> f]`.\n5. Duplicate top-level definitions
  are no longer allowed.\n\n#### Deprecated Syntax\n\nThe angle brackets for extension
  types are supported, but deprecated,\nas they are completely unnecessary now: `<{t
  : I | psi t} -> A t [ phi t |-> a t ]>` can now be written as `{t : I | psi t} ->
  A t [ phi t |-> a t]`\nor even `(t : psi) -> A t [ phi t |-> a t ]`.\n\n#### Syntax
  Relaxation\n\nOtherwise, syntax is now made more flexible:\n\n1. Function parameters
  can be unnamed: `A -> B` is the same as `(_ : A) -> B`.\n2. Angle brackets are now
  optional: `{t : I | psi t} -> A t [ phi t |-> a t ]`\n3. Nullary extension types
  are possible: `A t [ phi t |-> a t ]`\n4. Lambda abstractions can introduce multiple
  arguments:\n\n   ```rzk\n   #def hom : (A : U) -> A -> A -> U\n     := \\A x y ->\n
  \      (t : Δ¹) -> A [ ∂Δ¹ t |-> recOR(t === 0_2, t === 1_2, x, y) ]\n   ```\n\n5.
  Parameters can be introduced simultaneously for the type and body. Moreover, multiple
  parameters can be introduced with the same type:\n\n   ```rzk\n   #def hom (A :
  U) (x y : A) : U\n     := (t : Δ¹) -> A [ ∂Δ¹ t |-> recOR(t === 0_2, t === 1_2,
  x, y) ]\n   ```\n\n6. Restrictions can now support multiple subshapes, effectively
  internalizing `recOR`:\n\n   ```rzk\n   #def hom (A : U) (x y : A) : U\n     :=
  (t : Δ¹) -> A [ t === 0_2 |-> x, t === 1_2 |-> y ]\n   ```\n\n7. There are now 3
  syntactic versions of `refl` with different amount of explicit annotations:\n   `refl`,
  `refl_{x}` and `refl_{x : A}`\n\n8. There are now 2 syntactic versions of identity
  types (`=`): `x = y` and `x =_{A} y`.\n\n9. `recOR` now supports alternative syntax
  with an arbitrary number of subshapes:\n   `recOR( tope1 |-> term1, tope2 |-> term2,
  ..., topeN |-> termN )`\n\n10. Now it is possible to have type ascriptions: `t as
  T`. This can help with ensuring types of subexpressions in parts of formalizations,
  or to upcast types.\n\n11. New (better) commands are now supported:\n    1. `#define
  <name> (<param>)* : <type> := <term>` — same as `#def`, but with full spelling of
  the word\n    2. `#postulate <name> (<param>)* : <type>` — postulate an axiom\n
  \   3. `#check <term> : <type>` — typecheck an expression against a given type\n
  \   4. `#compute-whnf <term>` — compute (WHNF) of a term\n    5. `#compute-nf <term>`
  — compute normal form of a term\n    6. `#compute <term>` — alias for `#compute-whnf`\n
  \   7. `#set-option <option> = <value>` — set a (typechecker) option:\n       -
  `#set-option \"verbosity\" = \"silent\"` — no log printing\n       - `#set-option
  \"verbosity\" = \"normal\"` — log typechecking progress\n       - `#set-option \"verbosity\"
  = \"debug\"` — log every intermediate action\n         (may be useful to debug when
  some definition does not typecheck)\n\n    8. `#unset-option <option>` — revert
  option's value to its default\n\n#### Simple Shape Coercions\n\nIn some places,
  shapes (cube indexed tope families) can be used directly:\n\n1. In function parameters:
  `(Λ -> A) -> (Δ² -> A)` is the same as `({(t, s) : 2 * 2 | Λ (t, s)} -> A) -> ({(t,
  s) : 2 * 2 | Δ²} -> A)`\n\n2. In parameter types of lambda abstractions: `\\((t,
  s) : Δ²) -> ...` is the same as `\\{(t, s) : 2 * 2 | Δ² (t, s)} -> ...`\n\n####
  Better Type Inference\n\n1. It is now not required to annotate point variables with
  tope restrictions, the typechecker is finally smart enough to figure them out from
  the context.\n\n2. It is now possible to simply write `refl` in most situations.\n\n3.
  It is now possible to omit the index type in an identity type: `x = y`\n\n### Better
  output and error message\n\nThe output and error messages have been slightly improved,
  but not in a major way.\n\n### Internal representation\n\nA new internal representation
  (a version of second-order abstract syntax)\nallows stopping worrying about name
  captures in substitutions,\nso the implementation is much more trustworthy.\nThe
  new representation will also allow bringing in higher-order unification in the future,
  for better type inference, matching, etc.\n\nNew representation also allowed annotating
  each (sub)term with its type to avoid recomputations and some other minor speedups.
  There are still some performance issues, which need to be debugged, but overall
  it is much faster than version 0.1.0 already.\n"
