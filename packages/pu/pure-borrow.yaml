changelog: |
  # Revision history for pure-borrow

  ## 0.0.0.0 -- 2026-05-05

  This is the first release on Hackage :tada:
  Please refer to our paper for details.
  Besides the parts covered by the paper, we are providing the following experimental features:

  - Bulk borrows by `Borrows` heterogeneous list.
  - `Reborrowable` type class for abstraction over reborrowable borrow-like objects.
  - Looping structure.
  - Record splitting.
changelog-type: markdown
description: "# pure-borrow: Pure realization of Rust-style borrows in Linear Haskell\n\nThis
  is `pure-borrow`, a library that realizes Rust-style borrows in Linear\nHaskell
  in a pure manner.\nSee the haddock or publication below for the more information.\n\n##
  Supported GHC Versions\n\nWe support GHC 9.10.2+, but we recommend GHC 9.12.4+,
  due to subtle compiler bug in older GHC.\n\n## Known Issues\n\nDue to the bug of
  linear types in GHC <9.12.3, some program segfaults when evaluated in *interpreter*
  with older GHCs (see https://gitlab.haskell.org/ghc/ghc/-/issues/26565#note_645783).\nCompiled
  programs just work as expected with GHC 9.10.2+, so this issue will only affect
  you are trying to use GHCi or Eval Plugin of Haskell Language Server.\nIf you want
  to use interpreters, \nuse GHC 9.12.3+.\n\n## Publication(s)\n\n- Y. Matsushita
  and H. Ishii, *Pure Borrow: Linear Haskell Meets Rust-Style Borrowing*, 2026. \n
  \ To appear in: PLDI 2026. Boulder, Colorado, USA, June 15-19. DOI: [10.1145/3808259](https://doi.org/10.1145/3808259).
  Extended Version: [arxiv:2604.15290](https://arxiv.org/abs/2604.15290).\n- Y. Matsushita
  and H. Ishii, *Artifact for PLDI 2026 \"Pure Borrow: Linear Haskell Meets Rust-Style
  Borrowing\"*, 2026. Zenodo: https://zenodo.org/records/19622061.\n"
