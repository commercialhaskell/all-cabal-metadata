description: "# Generic Glean LSP Server\n\n`glean-lsp` is a generic LSP server that
  provides a minimal set of LSP\nfeatures using Glean data. A Glean-based LSP is particularly
  suited\nfor navigating very large codebases, where it wouldn't be practical to\nuse
  a traditional language service that parses all the source files on\nthe fly.\n\nThe
  Glean LSP server works for any language supported by Glean and\nGlass, and currently
  provides the following LSP features:\n\n* Go to Definition\n* Go to References\n*
  Type on Hover\n* Outline\n* Symbol Search\n\nMore features may be added in the future.\n\nThe
  LSP server is purely static, in that it will not re-index the\nsource files if they
  are edited. To update the Glean data, currently\nyou have to manually re-run the
  indexer yourself. This can be done\nwithout restarting VS Code or the LSP server,
  though.\n\n## Building & installing\n\n`cabal install glean-lsp`\n\n## Using it
  with VS Code\n\nFirst index your source code into a Glean DB. This will be something
  like\n\n```\ncd SRC\nglean index LANGUAGE --db-root GLEANDB --db NAME/HASH .\n```\n\nwhere\n\n*
  `SRC` is the directory containing your source code\n* `LANGUAGE` is the language
  you want to index, see the [Glean manual](https://glean.software/docs/indexer/intro/)
  for available languages\n* `GLEANDB` is where you want to store your DBs\n* `NAME'
  is the name for the DB, and `HASH` can just be 0 or you could\n  use the git hash
  of the repository if you want to index multiple\n  versions of the code.\n\nSee
  the [Glean manual](https://glean.software/docs/indexer/intro/) for any language-specific
  options that you might need.\n\nTo use this LSP server with VS Code you need a generic
  LSP client such\nas [Generic LSP Client (v2)](https://github.com/zsol/vscode-glspc).
  Using that client,\nadd the following to `.vscode/settings.json`\n\n\n```\n[\n    \"glean-lsp\":
  {\n        \"repo\": \"NAME\"\n    },\n    \"glspc.server.command\": \"GLEAN-LSP\"\n
  \   \"glspc.server.commandArguments\": [\"--db-root\", \"GLEANDB\"],\n    \"glspc.server.languageId\":
  [\n      \"LANGUAGE-ID\"\n    ]\n}\n```\n\nwhere\n\n* `GLEAN-LSP` is the path to
  the `glean-lsp` binary, which might be somethihng like `$HOME/.cabal/bin/glean-lsp`
  if you installed it with `cabal install glean-lsp`.\n* `GLEANDB` is the path to
  your Glean DBs (same as when running the indexer above).\n* `NAME` is the name of
  the Glean DB you want to use. Don't add\n  `HASH` here, `glean-lsp` will always
  use the most recent version of\n  the DB.\n* `LANGUAGE-ID` is the language you want
  to enable this extension\n  for. Make sure you also disable any other extensions
  you have for\n  the same language, you can do that locally for this workspace in
  VS Code.\n\nNow if you open this workspace in VS Code and open one of the source\nfiles
  that was indexed, you should have go-to-definition and the other\nfeatures available.\n\n##
  Example: browse the React codebase with Glean\n\nClone a copy of React:\n\n```\n$
  git clone --depth 1 https://github.com/facebook/react.git\n$ cd react\n```\n\nStart
  a Glean server:\n\n```\n$ glean-server --db-root .glean --port 1234 &\n```\n\nIf
  you don't have `Flow` installed:\n\n```\n$ sudo npm install -g flow-bin\n```\n\nIndex
  the code into a DB called `react/0`:\n\n```\n$ grep -v '^%' scripts/flow/config/flowconfig
  >.flowconfig\n$ glean index flow . --write-root \"\" --service localhost:1234 --db
  react/0\n```\n\nPut the following into `/tmp/react/.vscode/settings`:\n\n```\n{\n
  \   \"glean-lsp\": {\n        \"repo\": \"react\"\n    },\n    \"glspc.server.command\":
  \"glean-lsp\",\n    \"glspc.server.commandArguments\": [\"--service\", \"localhost:1234\"],\n
  \   \"glspc.server.languageId\": [\n      \"typescript\", \"javascript\"\n    ]\n}\n```\n\nStart
  VS Code, and open the folder `react` that you cloned. You\nprobably want to disable
  the built-in TypeScript extensions to avoid\nconflicts: `Ctrl-Shift-X` and filter
  on built-in extensions (Show\nBuilt-in Extensions in the `...` dropdown), then disable
  the\nextensions for TypeScript for this workspace only.\n\nNow open a `.js` file,
  and you should have navigation features\nprovided by `glean-lsp`: try right-click
  and \"Go to Definition\" or \"Go\nto References\". Check that the Outline view is
  populated. Try symbol\nsearch with `Ctrl-T`.\n\n## Troubleshooting\n\nIn the \"Output\"
  pane, select the output for the LSP client in the\ndropdown on the right to see
  the debugging output.\n\nA common problem is the file paths not matching up, which
  will result\nin the LSP server starting up and appearing to be working, but\ngo-to-definition
  just doesn't work. Make sure that in the Glean DB the\nfile paths are all relative
  to the root of the workspace. To check\nthis you can open the DB in the shell and
  query for `src.File _`. For\nexample when I look at my DB `stackage/1` which contains
  all the\nHaskell packages in Stackage:\n\n```\n$ glean shell --db-root ~/gleandb
  --db stackage/1\nGlean Shell, built on 2025-07-14 13:39:35.711312749 UTC, from rev
  <unknown>\nUsing local DBs from rocksdb:/home/simon/gleandb\ntype :help for help.\nstackage>
  :limit 5\nstackage> src.File _\n{ \"id\": 66477, \"key\": \"AC-Angle-1.0/Data/Angle.hs\"
  }\n{ \"id\": 19929124, \"key\": \"ANum-0.2.0.2/src/Data/ANum.hs\" }\n{ \"id\": 7772678,
  \"key\": \"Agda-2.6.4/src/full/Agda/Auto/Auto.hs\" }\n{ \"id\": 15530734, \"key\":
  \"Agda-2.6.4/src/full/Agda/Auto/CaseSplit.hs\" }\n{ \"id\": 11442673, \"key\": \"Agda-2.6.4/src/full/Agda/Auto/Convert.hs\"
  }\n\n5 results, 5 facts, 151.82ms, 208003368 bytes, 584 compiled bytes\nresults
  truncated (current limit 5, use :limit <n> to change it)\nUse :more to see more
  results\nstackage> \n```\n\nCheck that the paths look reasonable. If not, you may
  need to use\nlanguage-specific options to get the indexer to generate the right\npaths.\n\nIf
  the paths look OK, things should work to the extent that support\nfor the language
  is implemented in Glean's `codemarkup` layer and the\nGlass server. Some languages
  might be missing certain features, but\nthe basics should work for most languages.
  If you're still having\ntrouble try raising an issue on the [Glean issue\ntracker](https://github.com/facebookincubator/Glean/issues)
  or asking\non Discord, details of which are in Glean's\n[README](https://github.com/facebookincubator/Glean/blob/main/README.md).\n"
