changelog: "## v1.1.1 - *16 Jul, 2026*\n\n### Changed:\n- `defaultTranslator` now
  has a `BitPack` constraint instead of `Waveform`.\n  [#135](https://github.com/clash-lang/clash-shockwaves/issues/135)\n\n###
  Fixed:\n- Fixed a bug that caused the Surfer plugin to reject metadata files including
  signed integer translators.\n  [#142](https://github.com/clash-lang/clash-shockwaves/issues/142)\n\n##
  v1.1.0 - *08 Jun, 2026*\n\n### Consistency changes:\nShockwaves 1.1 includes a number
  of changes to make the library more internally consistent.\nThis mostly includes
  a number of renamed functions.\n\n### Static LUTs:\nSometimes, you want the flexibility
  of a LUT,\nbut translating all values of a type is rather inefficient.\nYou can
  now create _static LUTs_, where you define the entire LUT yourself,\nrather than
  building it up by translating values that pop up in simulation.\n\nPlease see the
  updated [HOWTO guide on using LUTs](docs/howto/LUTS.md) for more information!\n[#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n\n###
  Modifying the default translator:\nIt was already possible to set styles, but more
  advanced deviations from the default\nrequired a completely custom implementation.\nShockwaves
  1.1 introduces functions for obtaining the default translators for types,\nas well
  as several function for modifying these, by adding constructor styles and\ninheriting
  styles (both of which are used by default), but also renaming fields\nand compacting
  the subsignal structure. See [the new HOWTO guide](docs/howto/DEFAULT.md).\n[#50](https://github.com/clash-lang/clash-shockwaves/issues/50)\n\n###
  More BitPart options:\nWith the new `BitPart` options, the `ChangeBits` translator
  has become a lot more\npowerful. Beyond simply reordering bits, it is now possible
  to perform various operations\non bits. See [the updated documentation](docs/howto/ADVANCED.md)
  for more.\n[#54](https://github.com/clash-lang/clash-shockwaves/issues/54)\n\n###
  Surfer protection:\nThe Surfer translator extension now verifies the Shockwaves
  translators it's served.\n\nPreviously, incorrect custom `Waveform` instances could
  crash the extension,\ntaking Surfer down with it.\nThe new verification step checks
  for any major issues that would crash Surfer,\nreplacing any truly problematic translators,
  and also warns of (probably) incorrect\nconstructions such as translators that request
  more bits than they actually use.\n\nFor performance reasons, lookup tables are
  not checked, and values not matching the\nreported structure might still cause crashes.\n[#33](https://github.com/clash-lang/clash-shockwaves/issues/33)\n\n###
  Added:\n- `WaveformLUT` now has a method `staticL`.\n  This method can be overwritten
  to define a static LUT,\n  (which renders `translateL` and `structureL` obsolete).\n
  \ [#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n\n- `defaultTranslator`
  returns the unstyled translator that is used when deriving `Waveform`.\n  [#50](https://github.com/clash-lang/clash-shockwaves/issues/50)\n-
  `withConstructorStyles` applies a list of styles to the constructors of a translator.\n
  \ [#124](https://github.com/clash-lang/clash-shockwaves/issues/124)\n- `inheritSingleFieldStyle`
  applies the `Inherit 0` style to product translators with only one field.\n  [#124](https://github.com/clash-lang/clash-shockwaves/issues/124)\n-
  `noConstructorSubsignals` removes the constructor subsignals from a default translator.\n
  \ The resulting structure is like that of `Maybe` and `Bool`.\n  [#50](https://github.com/clash-lang/clash-shockwaves/issues/50)\n-
  `renameFields` can be used to rename the fields of a product type.\n  [#50](https://github.com/clash-lang/clash-shockwaves/issues/50)\n\n-
  `Bits` instance for `BitList`.\n  [#114](https://github.com/clash-lang/clash-shockwaves/issues/114)\n-
  `BitList.length` returns a `BitList`'s length.\n  [#114](https://github.com/clash-lang/clash-shockwaves/issues/114)\n-
  `BitList.hasUndefined` returns whether a `BitList` has any undefined bits.\n  [#114](https://github.com/clash-lang/clash-shockwaves/issues/114)\n\n-
  New `BitPart` options: (`BP`)`HasUndefined`, `Reverse`, `Invert`, `And`, `Or`, `Xor`,
  `OneHot`, `NHot` and `If`.\n  [#54](https://github.com/clash-lang/clash-shockwaves/issues/54)\n-
  Added the configuration option `override_number_format` to the Surfer extension,
  which lets you set the format of all numbers.\n  [#115](https://github.com/clash-lang/clash-shockwaves/issues/115)\n\n-
  `bitSize` returns the number of bits based on the `BitSize` class.\n- `defaultTypeName`
  derives a unique name automatically for a type.\n  The name consists of the simple
  type name plus a hash to prevent name collisions.\n  [#111](https://github.com/clash-lang/clash-shockwaves/issues/111)\n-
  `pprintT` prints a translator's structure, and can be used for debugging purposes
  when creating custom translators.\n\n\n### Changes:\n- `TLut` now has a field for
  the optional static LUT.\n  [#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n-
  `tLut` has been renamed to `tGeneratedLut`, and `tStaticLut` has been added.\n  A
  new `tLut` function switches between the two.\n  [#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n-
  `hasLut` has been renamed to `hasGeneratedLut`.\n  [#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n\n-
  Renamed `BitList.binPack` and `BitList.binUnpack` to `BitList.pack` and `BitList.unpack`.\n
  \ [#114](https://github.com/clash-lang/clash-shockwaves/issues/114)\n\n- The functions
  `tRef`, `tLut` (and the new `tStaticLut` and `tGeneratedLut`) no longer take proxy
  arguments.\n  [#111](https://github.com/clash-lang/clash-shockwaves/issues/111)\n\n-
  Swapped the order of the `TChangeBits` constructor fields to be easier to use without
  record syntax.\n\n- `Bit` now uses a static LUT. It is displayed as `0`/`1`/`x`,
  and styles can be\n  controlled through style variables `bit_low` and `bit_high`.\n
  \ [#92](https://github.com/clash-lang/clash-shockwaves/issues/92)\n- `BitVector`
  now contains subsignals for all bits.\n  The toplevel value is still generated by
  a number translator, and as such, may be modified through config files.\n  [#48](https://github.com/clash-lang/clash-shockwaves/issues/48)\n\n-
  Renamed `safeVal` and `safeValOr` to `safeNF` and `safeNFOr`.\n  `safeNF` now returns
  a `Maybe` value instead of an `Either` holding a potential error message.\n  [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n-
  Renamed both `WaveformForLUT` and its constructor `WfLut` to `WaveformForLut`.\n
  \ [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n- Renamed `WfNum`
  to `WaveformForNumber`.\n  [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n-
  Rename `styles` in `Waveform` to `constructorStyles`.\n  [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n-
  Renamed `rFromVal` to `defaultRender`.\n  [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n\n-
  To prevent issues, the translators specified for types must consume the same number
  of bits\n  as are used to represent the data (as specified by `BitSize`).\n  `tRef`
  now includes a check for this,\n  which prevents types with incorrect widths both
  from being referenced and used directly.\n  [#126](https://github.com/clash-lang/clash-shockwaves/issues/126)\n\n\n\n###
  Fixes:\n- VCD files generated by Shockwaves now contain both the Clash and Shockwaves
  version,\n  which was previously not properly implemented yet.\n  [#37](https://github.com/clash-lang/clash-shockwaves/issues/37)\n\n###
  Deprecated:\n- `width` has been deprecated from the `Waveform` class.\n  Instead,
  use `bitSize`.\n\n### Removed:\n- Removed `tFromVal`.\n  [#112](https://github.com/clash-lang/clash-shockwaves/issues/112)\n\n##
  v1.0.1 - *11 May, 2026*\n\nShockwaves now supports Clash 1.10!\n\n## v1.0.0 - *07
  Apr, 2026*\n\nThe first official full release!\n\nSince the 0.0 release, a lot of
  things have been changed and fixed.\nFurthermore, many changes were made behind
  the scenes to make the project more maintainable.\nThe system is now fully usable
  with no (known) bugs,\nbut more features and improvements are already on their way!\n\n###
  Added:\n- Added several options for rendering numbers.\n  [#52](https://github.com/clash-lang/clash-shockwaves/issues/52)\n
  \ [#49](https://github.com/clash-lang/clash-shockwaves/issues/49)\n  [#62](https://github.com/clash-lang/clash-shockwaves/issues/62)\n-
  Added HOWTO guides on using the advanced translators (advance sum/product, bitchange)\n
  \ and precedence values, as well as notes on differences between translations in
  Haskell\n  and Surfer.\n  [#51](https://github.com/clash-lang/clash-shockwaves/issues/51)\n
  \ [#59](https://github.com/clash-lang/clash-shockwaves/issues/59)\n  [#45](https://github.com/clash-lang/clash-shockwaves/issues/45)\n-
  Linked the HOWTO guides on GitHub in the Haddock documentation.\n- A permanent downloads
  of the Surfer extension is now available on the GitHub release page.\n\n### Changed:\n-
  Renamed the `shockwaves` library to `clash-shockwaves`, and `surfer_shockwaves`
  to `surfer-shockwaves` to match.\n  [#70](https://github.com/clash-lang/clash-shockwaves/issues/70)\n-
  Adding a config file is now part of the setup guide too.\n  The provided config
  file has some good defaults, and immediately improve the user experience\n  without
  the need to actually go into the configuration options.\n- Made the unknown style
  var log message a less alarming warning.\n  After all, having missing style variables
  is expected.\n  [#73](https://github.com/clash-lang/clash-shockwaves/issues/73)\n-
  Changed the `BitPart` `BPSlice` option to slice from a different `BitPart`'s output
  instead of the input,\n  and added `BPIn` to refer to the input.\n  Part of [#54](https://github.com/clash-lang/clash-shockwaves/issues/54)\n-
  The clock, reset and enable signals are now visible in their non-alarming states\n
  \ (reset deasserted, enable on). The default config makes these less obtrusive.\n
  \ [#78](https://github.com/clash-lang/clash-shockwaves/issues/78)\n- The source
  code is now formatted using Fourmolu.\n\n### Fixed:\n- When (advanced) sum translators
  have multiple translators that generate subsignals with the same name,\n  these
  are now merged recursively, instead of being added separately.\n  [#36](https://github.com/clash-lang/clash-shockwaves/issues/36)\n-
  Replaced several instances of `unknown` with `undefined`.\n  [#47](https://github.com/clash-lang/clash-shockwaves/issues/47)\n-
  `CLASH_OPAQUE` annotations have been replaced with `OPAQUE`.\n  [#72](https://github.com/clash-lang/clash-shockwaves/issues/72)\n-
  Made the code compatible with the stack LTS-23.28 resolver (GHC 9.8.4).\n\n## v0.0.1hd
  - *04 Mar, 2026*\n\n### Added:\n- Added proper links and instructions for adding
  dependencies to the setup HOWTO guide.\n  [#41](https://github.com/clash-lang/clash-shockwaves/issues/41)\n
  \ \n\n### Changed:\n- Loosened clash version constraints to allow versions 1.8.2
  and 1.8.3.\n  [#40](https://github.com/clash-lang/clash-shockwaves/issues/40)\n\n###
  Fixed:\n- After renaming `traceMap#` to `maps#`, an annotation was left; this has
  been fixed.\n  [#39](https://github.com/clash-lang/clash-shockwaves/issues/39)\n-
  `Maybe` accidentally used style variable `$maybe_just` instead of `maybe_just`.\n
  \ [#38](https://github.com/clash-lang/clash-shockwaves/issues/38)\n\n## v0.0.0hsd
  - *04 Mar, 2026*\n\nInitial release.\n"
changelog-type: markdown
description: |
  # Shockwaves Haskell Library

  This is the Haskell library for Shockwaves, a typed waveform solution designed for Clash.

  The basic concept of the library is that for all types for which signals exist in simulation,
  the `Waveform` class is implemented. This class provides all the functionality needed to provide
  metadata about types when simulating. This metadata is stored separately, and can be used
  by the waveform viewer to reconstruct a typed representation in the waveform viewer.

  By default, `Waveform` uses `Generics` to derive a waveform viewer representation similar
  to `Show`. Types with multiple constructors and constructors with fields get subsignals.

  The `Waveform` class can of course be customized. This allows for more advanced control over
  the way data is represented in the waveform viewer. Particularly, through `WaveformLUT`,
  translations can be implemented as lookup tables, allowing for arbitrary code execution
  in Haskell to create whatever data is desired.

  The library includes a modified version of `Clash.Signal.Trace` that uses `Waveform` to
  generate metadata.



  ## Default behaviour

  The default implementations of Waveform make several "clever" choices in how to display values.

  For types with multiple constructors and fields, subsignals are created per constructor,
  and for each constructor, subsignals are created for each of its fields.
  Constructor subsignals are labeled with the name of the constructor,
  and field subsignals with the field names.
  If there are no field names, the subsignals are numbered instead.
  The value displayed at the toplevel is the same as that of the current constructor.

  If a type has only one constructor, there is no need for subsignals for the constructor.
  Instead, the subsignals for the fields added to the toplevel signal directly.

  If a constructor has exactly one field, it will by default copy the style of the contained value.

  If a constructor is an operator and has exactly two fields, the constructor will be rendered as
  and infix. The operator precedence is used to appropriately add parentheses in nested values.
  If an operator constructor has a different number of fields, it is parenthesized and used as normal.

  Values are always rendered according to the information actually stored in the binary representation.
  This means the system will render both `(undefined,undefined)` and `undefined` as `(undefined,undefined)`:
  since there is only one constructor, the value can only be that constructor, and this is known
  regardless of whether the value was actually `undefined` during code execution or not.
  The translation functions provided in the library, which are meant for creating LUT-based translations,
  mimic this behaviour.

  Shockwaves has several waveform styles, some of which are special.
  If a translation has the `WSError` style, this is propagated through all signals above.
  This style is used for undefined values.
  `WSWarn` is displayed in the same manner, but not propagated.



  # Quick start

  This sections contains instructions for some common uses of Shockwaves.
  See also the [HOWTO guides](https://github.com/clash-lang/clash-shockwaves/tree/main/docs/howto/README.md).

  ## Trace signals

  Shockwaves has the same functions as `Clash.Signal.Trace`, with only minor changes:

  ```hs
  import qualified Clash.Shockwaves.Trace as T

  mainCounter :: ... -> Signal System Bool
  mainCounter = ... (T.trace "counter" counter) ...

  main :: IO ()
  main = do
    let cntrOut = exposeClockResetEnable mainCounter systemClockGen systemResetGen enableGen
    vcd <- T.dumpVCD (0, 100) cntrOut ["counter"]
    case vcd of
      Left msg ->
        error msg
      Right (contents,meta) -> do
        writeFile     "mainCounter.vcd"  contents
        writeFileJSON "mainCounter.json" meta

  ```

  ## Derive Waveform

  The easiest way to use Shockwaves is to simply derive the `Waveform` class for all types
  that appear in the output. This requires `Generic` and `Typeable` to also be derived.

  ```hs
  data MyData = A Int | B Bool
    deriving (Generic,Typeable,Waveform,NFDataX,BitPack)
  ```

  ## Adding coloured constructors

  It might be useful to mark the different constructors of a type using various colors.
  To do this, one simply needs to do a custom implementation of Waveform where `constructorStyles`
  is overwritten with a list of waveform styles, in the order that the constructors appear.

  ```hs
  {-# LANGUAGE OVerloadedStrings #-}

  instance Waveform MyData where
    constructorStyles = ["#0fc", WSWarn]
  ```

  ## Custom Waveform instances

  It is possible to customize the `Waveform` instances.
  For this, please see the [HOWTO guides](https://github.com/clash-lang/clash-shockwaves/tree/main/docs/howto/README.md).
