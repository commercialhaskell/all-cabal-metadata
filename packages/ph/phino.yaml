description: "<!--\nSPDX-FileCopyrightText: Copyright (c) 2025 Objectionary.com\nSPDX-License-Identifier:
  MIT\n-->\n\n# Command-Line Manipulator of \U0001D711-Calculus Expressions\n\n[![DevOps
  By Rultor.com](https://www.rultor.com/b/objectionary/phino)](https://www.rultor.com/p/objectionary/phino)\n\n[![`phino`
  on Hackage](https://img.shields.io/hackage/v/phino)](http://hackage.haskell.org/package/phino)\n[![cabal-linux](https://github.com/objectionary/phino/actions/workflows/cabal.yml/badge.svg)](https://github.com/objectionary/phino/actions/workflows/cabal.yml)\n[![stack-linux](https://github.com/objectionary/phino/actions/workflows/stack.yml/badge.svg)](https://github.com/objectionary/phino/actions/workflows/stack.yml)\n[![codecov](https://codecov.io/gh/objectionary/phino/branch/master/graph/badge.svg)](https://app.codecov.io/gh/objectionary/phino)\n[![Haddock](https://img.shields.io/badge/docs-Haddock-blue.svg)](https://objectionary.github.io/phino/)\n[![License](https://img.shields.io/badge/license-MIT-green.svg)](LICENSES/MIT.txt)\n[![Hits-of-Code](https://hitsofcode.com/github/objectionary/phino?branch=master&label=Hits-of-Code)](https://hitsofcode.com/github/objectionary/phino/view?branch=master&label=Hits-of-Code)\n[![PDD
  status](https://www.0pdd.com/svg?name=objectionary/phino)](https://www.0pdd.com/p?name=objectionary/phino)\n\nThis
  is a command-line normalizer, rewriter, and dataizer\nof [\U0001D711-calculus](https://www.eolang.org)
  expressions.\n\nFirst, you write a simple [\U0001D711-calculus](https://www.eolang.org)
  program\nin the `hello.phi` file:\n\n```text\nΦ ↦ ⟦ φ ↦ ⟦ Δ ⤍ 68-65-6C-6C-6F ⟧,
  t ↦ ξ.k, k ↦ ⟦⟧ ⟧\n```\n\n## Installation\n\nThen you can install `phino` in two
  ways:\n\nInstall [Cabal][cabal] first and then:\n\n```bash\ncabal update\ncabal
  install --overwrite-policy=always phino-0.0.95\nphino --version\n```\n\nOr download
  binary from the internet using [curl](https://curl.se/) or\n[wget](https://en.wikipedia.org/wiki/Wget):\n\n```bash\nsudo
  curl -o /usr/local/bin/phino http://phino.objectionary.com/releases/macos-15/phino-latest\nsudo
  chmod +x /usr/local/bin/phino\nphino --version\n```\n\nDownload paths are:\n\n*
  Ubuntu 22.04: <http://phino.objectionary.com/releases/ubuntu-22.04/phino-latest>\n*
  Ubuntu 24.04: <http://phino.objectionary.com/releases/ubuntu-24.04/phino-latest>\n*
  MacOS (ARM): <http://phino.objectionary.com/releases/macos-15/phino-latest>\n* MacOS
  (Intel): <http://phino.objectionary.com/releases/macos-14-large/phino-latest>\n*
  Windows: <http://phino.objectionary.com/releases/windows-2022/phino-latest.exe>\n\n##
  Build\n\nTo build `phino` from source, clone this repository:\n\n```bash\ngit clone
  git@github.com:objectionary/phino.git\ncd phino\n```\n\nThen, run the following
  command (ensure you have [Cabal][cabal] installed):\n\n```bash\ncabal build all\n```\n\nNext,
  run this command to install `phino` system-wide:\n\n```bash\nsudo cp \"$(cabal list-bin
  phino)\" /usr/local/bin/phino\n```\n\nVerify that `phino` is installed correctly:\n\n```bash\n$
  phino --version\n0.0.0\n```\n\nYou can ensure scripts are run with a specific version
  of `phino` using\nthe `--pin` global option. It exits with an error when the version
  supplied\ndoesn't match the installed one:\n\n```bash\nphino --pin=0.0.0.67 dataize
  hello.phi\n```\n\n## Dataize\n\nThen, you dataize the program:\n\n```bash\n$ phino
  dataize hello.phi\n68-65-6C-6C-6F\n```\n\n## Rewrite\n\nYou can rewrite this expression
  with the help of [rules](#rule-structure)\ndefined in the `my-rule.yml` YAML file
  (here, the `!d` is a capturing group,\nsimilar to regular expressions):\n\n```yaml\nname:
  My custom rule\npattern: Δ ⤍ !d\nresult: Δ ⤍ 62-79-65\n```\n\nThen, rewrite:\n\n```bash\n$
  phino rewrite --rule=my-rule.yml hello.phi\nΦ ↦ ⟦ φ ↦ ⟦ Δ ⤍ 62-79-65 ⟧, t ↦ ξ.k,
  k ↦ ⟦⟧ ⟧\n```\n\nIf you want to use many rules, just use `--rule` as many times
  as you need:\n\n```bash\nphino rewrite --rule=rule1.yaml --rule=rule2.yaml ...\n```\n\nYou
  can also use [built-in rules](resources), which are designed\nto normalize expressions:\n\n```bash\nphino
  rewrite --normalize hello.phi\n```\n\nIf no input file is provided, the \U0001D711-expression
  is taken from `stdin`:\n\n```bash\n$ echo 'Φ ↦ ⟦ φ ↦ ⟦ Δ ⤍ 68-65-6C-6C-6F ⟧ ⟧' |
  phino rewrite --rule=my-rule.yml\nΦ ↦ ⟦ φ ↦ ⟦ Δ ⤍ 62-79-65 ⟧ ⟧\n```\n\nYou're able
  to pass [`XMIR`][xmir] as input. Use `--input=xmir` and `phino`\nwill parse given
  `XMIR` from file or `stdin` and convert it to `phi` AST.\n\n```bash\nphino rewrite
  --rule=my-rule.yaml --input=xmir file.xmir\n```\n\nAlso `phino` supports \U0001D711-expressions
  in\n[ASCII](https://en.wikipedia.org/wiki/ASCII) format and with\nsyntax sugar.
  The `rewrite` command also allows you to desugar the expression\nand print it in
  canonical syntax:\n\n```bash\n$ echo 'Q -> [[ @ -> Q.io.stdout(\"hello\") ]]' |
  phino rewrite\nΦ ↦ ⟦\n  φ ↦ Φ.io.stdout(\n    α0 ↦ Φ.string(\n      α0 ↦ Φ.bytes(\n
  \       α0 ↦ ⟦ Δ ⤍ 68-65-6C-6C-6F ⟧\n      )\n    )\n  )\n⟧\n```\n\n## Merge\n\nYou
  can merge several \U0001D711-programs into a single one by merging their\ntop level
  formations:\n\n```bash\n$ cat bytes.phi\n{⟦ bytes(data) ↦ ⟦ φ ↦ data ⟧ ⟧}\n$ cat
  number.phi\n{⟦\n  number(as-bytes) ↦ ⟦\n    φ ↦ as-bytes,\n    plus(x) ↦ ⟦ λ ⤍ L_number_plus
  ⟧\n  ⟧\n⟧}\n$ cat minus.phi\n{⟦ number ↦ ⟦ minus(x) ↦ ⟦ λ ⤍ L_number_minus ⟧ ⟧ ⟧}\n$
  phino merge bytes.phi number.phi minus.phi --sweet\n{⟦\n  bytes(data) ↦ ⟦ φ ↦ data
  ⟧,\n  number(as-bytes) ↦ ⟦\n    φ ↦ as-bytes,\n    plus(x) ↦ ⟦ λ ⤍ L_number_plus
  ⟧,\n    minus(x) ↦ ⟦ λ ⤍ L_number_minus ⟧\n  ⟧\n⟧}\n```\n\n## Match\n\nYou can test
  the \U0001D711-program matches against the [rule](#rule-structure)\npattern. The
  result output contains matched substitutions:\n\n```bash\n$ phino match --pattern='⟦
  Δ ⤍ !d, !B ⟧' hello.phi\nB >> ⟦ ρ ↦ ∅ ⟧\nd >> 68-65-6C-6C-6F\n```\n\n## Explain\n\nYou
  can _explain_ the built-in rules by printing them in [LaTeX][latex]\nformat. Pass
  exactly one of `--normalize`, `--morph`, `--dataize` or\n`--contextualize` for the
  rewriting, morphing (\U0001D544), dataization (\U0001D53B) or\ncontextualization
  (\U0001D49E) rules (or `--rule` for a custom rule file):\n\n```bash\n$ phino explain
  --normalize\n\\begin{tabular}{rl}\n\\phinoNormalizationRule{alpha}\n  { [[ B_1,
  \\tau -> ?, B_2 ]] ( \\phiTerminal{\\alpha_{i}} -> e ) }\n  { [[ B_1, \\tau -> ?,
  B_2 ]] ( \\tau -> e ) }\n  { $ i = \\vert \\overline{ B_1 } \\vert $ }\n  { }\n\\phinoNormalizationRule{dc}\n
  \ { T ( \\tau -> e ) }\n  { T }\n  { }\n  { }\n...\n\\phinoNormalizationRule{stop}\n
  \ { [[ B ]] . \\tau }\n  { T }\n  { $ \\tau \\notin B \\;\\text{and}\\; @ \\notin
  B \\;\\text{and}\\; L \\notin B $ }\n  { }\n\\end{tabular}\n```\n\nThe morphing
  and dataization rules are printed the same way:\n\n```bash\n$ phino explain --morph\n\\begin{tabular}{rl}\n\\phinoMorphingRule{mf}\n
  \ { \\mathbb{M}( [[ B ]], e ) }\n  { [[ B ]] }\n  { }\n  { }\n...\n\\phinoMorphingRule{universe}\n
  \ { \\mathbb{M}( Q, e ) }\n  { \\mathbb{M}( \\phinoNormalize{ e }, e ) }\n  { $
  e \\not= Q $ }\n  { }\n\\end{tabular}\n```\n\n```bash\n$ phino explain --dataize\n\\begin{tabular}{rl}\n\\phinoDataizationRule{delta}\n
  \ { \\phinoDataize{ [[ B_1, D> δ, B_2 ]] } }\n  { δ }\n  { }\n  { }\n...\n\\phinoDataizationRule{norm}\n
  \ { \\phinoDataize{ n } }\n  { \\phinoDataize{ \\mathbb{M}( n, e ) } }\n  { }\n
  \ { }\n\\end{tabular}\n```\n\n```bash\n$ phino explain --contextualize\n\\begin{phinoContextualizationInference}\n
  \ \\phinoName{cxi}\n  \\phinoConclusion{ \\phinoContextualize{ \\phiTerminal{\\xi}
  }{ k }{ k } }\n\\end{phinoContextualizationInference}\n...\n\\begin{phinoContextualizationInference}\n
  \ \\phinoName{cd}\n  \\phinoPremise{ \\phinoContextualize{ n }{ k }{ n_1 } }\n  \\phinoConclusion{
  \\phinoContextualize{ n . \\tau }{ k }{ n_1 . \\tau } }\n\\end{phinoContextualizationInference}\n```\n\nFor
  more details, use `phino [COMMAND] --help` option.\n\n## Rule structure\n\nThis
  is BNF-like yaml rule structure. Here types ended with\napostrophe, like `Attribute'`
  are built types from \U0001D711-program [AST](src/AST.hs)\n\n```bnfc\nRule:\n  name:
  String\n  pattern: String\n  result: String\n  when: Condition?       # predicate,
  works with substitutions before extension\n  where: [Extension]?    # substitution
  extensions\n  having: Condition?     # predicate, works with substitutions after
  extension\n\nCondition:\n  = and: [Condition]     # logical AND\n  | or:  [Condition]
  \    # logical OR\n  | not: Condition       # logical NOT\n  | eq:                  #
  compare two comparable objects\n      - Comparable\n      - Comparable\n  | in:
  \                 # check if attributes exist in bindings\n      - Attribute'\n
  \     - Binding'\n  | nf: Expression'      # returns True if given expression in
  normal form\n                         # which means that no more other normalization
  rules\n                         # can be applied\n  | absolute: Expression' # returns
  True if given expression is xi-free, i.e.\n                         # there is no
  ξ outside of a formation: it is Φ, a\n                         # formation, a dispatch
  with a xi-free subject, or an\n                         # application with a xi-free
  subject and argument.\n                         # Combined with a normal-form check
  by the '\U0001D458'/'!k'\n                         # meta variable, which ranges
  over the absolute\n                         # expressions \U0001D4A6 ⊆ \U0001D4A9,
  used by the Rcopy rule.\n  | matches:             # returns True if given expression
  after dataization\n      - String           # matches to given regex\n      - Expression\n
  \ | part-of:             # returns True if given expression is attached to any\n
  \     - Expression'      # attribute in ginve bindings\n      - BiMeta'\n  | formation:
  \          # returns True if given expression is a formation\n      Expression'
  \       # (an abstraction ⟦…⟧); used by morphing 'md'\n                         #
  as 'not (formation \U0001D45B)', so a non-formation head is\n                         #
  morphed and a formation head is left to 'ml'\n\nComparable:              # comparable
  object that may be used in 'eq' condition\n  = Attribute'\n  | Number\n  | Expression'\n\nNumber:
  \                 # comparable number\n  = Integer              # just regular integer\n
  \ | IndexMeta'           # \U0001D456 (or !i), the index captured by an α\U0001D456
  argument\n  | length: BiMeta'      # calculate length of bindings by given meta
  binding\n\nExtension:               # substitutions extension used to introduce
  new meta variables\n  meta: [ExtArgument]    # new introduced meta variable\n  function:
  String       # name of the function\n  args: [ExtArgument]    # arguments of the
  function\n\nExtArgument\n  = Bytes'               # !d\n  | Binding'             #
  !B\n  | Expression'          # !e\n  | Attribute'           # !t\n```\n\nHere's
  list of functions that are supported for extensions:\n\n* `contextualize` - function
  of two arguments, that rewrites given expression\n  depending on provided context
  according to the contextualization\n  [rules](assets/contextualize.jpg)\n* `random-tau`
  - creates attribute with random unique name. Accepts bindings,\n  and attributes.
  Ensures that created attribute is not present in list of\n  provided attributes
  and does not exist as attribute in provided bindings.\n* `dataize` - dataizes given
  expression and returns bytes.\n* `concat` - accepts bytes or dataizable expressions
  as arguments,\n  concatenates them into single sequence and convert it to expression\n
  \ that can be pretty printed as human readable string:\n  `Φ.string(Φ.bytes⟦ Δ ⤍
  !d ⟧)`.\n* `sed` - pattern replacer, works like unix `sed` function.\n  Accepts
  two arguments: target expression and pattern.\n  Pattern must start with `s/`, consists
  of three parts\n  separated by `/`, for example, this pattern `s/\\\\s+//g`\n  replaces
  all the spaces with empty string. To escape braces and slashes\n  in pattern and
  replacement parts - use them with `\\\\`,\n  e.g. `s/\\\\(.+\\\\)//g`.\n* `random-string`
  - accepts dataizable expression or bytes as pattern.\n  Replaces `%x` and `%d` formatters
  with random hex numbers and\n  decimals accordingly. Uniqueness is guaranteed during
  one\n  execution of `phino`.\n* `size` - accepts exactly one meta binding and returns
  size of it and\n  `Φ.number`.\n* `tau` - accepts `Φ.string`, dataizes it and converts
  it to attribute.\n  If dataized string can't be converted to attribute - an error
  is thrown.\n* `string` - accepts `Φ.string` or `Φ.number` or attribute and converts
  it\n  to `Φ.string`.\n* `number` - accepts `Φ.string` and converts it `Φ.number`\n*
  `sum` - accepts list of `Φ.number` or `Φ.bytes` and returns sum of them as `Φ.number`\n*
  `join` - accepts list of bindings and returns list of joined bindings. Duplicated\n
  \ `ρ`, `Δ` and `λ` attributes are ignored, all other duplicated attributes are replaced\n
  \ with unique attributes using `random-tau` function.\n\n## Meta variables\n\nThe
  `phino` supports meta variables to write \U0001D711-expression patterns for\ncapturing
  attributes, bindings, etc.\n\nThis is the list of supported meta variables:\n\n*
  `!t` || `\U0001D70F` - attribute\n* `!i` || `\U0001D456` - the index of a positional
  (α) application argument,\n                captured by writing `α\U0001D456` (or
  `~!i`)\n* `!e` || `\U0001D452` - any expression\n* `!n` || `\U0001D45B` - any expression
  that is already in normal form (behaves like\n                `!e`/`\U0001D452`,
  but only binds a sub-expression in NF, so no explicit\n                `nf:` guard
  is needed)\n* `!k` || `\U0001D458` - any expression that is absolute, i.e. xi-free
  and in normal\n                form (ranges over `\U0001D4A6 ⊆ \U0001D4A9`); behaves
  like `!e`/`\U0001D452` but only\n                binds an absolute sub-expression,
  so no explicit `absolute:`\n                or `nf:` guard is needed\n* `!B` ||
  `\U0001D435` - list of bindings\n* `!d` || `δ` - bytes in meta delta binding\n*
  `!F` || `\U0001D453` - function name in meta lambda binding\n\nEvery meta variable
  may also be used with an integer index, like `!B1` or `\U0001D70F0`.\n\nA positional
  (α) application argument is written as `α0`, `~0` (ASCII), or\n`α\U0001D456`/`~!i`
  when its index is captured by an `!i`/`\U0001D456` meta variable.\n\nIncorrect usage
  of meta variables in \U0001D711-expression patterns leads to\nparsing errors.\n\n##
  Benchmark\n\nTo run performance benchmarks, you need [Java 8+][java] and [curl][curl].\nMaven
  is downloaded automatically on first run via `benchmark/mvnw`.\n\nThe benchmark
  uses the compiled [`Native`][jna-native] class from\n[JNA][jna] — a large real-world
  Java class — as its test input.\nOn first run, `make bench` downloads the class,
  disassembles it to\n[XMIR][xmir] via [jeo-maven-plugin][jeo], converts it to \U0001D711
  using\n`phino rewrite`, and caches the results in `benchmark/tmp/`.\nSubsequent
  runs skip straight to the benchmarks.\n\n```bash\nmake bench\n```\n\n<!-- benchmark_begin
  -->\n\n```text\n=== parse/phi ===\n  warmup:     3 iterations\n  batches:    10
  x 1\n  total:      1249146.083 μs\n  avg:        124914.608 μs\n  min:        114445.668
  μs\n  max:        153538.726 μs\n  std dev:    14836.651 μs\n=== parse/xmir ===\n
  \ warmup:     3 iterations\n  batches:    10 x 1\n  total:      7756845.678 μs\n
  \ avg:        775684.568 μs\n  min:        717096.328 μs\n  max:        814290.753
  μs\n  std dev:    28717.270 μs\n=== rewrite/normalize ===\n  warmup:     3 iterations\n
  \ batches:    10 x 1\n  total:      438127.137 μs\n  avg:        43812.714 μs\n
  \ min:        42655.269 μs\n  max:        45113.109 μs\n  std dev:    720.868 μs\n===
  print/sweet/multiline ===\n  warmup:     3 iterations\n  batches:    10 x 1\n  total:
  \     4445373.874 μs\n  avg:        444537.387 μs\n  min:        426945.439 μs\n
  \ max:        466720.288 μs\n  std dev:    13809.207 μs\n=== print/sweet/flat ===\n
  \ warmup:     3 iterations\n  batches:    10 x 1\n  total:      4535005.765 μs\n
  \ avg:        453500.576 μs\n  min:        426572.785 μs\n  max:        478523.175
  μs\n  std dev:    14154.997 μs\n=== print/salty/multiline ===\n  warmup:     3 iterations\n
  \ batches:    10 x 1\n  total:      13746516.677 μs\n  avg:        1374651.668 μs\n
  \ min:        1338899.143 μs\n  max:        1409557.147 μs\n  std dev:    24026.755
  μs\n```\n\nThe results were calculated in [this GHA job][benchmark-gha]\non 2026-06-19
  at 10:57,\non Linux with 4 CPUs.\n\n<!-- benchmark_end -->\n\n## How to Contribute\n\nFork
  repository, make changes, then send us a [pull request][guidelines].\nWe will review
  your changes and apply them to the `master` branch shortly,\nprovided they don't
  violate our quality standards. To avoid frustration,\nbefore sending us your pull
  request please make sure all your tests pass:\n\n```bash\nmake all\n```\n\nTo generate
  a local coverage report for development, run:\n\n```bash\nmake coverage\n```\n\nTo
  build a `phino` executable into the root of the repository, run:\n\n```bash\nmake
  phino\n```\n\nThis produces an executable `phino` (or `phino.exe` on Windows) in
  the\nproject root, which you can run directly for quick local testing:\n\n```bash\n./phino
  --version\n```\n\nYou will need [GHC ≥ 9.6.7][GHC] and [Cabal ≥ 3.0 (recommended)][cabal]\nor
