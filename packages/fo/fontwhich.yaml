changelog: |
  # fontwhich releases

  ## 0.2 (2026-03-12)
  - add --unicode for unicode data output (uses `unicode-data`)
  - rename --hex to --utf8 (for hex bytes)
  - show number of pango items with --utf8 or --unicode
  - only print number of bytes with --utf8 or --unicode

  ## 0.1.0 (2026-02-27)
  - initial release with --font --lang and --hex
changelog-type: markdown
description: "# Fontwhich\n\nFontwhich is a small CLI tool that uses pango to show\nwhich
  default fonts are used to render some text.\n\nIt should work on any Linux distro
  with the Cairo and Pango libraries:\nit requires the fonts to be available but not
  a graphical session.\n\n## Usage\n\n`$ fontwhich --version`\n\n```\n0.2\n```\n\n`$
  fontwhich --help`\n\n```\nfontwhich\n\nUsage: fontwhich [--version] [-f|--font FONT]
  [-l|--lang LANG] [-b|--utf8] \n                 [-u|--unicode] [TEXT]\n\n  Describes
  the fonts used to render text with pango\n\nAvailable options:\n  -h,--help                Show
  this help text\n  --version                Show version\n  -f,--font FONT           Base
  font [default: Sans]\n  -l,--lang LANG           Language code\n  -b,--utf8                Output
  UTF-8 hex codes\n  -u,--unicode             Output Unicode data\n```\n\n`$ fontwhich
  Hello \U0001F30D World дё–з•Њ`\n\n```\n'Hello ' : Noto Sans\n'\U0001F30D' : Noto Color
  Emoji\n' World ' : Noto Sans\n'дё–з•Њ' : Noto Sans CJK JP\n```\n\n`$ fontwhich -f Serif
  \"гЃ“г‚“гЃ«гЃЎгЃЇ \U0001F600 дё–з•Њ\"`\n\n```\n'гЃ“г‚“гЃ«гЃЎгЃЇ ' : Noto Serif CJK JP\n'\U0001F600' : Noto
  Color Emoji\n' ' : Noto Serif CJK JP\n'дё–з•Њ' : Noto Serif CJK JP\n```\n\n`$ fontwhich
  -l ja`\n\n```\nPrimary font for ja is: \"Noto Sans CJK JP\"\n```\n\n`$ fontwhich
  --utf8 \U0001F333`\n\n```\n4 bytes;\n'\U0001F333' [f0 9f 8c b3] : Noto Color Emoji\n```\n\n`$
  fontwhich --unicode О±ОІаҐ§аҐЁ`\n\n```\n10 bytes; 2 pango items\n'О±ОІ' : Noto Sans\nО± <U+03B1>:
  GREEK SMALL LETTER ALPHA [Greek]\nОІ <U+03B2>: GREEK SMALL LETTER BETA [Greek]\n'аҐ§аҐЁ'
  : Noto Sans Devanagari\nаҐ§ <U+0967>: DEVANAGARI DIGIT ONE [Devanagari]\nаҐЁ <U+0968>:
  DEVANAGARI DIGIT TWO [Devanagari]\n```\n\nOne can use both options together:\n\n`$
  fontwhich --utf8 \U0001F34A --unicode`\n\n```\n4 bytes;\n'\U0001F34A' [f0 9f 8d
  8a] : Noto Color Emoji\n\U0001F34A <U+1F34A>: TANGERINE [Common]\n```\n\n\n## Building
  and installation\nOn Fedora:\n```\n$ cabal-rpm builddep\n$ cabal install\n```\n\nThere
  is a copr repo: <https://copr.fedorainfracloud.org/coprs/petersen/fontwhich/>\n\n##
  Misc\nCode assisted with Gemini 3.1.\n\nThe tool is related conceptually to <https://github.com/sudipshil9862/whichfont>
  (C codebase).\n\n## Collaborate\n\nThe code is distributed under GPLv3+.\n\nRepository:
  <https://github.com/juhp/fontwhich>\n"
