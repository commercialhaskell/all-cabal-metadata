changelog: |
  # fontwhich releases

  ## 0.2.1 (2026-03-26)
  - check and warn about characters without font coverage
  - output base font name when not text given

  ## 0.2 (2026-03-12)
  - add --unicode for unicode data output (uses `unicode-data`)
  - rename --hex to --utf8 (for hex bytes)
  - show number of pango items with --utf8 or --unicode
  - only print number of bytes with --utf8 or --unicode

  ## 0.1.0 (2026-02-27)
  - initial release with --font --lang and --hex
changelog-type: markdown
description: "# Fontwhich\n\nFontwhich is a small CLI tool that uses pango to show\nwhich
  default fonts are used to render some text.\n\nIt should work on any Linux distro
  with the Cairo and Pango libraries:\nit requires the fonts to be available but not
  a graphical session.\n\n## Usage\n\n`$ fontwhich --version`\n\n```\n0.2.1\n```\n\n`$
  fontwhich --help`\n\n```\nfontwhich\n\nUsage: fontwhich [--version] [-f|--font FONT]
  [-l|--lang LANG] [-b|--utf8]\n                 [-u|--unicode] [TEXT]\n\n  Describes
  the fonts used to render text with pango\n\nAvailable options:\n  -h,--help                Show
  this help text\n  --version                Show version\n  -f,--font FONT           Base
  font [default: Sans]\n  -l,--lang LANG           Language code\n  -b,--utf8                Output
  UTF-8 hex codes\n  -u,--unicode             Output Unicode data\n```\n\n`$ fontwhich
  Hello \U0001F30D World 世界`\n\n```\n'Hello ' : Noto Sans\n'\U0001F30D' : Noto Color
  Emoji\n' World ' : Noto Sans\n'世界' : Noto Sans CJK JP\n```\n\n`$ fontwhich -f Serif
  \"こんにちは \U0001F600 世界\"`\n\n```\n'こんにちは ' : Noto Serif CJK JP\n'\U0001F600' : Noto
  Color Emoji\n' ' : Noto Serif CJK JP\n'世界' : Noto Serif CJK JP\n```\n\n`$ fontwhich
  -l ja`\n\n```\nPrimary Sans font for ja is: \"Noto Sans CJK JP\"\n```\n\n`$ fontwhich
  --utf8 \U0001F333`\n\n```\n4 bytes;\n'\U0001F333' [f0 9f 8c b3] : Noto Color Emoji\n```\n\n`$
  fontwhich --unicode αβ१२`\n\n```\n10 bytes; 2 pango items\n'αβ' : Noto Sans\nα <U+03B1>:
  GREEK SMALL LETTER ALPHA [Greek]\nβ <U+03B2>: GREEK SMALL LETTER BETA [Greek]\n'१२'
  : Noto Sans Devanagari\n१ <U+0967>: DEVANAGARI DIGIT ONE [Devanagari]\n२ <U+0968>:
  DEVANAGARI DIGIT TWO [Devanagari]\n```\n\nOne can use both options together:\n\n`$
  fontwhich --utf8 \U0001F34A --unicode`\n\n```\n4 bytes;\n'\U0001F34A' [f0 9f 8d
  8a] : Noto Color Emoji\n\U0001F34A <U+1F34A>: TANGERINE [Common]\n```\n\n\n## Building
  and installation\nOn Fedora, install system deps with `cabal-rpm builddep`.\n\nC
  library dependencies:\n\n- Fedora: cairo-devel pango-devel gobject-introspection-devel\n-
  Ubuntu: libcairo2-dev libpango1.0-dev libgirepository1.0-dev\n\nThen:\n```\n$ cabal
  install\n```\nor\n```\n$ stack install\n```\n\nThere is a copr repo: <https://copr.fedorainfracloud.org/coprs/petersen/fontwhich/>\n\n##
  Misc\nCode assisted with Gemini 3.1.\n\nThe tool is related conceptually to <https://github.com/sudipshil9862/whichfont>
  (C codebase).\n\n\"fontwhich\" as in \"sandwhich\" but with fonts.\n\n## Collaborate\n\nThe
  code is distributed under GPLv3+.\n\nRepository: <https://github.com/juhp/fontwhich>\n"
