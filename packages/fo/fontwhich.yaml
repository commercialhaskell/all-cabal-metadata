description: "# Fontwhich\n\nFontwhich is a small CLI tool that uses pango to show\nwhich
  default fonts are used to render some text.\n\nIt should work on any Linux distro
  with the Cairo and Pango libraries:\nit requires the fonts to be available but not
  a graphical session.\n\n## Usage\n\n`$ fontwhich --help`\n\n```\nfontwhich\n\nUsage:
  fontwhich [--version] [-f|--font FONT] [-l|--lang LANG] [-x|--hex] [TEXT]\n\n  Describes
  the fonts used to render text with pango\n\nAvailable options:\n  -h,--help                Show
  this help text\n  --version                Show version\n  -f,--font FONT           Base
  font [default: Sans]\n  -l,--lang LANG           Language code\n  -x,--hex                 Output
  UTF-8 hex codes\n```\n\n`$ fontwhich Hello \U0001F30D World 世界`\n\n```\n23 bytes\n'Hello
  ' : Noto Sans\n'\U0001F30D' : Noto Color Emoji\n' World ' : Noto Sans\n'世界' : Noto
  Sans CJK JP\n```\n\n`$ fontwhich -f Serif \"こんにちは \U0001F600 世界\"`\n\n```\n27 bytes\n'こんにちは
  ' : Noto Serif CJK JP\n'\U0001F600' : Noto Color Emoji\n' ' : Noto Serif CJK JP\n'世界'
  : Noto Serif CJK JP\n```\n\n`$ fontwhich -l ja`\n\n```\nPrimary font for ja is:
  \"Noto Sans CJK JP\"\n```\n\n`$ fontwhich --hex \U0001F34A`\n\n```\n4 bytes\n'\U0001F34A'
  [f0 9f 8d 8a] : Noto Color Emoji\n```\n\n## Building and installation\nOn Fedora:\n```\n$
  cabal-rpm builddep\n$ cabal install\n```\n\nThere is a copr repo: <https://copr.fedorainfracloud.org/coprs/petersen/fontwhich/>\n\n##
  Misc\nCode was assisted with Gemini Pro 3.1.\n\nThe tool is related conceptually
  to <https://github.com/sudipshil9862/whichfont> (C codebase).\n\n## Collaborate\n\nThe
  code is distributed under GPLv3+.\n\nRepository: <https://github.com/juhp/fontwhich>\n"
