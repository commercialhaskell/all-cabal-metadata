changelog: |
  # fontwhich releases

  ## 0.3 (2026-03-27)
  - improve no coverage logic
  - when no font output --unicode data
  - for --language check that primary font has coverage
  - check normalized lang is in fontconfig orth list
  - new pango --sample-text option with --language
  - add --list-langs option to list all fc orths
  - add --all-langs which iterates over all orth langs

  ## 0.2.1 (2026-03-26)
  - check and warn about characters without font coverage
  - output base font name when no text given

  ## 0.2 (2026-03-12)
  - add --unicode for unicode data output (uses `unicode-data`)
  - rename --hex to --utf8 (for hex bytes)
  - show number of pango items with --utf8 or --unicode
  - only print number of bytes with --utf8 or --unicode

  ## 0.1.0 (2026-02-27)
  - initial release with --font --lang and --hex
changelog-type: markdown
description: "# Fontwhich\n\nFontwhich is a small CLI tool that uses pango to show\nwhich
  default fonts are used to render some text.\n\nIt should work on any Linux distro
  with the Cairo and Pango libraries:\nit requires the fonts to be available but not
  a graphical session.\n\n## Usage\n\n`$ fontwhich --version`\n\n```\n0.3\n```\n\n`$
  fontwhich --help`\n\n```\nfontwhich\n\nUsage: fontwhich [--version] [-f|--font FONT]
  [-b|--utf8] [-u|--unicode]\n                 [-s|--sample-text]\n                 (--list-langs
  | (-l|--lang LANG) | --all-langs | TEXT)\n\n  Describes the fonts used to render
  text with pango\n  https://github.com/juhp/fontwhich#readme\n\nAvailable options:\n
  \ -h,--help                Show this help text\n  --version                Show
  version\n  -f,--font FONT           Base font [default: Sans]\n  -b,--utf8                Output
  UTF-8 hex codes\n  -u,--unicode             Output Unicode data\n  -s,--sample-text
  \        Use Pango sample text for language\n  --list-langs             List language
  orthography\n  -l,--lang LANG           Language code\n  --all-langs              Output
  all orth languages\n```\n\n`$ fontwhich Hello \U0001F30D World 世界`\n\n```\n'Hello
  ' : Noto Sans\n'\U0001F30D' : Noto Color Emoji\n' World ' : Noto Sans\n'世界' : Noto
  Sans CJK JP\n```\n\n`$ fontwhich -f Serif \"世界こんにちは\U0001F600\"`\n\n```\n'世界' :
  Noto Serif CJK JP\n'こんにちは' : Noto Serif CJK JP\n'\U0001F600' : Noto Color Emoji\n```\n\n`$
  fontwhich -l ja`\n\n```\nPrimary Sans font for 'ja': \"Noto Sans CJK JP\"\n```\n\n`$
  fontwhich --utf8 \U0001F333`\n\n```\n4 bytes;\n'\U0001F333' [f0 9f 8c b3] : Noto
  Color Emoji\n```\n\n`$ fontwhich --unicode αβ१२`\n\n```\n10 bytes; 2 pango items\n'αβ'
  : Noto Sans\nα <U+03B1>: GREEK SMALL LETTER ALPHA [Greek]\nβ <U+03B2>: GREEK SMALL
  LETTER BETA [Greek]\n'१२' : Noto Sans Devanagari\n१ <U+0967>: DEVANAGARI DIGIT ONE
  [Devanagari]\n२ <U+0968>: DEVANAGARI DIGIT TWO [Devanagari]\n```\n\nOne can use
  both options together:\n\n`$ fontwhich --utf8 \U0001F338 --unicode`\n\n```\n4 bytes;\n'\U0001F338'
  [f0 9f 8c b8] : Noto Color Emoji\n\U0001F338 <U+1F338>: CHERRY BLOSSOM [Common]\n```\n\n\n##
  Building and installation\nOn Fedora, install system deps with `cabal-rpm builddep`.\n\nC
  library dependencies:\n\n- Fedora: cairo-gobject-devel gobject-introspection-devel
  pango-devel\n- Ubuntu: libcairo2-dev libgirepository1.0-dev libpango1.0-dev\n\nThen:\n```\n$
  cabal install\n```\nor\n```\n$ stack install\n```\n\nThere is a copr repo: <https://copr.fedorainfracloud.org/coprs/petersen/fontwhich/>\n\n##
  Misc\nInitial code assisted with Gemini 3.1.\n\nThe tool is related conceptually
  to the C project <https://github.com/sudipshil9862/whichfont>.\n\n\"fontwhich\"
  as in \"sandwich\" but with fonts.\n\n## Collaborate\n\nThe code is distributed
  under GPLv3+.\n\nRepository: <https://github.com/juhp/fontwhich>\n"
