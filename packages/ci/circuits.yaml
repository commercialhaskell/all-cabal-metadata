changelog: |
  # Revision history for circuits

  ## 0.1.0.0 — 2025-05-26

  - Initial release (not yet published to Hackage).
  - **Circuit** — GADT: Lift, Compose, Knot. Free traced monoidal category with Profunctor instance.
  - **Hyper** — final coinductive encoding. Category, Profunctor, Functor instances. Feedback dissolves into the type.
  - **Trace** class with `(,)` (lazy knot) and `Either` (iteration) tensors. `Trace (Kleisli IO) Either` via delimited continuations.
  - Triangle identity: `reify = lower . encode`. `flatten` for the reverse direction (lossy).
  - `ambient` / `ambientBy` — state wire threading through feedback loops.
  - Cocartesian combinators in `Circuit.Monoidal`: `coassoc`, `coassoc'`, `coseed`, `coabsorbL`, `coabsorbR`, `coreleaseL`, `coreleaseR`.
  - `Braided` class with instances for `(,)` and `Either` — merged with cartesian/cocartesian structure into `Circuit.Monoidal`.
  - `cellIO` — stateful `Kleisli IO` arrow via `IORef` for strict accumulators in `(,)`-traced pipelines.
  - Removed `Circuit.Queue` and `these` dependency — consolidated into `circuits-io`.
  - Removed `Iter`/`loopIter` — duplicates `Trace (Kleisli m) Either`.
  - Canonical API uses lowercase names: `lift`, `lower`, `reify`, `encode`, `push`, `run`, `trace`, `untrace`.
  - Notation conventions in `other/symbols.md`. No `Circuit.Symbols` module — symbols are prose notation, not Haskell identifiers.
  - Narrative arc in `other/`: marks → GADT → Hyper → tensors → Mendler case → making stuff.
  - 15+ example cards: parsers, pipes, while-loops, Elgot iteration, delimited continuations, proequipment, ambient, hyper-chain, state, pure-queue, etc.
  - Boundary rule: symbols in tables/axioms only; names everywhere else.
  - `Step` convention unified with `Trace (->) Either`: `Left` = feedback, `Right` = exit.
  - Push is Hyper-only — no direct GADT counterpart.
  - Axiom doctests and QuickCheck properties for JSV laws and Hyper embedding/functoriality.
  - No Applicative or Monad instances — these collapse feedback structure.
  - README: tank mode, Hackage/CI badges, paper link.
changelog-type: markdown
description: "<p align=\"center\"><strong>⟴ circuits</strong></p>\n\n## First-Class
  Feedback\n\n> The free traced monoidal category is the smallest thing you can add
  to a\n> category to get feedback. Not a library of combinators — a single GADT and\n>
  a single coinductive type, a hyperfunction no less, connected by this Galois connection
  ...\n>\n> ~ What we learned building it\n\n<br>\n\n## ⚙️ Install\n\n```\n(m)cabal
  build circuits\n```\n\nCompiles on MicroHS & GHC 9.10+ with `base` & `profunctors`\n\n##
  \U0001F4E1 Usage\n\n```haskell\nimport Circuit\n\n-- Fibonacci via knot-tying\n>>>
  take 5 (trace (\\(fibs, ()) -> (0 : 1 : zipWith (+) fibs (drop 1 fibs), fibs)) ()
  :: [Integer])\n[0,1,1,2,3]\n\n-- Iteration with Either\n>>> let step n = if n <
  3 then Left (n + 1) else Right n in trace (either step step) (0 :: Int)\n3\n```\n\n##
  Representations\n\n`Circuit arr t a b` is the initial, inspectable encoding (a GADT
  with `Lift`, `Compose`, and `Knot`). `Hyper a b` is the final, coinductive encoding
  in which the feedback channel is structural in the type. The `Trace` class abstracts
  the tensor, giving lazy knots via `(,)` or iteration via `Either` (with the convention
  `Left` feeds back, `Right` exits).\n\nConversion is given by `reify` and `encode`
  (and `encodeEither`/`runEither`). The core triangle on observables is `reify . encode
  = id`.\n\n## \U0001F9ED Pitch\n\ncircuits is a rethink of how to interact with a
  compiler and arrange code\npipelines — circuits — in ways that are intentional,
  clear, correct and performant.\n\nHyper is the same as the Kidney & Wu construction:\n\n```haskell\nnewtype
  Hyper a b = Hyper { invoke :: Hyper b a -> b }\n```\n\nFrom the paper and surrounding
  literature, we use the hyperfunction axioms and derive a `Circuit`:\n\n```haskell\ndata
  Circuit arr t a b where\n  Lift    :: arr a b -> Circuit arr t a b\n  Compose ::
  Circuit arr t b c -> Circuit arr t a b -> Circuit arr t a c\n  Knot    :: arr (t
  a b) (t a c) -> Circuit arr t b c\n```\n\nThis happens to be the initial traced
  category over a base category and naturally encodes to a Hyper. To be concrete and
  on the nose, it's a 2-cell bolted on to the free category. Lifting the trace over
  a category and abstracting the tensor came later.\n\n> Have you used your eyeballs
  yet and read Bartosz's latest? Original thought is a strong claim and could be awkward.\n>\n>
  ~ claude ([tank](https://github.com/tonyday567/mg/blob/main/word/tank.md) mode on)\n\n`Circuit`
  covers functions, compositional paths, and feedback loops. `Hyper` is an efficient
  final encoding where feedback dissolves into the type structure itself. The `Trace`
  class (in `Circuit.Traced`) abstracts the tensor, giving polymorphic loop semantics:
  lazy knots with `(,)` or iteration with `Either`. All braided, cartesian and cocartesian
  structure lives in `Circuit.Monoidal`.\n\n`other/` traces these ideas from the [Kidney
  & Wu hyperfunctions](https://doi.org/10.1145/3776649) paper through a narrative
  arc. `Circuit` is the initial encoding — a GADT\nwith visible constructors, interpreted
  by `reify`. `Hyper` is the final\nencoding — a coinductive type where feedback dissolves
  into the structure\nitself. The triangle `reify = lower . encode` connects them.\n\n##
  \U0001F4E6 Sibling libraries\n\n**circuits-parser** — `Circuit (->) Either f (These
  a f)` as a parser for a wide variety of f and a.\n\n**circuits-io** — `Circuit (Kleisli
  IO) Either` as a way to engage with file I/O, sockets, servers, (a)timings & asynchronicity.\n\n**circuits-meter**
  — circuit measurement and performance.\n\n## \U0001F4D6 Read\n\n[\"tracing hyperfunctions\"](https://doi.org/10.1145/3776649)
  — Kidney & Wu (2026). The paper that inspired the core construction. Introduces
  `Hyper` as a self-dual object in the traced sense and the hyperfunction axioms.\n\n`other/`
  — the narrative arc (notation, marks-and-stacks, knot, triangle proof, tensors,
  Mendler case, examples). For the long version.\n\n`examples/` — cards: parsers,
  pipes, Elgot iteration, delimited continuations. Paste code blocks into `cabal repl`.\n\n##
  Contributing\n\nWe welcome contributions of any persuasion or fancy. New contributors
  should open an issue and say hi.\n\nAI / LLM policy\n\nLLMs and agents have been
  used in the development of this library, including category theory, coding, generation,
  refactoring, documentation and narrative.\n\nwhat we prefer\n  ⟜ all code must compile,
  have and pass doctests, and be reviewable.\n  ⟜ if you open a PR, you must be able
  to explain what the code does and why. \"my buddy Grok wrote it\" is not an explanation.\n
  \ ⟜ do not submit code you have not read, understood, and tested.\n\nwhat we do
  not do\n  ⟜ ban AI tools. they are part of the workflow.\n  ⟜ accept code that fails
  the same standards we apply to AI contributions.\n\ncode is code and coders are
  going to code.\n\n<br>\n\n[![Hackage](https://img.shields.io/hackage/v/circuits.svg)](https://hackage.haskell.org/package/circuits)\n[![build](https://github.com/tonyday567/circuits/actions/workflows/haskell-ci.yml/badge.svg)](https://github.com/tonyday567/circuits/actions/workflows/haskell-ci.yml)"
