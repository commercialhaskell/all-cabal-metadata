description: |
  [![pipeline status](https://gitlab.com/krakrjak/restman/badges/master/pipeline.svg)](https://gitlab.com/krakrjak/restman/-/commits/master)
  [![Latest Release](https://gitlab.com/krakrjak/restman/-/badges/release.svg)](https://gitlab.com/krakrjak/restman/-/releases)
  [![License: BSD2](https://img.shields.io/badge/license-BSD2-blue.svg)](LICENSE)

  # RESTMan

  **RESTMan** is a keyboard-driven TUI HTTP client for the terminal. Compose and
  send HTTP(S) requests interactively вҖ” or script one-shot requests from the
  command line вҖ” without leaving your shell.

  [[_TOC_]]

  ---

  ## Features

  - **All HTTP methods** вҖ” GET, HEAD, POST, PUT, DELETE, TRACE, OPTIONS, CONNECT,
    PATCH, or any custom verb
  - **Interactive TUI** вҖ” full-screen [Brick](https://hackage.haskell.org/package/brick)-based
    terminal UI
  - **Oneshot mode** вҖ” `--oneshot URI` prints the response body to stdout and
    exits (scriptable like `curl`)
  - **Quick Request mode** вҖ” pass a URI on the command line to pre-populate the
    TUI and fire the request immediately
  - **Syntax-highlighted responses** вҖ” MIME-type-aware, pygments colour theme via
    [Skylighting](https://hackage.haskell.org/package/skylighting)
  - **Bi-directional scroll** вҖ” arrow keys, Vi/Vim keys (`hjkl`), Page Up/Down,
    and mouse wheel
  - **Custom headers** вҖ” add, edit, enable, or disable individual headers in a
    table with horizontal scroll
  - **Default headers toggle** вҖ” view and toggle the wreq default headers
    (`Accept-Encoding`, `User-Agent`, вҖҰ)
  - **Request payloads** вҖ” provide a body inline (`--payload`) or from a file
    (`--payload-file`)
  - **TLS / HTTPS** вҖ” via `http-client-tls`; 30-second timeout guards against
    captive portals and slow proxies
  - **Shell completions** вҖ” HTTP method names auto-complete via
    `optparse-applicative`

  ---

