changelog: |
  # Revision history for devforms

  ## 0.1.0.0 -- 2026-04-22

  * Initial release with builder DSL for HTML survey forms.
  * Question types: checkbox, Likert scale, multiple choice, date, time, integer (with optional bounds).
  * Built-in Scotty web server with htmx interactivity and Pico CSS styling.
  * JSONL answer storage.
changelog-type: markdown
description: |-
  devforms is a Haskell library for building HTML survey forms using a
  monadic builder DSL. It bundles a Scotty web server with htmx and
  _hyperscript for client-side interactivity, Lucid2 for HTML rendering,
  and Pico CSS for styling. Submissions are stored as JSONL files.
