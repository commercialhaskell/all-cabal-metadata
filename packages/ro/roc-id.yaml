changelog: |
  # 0.4.0.0

  - Revised the `Show` instance of `ID` to produce a valid Haskell expression
    when applied to nested values of `ID`.
  - Revised the `ID.fromSymbol` function so that users are presented with a
    helpful error if they forget to apply the function to a concrete type.
  - Simplified the error handling for `ID.fromText` by merging the `TextTooShort`
    and `TextTooLong` errors into a unified `InvalidLength` error.
  - Renamed `ID.checksumDigit` to `ID.checksum`.
  - Made `ID` an instance of the `Finitary` type class.
  - Made `ID` an instance of the `Generic` type class.

  # 0.3.0.0

  - Added support for ARC (Alien Residence Certificate) numbers.
  - Added support for type-checked ID literals.
  - Refined and reorganised the public API.

  # 0.2.0.6

  - Revised version bounds of dependencies.

  # 0.2.0.5

  - Revised version bounds of dependencies.

  # 0.2.0.4

  - Added support for GHC 9.12.

  # 0.2.0.3

  - Added support for GHC 9.10.

  # 0.2.0.2

  - Revised upper version bounds of dependencies.

  # 0.2.0.1

  - Added support for GHC 9.8.

  # 0.2.0.0

  - Refreshed package documentation.
  - Refreshed all package dependencies.
  - Removed dependency on `generic-arbitrary` package.

  # 0.1.0.0

  - Initial release.
changelog-type: markdown
description: |
  # `roc-id`

  [![Latest Release](
    https://img.shields.io/hackage/v/roc-id?label=Latest%20Release&color=227755
  )](https://hackage.haskell.org/package/roc-id)
  [![Development Branch](
    https://img.shields.io/badge/Development%20Branch-API%20Documentation-225577
  )](https://jonathanknowles.github.io/roc-id/)

  This package provides a [Haskell](https://www.haskell.org/) implementation of
  the ROC (Taiwan) Uniform Identification Number (中華民國統一證號) format.

  This format is used by both National Identification Cards (國民身分證) and
  Alien Resident Certificates (居留證). Each identification number consists of a
  single uppercase letter followed by nine decimal digits, with the final digit
  serving as a checksum, calculated according to a standard algorithm.

  Example: `A123456789`

  This package offers functions for validating, decoding, and encoding these
  numbers.

  For more details of the Uniform Identification Number format, see:

  * https://zh.wikipedia.org/wiki/中華民國國民身分證
  * https://en.wikipedia.org/wiki/National_identification_card_(Taiwan)
  * https://en.wikipedia.org/wiki/Resident_certificate
