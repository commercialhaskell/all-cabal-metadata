  ---

  ## Tests

  ### CPU Tests (default)

  ```bash
  cabal test
  ```

  Runs **124 tests** across three tiers:

  - **Tier 1 ‚Äî Golden tests** ‚Äî Verify rendered MLIR text for EDSL ops, IR constructs, NN layers, and control flow.
  - **Tier 2 ‚Äî End-to-end runtime tests** ‚Äî Load the PJRT CPU plugin, compile StableHLO programs, execute them, and verify numerical results. Covers arithmetic, matmul, reductions, data movement, and NN ops.
  - **Tier 3 ‚Äî Runtime integration tests** ‚Äî Buffer metadata queries, async execution, and error handling.

  ### GPU Tests

  ```bash
  HHLO_TEST_GPU=1 cabal test
  ```

  Runs the full 124 CPU tests **plus** 6 additional GPU integration tests:

  - `EndToEnd.GPU` ‚Äî GPU availability and device enumeration
  - `Runtime.BufferGPU` ‚Äî Buffer round-trip and metadata queries on GPU
  - `Runtime.AsyncGPU` ‚Äî Async execution and `bufferReady` polling on GPU
  - `Runtime.MultiGPU` ‚Äî Concurrent `executeReplicas` across all GPUs

  Sample output:
