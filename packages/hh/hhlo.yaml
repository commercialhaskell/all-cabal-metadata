changelog: "# Revision history for hhlo\n\n## 0.1.0.0 -- 2026-04-22\n\n* Initial release.\n*
  Type-safe EDSL for StableHLO with 50+ ops.\n* CPU execution via PJRT CPU plugin.\n*
  GPU execution via PJRT CUDA plugin with device enumeration and selection.\n* Multi-GPU
  concurrent inference scaling via `executeReplicas`.\n* 115 CPU tests + 6 GPU integration
  tests.\n* 29 executable examples including ResNet-18, AlexNet, Transformer, and
  UNet.\n\n## 0.2.0.0 -- 2026-04-22\n\n**BREAKING**: `Operation` AST changed from
  single-result to multi-result.\nAny code using `opResult` / `opResultType` or pattern-matching
  on the\n`Operation` constructor must update to `opResults` / `opResultTypes`.\n\n*
  Multi-result `Operation` AST — `Operation` now supports `opResults :: [ValueId]`\n
  \ and `opResultTypes :: [TensorType]`, enabling ops with multiple outputs such as\n
  \ `stablehlo.rng_bit_generator`.\n* Multi-value control flow — added `whileLoop2`,
  `conditional2`, `whileLoopN`,\n  and `conditionalN` for carrying multiple typed
  tensors through loops and\n  conditionals without manual packing.\n* Random number
  generation — added `rngUniform`, `rngNormal`, and\n  `rngBitGenerator` to the EDSL,
  wrapping `stablehlo.rng` and\n  `stablehlo.rng_bit_generator`.\n* PJRT CPU v1.16.0
  parser compatibility fixes:\n  * `stablehlo.compare` now emits generic form with
  enum attributes\n    (`#stablehlo<comparison_direction LT>`) instead of custom form.\n
  \ * `stablehlo.rng` and `stablehlo.rng_bit_generator` emit generic form.\n  * `func.return`
  for multi-result functions no longer wraps types in parentheses.\n* New examples:
  `30-rng-uniform`, `31-rng-normal`, `32-rng-bit-generator`,\n  `33-multi-value-loop`.\n*
  Updated example `12-while` from print-only to fully executable.\n* Test count: 124
  CPU tests + 6 GPU integration tests.\n\n## 0.3.0.0 -- 2026-04-25\n\n**BREAKING**:
  `compare` and `lessThan` now return shape-preserving\n`Tensor s 'Bool` instead of
  scalar `Tensor '[] 'Bool`. New exports\n`sqrt`, `sin`, `cos`, `tan`, `floor`, `ceil`
  may conflict with Prelude.\n\n* New primitive ops: `sqrt`, `rsqrt`, `sin`, `cos`,
  `tan`, `pow`, `log1p`, `floor`, `ceil`.\n* New composite / convenience ops: `sigmoid`,
  `sumAll`, `pack2`, `pack3`, `slice1`.\n* Fixed `compare` to return shape-preserving
  `Tensor s 'Bool` per StableHLO spec.\n* New comparison wrappers: `equal`, `notEqual`,
  `greaterThan`, `lessThanOrEqual`, `greaterThanOrEqual`.\n* Test count: 141 CPU tests
  + 6 GPU integration tests.\n\n## 0.4.0.0 -- 2026-04-26\n\n**BREAKING**: `HostType
  'Bool` changed from `Bool` to `Word8` to match\nPJRT's PRED buffer transfer semantics.\n\n*
  **Convenience layer** — two new modules that eliminate boilerplate for\nthe common
  compile-and-run workflow:\n  * `HHLO.ModuleBuilder` provides `buildModule @nIn @nOut`,
  a polymorphic\n    entry point (via `TypeApplications`) that auto-generates `FuncArg`\n
  \   declarations and wires up `arg` calls. No more `natVal` or `FuncArg`\n    boilerplate.\n
  \ * `HHLO.Session` provides `withCPU`, `withGPU`, `withGPUDevice`, `compile`,\n
  \   `run`, `runAsync`, and typed `HostTensor` host-device transfers.\n    No more
  manual `render`, `toDeviceF32`, `fromDeviceF32`, or shape lists.\n* `whileLoop3`–`whileLoop8`
  and `conditional3`–`conditional8` for carrying\n  3–8 heterogeneous tensors through
  control flow.\n* Boolean logic ops: `logicalAnd`, `logicalOr`, `logicalNot`.\n*
  New dependency: `directory` (for plugin-path discovery in `withCPU`/`withGPU`).\n*
  Test count: 155 CPU tests + 6 GPU integration tests.\n\n## 0.5.0.0 -- 2026-04-27\n\n*
  **Autograd** — reverse-mode automatic differentiation is now part of HHLO.\n  New
  module `HHLO.Autograd` provides `grad` and `vjp` combinators that\n  transform HHLO
  computation graphs into their gradients, producing new\n  StableHLO modules that
  compile via PJRT. VJP rules cover ~25 ops including\n  element-wise arithmetic,
  matmul, transpose, reshape, broadcast, reduce,\n  slice, pad, concatenate, select,
  and more.\n* New convenience ops:\n  * `einsum` — Einstein summation via subscript
  strings (e.g. `\"ij,jk->ik\"`).\n    Parses labels, computes batch/contracting dims,
  and emits the correct\n    `stablehlo.dot_general` + optional `stablehlo.transpose`.\n
  \ * `split` — split a tensor into N equal parts along a dimension.\n  * `stack`
  — stack N tensors along a new axis.\n  * `productAll`, `productDim` — product reductions
  (mirrors `sumAll`/`reduceSumDim`).\n  * `topK` — return top-K values along a dimension
  via `sort` + `slice`.\n* Bug fix: `stablehlo.sort` now wraps its region in parentheses
  for PJRT\n  v1.16.0 parser compatibility.\n* Test count: 181 CPU tests + 6 GPU integration
  tests.\n\n## 0.6.0.0 -- 2026-04-28\n* **Convolution & pooling VJP rules** — autograd
  now supports backprop through\n  `conv2d`, `transposeConvolution`, `maxPool`, and
  `avgPool`.\n  * `vjpConvolution` / `vjpTransposeConvolution` emit backward input
  via\n    flipped-kernel transposed conv and skip backward-kernel computation when\n
  \   the kernel is a constant (the common `gradModule` case).\n  * `vjpReduceWindow`
  supports both sum-based (avgPool) and select-mask-based\n    (maxPool) backward
  passes.\n  * New primitive emitters: `bconvolution`, `breverse`.\n  * PJRT parser
  compatibility: `stablehlo.reverse` custom pretty-printer and\n    `batch_group_count`
  / `feature_group_count` attributes on backward convs.\n  \n## 0.7.0.0 -- 2026-04-28\n\n*
  **Multi-parameter gradients** — `gradModule` is no longer limited to a single\n
  \ input. New combinators `gradModule2`, `gradModule3`, `grad2`, `grad3`\n  differentiate
  w.r.t. multiple tensors natively.\n* **ParamTree** — generic pack/unpack for structured
  parameter records.\n  Derive via `GHC.Generics` and use `gradWithParams` to train
  models with\n  dozens of weight tensors without manual offset math.\n  ```haskell\n
  \ data MLPParams = MLPParams { w :: Tensor '[2,2] 'F32, b :: Tensor '[2] 'F32 }\n
  \     deriving (Generic)\n  instance ParamTree MLPParams\n  trainStep params x =
  gradWithParams loss params x\n  ```\n\n* New E2E autograd tests: `grad conv2d`,
  `grad maxPool`, `grad avgPool`,\n  `grad2 multiply`, `gradWithParams`.\n* New unit
  tests: `vjpConvolution`, `vjpTransposeConvolution`, `vjpReduceWindow`,\n  `gradModule2`.\n*
  Bug fix: `vjpSlice` padding value is now a 0D scalar (required by\n  `stablehlo.pad`).\n
  \ \n* **Comprehensive tutorial** — new document `doc/tutorial.md` (720 lines)\n
  \ providing a complete guided tour from `add` two scalars to multi-GPU\n  distributed
  inference. Covers: shapes-as-types, the full EDSL, NN primitives,\n  autograd (`grad`/`grad2`/`grad3`/ParamTree),
  control flow, async execution,\n  and a deep-dive into the architecture and PJRT
  pipeline.\n* Test count: 190 CPU tests + 6 GPU integration tests.\n\n## 0.8.0.0
  -- 2026-04-29\n\n* **Nested ParamTree** — `ParamTree` now supports arbitrarily nested
  records\n  via an overlapping `GParamTree (K1 R a)` instance. Fields can be other\n
  \ `ParamTree` records, not just bare `Tensor`s.\n  ```haskell\n  data LayerParams
  = LayerParams { w :: Tensor '[2] 'F32, b :: Tensor '[2] 'F32 }\n      deriving (Generic)\n
  \ instance ParamTree LayerParams\n\n  data ModelParams = ModelParams { layer1 ::
  LayerParams, layer2 :: LayerParams }\n      deriving (Generic)\n  instance ParamTree
  ModelParams\n  ```\n* New E2E autograd test: `gradWithParams nested`.\n* Massive
  GPU test expansion — from 6 to 82 GPU integration tests.\n  * New shared GPU test
  harness (`Test.Runtime.GPUResource`) using `tasty`\n    `withResource` for a single
  PJRT client shared across all GPU tests.\n  * GPU counterparts for nearly all CPU
  EndToEnd test categories:\n    Arithmetic (15), Shape (8), Matmul (6), NN (7), Reductions
  (5),\n    DataMovement (15), MultiValue (6), Autograd (10), Session (4).\n  * New
  typed GPU helpers: `toDeviceF32On`, `toDevicePredOn`, `toDeviceS64On`.\n  * Total:
  191 CPU tests + 82 GPU tests = 273 tests.\n* New `sessionFrom` constructor in `HHLO.Session`
  — create a `Session` from an\n  existing PJRT API/client/device without loading
  a new plugin.\n* Fixed `CUDA_ERROR_OUT_OF_MEMORY` warnings during GPU tests by converting\n
  \ `SessionGPU` tests to reuse the shared PJRT client (was creating 4 separate\n
  \ clients via `withGPU`, each contending for the same GPU memory).\n* Moved `getPluginPath`
  from `HHLO.Session` to `HHLO.Runtime.PJRT.Plugin`.\n  `withPJRTCPU` and `withPJRTGPU`
  now resolve plugin paths via the\n  `HHLO_PJRT_CPU_PLUGIN` / `HHLO_PJRT_GPU_PLUGIN`
  environment variables\n  (falling back to `deps/pjrt/`), so downstream libraries
  no longer need to\n  reimplement plugin discovery.\n\n## 0.9.0.0 -- 2026-04-20\n\n*
  **Fixed-length configuration vectors** — rank-polymorphic EDSL ops now use\n  `vector-sized`
  to tie config vector lengths to tensor ranks at compile time.\n  This eliminates
  the class of bugs where wrong-length config silently produces\n  invalid StableHLO.\n
  \ * Phase 1 (2D NN primitives): `conv2dWithPadding`, `maxPool`, `avgPool`,\n    `transposeConvolution`
  accept `V2 Int64` / `P2`.\n  * Phase 2+ (rank-polymorphic ops): `transpose`, `slice`,
  `pad`,\n    `dynamicSlice`, `reduceWindow`, and `dotGeneral` now accept\n    `Vector
  (Length s) Int64` or separate `Vector n Int64` type parameters\n    instead of raw
  `[Int64]`.\n  ```haskell\n  -- BEFORE (could silently miscompile)\n  transpose [1,
  0] x\n  slice x [1] [3] [1]\n  dotGeneral [] [] [1] [0] x y\n\n  -- AFTER (type-safe)\n
  \ transpose (v2 1 0) x\n  slice x (v1 1) (v1 3) (v1 1)\n  dotGeneral VS.empty VS.empty
  (v1 1) (v1 0) x y\n  ```\n  New exports in `HHLO.Core.Types`: `Length` type family,
  `V`, `V1`, `V2`,\n  `V3`, `V4`, `Padding`, `P2`, plus smart constructors `v1`, `v2`,
  `v3`, `v4`,\n  `p2`.\n* New dependency: `vector-sized >= 1.5 && < 1.6`.\n* Fix `transposeConvolution`
  lhs_dilation bug — passing a 2-element spatial\n  dilation list no longer drops
  the second element.\n* `gather` and `scatter` kept as `[Int64]` for now. Their config
  vector lengths\n  depend on complex relationships between operand / indices / result
  ranks, so\n  a clean type-safe design requires a separate future phase.\n"
changelog-type: markdown
description: |
  # HHLO — Haskell Frontend for StableHLO

  HHLO is a Haskell library for building, compiling, and executing machine learning programs that target [StableHLO](https://github.com/openxla/stablehlo), the portable, versioned IR of the [OpenXLA](https://openxla.org/) ecosystem.

  It lets you write ML models in pure Haskell with compile-time shape checking, compile them to CPU or GPU via the [PJRT](https://github.com/openxla/xla/blob/main/xla/pjrt/c/pjrt_c_api.h) C API, and even differentiate them automatically — all without leaving the type system.

  ```haskell
  {-# LANGUAGE DataKinds, TypeApplications #-}
  import HHLO.Session
  import HHLO.EDSL.Ops
  import HHLO.Autograd

  -- Define a model, differentiate it, and run it on CPU in 6 lines.
  main = withCPU $ \sess -> do
      let f x = sumAll =<< multiply x x
          gradMod = gradModule @'[3] @'F32 f
      compiled <- compile sess gradMod
      result   <- run sess compiled (hostFromList @'[3] @'F32 [1, 2, 3])
      print (hostToList result)   -- [2.0, 4.0, 6.0]
  ```

  ---

  ## Table of Contents

  - [Why HHLO?](#why-hhlo)
  - [Design Philosophy](#design-philosophy)
  - [Features](#features)
    - [Type-Safe EDSL](#type-safe-edsl)
    - [Convenience Ops](#convenience-ops)
    - [Autograd](#autograd)
    - [Runtime & Hardware](#runtime--hardware)
    - [Control Flow & RNG](#control-flow--rng)
  - [Quick Start](#quick-start)
  - [Examples](#examples)
  - [Installation](#installation)
  - [Project Structure](#project-structure)
  - [License](#license)

  ---

  ## Why HHLO?

  Most ML frameworks trace Python code to build computation graphs. HHLO takes a different path: you write StableHLO directly in Haskell.

  This means:

  - **No Python runtime** — Your model is ordinary Haskell code.
  - **Compile-time shape safety** — Matmul mismatches are type errors, not runtime failures.
  - **Native autograd** — Reverse-mode differentiation is implemented as a Haskell library, not a C++ backend.
  - **True portability** — StableHLO is a standardized, versioned IR; the same Haskell code runs on CPU, NVIDIA GPU, or any future PJRT backend.

  ---

  ## Design Philosophy

  ### Text Emission + PJRT

  HHLO emits StableHLO MLIR text and hands it straight to `PJRT_Client_Compile`. This is the same compilation path used by JAX's C++ backend, but without the heavy dependency of building LLVM/MLIR from source.

  ### Phantom Types

  Every tensor carries its shape and dtype as phantom type parameters:

  ```haskell
  Tensor '[2, 3] 'F32   -- 2×3 matrix of Float32
  Tensor '[4]    'F64   -- 4-element vector of Float64
  ```

  Matmul, broadcast, and conv shapes are checked at compile time via type families. If the shapes don't match, GHC tells you before you ever load a PJRT plugin.

  ### Layered Architecture

  HHLO is structured so you can use as much or as little abstraction as you need:

  ```
  ┌─────────────────────────────────────┐
  │  Session (HHLO.Session)             │  One-liners: withCPU, compile, run
  ├─────────────────────────────────────┤
  │  Autograd (HHLO.Autograd)           │  grad, vjp, gradModule — reverse-mode AD
  ├─────────────────────────────────────┤
  │  EDSL (HHLO.EDSL.Ops)               │  Type-safe frontend: add, matmul, einsum, etc.
  ├─────────────────────────────────────┤
  │  IR Builder (HHLO.IR.Builder)       │  Stateful monad for constructing MLIR
  ├─────────────────────────────────────┤
  │  Pretty Printer (HHLO.IR.Pretty)    │  Emits StableHLO MLIR text
  ├─────────────────────────────────────┤
  │  PJRT Runtime (HHLO.Runtime.*)      │  Compile → Execute on CPU or GPU
  └─────────────────────────────────────┘
  ```

  The high-level layers (`Session`, `Autograd`) eliminate PJRT boilerplate for the common case. The low-level layers (`IR.Builder`, `Pretty`, `Runtime`) remain available when you need full control.

  ---

  ## Features

  ### Type-Safe EDSL

  The frontend provides 50+ typed ops covering arithmetic, linear algebra, reductions, data movement, and neural network primitives:

  ```haskell
  -- Arithmetic
  c <- add a b
  d <- multiply a b
  e <- matmul a b

  -- Non-linear
  y <- relu x
  y <- sigmoid x
  y <- softmax x

  -- Reductions
  s <- sumAll x                    -- reduce all dims → scalar
  v <- reduceSumDim @0 x           -- reduce dim 0

  -- Data movement
  sliced <- slice x [(0, 2), (1, 3)]   -- extract sub-array
  padded <- pad x 0 [(1, 1), (0, 0)]   -- pad with zeros
  trans  <- transpose x [1, 0]         -- permute dimensions
  ```

  Shape mismatches are caught at compile time. A matmul between a `[2,3]` and a `[4,5]` tensor is a type error, not a segfault.

  ### Convenience Ops

  Beyond the raw StableHLO surface, HHLO provides higher-level combinators that compose primitive ops into familiar patterns:

  | Op | What it does |
  |---|---|
  | `einsum "ij,jk->ik" a b` | Einstein summation (dispatches to `dotGeneral` + `transpose`) |
  | `split dim n t` | Decompose a tensor into `n` equal slices along `dim` |
  | `stack dim [t1, t2, ...]` | Concatenate tensors along a new axis `dim` |
  | `productAll t` | Reduce all dimensions with `multiply` (like `sumAll` but product) |
  | `productDim dims t` | Reduce specific dimensions with `multiply` |
  | `topK k t` | Return the top-K elements (sort descending + slice) |

  These are implemented as pure compositions of existing EDSL ops, so they inherit full autograd support automatically.

  ### Autograd

  HHLO includes a native reverse-mode automatic differentiation engine that transforms StableHLO computation graphs into their gradients.

  **Standalone modules** — produce a reusable `Module`:

  ```haskell
  -- f(x) = sum(x²)   =>   grad f(x) = 2x
  gradMod :: Module
  gradMod = gradModule @'[3] @'F32 $ \x -> do
      sq <- multiply x x
      sumAll sq
  ```

  **Multi-parameter gradients** — differentiate w.r.t. multiple inputs natively:

  ```haskell
  -- g(x, y) = sum(x * y)   =>   (grad_x = y, grad_y = x)
  (gradX, gradY) <- grad2 (\x y -> sumAll =<< multiply x y) xVal yVal
  ```

  **Structured parameters with ParamTree** — train models with many weights
  without manual pack/slice bookkeeping:

  ```haskell
  {-# LANGUAGE DeriveGeneric #-}

  data MLPParams = MLPParams
      { w1 :: Tensor '[2,2] 'F32
      , b1 :: Tensor '[2]   'F32
      , w2 :: Tensor '[1,2] 'F32
      , b2 :: Tensor '[1]   'F32
      } deriving (Generic)

  instance ParamTree MLPParams

  loss p x = do
      h  <- relu =<< add (matmul x (w1 p)) (b1 p)
      y  <- add (matmul h (w2 p)) (b2 p)
      diff <- sub y target
      sumAll =<< multiply diff diff

  -- Returns an MLPParams of gradients
  dParams <- gradWithParams loss params x
  ```

  **In-place combinators** — use inside `buildModule` for composability:

  ```haskell
  buildModule @1 @1 "loss_and_grad" $ \x -> do
      loss <- sumAll =<< multiply x x
      g    <- grad (\y -> sumAll (multiply y y)) x
      returnTuple2 loss g
  ```

  **Vector-Jacobian products** — for non-scalar outputs:

  ```haskell
  -- vjp f x seed = (Df(x))ᵀ · seed
  vjpModule @'[3] @'[2] @'F32
      (\x -> do w <- constant @'[2,3] @'F32 1.0; matmul w x)
  ```

  Supported ops: `add`, `subtract`, `multiply`, `divide`, `negate`, `exponential`, `log`, `sqrt`, `power`, `sine`, `cosine`, `tanh`, `abs`, `maximum`, `minimum`, `reshape`, `transpose`, `broadcast_in_dim`, `reduce` (sum), `dot`, `select`, `slice`, `pad`, `concatenate`, `convert`, `convolution`, `reduce_window`, and more.

  Ops without gradient rules (e.g. `compare`, `floor`, `ceil`, `sort`) safely return zero gradients. Stubs (e.g. `gather`, `scatter`) error explicitly.

  ### Runtime & Hardware

  **CPU & GPU**

  The same Haskell code compiles to CPU via `withCPU` or to GPU via `withGPU`:

  ```haskell
  withCPU $ \sess -> do ...   -- CPU plugin, works out of the box
  withGPU $ \sess -> do ...   -- CUDA plugin, requires NVIDIA runtime libs
  ```

  **Async Execution**

  `HHLO.Runtime.Async` provides true non-blocking execution:

  ```haskell
  bufs <- executeAsync api exec inputs
  ready <- bufferReady api (head bufs)   -- poll
  awaitBuffers api bufs                   -- block until done
  ```

  **Multi-GPU Inference**

  Run the same compiled model concurrently across multiple GPUs:

  ```haskell
  compileWithOptions api client mlirText
      (defaultCompileOptions { optNumReplicas = numDevs })

  executeReplicas api exec
      [ (gpu0, [bufA0, bufB0])
      , (gpu1, [bufA1, bufB1])
      , ...
      ]
  ```

  **ForeignPtr Finalizers**

  PJRT buffers and executables are managed by `ForeignPtr` finalizers. They are automatically destroyed when garbage-collected — no explicit cleanup required.

  ### Control Flow & RNG

  **Multi-Value Control Flow**

  `whileLoop2` / `conditional2` carry multiple typed tensors through loops and conditionals without manual packing:

  ```haskell
  (resultCounter, resultSum) <- whileLoop2 counter0 sum0
      (\c s -> compare c limit "LT")
      (\c s -> do
          cNext <- add c one
          sNext <- add s cNext
          returnTuple2 cNext sNext)
  ```

  **Random Number Generation**

  ```haskell
  uniform  <- rngUniform a b      -- uniform in [a, b)
  normal   <- rngNormal            -- standard normal (mean 0, std 1)
  (newSt, bits) <- rngBitGenerator state   -- Threefry bit generator
  ```

  ---

  ## Quick Start

  ### 1. Download PJRT plugins

  ```bash
  ./pjrt_script.sh
  ```

  This fetches `libpjrt_cpu.so` into `deps/pjrt/`. If you have an NVIDIA GPU, the CUDA plugin is also downloaded automatically.

  You can also point HHLO to an existing PJRT plugin via environment variables:
  ```bash
  export HHLO_PJRT_CPU_PLUGIN=/path/to/libpjrt_cpu.so
  export HHLO_PJRT_GPU_PLUGIN=/path/to/libpjrt_cuda.so
  ```

  ### 2. Build

  ```bash
  cabal build all
  ```

  ### 3. Run an example

  ```bash
  # CPU — works out of the box
  cabal run example-add --flag=examples

  # Autograd
  cabal run example-autograd-basic --flag=examples
  ```

  ### 4. Run tests

  ```bash
  cabal test                    # 191 CPU tests
  ```

  GPU tests are **opt-in** via the `HHLO_TEST_GPU` environment variable (they require an NVIDIA GPU and the PJRT CUDA plugin):

  ```bash
  HHLO_TEST_GPU=1 cabal test    # 191 CPU + 82 GPU tests = 273 total
  ```

  ---

