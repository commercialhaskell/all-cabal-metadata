changelog: |
  #+TITLE: Changelog for swiss-army-knife
  #+AUTHOR: Fred Mitchell
  #+EMAIL: fred.mitchell@atomlogik.de

  * 1.1.0.4 - 2026-07-01
    + Adjusted cabal version to be lower for better coverage.
    + GHC2021 for better coverage
  ** Added
  - Cross-distro =sak kernel= command
    - Now works on Arch, Debian, Ubuntu, Linux Mint, Pop!_OS, Fedora, RHEL, CentOS, Rocky Linux, and AlmaLinux
    - Detects running kernel via =uname -r=
    - Shows installed kernels using the native package manager (=pacman=, =dpkg-query=, or =rpm=)
    - Graceful handling when optional kernel packages (e.g. =linux-lts=) are not installed

  ** Changed
  - =Knives.Kernel= module is now fully distribution-agnostic
  - Cleaner output formatting with proper newlines
  - More robust command execution (no crashes on missing packages)

  ** Fixed
  - Trailing newlines from =readProcess=
  - Ambiguous exception type error on GHC 9.14

  * 1.0.0.1 and earlier
  ** Versions
     + 1.1.0.0 - Hackage release, renamed to swiss-army-knife (dropping the
                  "-hs" from the name. AUR will pull from Hackage instead.
                  of GitHub.
     + 1.0.0.1 - enable and disable daemons, wg -l list has an extra field.
                - Changelog.org removed. Basically a duplication of Versions here.
                - version 1.0.0.0 was stillborn. Installation issues fixed
     + 0.1.0.4 - fix for install issues with 0.1.0.3
     + 0.1.0.3 - 2 new feature, internally invokes sudo,
        adopted "standard" for 4 number versioning X.Y.Z.W:

        | # | Description                                   |
        |---+-----------------------------------------------|
        | X | Major version (breaking changes)              |
        | Y | Minor version (new features)                  |
        | Z | Patch version (bug fixes)                     |
        | W | Build or revision number (specific iteration) |

        So from now on, this will be applied.
     + 0.0.1.1 - new feature added
     + 0.0.0.2 - bug fixes
changelog-type: text
description: "* swiss-army-knife :TOC_7_gh:\n  - [[#created-by][Created By]]\n  -
  [[#introduction][Introduction]]\n  - [[#documentation][Documentation]]\n    - [[#sak---help][sak
  --help]]\n    - [[#sak-extip][sak extip]]\n    - [[#sak-kernel][sak kernel]]\n    -
  [[#sak-sleep][sak sleep]]\n    - [[#sak-zfscheck][sak zfscheck]]\n    - [[#sak-wg][sak
  wg]]\n    - [[#sak-nm][sak nm]]\n    - [[#sak-sn][sak sn]]\n  - [[#examples][Examples]]\n\n**
  Created By\n   Fred Mitchell & Atomlogik\n      \n** Introduction\n   Swiss-Army-Knife
  is a collection of useful\n   tools that you can do quickly.\n   \n   This is now
  in Hackage and the AUR. So in theory,\n   it can run \"anywhere\", though I have
  not had the time to test this,\n   so I am open to comments and pull requests. In
  particular, it is \n   gauranteed to run on Arch, and I do have some support for
  other\n   distros, and that will grow. But I have not had the time to fully\n   test
  other distros.\n\n   So some knives will run \"anywhere\", but some that call out
  to\n   the system for system-specific information may have issues.\n   As I find
  out about them, I will fix them as quickly as I can.\n\n** Documentation\n   These
  are the current \"knives\" implemented. More to come. Open\n   to suggestions.\n
  \  + Note that you no longer have to prepend \"sudo\" to do system-level\n      operations.\n***
  sak --help\n    Will list all the current commands.\n*** sak extip\n    Will tell
  you what your external IP is for your connection,\n    either in IPv4 or IPv6 Useful
  if you use a VPN\n*** sak kernel\n    Will tell you the version of the installed
  kernel as well\n    as the running version. Support is in for Arch, Debian, and\n
  \   RedHat, but only Arch has been tested.\n*** sak sleep\n    Will put your system
  in standby mode.\n*** sak zfscheck\n    If you use the zfs from archzfs, sometimes
  it \n    does not keep up with the latest kernel release.\n    Check to see the
  latest kernel zfs supports before\n    you do a system upgrade. Other distros will
  probably\n    not have the zfs sync issues that Arch does.\n*** sak wg\n    If you
  use WireGuard for your VPN, manage it from\n    here. List your installed WireGuard
  options,\n    and swap among them. you can start, stop, and list your\n    WireGuard
  VPNs.\n\n    Now supports enabling and disabling of the underlying daemon.\n***
  sak nm\n    Manage NetworkManager\n    Now supports enabling and disabling of the
  underlying daemon.\n\n*** sak sn\n    Manage systemd-networkd\n    Now supports
  enabling and disabling of the underlying daemon.\n\n** Examples\n   | Command   |
  Description                                                                                                        |\n
  \  |-----------+--------------------------------------------------------------------------------------------------------------------|\n
  \  | sak extip | Will list your external IP and location information                                                                |\n
  \  | sak wg -l | (If you are using wg_quick) will list all of your available WG
  vpns, as well as their active and enabled statuses. |\n   | sak wg -d | Will deactivate
  (but not disable) all WireGuard VPNs.                                                            |\n
  \  | sak wg -D | Will disable (but not deactivate) all WireGuard VPNs.                                                              |\n
  \  | sak sn -A | Will enable and start systemd-networkd.                                                                            |\n
  \  | sak nm -D | Will disable and stop NetworkManager.                                                                              |\n
  \  |-----------+--------------------------------------------------------------------------------------------------------------------|\n"
