changelog: "#+TITLE: Changelog for swiss-army-knife\n#+AUTHOR: Fred Mitchell\n#+EMAIL:
  fred.mitchell@atomlogik.de\n* 1.1.0.5 - 2026-07-11\n  + Made build static to get
  around dynamic mixmatch issues with GHC versions.\n  + Static made optional for
  Hackage installs. \n* 1.1.0.4 - 2026-07-01\n  + Adjusted cabal version to be lower
  for better coverage.\n  + GHC2021 for better coverage\n** Added\n- Cross-distro
  =sak kernel= command\n  - Now works on Arch, Debian, Ubuntu, Linux Mint, Pop!_OS,
  Fedora, RHEL, CentOS, Rocky Linux, and AlmaLinux\n  - Detects running kernel via
  =uname -r=\n  - Shows installed kernels using the native package manager (=pacman=,
  =dpkg-query=, or =rpm=)\n  - Graceful handling when optional kernel packages (e.g.
  =linux-lts=) are not installed\n\n** Changed\n- =Knives.Kernel= module is now fully
  distribution-agnostic\n- Cleaner output formatting with proper newlines\n- More
  robust command execution (no crashes on missing packages)\n\n** Fixed\n- Trailing
  newlines from =readProcess=\n- Ambiguous exception type error on GHC 9.14\n\n* 1.0.0.1
  and earlier\n** Versions\n   + 1.1.0.0 - Hackage release, renamed to swiss-army-knife
  (dropping the\n                \"-hs\" from the name. AUR will pull from Hackage
  instead.\n                of GitHub.\n   + 1.0.0.1 - enable and disable daemons,
  wg -l list has an extra field.\n              - Changelog.org removed. Basically
  a duplication of Versions here.\n              - version 1.0.0.0 was stillborn.
  Installation issues fixed\n   + 0.1.0.4 - fix for install issues with 0.1.0.3\n
  \  + 0.1.0.3 - 2 new feature, internally invokes sudo,\n      adopted \"standard\"
  for 4 number versioning X.Y.Z.W:\n\n      | # | Description                                   |\n
  \     |---+-----------------------------------------------|\n      | X | Major version
  (breaking changes)              |\n      | Y | Minor version (new features)                  |\n
  \     | Z | Patch version (bug fixes)                     |\n      | W | Build or
  revision number (specific iteration) |\n\n      So from now on, this will be applied.\n
  \  + 0.0.1.1 - new feature added\n   + 0.0.0.2 - bug fixes\n"
changelog-type: text
description: "* swiss-army-knife :TOC_7_gh:\n  - [[#created-by][Created By]]\n  -
  [[#introduction][Introduction]]\n  - [[#installation][Installation]]\n    - [[#statiic-builds-from-hackage][Statiic
  Builds from Hackage]]\n  - [[#documentation][Documentation]]\n    - [[#sak---help][sak
  --help]]\n    - [[#sak-extip][sak extip]]\n    - [[#sak-kernel][sak kernel]]\n    -
  [[#sak-sleep][sak sleep]]\n    - [[#sak-zfscheck][sak zfscheck]]\n    - [[#sak-wg][sak
  wg]]\n    - [[#sak-nm][sak nm]]\n    - [[#sak-sn][sak sn]]\n  - [[#examples][Examples]]\n\n**
  Created By\n   Fred Mitchell & Atomlogik\n      \n** Introduction\n   Swiss-Army-Knife
  is a collection of useful\n   tools that you can do quickly.\n   \n   This is now
  in Hackage and the AUR. So in theory,\n   it can run \"anywhere\", though I have
  not had the time to test this,\n   so I am open to comments and pull requests. In
  particular, it is \n   gauranteed to run on Arch, and I do have some support for
  other\n   distros, and that will grow. But I have not had the time to fully\n   test
  other distros.\n\n   So some knives will run \"anywhere\", but some that call out
  to\n   the system for system-specific information may have issues.\n   As I find
  out about them, I will fix them as quickly as I can.\n** Installation\n   + using
  cabal (recommended)\n     cabal update\n     cabal install swiss-army-knife\n   +
  On Arch from the AUR\n     | using aura | aura -A swiss-army-knife |\n     | using
  yay  | yay -S swiss-army-knife  |\n     | using paru | paru -S swiss-army-knife
  |\n*** Statiic Builds from Hackage \n    To build a statically-linked binary, install:\n
  \   + `ghc-static` (Arch: `pacman -S ghc-static`)\n    + a static gmp (Arch: AUR
  `libgmp-static`)\n    + a static zlib — Arch's official package dropped `libz.a`
  as of 1.3.2;\n       build it yourself from https://zlib.net if needed.\n    Then:
  `cabal install swiss-army-knife -fstatic`\n** Documentation\n   These are the current
  \"knives\" implemented. More to come. Open\n   to suggestions.\n   + Note that you
  no longer have to prepend \"sudo\" to do system-level\n      operations.\n*** sak
  --help\n    Will list all the current commands.\n*** sak extip\n    Will tell you
  what your external IP is for your connection,\n    either in IPv4 or IPv6 Useful
  if you use a VPN\n*** sak kernel\n    Will tell you the version of the installed
  kernel as well\n    as the running version. Support is in for Arch, Debian, and\n
  \   RedHat, but only Arch has been tested.\n*** sak sleep\n    Will put your system
  in standby mode.\n*** sak zfscheck\n    If you use the zfs from archzfs, sometimes
  it \n    does not keep up with the latest kernel release.\n    Check to see the
  latest kernel zfs supports before\n    you do a system upgrade. Other distros will
  probably\n    not have the zfs sync issues that Arch does.\n*** sak wg\n    If you
  use WireGuard for your VPN, manage it from\n    here. List your installed WireGuard
  options,\n    and swap among them. you can start, stop, and list your\n    WireGuard
  VPNs.\n\n    Now supports enabling and disabling of the underlying daemon.\n***
  sak nm\n    Manage NetworkManager\n    Now supports enabling and disabling of the
  underlying daemon.\n\n*** sak sn\n    Manage systemd-networkd\n    Now supports
  enabling and disabling of the underlying daemon.\n\n** Examples\n   | Command   |
  Description                                                                                                        |\n
  \  |-----------+--------------------------------------------------------------------------------------------------------------------|\n
  \  | sak extip | Will list your external IP and location information                                                                |\n
  \  | sak wg -l | (If you are using wg_quick) will list all of your available WG
  vpns, as well as their active and enabled statuses. |\n   | sak wg -d | Will deactivate
  (but not disable) all WireGuard VPNs.                                                            |\n
  \  | sak wg -D | Will disable (but not deactivate) all WireGuard VPNs.                                                              |\n
  \  | sak sn -A | Will enable and start systemd-networkd.                                                                            |\n
  \  | sak nm -D | Will disable and stop NetworkManager.                                                                              |\n
  \  |-----------+--------------------------------------------------------------------------------------------------------------------|\n"
