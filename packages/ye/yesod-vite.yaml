description: "# `yesod-vite`\n\nYesod \U0001F49C Vite.\n\n\nThis package provides
  an implement for the `yesod` web framework to connect with vite.\nVite is a modern
  build tool used across stacks.\n\n## Quick Start\nThe assumption here is that your
  setup is similar to the default Yesod scaffold.\nYou will need to have installed
  both `yesod-static` and `yesod-vite` for this to work.\nIn addition, you will need
  the static subsite configured, as the route constructor is required.\n- Run `npm
  init -y` or the equivalent for your build tool.\n- Run `npm i -D vite` or the equivalent
  for your build tool.\n- Create a `vite.config.js` to include the following:\n```javascript\nimport
  { defineConfig } from \"vite\";\nimport * as path from \"node:path\";\nexport default
  defineConfig({\n  plugins: [],\n  base: \"/static/\",\n  build: {\n    outDir: path.resolve(\"./static\"),\n
  \   manifest: \"manifest.json\",\n    rollupOptions: {\n      input: path.resolve(\"./assets/src/app.js\"),\n
  \   },\n  },\n});\n```\n- Install and configure \"Yesod.Static\" for your application.\n-
  Setup 'YesodVite' as the following:\n```haskell\ninstance YesodVite App where\n
  \ viteBuildDir :: app -> IO FilePath\n  vitebuildDir app = return $ appStaticDir
  app\n  viteInDev :: app -> IO Bool\n  viteinDev app = return . const True\n  viteRoute
  :: Route Static -> Route site\n  viteRoute = StaticR\n```\n- Add the `viteAsset
  \\<asset-name\\>` to your default layout.\n"
