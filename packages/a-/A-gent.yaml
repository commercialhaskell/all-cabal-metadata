changelog: "# Revision history for Λ-gent\n\n## 0.11.0.3  -- 2026-03-06\n\n* Made
  `read` usable by providing support for:\n\n  * `BACKSPACE` and `DELETE` to remove
  characters.\n  \n  * Move back and forth with `←` & `→` (single characters) and
  `CTRL + ←` &\n    `CTRL + →` (words).\n    \n  * Move to start and end of the text
  with `HOME` and `END`.\n\n## 0.11.0.2  -- 2026-03-05\n\n* Fixed issue with Hackage.
  The project now builds for:\n  * `ghc-9.4.8`\n  * `ghc-9.6.7`\n  * `ghc-9.8.4`\n
  \ * `ghc-9.10.3`\n  * `ghc-9.12.2`\n\n## 0.11.0.1  -- 2026-03-05\n\n* Issue with
  Hackage. Since the service builds with `9.8.4` we have to comply\n  with that.\n\n##
  0.11.0.0  -- 2026-03-04\n\n* Initial release after feedback from the NixOS Copenhagen
  User Group, March\n  meetup: <https://www.meetup.com/nixos-copenhagen-user-group/events/313205865/>\n\n*
  There is a `BUG` when trying to print emojii's ('\U0001F34E', '\U0001F34F', …):\n
  \ ```shell\n  <stdout>: hPutChar: invalid argument (cannot encode character '\\55357'\n
  \ ```\n\n## 0 -- 2026-02-25\n\n* First version. Released on an unsuspecting world.\n\n##
  References\n\n* Use of a fourth component [Version scheme][haskell-stack-ver].\n\n[haskell-stack-ver]:
  https://docs.haskellstack.org/en/v3.5.1/maintainers/version_scheme/#use-of-a-fourth-component\n"
