changelog: "# Revision history for О›-gent\n\n## 0.11.0.12 -- 2026-05-12\n\nThere have
  been made some **major changes** to this library and therefore there\nis no backwards
  compatibility with previous versions:\n\n* Added support for `Code` mode, as in
  `read` and `write` files back and forth\n  to the `git` repository. A new tab will
  be added to the website with a script\n  explaining usage.\n\n* Added support for
  script integrity as known from `HTML`:\n\n  ```\n  <script integrity=\"sha256-YBbjT3uJjnS6ofC6HIal+4vNvgA9vZBfC/KMVN51URc=\"
  вЂ¦></script>\n  ```\n  \n  If the `LLM_SIGN_SHA` environment variable is provided
  on execution, the\n  script will check it's own file `SHA-256` hash and compare
  to the provided:\n  \n  ```\n  # О›-gent integrity failed:\n  > 2d3c326e2991da5876b820fe128c3840d3c0664c43907ce725f3f3f26f2fbabc
  (expected)\n  > 8f89a79f891ce329a6142c68962fcad0b438e7d0b80c9410f0141cc6c02437d0
  (observed)\n  ```\n\n* Adding `uuid` to main context future purposes.\n\n* Due to
  refactoring, the context lost a few properties (ex: `exit`, `hist`,\n  `root`, вЂ¦)
  and some of the internals have changed. Still same output, but,\n  less chaotic.
  Furthermore, `rootPath` is no longer needed.\n\n* Due to refactoring, some of the
  exposed utils are no longer\n  relevant. Therefore, they are moved to an internal
  module.\n\n* Removed quotes from `curl` headers as some `LLM` API's would parse
  them, but\n  others would not.\n\n* Followed up on binary flags as we need to have
  the **least common** between\n  `Linux` distros and `macOS`.\n\n* Added the `/repo`
  command to help parse and store files received from LLM's\n  `atomically` with help
  of `git worktree`.\n\n* Added `message` and `action` types simplify and make more
  robust the\n  interactions between user and `О›-gent`.\n\n* Wrapped `withExitCodeвЂ¦`
  functions in `try` (`Control.Exception`) to ensure the\n  `О›-gents` don't crash
  and burn. Also wrapped `read` and `write` files as well\n  with `try`.\n\n## 0.11.0.11
  -- 2026-04-19\n\n* Fixed a few misspells.\n\n* Refactored `Files` to `FilePaths`.\n\n*
  Refactored `Document(s)` to already existing `File(s)` for simplicity.\n\n* Excluding
  non-files (symbolic links) from search as this could bypass the\n  limitation of
  the current working directory.\n\n## 0.11.0.10 -- 2026-04-17\n\n* Minor bug fixes
  and misspells.\n\n* Moved Agent/JSON.hs to Agent/Data/JSON.hs\n\n## 0.11.0.9 --
  2026-04-16\n\n* Minor bug fixes.\n\n## 0.11.0.8 -- 2026-04-15\n\n* Refactored `/pile`
  to no longer storing a `find` filter but the absolute path\n  to the `find` results.\n
  \ \n  > **NOTE:** Even though absolute path is stored, only relative will be shown.\n
  \ \n* `/list` performance has been improved instead of performing the filters with\n
  \ Haskell, it's now passed to the `find` command.\n  \n* Added logic to request
  `ISO-8601` timestamps (`UTC`) that are file path safe.\n\n* Added to website, info
  tab, a guide on how to setup LSP support for IDE's:\n\n  * https://a-gent.org/info.html#lsp-support-for-ides\n
  \ \n* Due to future `git-worktree` usage, the folder `/tmp/` MUST exist in the root\n
  \ of the project and it needs to be added to the `.gitignore` file to avoid\n  `GIT`
  collisions.\n  \n* Added `Internal.RIO` so the application can execute `RestrictedIO`,
  but,\n  consumers of the `О›-gent` package will NOT.\n\n* All `Context` properties,
  except `load`, have now `internal` constructor\n  types. This will ensure that we
  will know that they have been instantiated by\n  the `О›-gents`.\n  \n* From `0.11.0.6
  -- 2026-03-20` below:\n  \n  > **NOTE**: Fix is not verified. Well, this update
  will confirm (or not).\n  \n  * Package is NO longer marked as broken: https://github.com/NixOS/nixpkgs/blob/haskell-updates/pkgs/development/haskell-modules/configuration-hackage2nix/broken.yaml\n\n*
  Added `withExitCodeStdIn` as `curl` has a limit on data that can be sent as a\n
  \ parameter.\n\n* A `Agent.Data.ANSI.EscapeCode` module has been added to help distinguish\n
  \ between input/output.\n\n* `/send` (`/s`) has been added to provide the capability
  of sending `/pile`\n  files as context to messages sent to LLM's.\n\n* `repl` and
  `replWithMode` now need to provide an optional value for the\n  projects `rootPath`.
  This refactoring has been added to ease logic\n  implementation for the `О›-gent`
  package.\n  \n  > **NOTE**: Changes to current existing О›-gent scripts can be done
  by just\n  > post-fixing `Nothing`. Example: `replWithMode Echo eval Nothing`\n\n##
  0.11.0.7 -- 2026-03-30\n\n* We seem to have fixed multi-line issues. I guess we
  can say that we are\n  probably as good as `GHCi`.\n  \n  > **NOTE:** A thorough
  refactoring needs to be done to enforce `DRY`.\n\n* Added support for:\n\n  * `CTRL
  + L` clear screen.\n    \n  * `CTRL + U` clear text from current position to start
  of input.\n    \n  * `CTRL + K` clear text from current position to end of input.\n
  \   \n  * `CTRL + A` equivalent to `HOME`.\n    \n  * `CTRL + E` equivalent to `END`.\n
  \   \n  * `CTRL + D` equivalent to `DELETE`.\n\n## 0.11.0.6 -- 2026-03-20\n\n* Added
  a `todo.org` file in the root folder of the project. This will allow to\n  see current,
  but also future, status of the project.\n\n* Expanded file capabilities for `Code`
  and `Plan`.\n\n  * Files will be shown with `relative` paths. However, they will
  be handled\n    with `absolute` paths under the hood.\n\n* Added a few more `REPL`
  commands and improvements to typing.\n\n  * **NOTE**: There is a `bug` with regard
  of multi-line text. Hopefully it will\n    be fixed shortly.\n\n* No longer on Bluesky
  and therefore, removed from `cabal` file.\n\n* Issue with `haskellPackages` on `NixOS`.
  It seems that they use `stack` to\n  build with the latest `LTS`. The fix is to
  change in the `cabal` file the\n  following version contraint: `containers >= 0.7
  && < 1` as `stackage` only has\n  the version `0.7` of the `containers` package.\n
  \ \n  * **NOTE**: Fix is not verified. Well, this update will confirm (or not).\n\n*
  Added the `Agent.Control.Concurrent` module to provide support for\n  asynchronous
  tasks.\n\n* Added `Agent.Utils` modules to help for the respective `modes`. This
  will help\n  keep `О›-gent` code small by providing ready to plug code bloks.\n\n##
  0.11.0.5 -- 2026-03-08\n\n* `ENTER` only triggers if something is typed.\n\n## 0.11.0.4
  -- 2026-03-08\n\n* Fixed the `BUG` when trying to print emojii's ('\U0001F34E',
  '\U0001F34F', вЂ¦):\n\n  ```shell\n  <stdout>: hPutChar: invalid argument (cannot
  encode character '\\55357'\n  ```\n  \n  by adding `setLocaleEncoding utf8` to `replWithMode`.
  Now instead of crashing,\n  invalid `UTF-8` characters will just be shown as single
  or multiple `?`.\n\n## 0.11.0.3 -- 2026-03-06\n\n* Made `read` usable by providing
  support for:\n\n  * `BACKSPACE` and `DELETE` to remove characters.\n  \n  * Move
  back and forth with `в†ђ` & `в†’` (single characters) and `CTRL + в†ђ` &\n    `CTRL +
  в†’` (words).\n    \n  * Move to start and end of the text with `HOME` and `END`.\n\n##
  0.11.0.2 -- 2026-03-05\n\n* Fixed issue with Hackage. The project now builds for:\n
  \ * `ghc-9.4.8`\n  * `ghc-9.6.7`\n  * `ghc-9.8.4`\n  * `ghc-9.10.3`\n  * `ghc-9.12.2`\n\n##
  0.11.0.1 -- 2026-03-05\n\n* Issue with Hackage. Since the service builds with `9.8.4`
  we have to comply\n  with that.\n\n## 0.11.0.0 -- 2026-03-04\n\n* Initial release
  after feedback from the NixOS Copenhagen User Group, March\n  meetup: <https://www.meetup.com/nixos-copenhagen-user-group/events/313205865/>\n\n*
  There is a `BUG` when trying to print emojii's ('\U0001F34E', '\U0001F34F', вЂ¦):\n
  \ ```shell\n  <stdout>: hPutChar: invalid argument (cannot encode character '\\55357'\n
  \ ```\n\n## 0 -- 2026-02-25\n\n* First version. Released on an unsuspecting world.\n\n##
  References\n\n* Use of a fourth component [Version scheme][haskell-stack-ver].\n\n[haskell-stack-ver]:
  https://docs.haskellstack.org/en/stable/maintainers/version_scheme/#use-of-a-fourth-component\n"
