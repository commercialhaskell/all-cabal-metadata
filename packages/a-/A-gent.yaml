changelog: "# Revision history for О›-gent\n\n## 0.11.0.7  -- 2026-03-30\n\n* We seem
  to have fixed multi-line issues. I guess we can say that we are\n  probably as good
  as `GHCi`.\n  \n  > **NOTE:** A thorough refactoring needs to be done to enforce
  `DRY`.\n\n* Added support for:\n\n  * `CTRL + L` clear screen.\n    \n  * `CTRL
  + U` clear text from current position to start of input.\n    \n  * `CTRL + K` clear
  text from current position to end of input.\n    \n  * `CTRL + A` equivalent to
  `HOME`.\n    \n  * `CTRL + E` equivalent to `END`.\n    \n  * `CTRL + D` equivalent
  to `DELETE`.\n\n## 0.11.0.6  -- 2026-03-20\n\n* Added a `todo.org` file in the root
  folder of the project. This will allow to\n  see current, but also future, status
  of the project.\n\n* Expanded file capabilities for `Code` and `Plan`.\n\n  * Files
  will be shown with `relative` paths. However, they will be handled\n    with `absolute`
  paths under the hood.\n\n* Added a few more `REPL` commands and improvements to
  typing.\n\n  * **NOTE**: There is a `bug` with regard of multi-line text. Hopefully
  it will\n    be fixed shortly.\n\n* No longer on Bluesky and therefore, removed
  from `cabal` file.\n\n* Issue with `haskellPackages` on `NixOS`. It seems that they
  use `stack` to\n  build with the latest `LTS`. The fix is to change in the `cabal`
  file the\n  following version contraint: `containers >= 0.7 && < 1` as `stackage`
  only has\n  the version `0.7` of the `containers` package.\n  \n  * **NOTE**: Fix
  is not verified. Well, this update will confirm (or not).\n\n* Added the `Agent.Control.Concurrent`
  module to provide support for\n  asynchronous tasks.\n\n* Added `Agent.Utils` modules
  to help for the respective `modes`. This will help\n  keep `О›-gent` code small by
  providing ready to plug code bloks.\n\n## 0.11.0.5  -- 2026-03-08\n\n* `ENTER` only
  triggers if something is typed.\n\n## 0.11.0.4  -- 2026-03-08\n\n* Fixed the `BUG`
  when trying to print emojii's ('\U0001F34E', '\U0001F34F', вЂ¦):\n\n  ```shell\n  <stdout>:
  hPutChar: invalid argument (cannot encode character '\\55357'\n  ```\n  \n  by adding
  `setLocaleEncoding utf8` to `replWithMode`. Now instead of crashing,\n  invalid
  `UTF-8` characters will just be shown as single or multiple `?`.\n\n## 0.11.0.3
  \ -- 2026-03-06\n\n* Made `read` usable by providing support for:\n\n  * `BACKSPACE`
  and `DELETE` to remove characters.\n  \n  * Move back and forth with `в†ђ` & `в†’` (single
  characters) and `CTRL + в†ђ` &\n    `CTRL + в†’` (words).\n    \n  * Move to start and
  end of the text with `HOME` and `END`.\n\n## 0.11.0.2  -- 2026-03-05\n\n* Fixed
  issue with Hackage. The project now builds for:\n  * `ghc-9.4.8`\n  * `ghc-9.6.7`\n
  \ * `ghc-9.8.4`\n  * `ghc-9.10.3`\n  * `ghc-9.12.2`\n\n## 0.11.0.1  -- 2026-03-05\n\n*
  Issue with Hackage. Since the service builds with `9.8.4` we have to comply\n  with
  that.\n\n## 0.11.0.0  -- 2026-03-04\n\n* Initial release after feedback from the
  NixOS Copenhagen User Group, March\n  meetup: <https://www.meetup.com/nixos-copenhagen-user-group/events/313205865/>\n\n*
  There is a `BUG` when trying to print emojii's ('\U0001F34E', '\U0001F34F', вЂ¦):\n
  \ ```shell\n  <stdout>: hPutChar: invalid argument (cannot encode character '\\55357'\n
  \ ```\n\n## 0 -- 2026-02-25\n\n* First version. Released on an unsuspecting world.\n\n##
  References\n\n* Use of a fourth component [Version scheme][haskell-stack-ver].\n\n[haskell-stack-ver]:
  https://docs.haskellstack.org/en/stable/maintainers/version_scheme/#use-of-a-fourth-component\n"
