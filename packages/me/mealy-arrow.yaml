changelog: |
  # Changelog

  ## 0.1.0.0

  * Initial release.
  * `Control.Arrow.Mealy` — coalgebraic Mealy machine (`Auto m a b`)
    with `Category`, `Arrow`, `ArrowChoice`, `ArrowLoop`, `Profunctor`,
    and `Functor` instances.
  * Smart constructors: `stateless`, `stateful`, `constAuto`.
  * Runners: `stepN`, `scanAuto`, `foldAuto`.
  * Natural transformation: `hoistAuto`.
