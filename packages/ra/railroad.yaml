changelog: "# Revision history for railroad\n\n## 0.1.1.1 -- 2026-02-28\n* Widen dependency
  bounds for better GHC compatibility:\n  - `base` → `>= 4.17 && < 4.23` (supports
  GHC 9.4 through 9.14)\n  - `effectful` → `>= 2.5 && < 2.7` (allows current 2.6.x
  series)\n  - `mtl` lower bound relaxed to `>= 2.2`\n\n## 0.1.1.0 -- 2026-02-26\n*
  Add non unicode alias for `(?∅)`\n* Fix the fixity of `(??~)` to be inline with
  `(?~)`\n\n## 0.1.0.1 -- 2026-02-26\n\n* Fix that `Railroad.MonadError` is not exposed
  in the cabal file\n* Fix ambiguous occurrence of `(??~)` in `Railroad.MonadError`
  by hiding it in import.\n* Add tests for the MonadError version of the operators
  such that issues like the above will be caught \n\n## 0.1.0.0 -- 2026-02-25\n\n*
  First version. Released on an unsuspecting world.\n"
changelog-type: markdown
description: "A railway oriented mini-DSL for handling and interpreting error states
